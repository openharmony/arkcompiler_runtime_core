[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "urunner"
dynamic = ["version"]
description = "Universal test runner"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
"dataclasses==0.6",
"python-dotenv==0.20.0",
"pytz==2025.2",
"Jinja2==3.1.2",
"MarkupSafe==2.1.1",
"PyYaml==6.0.1",
"tqdm==4.64.0",
"PyPDF2==3.0.1",
"jinja2-cli==0.8.2",
"tox == 4.21.1",
"pydantic == 2.12.5",
"pydantic-core == 2.41.5",
"ruamel.yaml == 0.18.14",
"numpy == 2.2.6",
"mypy==1.15.0",
"mypy-extensions==1.0.0",
"tomli==2.2.1",
"typing-extensions==4.15.0",
"types-PyYAML==6.0.12.4",
"types-pytz==2025.2.0.20250326",
"astroid==3.3.9",
"dill==0.4.1",
"isort==6.0.1",
"lazy-object-proxy==1.11.0",
"mccabe==0.7.0",
"platformdirs==4.3.7",
"pylint==3.3.6",
"tomlkit==0.11.6",
"wrapt==1.14.1",
"yamllint==1.37.1",
"flake8==7.2.0",
"flake8-bandit==4.1.1",
"flake8-coding==1.3.2",
"flake8-executable==2.1.3",
"pep8-naming==0.14.1",
"pycodestyle==2.13.0",
"ruff==0.11.6",
"radon==6.0.1",
]

[project.scripts]
urunner = "runner.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["runner*"]

[tool.setuptools]
include-package-data = true

[tool.ruff]
target-version = "py310"
preview = true
line-length = 120
exclude = [
  ".git",
  "__pycache__",
  "venv",
  "build",
  "dist",
]

# - E,
# - F: flake8
# - B: bugbear
# - UP: pyupgrade
# - I: isort
# - RUF - specific rules

[tool.ruff.lint]
select = ["E", "F", "B", "UP", "I", "RUF"]
ignore = [
  "D100",  # missing-module-docstring
  "D101",  # missing-class-docstring
  "D102",  # missing-function-docstring
  "B008",  # too-many-instance-attributes
  "B006",  # too-many-arguments
  "T201",  # logging-format-interpolation
  "B027",  # too-few-public-methods
  "UP009", # ignore encoding
  "RUF052",
]

[tool.tox]
env_list = ["unittests", "linters"]

# run tests with tox: tox run -e unittests
[tool.tox.env_run_base]
package = "editable"

[tool.tox.env.unittests]
description = "Run URunner unit tests with coverage"
deps = ["coverage[toml]"]
commands = [
  ["python", "-m", "coverage", "run", "-m", "unittest", "discover", "-s", "runner/test", "-p", "*_test*.py"],
  ["python", "-m", "coverage", "report", "-m"],
]

[tool.tox.env.linters]
description = "Run URunner linters"
deps = ["ruff==0.11.6",
        "pylint==3.3.6",
        "mypy==1.15.0",
        "mypy-extensions==1.0.0",
        "flake8==7.2.0",
        ]
commands = [
   ["python", "-m", "pylint", "--rcfile", ".pylintrc", "runner", "--ignore=test"],
    ["python", "-m", "pylint", "--rcfile", ".pylintrc", "runner/test/", "--disable=protected-access",
        "--disable=duplicate-code", "--disable=too-many-public-methods"],
    ["python", "-m", "mypy", "-p", "runner"],
    ["python", "-m", "flake8", "--radon-max-cc", "15", "--select=R701", "."],
   ["python", "-m", "ruff", "check", "."],
]

[tool.coverage.run]
branch = true
source = ["runner"]

[tool.coverage.report]
show_missing = true
skip_empty = true
omit = [
  "runner/test/*",
]

[tool.coverage.html]
directory = "htmlcov"
title = "URunner coverage report"
