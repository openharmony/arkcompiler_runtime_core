runner-api-level: 0.0.0.1
type: workflow
workflow-name: panda-metadata-parity
description: >-
    Verifies that every test source under 24.build_system/metadata/ has a
    equivalent under 24.build_system/binary-metadata/ with no changes 
    other than the expected es2panda_options swap (--emit-declaration ↔
    --emit-metadata + --read-metadata)
    Also arktsconfig and YAML files are checked

parameters:
    ets-templates-root: "${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests/ets-templates"
    parity-timeout: 30
    # ───────────────────────────────────────────────────────────────────────
    # Following parameters are NOT used by the parity-check step
    # they are declared here only for compatibility with other runner's flow
    build: ${PANDA_BUILD}
    load-runtimes: ${parameters.load-runtimes}
    extension: ${parameters.extension}
    opt-level: 2
    es2panda-timeout: 30
    verifier-timeout: 60
    enable-es2panda: true
    enable-verifier: true
    es2panda-args: [ ]
    verifier-args: [ ]
    ark-timeout: 180
    gc-type: g1-gc
    full-gc-bombing-frequency: 0
    heap-verifier: fail_on_verification
    ark-args: [ ]
    is-panda: true
    boot-panda-files: ""
    stdlib: "${parameters.build}/plugins/ets/etsstdlib.abc"
    ark-stdout: ""
    ark-stderr: ""

steps:
    parity-check:
        executable-path: /bin/bash
        timeout: ${parameters.parity-timeout}
        # To avoid test files marked 'compile-only' to be excluded
        step-type: declgen
        args:
            - "${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/tests/tests-u-runner-2/cfg/scripts/check-metadata-parity.sh"
            - "${parameters.ets-templates-root}/${test-id}"
