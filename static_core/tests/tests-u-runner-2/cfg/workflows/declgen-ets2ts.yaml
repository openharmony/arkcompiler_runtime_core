runner-api-level: 0.0.0.1
type: workflow
workflow-name: declgen
parameters:
    build: ${PANDA_BUILD}
    work-dir: ${parameters.work-dir}
    test-dets: "${parameters.work-dir}/intermediate/${test-id:parent}/${test-id:stem}.d.ets"
    test-ets: "${parameters.work-dir}/intermediate/ets/${test-id}"
    test-interop-ets: "${parameters.work-dir}/intermediate/${test-id:parent}/${test-id:stem}.d.ets_includes.d.ets"
    declgen-timeout: 120
    tsc-timeout: 120
    extension: ets
    decl-path: "${parameters.work-dir}/intermediate"
    tsc-project-other: true
    tsc-project-sdk: false # for running tsc with autogenerated project file in the test suite declgen-ets2ts-sdk
    tsc-project-file: "${parameters.work-dir}/intermediate/${test-id:parent}/${test-id:stem}_tsconfig.json"
steps:
    declgen-ets2ts:
        pre-reqs:
            - req: FileExist
              value: "${parameters.build}/bin/declgen_ets2ts"
            - req: ParentExistCreate
              value: "${parameters.test-dets}"
            - req: ParentExistCreate
              value: "${parameters.test-ets}"
        executable-path: ${parameters.build}/bin/declgen_ets2ts
        timeout: ${parameters.declgen-timeout}
        step-type: declgen
        validator: runner.extensions.validators.return_0_validator.Return0Validator
        args:
            - "--output-dets=${parameters.test-dets}"
            - "--output-ets=${parameters.test-ets}"
            - "--export-all"
            - "${parameters.work-dir}/gen/${test-id}"

    # generates help file "${parameters.test-interop-ets}" for other test-suites but ets-sdk
    gen-includes-file-other:
        pre-reqs:
            - req: ParentExistCreate
              value: "${parameters.test-dets}"
        executable-path: /usr/bin/echo
        enabled: ${parameters.tsc-project-other}
        args:
            - '
declare namespace st {
    export class Array<T> {}
    export class Map<K, V> {}
    export class Set<T> {}
}
export default st;
'
        validator: runner.extensions.validators.return_0_validator.Return0Validator
        step-type: other
        stdout: ${parameters.test-interop-ets}
        post-reqs:
            - req: FileExist
              value: "${parameters.test-interop-ets}"

    # generates project file for other test-suites but ets-sdk
    gen-project-file-other:
        pre-reqs:
            - req: ParentExistCreate
              value: "${parameters.test-dets}"
        executable-path: /usr/bin/echo
        enabled: ${parameters.tsc-project-other}
        args:
            - '{
    "compilerOptions": {
        "baseUrl": "${parameters.decl-path}",
        "paths": {
            "@ohos.lang.interop": ["${parameters.test-interop-ets}"]
        }
    },
    "files": ["${parameters.test-dets}"]
}'
        validator: runner.extensions.validators.return_0_validator.Return0Validator
        step-type: other
        stdout: ${parameters.tsc-project-file}
        post-reqs:
            - req: FileExist
              value: "${parameters.tsc-project-file}"

    # generates project file for the test-suit ets-sdk
    gen-project-file-sdk:
        executable-path: /usr/bin/echo
        enabled: ${parameters.tsc-project-sdk}
        args:
            - '{
    "compilerOptions": {
        "baseUrl": "${parameters.decl-path}",
        "paths": {
            "@ohos.base": ["${parameters.decl-path}/api/@ohos.base.d.ets"]
        }
    },
    "files": ["${parameters.test-dets}"]
}'
        validator: runner.extensions.validators.return_0_validator.Return0Validator
        step-type: other
        stdout: ${parameters.tsc-project-file}
        post-reqs:
            - req: FileExist
              value: "${parameters.tsc-project-file}"

    # Run tsc using project file generated on the previous step
    tsc-project:
        pre-reqs:
            - req: FileExist
              value: ${parameters.tsc-project-file}
            - req: FileExist
              value: "${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/third_party/typescript/bin/tsc"
            - req: ParentExistCreate
              value: "${parameters.test-dets}"
        executable-path: ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/third_party/typescript/bin/tsc
        timeout: ${parameters.tsc-timeout}
        step-type: tsc
        validator: runner.extensions.validators.return_0_validator.Return0Validator
        args:
            - "--lib"
            - "es2020"
            - "--project"
            - "${parameters.tsc-project-file}"
