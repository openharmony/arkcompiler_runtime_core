type: test-suite
suite-name: declgen-ets2ts-func-tests
test-root: ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests
list-roots:
    - ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests/test-lists/declgenets2ts/ets-func-tests
    - root: ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests/test-lists/ets-func-tests
      name: ets-func-tests

parameters:
    extension: ets
    load-runtimes: ets
    work-dir: ${WORK_DIR}/${suite-name}

collections:
    ets_func_tests: |-
    stdlib-templates:
        generator-class: runner.extensions.generators.sts_stdlib.stdlib_templates_generator.StdlibTemplatesGenerator
    ets-func-tests-templates:
        generator-class: runner.extensions.generators.sts_stdlib.func_templates_generator.FuncTestsCodeGenerator
