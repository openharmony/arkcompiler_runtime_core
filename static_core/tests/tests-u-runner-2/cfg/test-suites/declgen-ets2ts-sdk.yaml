type: test-suite
suite-name: declgen-ets2ts-sdk
test-root: ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/sdk
list-roots:
    - ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests/test-lists/declgenets2ts/declgen-ets2ts-sdk
    - root: ${ARKCOMPILER_RUNTIME_CORE_PATH}/static_core/plugins/ets/tests/ets-sdk
      name: ets-sdk

parameters:
    extension: ets
    load-runtimes: ets
    work-dir: ${WORK_DIR}/${suite-name}
    # This test suite declgen-ets2ts-sdk runs tsc with its own project file
    tsc-project-sdk: true
    tsc-project-other: false
