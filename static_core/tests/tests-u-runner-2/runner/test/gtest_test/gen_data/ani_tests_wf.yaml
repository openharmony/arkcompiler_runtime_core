runner-api-level: 0.0.0.1
type: workflow
workflow-name: run-ani-tests
workflow-kind: gtest
parameters:
    arktsconfig: "${parameters.build}/tools/es2panda/generated/arktsconfig.json"
    build: ${PANDA_BUILD}
    stdlib: "${parameters.build}/plugins/ets/etsstdlib.abc"
    work-dir: ${parameters.work-dir}
    runner-args: []
    extension: ets
    opt-level: 2
    output-file: "${parameters.work-dir}/intermediate/${test-id}.abc"
    es2panda-workflow-args:
      - "--arktsconfig=${parameters.arktsconfig}"
      - "--gen-stdlib=false"
      - "--extension=${parameters.extension}"
      - "--opt-level=${parameters.opt-level}"
      - "--output=${parameters.output-file}"
steps:
  compiler:
    executable-path: /usr/bin/echo
    step-type: compiler
    output-file: "${parameters.work-dir}/intermediate/${test-id}.abc"
    stdlib: "${parameters.build}/plugins/ets/etsstdlib.abc"
    args:
      - "${parameters.es2panda-workflow-args}"
      - "${parameters.work-dir}/gen/${test-id}"

    run-ani-tests:
        timeout: 30
        enabled: true
        step-type: gtest-runner
        args:
          - "${parameters.runner-args}"
        env:
          ARK_ETS_STDLIB_PATH:
          - "${parameters.stdlib}"
