module:
  name: dump
  namespace: ark::aptool::dump

options:
- name: ap-path
  type: std::string
  default: ""
  description: Path to input .ap profile file

- name: output
  type: std::string
  default: ""
  description: Path to output YAML file

- name: abc-path
  type: std::string
  default: ""
  description: Path to .abc file for resolving class and method names

- name: abc-dir
  type: std::string
  default: ""
  description: Directory containing .abc files for resolving class and method names

- name: keep-panda-file-name
  type: arg_list_t
  default: []
  description: Filter output to only include specified panda file names
  delimiter: ","

- name: keep-class-name
  type: arg_list_t
  default: []
  description: Filter output to only include specified class descriptors (requires --abc-path or --abc-dir)
  delimiter: ","

- name: keep-method-name
  type: arg_list_t
  default: []
  description: Filter output to only include specified method names (requires --abc-path or --abc-dir)
  delimiter: ","
