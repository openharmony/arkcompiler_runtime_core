[project]
name = "arkts-migration-visualizer"
version = "0.1.0"
description = "Collect, integrate, and serve ArkTS migration visualization data."
readme = "README.md"
requires-python = ">=3.10,<3.13"
license = { text = "Apache-2.0" }
dependencies = []

[project.optional-dependencies]
dev = [
    "hatch>=1.14.0",
    "ruff==0.15.10",
]

[project.scripts]
arkts-migration-visualizer = "arkts_migration_visualizer.cli:main"

[build-system]
requires = ["hatchling>=1.26.3"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arkts_migration_visualizer"]

[tool.hatch.envs.default.scripts]
test = "python -m unittest discover -s tests -v"
lint = "ruff check src tests"

[tool.ruff]
target-version = "py310"
line-length = 88
