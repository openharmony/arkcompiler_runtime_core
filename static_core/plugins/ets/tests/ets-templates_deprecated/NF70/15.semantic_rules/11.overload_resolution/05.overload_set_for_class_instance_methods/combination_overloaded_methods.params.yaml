---
cases:
    - desc: |-
        Overloaded method with optional param is after method with mandatory param
      decl: |-
        class C {
          foo(x: number): string { return 'foo1' }
          foo(s: string): string { return 'foo2' }
          fooOpt(x?: number): string { return 'fooOpt' }

          overload foo { foo, fooOpt }
        }
      call: |-
        let c = new C
        arktest.assertEQ(c.foo(1), 'foo1', 'foo1 call expected');
        arktest.assertEQ(c.foo('1'), 'foo2', 'foo2 call expected');
        arktest.assertEQ(c.foo(), 'fooOpt', 'fooOpt call expected');
        
    - desc: |-
        Overloaded method with optional param is before method with mandatory param
      decl: |-
        class C {
          foo(x: number): string { return 'foo1' }
          foo(s: string): string { return 'foo2' }
          fooOpt(x?: number): string { return 'fooOpt' }

          overload foo { fooOpt, foo }
        }
      call: |-
        let c = new C
        arktest.assertEQ(c.foo(1), 'fooOpt', 'fooOpt call expected');
        arktest.assertEQ(c.foo('1'), 'foo2', 'foo2 call expected');
        arktest.assertEQ(c.foo(), 'fooOpt', 'fooOpt call expected');
        
    - desc: |-
        An overload set for a class with a superclass and a superinterface
      decl: |-
        interface I {
          foo(x: number): string // foo1
        }

        class C {
          foo(s: string): string { return 'foo2' }
        }

        class D extends C implements I {
          foo(x: number): string { return 'foo1' } // implements foo1
          foo(b: boolean): string { return 'foo3' }
        }
      call: |-
        let d = new D
        arktest.assertEQ(d.foo(1), 'foo1', 'foo1 call expected');
        arktest.assertEQ(d.foo('1'), 'foo2', 'foo2 call expected');
        arktest.assertEQ(d.foo(true), 'foo3', 'foo3 call expected');
        
    - desc: |-
        That only direct supertypes are considered for overload set
      decl: |-
        class A {}

        interface I {
          foo(x: number): string { return 'foo1' }
        }

        class C implements I {
          foo(x: A): string { return 'foo2' }
        }

        class D extends C {
          foo(s: string): string { return 'foo3' } 
          foo(x: A | null): string { return 'foo4' } // overrides foo2
        }

        class E extends D {
          foo(x: number): string { return 'foo5' } // overrides foo1
        }
      call: |-
        let e = new E
        arktest.assertEQ(e.foo(1), 'foo5', 'foo5 call expected');
        arktest.assertEQ(e.foo('1'), 'foo3', 'foo3 call expected');
        arktest.assertEQ(e.foo(new A), 'foo4', 'foo4 call expected');
        arktest.assertEQ(e.foo(null), 'foo4', 'foo4 call expected');
       