---
cases:
  - decl: |-
      interface I {
        n: int
      }
      class D implements I {
        get n(): int { return 1 }
        set n(x: int) {}
      }
      class D1 extends D {
        n: int = 2
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'D', but is overridden here in 'D1' as an instance property."
    doc: field overrides superclass accessor that implements interface property

  - decl: |-
      interface I {
        readonly n: int
      }
      class D implements I {
        get n(): int { return 1 }
      }
      class D1 extends D {
        n: int = 2
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'D', but is overridden here in 'D1' as an instance property."
    doc: field overrides superclass getter that implements readonly interface property

  - decl: |-
      interface I {
        n: int
      }
      abstract class A implements I {
        get n(): int { return 0 }
        set n(x: int) {}
      }
      class D1 extends A {
        n: int = 2
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'A', but is overridden here in 'D1' as an instance property."
    doc: field overrides accessor from abstract superclass that implements interface property
