---
cases:
  - decl: |-
      interface I {
        n: number
      }
      class B {
        n: string = "aa"
      }
      class C extends B implements I {
      }
    expected_out: "Semantic error ESE985118: Class member n with type String in C cannot implement n with type Double property from interface I because the implementing return type is not compatible with the interface return type."
    doc: superclass field type string conflicts with interface property type number

  - decl: |-
      interface I {
        n: int
      }
      class B {
        n: boolean = false
      }
      class C extends B implements I {
      }
    expected_out: "Semantic error ESE985118: Class member n with type Boolean in C cannot implement n with type Int property from interface I because the implementing return type is not compatible with the interface return type."
    doc: superclass field type boolean conflicts with interface property type int

  - decl: |-
      interface I {
        readonly n: number
      }
      class B {
        n: string = "aa"
      }
      class C extends B implements I {
      }
    expected_out: "Semantic error ESE985118: Class member n with type String in C cannot implement n with type Double property from interface I because the implementing return type is not compatible with the interface return type."
    doc: superclass field type string conflicts with readonly interface property type number
