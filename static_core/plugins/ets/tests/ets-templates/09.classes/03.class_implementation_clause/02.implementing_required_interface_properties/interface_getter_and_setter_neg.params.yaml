---
cases:
  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        readonly f: int = 1
      }
    expected_out: "Semantic error ESE0337: Cannot implement interface I: property 'f' must have a setter, but the implementation is readonly"
    doc: cannot narrow down the parameter from writable to readonly form

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        get f(): int { return 1 }
      }
    expected_out: "Semantic error ESE0189: C is not abstract and does not implement setter for f property in I"
    doc: writable parameter requires both getter and setter

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        set f(i: int) {}
      }
    expected_out: "Semantic error ESE0188: C is not abstract and does not implement getter for f property in I"
    doc: writable parameter requires both getter and setter

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        f: boolean = false
      }
    expected_out: "Semantic error ESE985118: Class member f with type Boolean in C cannot implement f with type Int property from interface I because the implementing return type is not compatible with the interface return type."
    doc: incorrect field type

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {}
    expected_out: "Semantic error ESE0188: C is not abstract and does not implement getter for f property in I"
    doc: required property is not initialized

  - decl: |-
      interface J {
        get n(): number
        set n(x: string)
      }
      class D implements J {
        n: number = 1
      }
    expected_out: "Semantic error ESE0319: Type 'Double' is not compatible with type 'String' at property 'n'"
    doc: different getter and setter types

  - decl: |-
      interface J {
        get n(): number
        set n(x: string)
      }
      class D implements J {
        n: string = "1"
      }
    expected_out: "Semantic error ESE0319: Type 'Double' is not compatible with type 'String' at property 'n'"
    doc: different getter and setter types

  - decl: |-
      interface I {
        get n(): number
      }
      class C implements I {
        n: string = ""
      }
    expected_out: "Semantic error ESE985118: Class member n with type String in C cannot implement n with type Double property from interface I because the implementing return type is not compatible with the interface return type."
    doc: reviewer case - getter-only interface property implemented by incompatible field type

  - decl: |-
      interface J {
        get n(): number
        set n(x: number)
      }
      class D implements J {
        n: string = ""
      }
    expected_out: "Semantic error ESE0136: Method n(): String in D not overriding any method"
    doc: reviewer case - getter/setter with same type implemented by incompatible field type

  - decl: |-
      interface K {
        get n(): number
        set n(x: string)
      }
      class E {
        n: number = 1
      }
      class F extends E implements K {}
    expected_out: "Semantic error ESE0319: Type 'Double' is not compatible with type 'String' at property 'n'"
    doc: reviewer case - inherited field used for implementation must still respect getter/setter mismatch rule
