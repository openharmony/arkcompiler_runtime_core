cases:
  - desc: |-
      >-
        Checking on field has no initializer and is not
        definitely assigned in the constructor.
    check_variants:
      - {check_type: "bigint"}
      - {check_type: "string"}
      - {check_type: "Object"}
    decl_variants:
      - |-
        class A {
          field: [check_type]
        }
    out: |-
      Semantic error ESE0280: Property 'field' might not have been initialized.

  - desc: |-
      >-
        Checking on field has no initializer and is not
        definitely assigned in the constructor.
    decl_variants:
      - |-
        class C {}
        class A {
          field: C
        }
    out: |-
      Semantic error ESE0280: Property 'field' might not have been initialized.

  - desc: |-
      >-
        Checking for initialization with different
        not covariant subtype values usage.
    check_variants:
      - {check_value_type: "Cat", out: "Semantic error ESE0318: Type 'Cat' cannot be assigned to type 'Dog'"}
      - {check_value_type: "Animal", out: "Semantic error ESE0318: Type 'Animal' cannot be assigned to type 'Dog'"}
    decl_variants:
      - |-
        class Animal {}
        class Dog extends Animal {}
        class Cat extends Animal {}
        class C {
          field: Dog = new [check_value_type]
        }
      - |-
        class Animal {}
        class Dog extends Animal {}
        class Cat extends Animal {}
        class C {
          field: Dog
          constructor () {
            this.field = new [check_value_type]
          }
        }

  - desc: |-
      >-
        Checking for changing the value from outside of constructor
        with different not covariant subtype values usage.
    check_variants:
      - {check_value_type: "Cat", out: "Semantic error ESE0318: Type 'Cat' cannot be assigned to type 'Dog'"}
      - {check_value_type: "Animal", out: "Semantic error ESE0318: Type 'Animal' cannot be assigned to type 'Dog'"}
    decl_variants:
      - |-
        class Animal {}
        class Dog extends Animal {}
        class Cat extends Animal {}
        class C {
          field: Dog = new Dog
        }
    sub_cases_logic:
      - |-
        let a: C = new C
        a.field = new [check_value_type]

  - desc: |-
      >-
        Checking for initialization with different
        not covariant function subtype values usage.
    check_variants:
      - {check_value: "handlerCInt", out: "Semantic error ESE0318: Type '((p1: C, p2: Int) => B)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerBInt", out: "Semantic error ESE0318: Type '((p1: B, p2: Int) => A)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerB", out: "Semantic error ESE0318: Type '((p1: B) => A)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerBIntInt", out: "Semantic error ESE0318: Type '((p1: B, p2: Int, p3: Int) => B)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerNothing", out: "Semantic error ESE0318: Type '(() => C)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
    decl_variants:
      - |-
        class A {}
        class B extends A {}
        class C extends A {}
        type HandlerReq = (a: B, b: int) => B
        const handlerReq: HandlerReq = (a: B, b: int): B => {
          return new B
        }
        type HandlerCInt = (a: C, b: int) => B
        const handlerCInt: HandlerCInt = (a: C, b: int): B => {
          return new B
        }
        type HandlerBInt = (a: B, b: int) => A
        const handlerBInt: HandlerBInt = (a: B, b: int): A => {
          return new B
        }
        type HandlerB = (a: B) => A
        const handlerB: HandlerB = (a: B): A => {
          return new B
        }
        type HandlerBIntInt = (a: B, b: int, c: int) => B
        const handlerBIntInt: HandlerBIntInt = (a: B, b: int, c: int): B => {
          return new B
        }
        type HandlerNothing = () => C
        const handlerNothing: HandlerNothing = (): C => {
          return new C
        }
        class D {
          field: HandlerReq = [check_value]
        }
      - |-
        class A {}
        class B extends A {}
        class C extends A {}
        type HandlerReq = (a: B, b: int) => B
        const handlerReq: HandlerReq = (a: B, b: int): B => {
          return new B
        }
        type HandlerCInt = (a: C, b: int) => B
        const handlerCInt: HandlerCInt = (a: C, b: int): B => {
          return new B
        }
        type HandlerBInt = (a: B, b: int) => A
        const handlerBInt: HandlerBInt = (a: B, b: int): A => {
          return new B
        }
        type HandlerB = (a: B) => A
        const handlerB: HandlerB = (a: B): A => {
          return new B
        }
        type HandlerBIntInt = (a: B, b: int, c: int) => B
        const handlerBIntInt: HandlerBIntInt = (a: B, b: int, c: int): B => {
          return new B
        }
        type HandlerNothing = () => C
        const handlerNothing: HandlerNothing = (): C => {
          return new C
        }
        class D {
          field: HandlerReq
          constructor () {
            this.field = [check_value]
          }
        }

  - desc: |-
      >-
        Checking for changing the value from outside of constructor
        with different not covariant function subtype values usage
    check_variants:
      - {check_value: "handlerCInt", out: "Semantic error ESE0318: Type '((p1: C, p2: Int) => B)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerBInt", out: "Semantic error ESE0318: Type '((p1: B, p2: Int) => A)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerB", out: "Semantic error ESE0318: Type '((p1: B) => A)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerBIntInt", out: "Semantic error ESE0318: Type '((p1: B, p2: Int, p3: Int) => B)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
      - {check_value: "handlerNothing", out: "Semantic error ESE0318: Type '(() => C)' cannot be assigned to type '((p1: B, p2: Int) => B)'"}
    decl_variants:
      - |-
        class A {}
        class B extends A {}
        class C extends A {}
        type HandlerReq = (a: B, b: int) => B
        const handlerReq: HandlerReq = (a: B, b: int): B => {
          return new B
        }
        type HandlerCInt = (a: C, b: int) => B
        const handlerCInt: HandlerCInt = (a: C, b: int): B => {
          return new B
        }
        type HandlerBInt = (a: B, b: int) => A
        const handlerBInt: HandlerBInt = (a: B, b: int): A => {
          return new B
        }
        type HandlerB = (a: B) => A
        const handlerB: HandlerB = (a: B): A => {
          return new B
        }
        type HandlerBIntInt = (a: B, b: int, c: int) => B
        const handlerBIntInt: HandlerBIntInt = (a: B, b: int, c: int): B => {
          return new B
        }
        type HandlerNothing = () => C
        const handlerNothing: HandlerNothing = (): C => {
          return new C
        }
        class D {
          field: HandlerReq = handlerReq
        }
    sub_cases_logic:
      - |-
        let a: D = new D
        a.field = [check_value]

  - desc: |-
      >-
        Checking for initialization with field initializer
        with usage super.
        super is to access constructors declared in the superclass,
        or the overridden method version of the superclass.
    check_variants:
      - {check_type: "int", check_value: "5"}
      - {check_type: "double", check_value: "7.3"}
      - {check_type: "Object", check_value: "5"}
    decl_variants:
      - |-
        class Base {
          protected _v: [check_type] = [check_value]
        }
        class A extends Base {
          protected _field: [check_type] = super._v
        }
    out: |-
      Warning W0010: The instance field initializer expression cannot use the super.
