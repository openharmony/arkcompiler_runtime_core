cases:
  - desc: |-
      >-
        The instance field initializer expression cannot use
        the following directly in any form:
        • super; or
        • this.
        If the initializer expression contains one of the above patterns,
        then a compile-time warning occurs.
    assert: |-
      >-
        Checking for initialization with field initializer
        by assign this directly
    decl_variants:
      - |-
        class A {
          readonly field = this
        }
    expected_out:
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."

  - desc: |-
      >-
        The instance field initializer expression cannot use
        the following directly in any form:
        • super; or
        • this.
        If the initializer expression contains one of the above patterns,
        then a compile-time warning occurs.
    assert: |-
      >-
        Checking for initialization with field initializer
        with call methods of this or supper.
    check_variants:
      - {type: "int", check_value: "5"}
      - {type: "double", check_value: "7.3"}
      - {type: "Object | undefined", check_value: "5"}
      - {type: "Any", check_value: "5"}
    decl_variants:
      - |-
        class A {
          foo (): [type] {
            return [check_value]
          }
          readonly field: [type] = this.foo()
        }
      - |-
        class Base {
          foo (): [type] {
            return [check_value]
          }
        }
        class A extends Base {
          readonly field: [type] = super.foo()
        }
    expected_out:
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."
      - |-
        "Warning W0010: The instance field initializer expression cannot use the super."

  - desc: |-
      >-
        The instance field initializer expression cannot use
        the following directly in any form:
        • super; or
        • this.
        If the initializer expression contains one of the above patterns,
        then a compile-time warning occurs.
    assert: |-
      >-
        Checking for initialization with field initializer
        with capture this.
    decl_variants:
      - |-
        class B {}
        function foo (f: () => B) { return f() }
        class A {
          readonly field1 = foo(() => this.field2)
          readonly field2 = new B
        }
    expected_out:
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."

  - desc: |-
      >-
        The instance field initializer expression cannot use
        the following directly in any form:
        • super; or
        • this.
        If the initializer expression contains one of the above patterns,
        then a compile-time warning occurs.
    assert: |-
      >-
        Checking for initialization with field initializer
        with usage this or super.
    check_variants:
      - {type: "int", check_value: "5"}
      - {type: "double", check_value: "7.3"}
      - {type: "Object | undefined", check_value: "5"}
      - {type: "Any", check_value: "5"}
    decl_variants:
      - |-
        class A {
          v: [type] = [check_value]
          readonly field: [type] = this.v
        }
      - |-
        class A {
          private readonly _v: [type] = [check_value]
          get v(): [type] {
            return this._v
          }
          readonly field: [type] = this.v
        }
      - |-
        class Base {
          private readonly _v: [type] = [check_value]
          get v(): [type] {
            return this._v
          }
        }
        class A extends Base {
          readonly field: [type] = super.v
        }
      - |-
        class A {
          private readonly v: [type] = [check_value]
          private readonly _field: [type] = this.v
          get field(): [type] {
            return this._field
          }
        }
      - |-
        class Base {
          protected readonly _v: [type] = [check_value]
          get v(): [type] {
            return this._v
          }
        }
        class A extends Base {
          protected readonly _field: [type] = super.v
          get field(): [type] {
            return this._field
          }
        }
    expected_out:
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."
      - |-
        "Warning W0010: The instance field initializer expression cannot use the super."
      - |-
        "Warning W0010: The instance field initializer expression cannot use the this."
      - |-
        "Warning W0010: The instance field initializer expression cannot use the super."
