cases:
  - desc: |-
      >-
        A compile-time error occurs if name of a field declared
        in the body of a class declaration is also used for a method
        of this class with the same static or non-static status.
    check_variants:
      - {member1: "x: int", member2: "x(): int { return 1 }"}
      - {member1: "static x: int", member2: "static x(): int { return 1 }"}
    decl_variants:
      - |-
        class A {
          [member1]
          [member2]
        }
      - |-
        class A {
          [member2]
          [member1]
        }
    expected_error: |-
      Semantic error ESE0351: Variable 'x' has already been declared.

  - desc: |-
      >-
        A compile-time error occurs if name of a field declared
        in the body of a class declaration is also used for a method
        of this class with the same static or non-static status.
        Static classes not counted for inheritance
    check_variants:
      - {member1: "x: int", member2: "x(): int { return 1 }"}
    decl_variants:
      - |-
        class A {
          [member1]
        }
        class B extends A {
          [member2]
        }
    expected_error: |-
      Semantic error ESE0216: Class B cannot extend class A because the overriding declaration type for method x is not compatible with the declaration type required by the base class.

  - desc: |-
      >-
        A compile-time error occurs if name of a field declared
        in the body of a class declaration is also used for a method
        of this class with the same static or non-static status.
        Static classes not counted for inheritance
    check_variants:
      - {member1: "x: int", member2: "x(): int { return 1 }"}
    decl_variants:
      - |-
        class A {
          [member2]
        }
        class B extends A {
          [member1]
        }
    expected_error: |-
      Semantic error ESE0216: Class B cannot extend class A because the overriding declaration type for field x is not compatible with the declaration type required by the base class.

  - desc: |-
      >-
        A compile-time error occurs if name of a field declared
        in the body of a class declaration is also used for another field
        in the same declaration with the same static or non-static status.
    check_variants:
      - {member1: "x: int", member2: "x: number"}
      - {member1: "static x: int", member2: "static x: number"}
    decl_variants:
      - |-
        class A {
          [member1]
          [member2]
        }
      - |-
        class A {
          [member2]
          [member1]
        }
    expected_error: |-
      Semantic error ESE0351: Variable 'x' has already been declared.
