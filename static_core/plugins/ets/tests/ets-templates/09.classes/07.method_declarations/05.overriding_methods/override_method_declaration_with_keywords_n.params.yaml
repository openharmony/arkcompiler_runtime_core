--- # List of invalid method modifiers
cases:
  - modifier: "abstract"
    function: |-
      override abstract foo(): int;
    error: |-
      Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier.

  - modifier: "override"
    function: |-
      override override foo(): int {
        return 5;
      }
    error: |-
      Syntax error ESY0115: Duplicated modifier is not allowed.

  - modifier: "static"
    function: |-
      override static foo(): int {
        return 5;
      }
    error: |-
      Semantic error ESE0077: Invalid method modifier(s): a static method can't have abstract, final or override modifier.

  - modifier: "async"
    function: |-
      override async foo(): Promise<int> {
        return 5;
      }
    error: |-
      Semantic error ESE0136: Method %%async-foo(): Promise<Int>|Int in B not overriding any method
