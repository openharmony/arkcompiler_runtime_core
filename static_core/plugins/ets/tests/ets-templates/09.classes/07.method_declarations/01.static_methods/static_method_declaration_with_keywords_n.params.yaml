--- # List of invalid static method modifiers
modifiers:
#0
  - mod: "abstract"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#1
  - mod: "override"
    expected: "Semantic error ESE0077: Invalid method modifier(s): a static method can't have abstract, final or override modifier."
#2
  - mod: "open"
    expected: "Syntax error ESY0121: Field type annotation expected."
#3
  - mod: "synchronized"
    expected: "Syntax error ESY0121: Field type annotation expected."
#4
  - mod: "final"
    expected: "Semantic error ESE0077: Invalid method modifier(s): a static method can't have abstract, final or override modifier."
