--- # Dispatching static vs instance methods
cases:
  - use: |-
      let b = new BI
      let i: I = b.a
  
      arktest.assertEQ(i.foo_get(), "instance", "1")
  
      b.a = "instance 2"
      arktest.assertEQ(i.foo_get(), "instance 2", "2")

  - use: |-
      let b = new B
  
      arktest.assertEQ(b.a.foo_get(), "instance", "get basic")
  
      b.a = "instance 2"
      arktest.assertEQ(b.a.foo_get(), "instance 2", "set basic")

  - use: |-
      arktest.assertEQ(new B1().a.foo(42), 42, "overload resolution")

  - use: |-
      let b = new B2
      arktest.assertEQ(b.a.n, 1, "get instance field")
      b.a = 2
      arktest.assertEQ(b.a.n, 2, "set instance field")
  
      arktest.assertEQ(b.aa.n, 1, "get regular instance field")
      b.aa.n = 2
      arktest.assertEQ(b.aa.n, 2, "set regular instance field")
  
      let aaa = b.bar()
      arktest.assertEQ(aaa.n, 1, "get via regular method")
      aaa.n = 2
      arktest.assertEQ(aaa.n, 2, "set via regular method")
