---
cases:
  # accessor marked with the modifier override does not override
  # an accessor from a superclass
  - decl: |-
      class A {
          _age: int = 0;
        
          set age(value: int) {
            this._age = value;
          }
        
          get age(): int {
            return this._age;
          }
      }
      
      class B extends A {
          override set age1(value: int) {
            this._age = value + 5;
          }
      }
    exp_out: |-
      Semantic error ESE0136: Method age1(value: Int): undefined in B not overriding any method

  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
      
      class B extends A {
          override get age1(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0136: Method age1(): Int in B not overriding any method

  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
      
      class B extends A {
          override set age1(value: int) {
            this._age = value + 5;
          }
          override get age1(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0136: Method age1(value: Int): undefined in B not overriding any method

  # setter has no parameters
  - decl: |-
      class A {
          _age: int = 0;
      
          set age() {
            this._age = 1;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY0063: Setter must have exactly one formal parameter.

  # setter has more than one parameter
  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value: int, value1: int) {
            this._age = value + value1;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY0063: Setter must have exactly one formal parameter.

  # setter has a parameter with optional (default) value
  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value: int = 1) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY13534: Setter cannot have optional parameter.

  # setter has a parameter with optional value
  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value?: int) { }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY13534: Setter cannot have optional parameter.

  # name of an accessor is the same as that of a non-static field of same class
  - decl: |-
      class A {
          age: int = 0; 
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      }
    exp_out: |-
      Semantic error ESE0351: Variable 'age' has already been declared.

  - decl: |-
      class A {
          get age: int = 0;
          _age: int = 0;
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY0058: Getter must not have formal parameters.

  - decl: |-
      class A {
          get age: int = 0;
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Syntax error ESY0058: Getter must not have formal parameters.

  # name of an accessor is the same as that of a non-static field of parent class
  - decl: |-
      class Base {
          age: int = 0;
      }
      class A extends Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      }
    exp_out: |-
      Semantic error ESE45073: 'age' is defined as a property in class 'Base', but is overridden here in 'A' as an accessor.

  - decl: |-
      class Base {
          age: int = 0;
      }
      class A extends Base {
          _age: int = 0;
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE45073: 'age' is defined as a property in class 'Base', but is overridden here in 'A' as an accessor.

  - decl: |-
      class Base {
          age: int = 0;
      }
      class A extends Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE45073: 'age' is defined as a property in class 'Base', but is overridden here in 'A' as an accessor.

  # name of an accessor is the same as that of a method of same class
  - decl: |-
      class A {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      
          age(value: int): void {
            this._age = value;
          }
      }

      class A {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      
          age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0218: Method cannot use the same name as age accessor property

  # name of an accessor is the same as that of a method of parent class
  - decl: |-
      class Base {
          age(value: int): void { }
      }
      class A extends Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0216: Class A cannot extend class Base because the overriding declaration type for method age is not compatible with the declaration type required by the base class.

  - decl: |-
      class Base {
          age(): int {
            return 1;
          }
      }
      class A extends Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0216: Class A cannot extend class Base because the overriding declaration type for method age is not compatible with the declaration type required by the base class.

  # name of an accessor is the same as that of a method of interface
  - decl: |-
      interface Base {
          age(value: int): void;
      }
      class A implements Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0215: Class A cannot implement interface Base because the declaration type for method age is not compatible with the declaration type required by the interface.

  - decl: |-
      interface Base {
          age(): int;
      }
      class A implements Base {
          _age: int = 0;
      
          set age(value: int) {
            this._age = value;
          }
      
          get age(): int {
            return this._age;
          }
      }
    exp_out: |-
      Semantic error ESE0215: Class A cannot implement interface Base because the declaration type for method age is not compatible with the declaration type required by the interface.

  # (static case) setter has no parameters
  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age() {
            A._age = 1;
          }
      
          static get age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Syntax error ESY0063: Setter must have exactly one formal parameter.

  # (static case) setter has more than one parameter
  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age(value: int, value1: int) {
            A._age = value + value1;
          }
      
          static get age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Syntax error ESY0063: Setter must have exactly one formal parameter.

  # (static case) setter has a parameter with optional (default) value
  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age(value: int = 1) {
            A._age = value;
          }
      
          static get age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Syntax error ESY13534: Setter cannot have optional parameter.

  # (static case) setter has a parameter with optional value
  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age(value?: int) { }
      
          static get age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Syntax error ESY13534: Setter cannot have optional parameter.

  # (static case) name of an accessor is the same as that of a method of same class
  - decl: |-
      class A {
          static _age: int = 0;
      
          static get age(): int {
            return A._age;
          }
      
          static age(value: int): void {
            A._age = value;
          }
      }
    exp_out: |-
      Semantic error ESE0218: Method cannot use the same name as age accessor property

  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age(value: int) {
            A._age = value;
          }
      
          static age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Semantic error ESE0218: Method cannot use the same name as age accessor property

  - decl: |-
      class A {
          static _age: int = 0;
      
          static set age(value: int) {
            A._age = value;
          }
      
          static get age(): int {
            return A._age;
          }
      
          static age(): int {
            return A._age;
          }
      }
    exp_out: |-
      Semantic error ESE0218: Method cannot use the same name as age accessor property

