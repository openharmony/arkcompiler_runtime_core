---
cases:
  # no method for get
  - decl: |-
      class B {
          private a_ = new A()
          get a() { return this.a_ }
      }
    use: |-
      new B().a.foo_get()
    exp_out: |-
      Semantic error ESE0207: 'foo_get' is a static property of 'A'

  # no method for set
  - decl: |-
      class B {
          private a_ = new A()
          set a(val: string) { this.a_.foo_set(val) }
      }
    use: |-
      new B().a = "invalid set"
    exp_out: |-
      Semantic error ESE0207: 'foo_set' is a static property of 'A'
