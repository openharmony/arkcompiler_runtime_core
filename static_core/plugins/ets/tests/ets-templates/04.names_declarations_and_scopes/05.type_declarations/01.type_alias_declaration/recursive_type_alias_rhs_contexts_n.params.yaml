---
cases:
    - desc: tuple-element recursive reference
      defs: |-
          type TupleRec = [TupleRec | undefined]
      use: |-
          let t: TupleRec = [undefined]
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: union-member function recursive reference
      defs: |-
          type UnionFuncRec = string | (() => UnionFuncRec)
      use: |-
          let f: UnionFuncRec = (): UnionFuncRec => 'ok'
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: function-parameter recursive reference
      defs: |-
          type ParamRec = (p: ParamRec) => int
      use: |-
          let f: ParamRec = (p: ParamRec): int => 1
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: union-member function-parameter recursive reference
      defs: |-
          type UnionParamRec = string | ((p: UnionParamRec) => int)
      use: |-
          let f: UnionParamRec = (p: UnionParamRec): int => 1
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: generic function-parameter recursive reference
      defs: |-
          type GenericParamRec<T> = (p: GenericParamRec<T>) => T
      use: |-
          let f: GenericParamRec<int> = (p: GenericParamRec<int>): int => 1
      expected_out: "Semantic error ESE0311: Circular type alias reference"
