---
cases:
    # functions
    - defs: |-
          type Func<T> = (p: int) => T;
      use: |-
          let v: Func<Int> = (p: int): Int => { return new Int(p); };
          let ok = v(1) == 1;

    - defs: |-
          type Func<T> = (p: int) => T;
          type NullableFunc<T> = Func<T>|null;
      use: |-
          let v: NullableFunc<Int> = (p: int): Int => { return new Int(p); };
          let ok = v!(1) == 1;

    - defs: |-
          type Func<T> = (p: int) => T;
          type NullableFunc<T> = Func<T>|null;
      use: |-
          let v: NullableFunc<Int> = null;
          let ok = v === null;

    - defs: |-
          type Foo<T> = (p: int) => T;
          type Bar<T> = Foo<T>
          type Baz<T> = Bar<T>
      use: |-
          let v: Baz<String> = (p: int): String => { return 'a' + p }
          let ok = v(42) == 'a42'

    - defs: |-
          type Foo<V, T> = (p: V) => T;
          type Bar<V> = Foo<Number, V>
          type Baz = Bar<String>
      use: |-
          let v: Baz = (p: Number): String => { return 'a' + p }
          let ok = v(42.0) == 'a42'

    - defs: |-
          type Func<T> = (p: int) => T;
          type FF = Func<Int>[]
      use: |-
          let v: FF = [(p: int): Int => { return new Int(p); }]
          let ok = v[0](1) == 1;

    - defs: |-
          type Func<T> = (p: int) => T;
          type FF<T> = Func<T>[]
      use: |-
          let v: FF<Int> = [(p: int): Int => { return new Int(p); }]
          let ok = v[0](1) == 1;

    # classes
    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB<T> = B<T>;
      use: |-
          let v: BetterB<Int> = new BetterB<Int>();
          let ok: boolean = v.ok;

    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB = B<Int>;
      use: |-
          let v: BetterB = new BetterB();
          let ok: boolean = v.ok;

    - defs: |-
          class B<T, V> {
              public ok = true;
          }
          type BetterB<T> = B<T, Boolean>;
      use: |-
          let v: BetterB<Long> = new B<Long, Boolean>();
          let ok: boolean = v.ok;

    - defs: |-
          class B<out T, in U, V extends Error> {
              public ok = true;
          }
          type BetterB<T, U> = B<T, U, NullPointerError>;
      use: |-
          let v: BetterB<Int, Long> = new BetterB<Int, Long>();
          let ok: boolean = v.ok;

    - defs: |-
          class Outer {
              public ok = true;
          }
          type Shortcut = Outer
      use: |-
          let v: Shortcut = new Shortcut();
          let ok: boolean = v.ok;

    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB<T> = B<T>;
          type BestB<V> = BetterB<V>
      use: |-
          let v: BestB<Int> = new BestB<Int>();
          let ok: boolean = v.ok;

    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB = B<Boolean>;
          type BestB = BetterB
      use: |-
          let v: BestB = new B<Boolean>();
          let ok: boolean = v.ok;

    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB<T> = B<T>;
          type BB = BetterB<Int>[]
      use: |-
          let v: BB = [new BetterB<Int>()]
          let ok: boolean = v[0].ok;

    - defs: |-
          class B<T> {
              public ok = true;
          }
          type BetterB<T> = B<T>;
          type BB<T> = BetterB<T>[]
      use: |-
          let v: BB<Int> = [new BetterB<Int>()]
          let ok: boolean = v[0].ok;

    # interfaces
    - defs: |-
          interface I<T> {
              ok: boolean
          }
          class A<T> implements I<T> {
              public ok = true;
          }
          type Intf<T> = I<T>;
      use: |-
          let v: Intf<Error> = new A<Error>();
          let ok: boolean = v.ok;

    - defs: |-
          interface I<T, V> {
              ok: boolean
          }
          class A<T> implements I<T, Int> {
              public ok = true;
          }
          type Intf<T> = I<T, Int>;
      use: |-
          let v: Intf<Boolean> = new A<Boolean>();
          let ok: boolean = v.ok;

    - defs: |-
          interface I<out T, in V, U extends Error> {
              ok: boolean
          }
          type Intf = I<Int, Long, NullPointerError>;
          class A implements Intf {
              public ok = true;
          }
      use: |-
          let v: Intf = new A();
          let ok: boolean = v.ok;

    - defs: |-
          interface I<T, U> {
              ok: boolean
          }
          class A<T> implements I<T, Error> {
              public ok = true;
          }
          type Intf<T, U> = I<T, U>
          type Intf2<T> = Intf<Error, T>
      use: |-
          let v: Intf2<Error> = new A<Error>();
          let ok: boolean = v.ok;

    - defs: |-
          interface I<T> {
              ok: boolean
          }
          class A<T> implements I<T> {
              public ok = true;
          }
          type Intf<T> = I<T>
          type II = Intf<Error>[]
      use: |-
          let v: II = [new A<Error>()]
          let ok: boolean = v[0].ok

    - defs: |-
          interface I<T> {
              ok: boolean
          }
          class A<T> implements I<T> {
              public ok = true;
          }
          type Intf<T> = I<T>
          type II<T> = Intf<T>[]
      use: |-
          let v: II<Error> = [new A<Error>()]
          let ok: boolean = v[0].ok

    - defs: |-
        type Func<I, T> = (p: I) => T
      use: |-
        let xx: Func<String, Number> = (p: String): Number => p.length
        let ok = xx('Hello World') == 11;

    - defs: |-
        final class FinitaLaComedia {}
        type Alias<T extends FinitaLaComedia = FinitaLaComedia> = T
      use: |-
        let xx = new Alias
        let ok = xx instanceof FinitaLaComedia && xx instanceof Alias;

    - defs: |-
        type None = undefined
        type Some<T> = T
        type Maybe<T> = Some<T> | None
      use: |-
        let v0: Maybe<string> = undefined
        let v1: Maybe<string> = 'Hello World'
        let ok = v0 === undefined && v1 instanceof string && v1 == 'Hello World'

    - defs: |-
        type Lazy<T> = T | () => T
      use: |-
        let vl: Lazy<string> = 'Hello World'
        vl = () => 'Call Me'
        let ok = vl instanceof Function && vl() == 'Call Me'

    - defs: |-
        type TU<T1, T2> = T1 | T2
        type EX<T1, T2> = Record<string, int | TU<T1, T2> | undefined>
      use: |-
        let tv: TU<string, boolean> = 'I am String'
        let v: EX<string, boolean> = {'s1': 'String', 's2': true, 's3': 42, 's4': undefined, 's5': tv}
        let ok = v['s1'] == 'String' && v['s2'] == true && v['s3'] == 42 && v['s4'] === undefined && v['s5'] == 'I am String';
