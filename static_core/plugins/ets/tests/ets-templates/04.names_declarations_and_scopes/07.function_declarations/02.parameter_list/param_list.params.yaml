--- # List of valid function declarations
function_decls:
    # value type params, void return
#0
    - decl: |-
          function foo0(a: long, b: double, c: char): void {}
      call: |-
          foo0(42, 1.5, c'A');

    # value type array params, void return
#1
    - decl: |-
          function foo1(a: long[], b: double[], c: char[]): void {} 
      call: |-
          let a: long[] = new long[0](0)
          let b: double[] = new double[0](0)
          let c: char[] = new char[0](c'\0')
          foo1(a, b, c);

    # function param, void return
#2
    - decl: |-
          function bar2() {}
          function foo2(a: () => void): void {}
      call: |-
          foo2(bar2);

    # Case for issue 14702 Subtyping with functions requires explicit conversion
#3
    - decl: |-
        function bar3(): String { return "Bar" }
        function foo3(a: () => Object): void { let xx = a() }
      call: |-
        foo3(bar3);

  # Case for issue 14702 Subtyping with functions requires explicit conversion
#4
    - decl: |-
        type TFunc = () => Object
        function bar4(): String { return "Bar" }
        function foo4(a: TFunc): void { let xx = a() }
      call: |-
        foo4(bar4);

    # reference type param, void return
#5
    - decl: |-
          function foo5(a: Long) {}
      call: |-
          foo5(new Long())
#6
    - decl: |-
          function foo6(a: Object|null) {}
      call: |-
          foo6(null)

    # reference type array param, void return
#7
    - decl: |-
          function foo7(a: Long[]) {}
      call: |-
          foo7(new Long[0](0))
#8
    - decl: |-
          function foo8(a: (Object|undefined)[]) {}
      call: |-
          let arr: (Object|undefined)[] = new (Object|undefined)[1](undefined)
          arr[0] = undefined
          foo8(arr)

    # enum param, void return
#9
    - decl: |-
          enum Color { Red, Green, Blue }
          function foo9(a: Color): void {}
      call: |-
          foo9(Color.Red);

    # T param, T return
#10
    - decl: |-
          function foo10<T>(a: T): T {
              return a;
          }
      call: |-
          let v: Long = foo10<Long>(new Long())
          arktest.assertTrue( v instanceof Long )
#11
    - decl: |-
          function foo11<T, U, V>(a: T, b: U, c: V): V {
              return c;
          }
      call: |-
          let v: Object|null = foo11<Long, Boolean, Object|null>(new Long(), new Boolean(true), new Object())
          arktest.assertTrue( v instanceof Object)

    # T array param, T array return
#12
    - decl: |-
          function foo12<T>(a: T[]): T[] {
              return a;
          }
      call: |-
          let arr: Boolean[] = foo12<Boolean>(new Boolean[0](false))
          arktest.assertTrue( arr instanceof Array && arr.length == 0 )

    # mixed type params
#13
    - decl: |-
          function foo13<T>(a: byte, b: Short|null, c: long, ...d: T[]): T {
              return d[0];
          }
      call: |-
          let v: Byte = foo13<Byte>(1 as byte, null, Long.MIN_VALUE, new Byte(1 as byte), new Byte(2 as byte))
          arktest.assertTrue( v instanceof Byte && v == 1 )
