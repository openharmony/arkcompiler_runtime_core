---
cases:
  - decl: |
      let f = (this: null): void => {}
    out: "Semantic error ESE0082: Extension function can only defined for class, interface or array."
  - decl: |
      let f = (this: undefined): void => {}
    out: "Semantic error ESE0082: Extension function can only defined for class, interface or array."
  - decl: |
      let f = (this: Any): void => {}
    out: "Semantic error ESE0082: Extension function can only defined for class, interface or array."
  - decl: |
      class A {}
      let f = (this: A): void => {}
    use: |
      let a: A = new A()
      a.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'A'"
  - decl: |
      interface I {}
      let f = (this: I): void => {}
    use: |
      let i: I = {}
      i.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'I'"
  - decl: |
      let f = (this: number[]): void => {}
    use: |
      let n: number[] = [0, 1]
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Array'"
  - decl: |
      let f = (this: Number): void => {}
    use: |
      let n: Number = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Double'"
  - decl: |
      let f = (this: number): void => {}
    use: |
      let n: number = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Double'"
  - decl: |
      let f = (this: byte): void => {}
    use: |
      let n: byte = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Byte'"
  - decl: |
      let f = (this: short): void => {}
    use: |
      let n: short = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Short'"
  - decl: |
      let f = (this: int): void => {}
    use: |
      let n: int = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Int'"
  - decl: |
      let f = (this: long): void => {}
    use: |
      let n: long = 1
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Long'"
  - decl: |
      let f = (this: bigint): void => {}
    use: |
      let n: bigint = 1n
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'BigInt'"
  - decl: |
      let f = (this: float): void => {}
    use: |
      let n: float = 1.0f
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Float'"
  - decl: |
      let f = (this: double): void => {}
    use: |
      let n: double = 1.0
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Double'"
  - decl: |
      let f = (this: boolean): void => {}
    use: |
      let n: boolean = true
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Boolean'"
  - decl: |
      let f = (this: string): void => {}
    use: |
      let n: string = "abc"
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'String'"
  - decl: |
      let f = (this: char): void => {}
    use: |
      let n: char = c'a'
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Char'"
  - decl: |
      let f = (this: Function): void => {}
    use: |
      let n: Function = (): void => {}
      n.f()
    out: "Semantic error ESE0087: Property 'f' does not exist on type 'Function'"
