---
cases:
  - decl: |
      class A {}
      let f = (this: A): void => {}
    use: |
      let a: A = new A()
      f(a)
  - decl: |
      interface I {}
      let f = (this: I): void => {}
    use: |
      let i: I = {}
      f(i)
  - decl: |
      let f = (this: number[]): void => {}
    use: |
      let n: number[] = [0, 1]
      f(n)
  - decl: |
      class A {
        f(): string { return "A" }
      }
      class B {
        a:A
        constructor(a:A){
           this.a = a
        }
        f = (this: A): string => { return this.f() }
      }
    use: |
      let a: A = new A()
      let b: B = new B(a)
      arktest.assertEQ(b.a.f(), "A")
  - decl: |
      class A {
        f(): string { return "A" }
      }
      class B {
        f = (this: B, a: A): string => { return a.f() }
      }
    use: |
      let a: A = new A()
      let b: B = new B()
      arktest.assertEQ(b.f(b, a), "A")
  - decl: |
      class A {
        f(): string { return "A" }
      }
      class B {
        f = (this: A): string => { return this.f() }
      }
    use: |
      let a: A = new A()
      let b: B = new B()
      arktest.assertEQ(b.f(a), "A")
      arktest.assertEQ(a.f(), "A")
  - decl: |
      class A {
        f(): string { return "A" }
      }
      interface I {
        f: (this: A) => string
      }
    use: |
      let a: A = new A()
      let i: I = {f: (this: A): string => { return this.f() }}
      arktest.assertEQ(i.f(a), "A")
  - decl: |
      let f = (this: Number): void => {}
    use: |
      let n: Number = 1
      f(n)
  - decl: |
      interface I {}
      let f = (this: I): void => {}
    use: |
      let i: I = {}
      f(i)
  - decl: |
      let f = (this: number): void => {}
    use: |
      let n: number = 1
      f(n)
  - decl: |
      let f = (this: byte): void => {}
    use: |
      let n: byte = 1
      f(n)
  - decl: |
      let f = (this: short): void => {}
    use: |
      let n: short = 1
      f(n)
  - decl: |
      let f = (this: int): void => {}
    use: |
      let n: int = 1
      f(n)
  - decl: |
      let f = (this: long): void => {}
    use: |
      let n: long = 1
      f(n)
  - decl: |
      let f = (this: bigint): void => {}
    use: |
      let n: bigint = 1n
      f(n)
  - decl: |
      let f = (this: float): void => {}
    use: |
      let n: float = 1.0f
      f(n)
  - decl: |
      let f = (this: double): void => {}
    use: |
      let n: double = 1.0
      f(n)
  - decl: |
      let f = (this: boolean): void => {}
    use: |
      let n: boolean = true
      f(n)
  - decl: |
      let f = (this: string): void => {}
    use: |
      let n: string = "abc"
      f(n)
  - decl: |
      let f = (this: char): void => {}
    use: |
      let n: char = c'a'
      f(n)
  - decl: |
      let f = (this: Function): void => {}
    use: |
      let n: Function = (): void => {}
      f(n)

  # Array
  - decl: |
      let f = (this: Array<float>): float => { return this[1] }
    use: |
      let a: Array<float> = [-0.5f, 7.3f] 
      arktest.assertEQ(f(a), a[1])

  # Array: iterate receiver
  - decl: |
      let f = (this: Array<string>): string => {
        let res = ""
        for (let el of this) {
          res += el
        }
      return res
      }
    use: |
      let a: Array<string> = ["t", "e", "s", "t"]
      arktest.assertEQ(f(a), "test")

  # ValueArray
  - decl: |
      let f = (this: ValueArray<float>): float => { return this.length }
    use: |
      let a: ValueArray<float> = [-0.5f, 7.3f]
      arktest.assertEQ(f(a), 2)

  # $_iterator as lambda with receiver for Array<int>
  - decl: |
      class ArrayIntIterator implements Iterator<int> {
        index: int = 0
        base: Array<int>
        constructor(base: Array<int>) {
          this.base = base
        }
        next(): IteratorResult<int> {
          return new IteratorResult<int>(this.index >= this.base.length,
            this.index >= this.base.length ? undefined : this.base[this.index++])
        }
      }
      let $_iterator = (this: Array<int>): Iterator<int> => {
        return new ArrayIntIterator(this)
      }
    use: |
      let sum = 0
      let arr: Array<int> = [10, 20, 30]
      let it = arr.$_iterator()
      let res = it.next()
      while (!res.done) {
        sum += res.value!.toInt()
        res = it.next()
      }
      arktest.assertEQ(sum, 60)

  # $_iterator as lambda with receiver for ValueArray<float>
  - decl: |
      class VAIterator implements Iterator<float> {
        index: int = 0
        base: ValueArray<float>
        constructor(base: ValueArray<float>) {
          this.base = base
        }
        next(): IteratorResult<float> {
          return new IteratorResult<float>(this.index >= this.base.length,
            this.index >= this.base.length ? undefined : this.base[this.index++])
        }
      }
      let $_iterator = (this: ValueArray<float>): Iterator<float> => {
        return new VAIterator(this)
      }
    use: |
      let a: ValueArray<float> = [1.0f, 2.0f, 3.0f]

      let it_func = $_iterator(a)
      sum = 0.0f
      res = it_func.next()
      while (!res.done) {
        sum += res.value as float
        res = it_func.next()
      }
      arktest.assertEQ(sum, 6.0f)
