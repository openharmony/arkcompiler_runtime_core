---
cases:
    - main: |-
          v = null >= c'a'
      expected_out: "Semantic error ESE0105: Operator '>=' cannot be applied to types 'null' and 'Char'."

    - main: |-
          v = undefined > c'a'
      expected_out: "Semantic error ESE0105: Operator '>' cannot be applied to types 'undefined' and 'Char'."

    - main: |-
          v = v < c'a'
      expected_out: "Semantic error ESE0105: Operator '<' cannot be applied to types 'Boolean' and 'Char'."

    - main: |-
          v = "a" >= c'a'
      expected_out: "Semantic error ESE0105: Operator '>=' cannot be applied to types 'String' and 'Char'."

    - main: |-
          v = c'a' > new Object()
      expected_out: "Semantic error ESE0105: Operator '>' cannot be applied to types 'Char' and 'Object'."

    - decl: |-
          let u: char|int|string = 0
          let c: char = c'a'
      main: |-
          v = c > u
      expected_out: "Semantic error ESE0109: Bad operand type, unions are not allowed in binary expressions except equality."

    - decl: |-
          enum Color { Red, Green, Blue }
      main: |-
          v = Color.Red >= c'\u0000'
      expected_out: "Semantic error ESE0105: Operator '>=' cannot be applied to types 'Color' and 'Char'."
