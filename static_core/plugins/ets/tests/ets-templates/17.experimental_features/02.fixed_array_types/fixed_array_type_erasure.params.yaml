cases:
  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<number | bigint>"
    element_check_wrong_type: "int"
    fixed_array_check_wrong_type: "FixedArray<int>"
    fixed_array_cast_wrong_type: "FixedArray<int>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7"
    new_val_2: "125.4"
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "number_bigint"

  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<number | null>"
    element_check_wrong_type: "null"
    fixed_array_check_wrong_type: "FixedArray<null>"
    fixed_array_cast_wrong_type: "FixedArray<null>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7"
    new_val_2: "125.4"
    new_wrong_val_0: "null"
    new_wrong_val_1: "null"
    new_wrong_val_2: "null"
    test_suffix: "number_null"

  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<number | undefined>"
    element_check_wrong_type: "undefined"
    fixed_array_check_wrong_type: "FixedArray<undefined>"
    fixed_array_cast_wrong_type: "FixedArray<undefined>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7"
    new_val_2: "125.4"
    new_wrong_val_0: "undefined"
    new_wrong_val_1: "undefined"
    new_wrong_val_2: "undefined"
    test_suffix: "number_und"

  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<number | null | undefined>"
    element_check_wrong_type: "undefined"
    fixed_array_check_wrong_type: "FixedArray<null | undefined>"
    fixed_array_cast_wrong_type: "FixedArray<null | undefined>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7"
    new_val_2: "125.4"
    new_wrong_val_0: "null"
    new_wrong_val_1: "undefined"
    new_wrong_val_2: "null"
    test_suffix: "number_null_und"

  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<Object>"
    element_check_wrong_type: "string"
    fixed_array_check_wrong_type: "FixedArray<string>"
    fixed_array_cast_wrong_type: "FixedArray<string>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7.3"
    new_val_2: "125.4"
    new_wrong_val_0: "\"a\""
    new_wrong_val_1: "\"b\""
    new_wrong_val_2: "\"c\""
    test_suffix: "number_obj"

  - element_type: "number"
    element_check_type: "number"
    fixed_array_check_type: "FixedArray<number>"
    fixed_array_check_superclass_type: "FixedArray<Any>"
    element_check_wrong_type: "string"
    fixed_array_check_wrong_type: "FixedArray<string>"
    fixed_array_cast_wrong_type: "FixedArray<string>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7.3"
    new_val_2: "125.4"
    new_wrong_val_0: "null"
    new_wrong_val_1: "undefined"
    new_wrong_val_2: "null"
    test_suffix: "number_any"

  - element_type: "double"
    element_check_type: "double"
    fixed_array_check_type: "FixedArray<double>"
    fixed_array_check_superclass_type: "FixedArray<double | bigint>"
    element_check_wrong_type: "float"
    fixed_array_check_wrong_type: "FixedArray<float>"
    fixed_array_cast_wrong_type: "FixedArray<float>"
    check_val_0: "5"
    check_val_1: "2.3"
    check_val_2: "7.49"
    new_val_0: "17.23"
    new_val_1: "7"
    new_val_2: "125.4"
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "double"

  - element_type: "float"
    element_check_type: "float"
    fixed_array_check_type: "FixedArray<float>"
    fixed_array_check_superclass_type: "FixedArray<float | double>"
