    fixed_array_check_wrong_type: "FixedArray<string>"
    fixed_array_cast_wrong_type: "FixedArray<string>"
    check_val_0: "c'a'"
    check_val_1: "c'b'"
    check_val_2: "c'd'"
    new_val_0: "c'x'"
    new_val_1: "c'y'"
    new_val_2: "c'z'"
    new_wrong_val_0: "17.3"
    new_wrong_val_1: "7.67"
    new_wrong_val_2: "125.54"
    test_suffix: "char"

  - element_type: "Object"
    element_check_type: "Object"
    fixed_array_check_type: "FixedArray<Object>"
    fixed_array_check_superclass_type: "FixedArray<Any>"
    element_check_wrong_type: "float"
    fixed_array_check_wrong_type: "FixedArray<float>"
    fixed_array_cast_wrong_type: "FixedArray<float>"
    check_val_0: "5.7"
    check_val_1: "54789n"
    check_val_2: "c'd'"
    new_val_0: "\"abc\""
    new_val_1: "123"
    new_val_2: "c'z'"
    new_wrong_val_0: "null"
    new_wrong_val_1: "undefined"
    new_wrong_val_2: "null"
    test_suffix: "object"

  - element_type: "Any"
    element_check_type: "Any"
    fixed_array_check_type: "FixedArray<Any>"
    fixed_array_check_superclass_type: "FixedArray<Any>"
    element_check_wrong_type: "never"
    fixed_array_check_wrong_type: "FixedArray<float>"
    fixed_array_cast_wrong_type: "FixedArray<float>"
    check_val_0: "5.7"
    check_val_1: "54789n"
    check_val_2: "34.7f"
    new_val_0: "\"abc\""
    new_val_1: "null"
    new_val_2: "undefined"
    test_suffix: "any"

  - element_type: "number | string"
    element_check_type: "number | string"
    fixed_array_check_type: "FixedArray<number | string>"
    fixed_array_check_superclass_type: "FixedArray<number | string | bigint>"
    element_check_wrong_type: "int"
    fixed_array_check_wrong_type: "FixedArray<number>"
    fixed_array_cast_wrong_type: "FixedArray<number>"
    check_val_0: "5.7"
    check_val_1: "17.3"
    check_val_2: "4.8"
    new_val_0: "\"abc\""
    new_val_1: "\"efg\""
    new_val_2: "123"
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
