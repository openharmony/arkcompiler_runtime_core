  - element_type: "\"a\" | \"b\" | \"c\""
    element_check_type: "string"
    fixed_array_check_type: "FixedArray<string>"
    fixed_array_check_superclass_type: "FixedArray<string | bigint>"
    element_check_wrong_type: "bigint"
    fixed_array_check_wrong_type: "FixedArray<bigint>"
    fixed_array_cast_wrong_type: "FixedArray<bigint>"
    check_val_0: "\"a\""
    check_val_1: "\"c\""
    check_val_2: "\"b\""
    new_val_0: "\"b\""
    new_val_1: "\"a\""
    new_val_2: "\"c\""
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "union_str_lit"
