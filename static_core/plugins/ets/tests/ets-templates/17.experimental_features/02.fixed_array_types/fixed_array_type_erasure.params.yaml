    fixed_array_cast_wrong_type: "FixedArray<string>"
    check_val_0: "5f"
    check_val_1: "2.3f"
    check_val_2: "7.49f"
    new_val_0: "17.23f"
    new_val_1: "7f"
    new_val_2: "125.4f"
    new_wrong_val_0: "17.3"
    new_wrong_val_1: "7.67"
    new_wrong_val_2: "125.54"
    test_suffix: "float"

  - element_type: "int"
    element_check_type: "int"
    fixed_array_check_type: "FixedArray<int>"
    fixed_array_check_superclass_type: "FixedArray<int | string>"
    element_check_wrong_type: "number"
    fixed_array_check_wrong_type: "FixedArray<number>"
    fixed_array_cast_wrong_type: "FixedArray<number>"
    check_val_0: "2147483647"
    check_val_1: "23"
    check_val_2: "749"
    new_val_0: "15"
    new_val_1: "20"
    new_val_2: "37"
    new_wrong_val_0: "\"a\""
    new_wrong_val_1: "\"b\""
    new_wrong_val_2: "\"c\""
    test_suffix: "int"

  - element_type: "long"
    element_check_type: "long"
    fixed_array_check_type: "FixedArray<long>"
    fixed_array_check_superclass_type: "FixedArray<long | string>"
    element_check_wrong_type: "int"
    fixed_array_check_wrong_type: "FixedArray<int>"
    fixed_array_cast_wrong_type: "FixedArray<int>"
    check_val_0: "9223372036854775807"
    check_val_1: "23"
    check_val_2: "749"
    new_val_0: "15"
    new_val_1: "20"
    new_val_2: "37"
    new_wrong_val_0: "\"a\""
    new_wrong_val_1: "\"b\""
    new_wrong_val_2: "\"c\""
    test_suffix: "long"

  - element_type: "short"
    element_check_type: "short"
    fixed_array_check_type: "FixedArray<short>"
    fixed_array_check_superclass_type: "FixedArray<short | bigint>"
    element_check_wrong_type: "byte"
    fixed_array_check_wrong_type: "FixedArray<byte>"
    fixed_array_cast_wrong_type: "FixedArray<byte>"
    check_val_0: "32767"
    check_val_1: "23"
    check_val_2: "749"
    new_val_0: "15"
    new_val_1: "20"
    new_val_2: "37"
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "short"

  - element_type: "byte"
    element_check_type: "byte"
    fixed_array_check_type: "FixedArray<byte>"
    fixed_array_check_superclass_type: "FixedArray<byte | bigint>"
    element_check_wrong_type: "short"
    fixed_array_check_wrong_type: "FixedArray<short>"
    fixed_array_cast_wrong_type: "FixedArray<short>"
    check_val_0: "127"
    check_val_1: "23"
    check_val_2: "115"
    new_val_0: "15"
    new_val_1: "20"
    new_val_2: "37"
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "byte"

  - element_type: "bigint"
    element_check_type: "bigint"
    fixed_array_check_type: "FixedArray<bigint>"
    fixed_array_check_superclass_type: "FixedArray<bigint | int>"
    element_check_wrong_type: "string"
    fixed_array_check_wrong_type: "FixedArray<string>"
    fixed_array_cast_wrong_type: "FixedArray<string>"
    check_val_0: "92233720368547758097n"
    check_val_1: "23n"
    check_val_2: "749n"
    new_val_0: "15n"
    new_val_1: "20n"
    new_val_2: "37n"
    new_wrong_val_0: "17"
    new_wrong_val_1: "7"
    new_wrong_val_2: "125"
    test_suffix: "bigint"

  - element_type: "string"
    element_check_type: "string"
    fixed_array_check_type: "FixedArray<string>"
    fixed_array_check_superclass_type: "FixedArray<string | bigint>"
    element_check_wrong_type: "int"
    fixed_array_check_wrong_type: "FixedArray<int>"
    fixed_array_cast_wrong_type: "FixedArray<int>"
    check_val_0: "\"abc\""
    check_val_1: "\"efg\""
    check_val_2: "\"123\""
    new_val_0: "\"a\""
    new_val_1: "\"b\""
    new_val_2: "\"c\""
    new_wrong_val_0: "17n"
    new_wrong_val_1: "7n"
    new_wrong_val_2: "125n"
    test_suffix: "string"

  - element_type: "char"
    element_check_type: "char"
    fixed_array_check_type: "FixedArray<char>"
    fixed_array_check_superclass_type: "FixedArray<char | number>"
