--- # Negative cases for fixed arrays of function
cases:
    - logic: |-
        let fs: FixedArray<HandlerReq> = [handlerB]
      expected_out: |-
        "Semantic error ESE461884: Type '((p1: B) => B)' is not preserved by type erasure and cannot be used as type argument for FixedArray instantiations."

    - logic: |-
        let fs: FixedArray<HandlerReq|null> = [null]
        fs[0] = handlerB
      expected_out: |-
        "Semantic error ESE461884: Type '(((p1: B) => B))|null' is not preserved by type erasure and cannot be used as type argument for FixedArray instantiations.\nSemantic error ESE0318: Type '((p1: B) => A)' cannot be assigned to type '(((p1: B) => B))|null'"

    - logic: |-
        let fs: FixedArray<HandlerReq> = [handlerNothing]
      expected_out: |-
        "Semantic error ESE461884: Type '((p1: B) => B)' is not preserved by type erasure and cannot be used as type argument for FixedArray instantiations."

    - logic: |-
        let fs: FixedArray<HandlerReq|null> = [null]
        fs[0] = handlerNothing
      expected_out: |-
        "Semantic error ESE461884: Type '(((p1: B) => B))|null' is not preserved by type erasure and cannot be used as type argument for FixedArray instantiations.\nSemantic error ESE0318: Type '(() => A)' cannot be assigned to type '(((p1: B) => B))|null'"
