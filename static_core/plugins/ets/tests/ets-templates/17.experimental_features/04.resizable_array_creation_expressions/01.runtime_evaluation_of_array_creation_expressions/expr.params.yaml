---
cases:
    - defs: |-
          let res: string = ""
          function foo(p: int): int {
              res += p
              return p
          }
      use: |-
          res = ""
          let v: number[][] = [ [new Double(foo(1))],[new Double(foo(2))] ]
          arktest.assertEQ(res, "12")
          arktest.assertTrue(v instanceof Array)
          arktest.assertTrue(v[0][0] instanceof number)

    - defs: |-
          type UT = number[][] | null
          let res: string = ""
          function foo(p: int): int {
              res += p
              if (p == 2) {
                  throw new Error()
              }
              return p
          }
      use: |-
          res = ""
          let v: UT = null
          let expectedError = (e: Error): boolean => {
              return (e instanceof Error)
          }
          arktest.expectThrow(() => {v = [ [new Double(foo(1))],[new Double(foo(2))] ]}, expectedError)
          arktest.assertEQ(res, "12")
          arktest.assertEQ(v, null)

    - desc: |- # 24859 undefined register, Register type conflict
      defs: |-
          type UT = number[][] | null
          let res: string = ""
          function foo(p: int): int {
              res += p
              if (p == 2) {
                  throw new Error()
              }
              return p
          }
      use: |-
          res = ""
          let v: UT = null
          let check: boolean = false
          try {
              v = [ [new Double(foo(1))],[new Double(foo(2))] ]
          } catch (e) {
              // expected
              check = true
          }
          arktest.assertEQ(check, true)
          arktest.assertEQ(res, "12")
          arktest.assertEQ(v, null)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = cntr++
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(v.length, 42)
          arktest.assertTrue(v[41] instanceof A)


    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = cntr
              constructor() {
                  this.fld = cntr++
              }
              constructor(p: int) {
                  this.fld = p
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(v.length, 42)
          arktest.assertTrue(v[41] instanceof A)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(p?: int) {
                  if (p == undefined) {
                      this.fld = cntr++
                  }
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(v.length, 42)
          arktest.assertTrue(v[41] instanceof A)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(p: int = 1) {
                  this.fld = cntr
                  cntr += p
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(cntr, 42)
          arktest.assertTrue(v[41] instanceof A)
          arktest.assertEQ(v[41].fld, 41)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(p1?: int, p2?: int) {
                  if ((p1 == undefined) && (p2 == undefined)) {
                      this.fld = cntr++
                  }
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(cntr, 1)
          arktest.assertTrue(v[41] instanceof A)
          arktest.assertEQ(v[41].fld, 0)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(p1: int = 1, p2?: int) {
                  if (p2 == undefined) {
                      this.fld = cntr
                      cntr += p1
                  }
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(cntr, 42)
          arktest.assertTrue(v[41] instanceof A)
          arktest.assertEQ(v[41].fld, 41)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(p1?: int, p2: int = 1) {
                  if (p1 == undefined) {
                      this.fld = cntr
                      cntr += p2
                  }
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(cntr, 42)
          arktest.assertTrue(v[41] instanceof A)
          arktest.assertEQ(v[41].fld, 41)

    - defs: |-
          let cntr: int = 0
          class A {
              fld: int = 0
              constructor(...args: Any[]) {
                  if (args.length == 0) {
                      this.fld = cntr++
                  }
              }
          }
          function foo(p: int): int {
              res += p
              return p
          }
          let res: string = ""
      use: |-
          cntr = 0
          res = ""
          let v: A[] = new A[foo(42)](new A())
          arktest.assertEQ(res, "42")
          arktest.assertEQ(cntr, 42)
          arktest.assertTrue(v[41] instanceof A)
          arktest.assertEQ(v[41].fld, 41)

    - use: |-
          let v: int[] = new int[33](0)  // initialized with 0
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], 0)
          }

    - use: |-
          let v: number[] = new number[33](0)  // initialized with 0.0
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], 0.0)
          }

    - use: |-
          let v: char[] = new char[33]((0).toChar())  // initialized with c'\u0000'
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], c'\u0000')
          }

    - use: |-
          let v: boolean[] = new boolean[33](false)  // initialized with false
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], false)
          }

    - defs: |-
          type EN = Error|undefined
      use: |-
          let v: EN[] = new EN[33](undefined)  // initialized with undefined
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], undefined)
          }

    - defs: |-
          type EU = Error|undefined
      use: |-
          let v: EU[] = new EU[33](undefined)  // initialized with undefined
          for (let i = 0; i < 33; i++) {
              arktest.assertEQ(v[i], undefined)
          }
