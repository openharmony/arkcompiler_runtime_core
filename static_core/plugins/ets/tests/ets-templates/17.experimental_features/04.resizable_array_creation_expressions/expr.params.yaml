---
cases:
#0
    - decl: |-
          let size = 0  // int, zero-length array
      use: |-
          let v = new string[size]("")
          arktest.assertEQ(v.length, 0)
#1
    - decl: |-
          const size = 256  // int
      use: |-
          let v = new number[size](0)
          v[255] = 42.0
          arktest.assertEQ(v.length, 256)
          arktest.assertEQ(v[255], 42.0)
#2
    - decl: |-
          let size: Int = new Int(1)  // int alias
      use: |-
          let v: number[] = new number[size](0)
          v[0] = 42.0
          arktest.assertEQ(v.length, 1)
          arktest.assertEQ(v[0], 42.0)
#3
    - decl: |-
          const size: byte = 10
      use: |-
          let v: Error[] = new Error[size](new Error())
          v[9] = new Error()
          arktest.assertEQ(v.length, 10)
          arktest.assertTrue(v[9] instanceof Error)
#4
    - decl: |-
          let size: Byte = new Byte(0x7f as byte)  // byte alias
      use: |-
          let v: Error[] = new Error[size](new Error())
          v[0x7e] = new Error()
          arktest.assertEQ(v.length, 0x7f)
          arktest.assertTrue(v[0x7e] instanceof Error)
#5
    - decl: |-
          const size: short = 0o52
      use: |-
          let v: Number[] = new Number[size](0)
          v[0o37] = new Number(42.0)
          arktest.assertEQ(v.length, 0o52)
          arktest.assertEQ(v[0o37], 42.0)
#6
    - decl: |-
          let size: Short = new Short(0b0101 as short)  // short alias
      use: |-
          let v: Long[] = new Long[size](0)
          v[0b0100] = new Long(42 as long)
          arktest.assertEQ(v.length, 0b0101)
          arktest.assertEQ(v[0b0100], 42)
#7
    - decl: |-
          let size1: byte = 7
          let size2: short = 8
          const size3: int = 9
      use: |-
          let v1: string[] = new string[size1]("abc")
          let v2: string[] = new string[size2]("abc")
          let v3: string[] = new string[size3]("abc")
          arktest.assertEQ(v1.length, size1)
          arktest.assertEQ(v2.length, size2)
          arktest.assertEQ(v3.length, size3)
          arktest.assertEQ(v1[size1 - 1], "abc")
          arktest.assertEQ(v2[size2 - 1], "abc")
          arktest.assertEQ(v3[size3 - 1], "abc")
#8
    - decl: |-
          enum Color { Red, Green, Blue }
          let size = 3
      use: |-
          let v: Color[] = new Color[size](Color.Red)
          v[0] = Color.Blue
          arktest.assertEQ(v.length, 3)
          arktest.assertEQ(v[0], Color.Blue)
#9
    - decl: |-
          enum Color { Red, Green, Blue }
      use: |-
          let v: char[] = new char[Color.Green](c'@')
          arktest.assertEQ(v.length, 1)
          arktest.assertEQ(v[0], c'@')
