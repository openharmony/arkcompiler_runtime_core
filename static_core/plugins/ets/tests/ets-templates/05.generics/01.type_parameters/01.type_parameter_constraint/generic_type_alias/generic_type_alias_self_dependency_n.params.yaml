--- # Self dependency tests
cases:
  - self_dependency: T extends T
    expected_out: "Semantic error ESE0184: Type parameter 'T' has circular constraint dependency."
  - self_dependency: T2 extends T2<T>
    expected_out: "Semantic error ESE0184: Type parameter 'T2' has circular constraint dependency."
  - self_dependency: T2 extends T2<T3<T>>
    expected_out: "Semantic error ESE0184: Type parameter 'T2' has circular constraint dependency."
  - self_dependency: T2 extends T2<T2<T>>
    expected_out: "Semantic error ESE0184: Type parameter 'T2' has circular constraint dependency."
  - self_dependency: T4 extends T4<T2<T>>
    expected_out: "Semantic error ESE0184: Type parameter 'T4' has circular constraint dependency."

# Top level class modifiers
top_level_class_modifiers:
  - ""
  - abstract
  - final
