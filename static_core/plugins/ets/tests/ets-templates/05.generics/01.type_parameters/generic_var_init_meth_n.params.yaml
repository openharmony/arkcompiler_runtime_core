cases:
  - decl: |-
      class G<T> {
        // note similar test for class field is in 9.6.4
        foo() {
          let t: T
          let foo = t + "bar" // TypeError: variable 't' is used before being assigned
          return foo
        }
      }
    use: |-
      let g = new G<String>
      arktest.assertEQ(g.foo(), "invalid init", "this avoids compiler optimization")

  - decl: |-
      class G<T> {
        foo() {
          let t: T
          let s = t
          return s
        }
      }
    use: |-
      let g = new G<String>
      arktest.assertEQ(g.foo(), "invalid init", "this avoids compiler optimization")
