---
cases:
  # based on spec code examples
  # 0
  - decl: |-
      class X<T> {
        p: T
        constructor(v: T) { this.p = v }
      }

      function bar(x: X<Any>) { x.p = "a" }

      function foo(obj: object): void {
        if (obj instanceof X) {
          let x = obj // instanceof guarantees that the type is *some* X
          // yet the type parameter is unknown
          // The inferred type of obj is X<*>

          bar(x) // compile-time error, X<*> is not just X<Any>, and X<*> is not
          // a subtype of X<Any>. The type parameter
          // T is invariant, thus an arbitrary instantiation of
          // X is not strictly an X<Any>.
        }
      }
    stdout: |-
      "Semantic error ESE0127: No matching call signature for bar(X<*>)"
      "Semantic error ESE0046: Type 'X<*>' is not compatible with type 'X<Any>' at index 1"

  # 1
  - decl: |-
      class C { }

      interface X1<T extends C> {
        read(): T
        write(p: T): void
        prop: T
      }

      function foo1(o: Object) {
        if (o instanceof X1) {
          let o1: X1<C> = o // compile-time error, X<*> is not a subtype of X<C>
        }
      }
    expected_out: |-
      "Semantic error ESE0318: Type 'X1<*>' cannot be assigned to type 'X1<C>'"

  # 2
  - decl: |-
      class C { }

      interface X1<T extends C> {
        read(): T
        write(p: T): void
        prop: T
      }

      function foo1(o: Object) {
        if (o instanceof X1) {
          let o2: X1<never> = o // compile-time error, X<*> is not a subtype of X<never>
        }
      }
    expected_out: |-
      "Semantic error ESE0318: Type 'X1<*>' cannot be assigned to type 'X1<never>'"

  # 3
  - decl: |-
      class C { }

      interface X1<T extends C> {
        read(): T
        write(p: T): void
        prop: T
      }

      function foo1(o: Object) {
        if (o instanceof X1) {
          o.write(new C()) // compile-time error, T in "in" position is instantiated with never
        }
      }
    stdout: |-
      Semantic error ESE0127: No matching call signature for write(C)\n
      Semantic error ESE0046: Type 'C' is not compatible with type '*' at index 1\n

  # 4
  - decl: |-
      class C { }

      interface X1<T extends C> {
        read(): T
        write(p: T): void
        prop: T
      }

      function foo1(o: Object) {
        if (o instanceof X1) {
          o.prop = o.read() // compile-time error, T in "invariant" position
        }
      }
    expected_out: |-
      "Semantic error ESE0318: Type 'C' cannot be assigned to type '*'"

  # 5
  - decl: |-
      class C { }

      interface X2<out T extends C> {
        read(): T
      }

      function foo2(o: Object) {
        if (o instanceof X2) { // type of o is X2<C>
          let o2: X2<never> = o // compile-time error, X2<C> is not a subtype of X2<never>
        }
      }
    expected_out: |-
      "Semantic error ESE0318: Type 'X2<C>' cannot be assigned to type 'X2<never>'"

  # 6
  - decl: |-
      class C { }

      interface X3<in T extends C> {
        write(p: T): void
      }

      function foo3(o: Object) {
        if (o instanceof X3) { // type of o is X3<never>
          let o1: X3<C> = o // compile-time error, X3<never> is not a subtype of X3<C>
        }
      }
    expected_out: |-
      "Semantic error ESE0318: Type 'X3<never>' cannot be assigned to type 'X3<C>'"

  # 7
  - decl: |-
      class C { }

      interface X3<in T extends C> {
        write(p: T): void
      }

      function foo3(o: Object) {
        if (o instanceof X3) { // type of o is X3<never>
          o.write(new C()) // compile-time error, T in "in" position is instantiated with never
        }
      }
    stdout: |-
      "Semantic error ESE0127: No matching call signature for write(C)"
      "Semantic error ESE0046: Type 'C' is not compatible with type 'never' at index 1"

  # 8
  - decl: |-
      class X4<T> {
        p: T
        constructor(p: T) { this.p = p }
      }

      function foo4(a: Any, b: Any) {
        if (a instanceof X4 && b instanceof X4) {
          a.p = b.p // compile-time error defined by invariance
        }
      }
    use: |-
      foo4(new X4<number>(1), new X4<string>("a"))
    expected_out: |-
      "Semantic error ESE0318: Type '*' cannot be assigned to type '*'"
