--- # List of named type declaration operations
incorrect_cases:
  - declaration: 'undefined class A {}'
    usage: 'let a = new A'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'class'."
  - declaration: 'class undefined {}'
    usage: 'let a = new undefined()'
    exp_out: |-
      "Syntax error ESY0316: Hard keyword 'undefined' cannot be used as identifier"
  - declaration: 'class MCU implements undefined {}'
    usage: 'let a = new MCU'
    exp_out: |-
      "Syntax error ESY0122: Identifier expected."
  - declaration: 'class MCU extends undefined {}'
    usage: 'let a = new MCU'
    exp_out: |-
      "Syntax error ESY0230: Expected '{', got 'undefined'."
  - declaration: 'interface undefined {}'
    usage: 'let a: undefined'
    exp_out: |-
      "Syntax error ESY0316: Hard keyword 'undefined' cannot be used as identifier"
  - declaration: 'undefined interface I {}'
    usage: 'let a = 1'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'interface'."
  - declaration: 'undefined function foo() { return 1}'
    usage: 'arktest.assertTrue(foo() == 2)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'function'."
  - declaration: 'function undefined() { return 1}'
    usage: 'arktest.assertTrue(undefined() == 1)'
    exp_out: |-
      "Semantic error ESE0002: Type 'undefined' has no call signatures."
  - declaration: 'undefined foo() { return 1}'
    usage: 'arktest.assertTrue(foo() == 1)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'foo'."
  - declaration: 'function foo(undefined int) { return 1}'
    usage: 'arktest.assertTrue(foo() == undefined)'
    exp_out: |-
      "Syntax error ESY0194: Parameter declaration should have an explicit type annotation."
  - declaration: 'class A { undefined:int = 1 }'
    usage: 'arktest.assertTrue(new A().undefined == 1)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'undefined'."
  - declaration: 'class A { static undefined:int = 1 }'
    usage: 'arktest.assertTrue(A.undefined == 1)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'undefined'."
  - declaration: 'class A { undefined:undefined = undefined }'
    usage: 'arktest.assertTrue(new A().undefined == undefined)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'undefined'."
  - declaration: 'class A { undefined foo() { return 1} }'
    usage: 'arktest.assertTrue(new A().foo() == 1)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'undefined'."
  - declaration: 'class A { undefined() { return 1} }'
    usage: 'arktest.assertTrue(new A().undefined() == 1)'
    exp_out: |-
      "Syntax error ESY0316: Hard keyword 'undefined' cannot be used as identifier"
  - declaration: 'class A implements undefined { }'
    usage: 'arktest.assertTrue(new A() instanceof A)'
    exp_out: |-
      "Syntax error ESY0122: Identifier expected."
  - declaration: 'class A undefined String { }'
    usage: 'arktest.assertTrue(new A() instanceof A)'
    exp_out: |-
      "Syntax error ESY0230: Expected '{', got 'undefined'."
  - declaration: 'undefined A { }'
    usage: 'arktest.assertTrue(new A() instanceof A)'
    exp_out: |-
      "Syntax error ESY0227: Unexpected token 'A'."
