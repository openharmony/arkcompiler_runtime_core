--- # List of predefined types

default_value:
  - { type: byte, expected: "Syntax error ESY0295: byte is a predefined type, cannot be used as an identifier" }
  - { type: short, expected: "Syntax error ESY0295: short is a predefined type, cannot be used as an identifier" }
  - { type: int, expected: "Syntax error ESY0295: int is a predefined type, cannot be used as an identifier" }
  - { type: long, expected: "Syntax error ESY0295: long is a predefined type, cannot be used as an identifier" }
  - { type: float, expected: "Syntax error ESY0295: float is a predefined type, cannot be used as an identifier" }
  - { type: double, expected: "Syntax error ESY0295: double is a predefined type, cannot be used as an identifier" }
  - { type: char, expected: "Syntax error ESY0295: char is a predefined type, cannot be used as an identifier" }
  - { type: boolean, expected: "Syntax error ESY0295: boolean is a predefined type, cannot be used as an identifier" }
  - { type: "null", expected: "Syntax error ESY0224: Identifier expected, got 'null'." }
  - { type: void, expected: "Syntax error ESY0295: void is a predefined type, cannot be used as an identifier" }
  - { type: undefined, expected: "Syntax error ESY0316: Hard keyword 'undefined' cannot be used as identifier" }
  - { type: bigint, expected: "Syntax error ESY0295: bigint is a predefined type, cannot be used as an identifier" }
