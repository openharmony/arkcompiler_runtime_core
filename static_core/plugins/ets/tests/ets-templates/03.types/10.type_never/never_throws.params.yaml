# Runtime behavior of `never`:
#   - `as never` always throws ClassCastError at runtime.
#   - reading a never-typed field/var emits a throw stub.
#   - never-returning calls flow through any target slot.

--- # cases
cases:
    - desc: cast Object to never throws
      decl: ""
      body: |-
        let a: Object = new Object()
        arktest.expectThrow(() => { let x: never = a as never },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("Object cannot be cast to N"))

    - desc: cast class instance to never throws
      decl: |-
        class NeverCastBox { v: int = 0 }
      body: |-
        let b: NeverCastBox = new NeverCastBox()
        arktest.expectThrow(() => { let x: never = b as never },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("NeverCastBox cannot be cast to N"))

    - desc: cast string to never throws
      decl: ""
      body: |-
        let s: string = "abc"
        arktest.expectThrow(() => { let x: never = s as never },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("LineString cannot be cast to N"))

    - desc: cast null to never throws
      decl: |-
        type UT = Object | null
      body: |-
        let a: UT = null
        arktest.expectThrow(() => { let x: never = a as never },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("Null cannot be cast to N"))

    - desc: cast in union assignment throws
      decl: |-
        type UT = Object | null
      body: |-
        let v: UT = new Object()
        arktest.expectThrow(() => { let z: UT = v as never },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("Object cannot be cast to N"))

