            new Error("str-slot"))

    - desc: never call into double slot without cast
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
      body: |-
        arktest.expectError(() => { let d: double = throwNever("dbl-direct") },
            new Error("dbl-direct"))

    - desc: never call into String slot without cast
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
      body: |-
        arktest.expectError(() => { let s: String = throwNever("str-direct") },
            new Error("str-direct"))

    - desc: lambda typed as () => never throws
      decl: ""
      body: |-
        let fn: () => never = (): never => { throw new Error("lambda") }
        arktest.expectError(() => { fn() }, new Error("lambda"))

    - desc: never lambda assigned into () => Object throws
      decl: ""
      body: |-
        let anyFn: () => Object = ((): never => { throw new Error("lambda-obj") }) as () => Object
        arktest.expectError(() => { let r: Object = anyFn() }, new Error("lambda-obj"))

    - desc: never lambda with param in interface slot throws
      decl: ""
      body: |-
        let fn: (x: int) => Object = ((n: int): never => { throw new Error("param-lambda") }) as (x: int) => Object
        arktest.expectError(() => { let r: Object = fn(42) }, new Error("param-lambda"))

    - desc: never tail-call single level
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
        function neverTailCall(): never { throwNever("tail") }
      body: |-
        arktest.expectError(() => { neverTailCall() }, new Error("tail"))

    - desc: never tail-call double chain
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
        function neverTailCall(): never { throwNever("tail") }
        function neverDoubleChain(): never { neverTailCall() }
      body: |-
        arktest.expectError(() => { neverDoubleChain() }, new Error("tail"))
