    - desc: T-extends-never field init throws
      decl: |-
        class NeverBoundBox<T extends never> {
            f: T = undefined as T
            consume(x: T): T { return this.f }
            init(): T { return undefined as T }
        }
      body: |-
        arktest.expectThrow(() => { let nb = new NeverBoundBox<never>() },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("undefined cannot be cast to N"))

    - desc: T-extends-never generic call throws at cast
      decl: |-
        function neverBoundGeneric<T extends never>(x: T): T {
            throw new Error("never-bound")
        }
      body: |-
        arktest.expectThrow(() => { neverBoundGeneric<never>(undefined as never) },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("undefined cannot be cast to N"))

    - desc: never-returning direct call throws
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
      body: |-
        arktest.expectError(() => { throwNever("direct") }, new Error("direct"))

    - desc: never result fits int slot via cast
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
      body: |-
        arktest.expectError(
            () => { let x: int = (throwNever("int-slot") as int); arktest.assertTrue(x == 0) },
            new Error("int-slot"))

    - desc: never result fits Object slot
      decl: |-
        function throwNever(msg: string): never { throw new Error(msg) }
      body: |-
        arktest.expectError(
            () => { let o: Object = throwNever("obj-slot"); arktest.assertTrue(o != null) },
            new Error("obj-slot"))

