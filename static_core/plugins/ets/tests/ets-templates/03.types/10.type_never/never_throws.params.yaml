    - desc: never field init throws
      decl: |-
        class NeverFieldBox { f: never = undefined as never }
      body: |-
        arktest.expectThrow(() => { let b = new NeverFieldBox() },
            (e: Error): boolean => e instanceof ClassCastError &&
                (e as ClassCastError).message.endsWith("undefined cannot be cast to N"))

