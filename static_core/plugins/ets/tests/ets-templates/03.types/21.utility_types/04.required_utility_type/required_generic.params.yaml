cases:
  - decl: |-
      class A<T> {
        value?: T
      }
    use: |-
      let r: Required<A<string>> = {value: "string"}
      arktest.assertEQ(r.value, "string", "expect string")

  - decl: |-
      class A<T> {
        value?: T
      }
    use: |-
      let r: Required<A<int>> = {value: 0}
      arktest.assertEQ(r.value, 0, "expect 0")

  - decl: |-
      interface I<T> {
        value?: T
      }
    use: |-
      let r: Required<I<string>> = {value: "string"}
      arktest.assertEQ(r.value, "string", "expect string")
