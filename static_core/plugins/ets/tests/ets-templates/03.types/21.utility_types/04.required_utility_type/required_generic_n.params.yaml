cases:
  - decl: |-
      class A<T> {
        value?: T
      }
    use: |-
      let r: Required<A<string>> = {}
      arktest.assertEQ(r.value, "invalid init", "this avoids compiler optimization")
    expected_out: |-
      "Semantic error ESE0226: Class property 'value' needs to be initialized for Required<A>."

  - decl: |-
      class A<T> {
        value?: T
      }
    use: |-
      let r: Required<A<string>> = {value: 0}
      arktest.assertEQ(r.value, 0, "this avoids compiler optimization")
    expected_out: |-
      "Semantic error ESE0319: Type 'Int' is not compatible with type 'String' at property 'value'"
