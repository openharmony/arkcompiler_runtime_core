---
cases:
#0
  - { ptype: [short, int, long, float, double], type: Short, val: "42 as byte", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Int'" }

#1-2
  - { ptype: [int, long, float, double], type: Int, val: "0x5A as byte", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Long'" }
  - { ptype: [int, long, float, double], type: Int, val: "(-128).toShort()", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Long'" }

#3-5
  - { ptype: [long, float, double], type: Long, val: "0o177 as byte", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Float'" }
  - { ptype: [long, float, double], type: Long, val: "(0x0000).toShort()", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Float'" }
  - { ptype: [long, float, double], type: Long, val: "0x7AFAFBFB", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Float'" }
#6-8
  - { ptype: [float, double], type: Float, val: "127 as byte", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Double'" }
  - { ptype: [float, double], type: Float, val: "(128).toShort()", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Double'" }
  - { ptype: [float, double], type: Float, val: "Long.MAX_VALUE", expected: "Semantic error ESE0318: Type 'T' cannot be assigned to type 'Double'" }
