--- # Basic standalone expressions
cases:
    - {expr: -1,           expr_type: "int",  name: "Type of integer literals is int or long"}
    - {expr: 2147_483_648, expr_type: "long", name: "Type of integer literals is int or long"}

    - {expr: 1.3f,  expr_type: "float",  name: "Type of floating-point literals is double or float"}
    - {expr: -18.5, expr_type: "double", name: "Type of floating-point literals is double or float"}

    - {expr: (1.3f - 10),      expr_type: "float",   name: "Type of expressions is inferred from operand types and operations"}
    - {expr: (-18.5 == -18.5), expr_type: "boolean", name: "Type of expressions is inferred from operand types and operations"}

    - {expr: ["a", "b", "c"], expr_type: "Array", name: "Type of array literal is erased at runtime"}
    - {expr: [1, 9, 0.17f],   expr_type: "Array", name: "Type of array literal is erased at runtime"}
