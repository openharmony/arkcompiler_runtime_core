---
cases:
    # VALUE TYPES, PARAMETER

    - base: |-
          foo(i: number): void {
              res = 1
          }
      derived: |-
          override foo(i: long): void {
              res = 2
          }
      params: override-incompatible parameter
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Long): undefined in Derived not overriding any method"

    # VALUE TYPES, RETURN TYPE

    - base: |-
          foo(): number {
              res = 1
              return 1.0
          }
      derived: |-
          override foo(): boolean {
              res = 2
              return true
          }
      params: override-incompatible return type
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type Boolean in Derived cannot override foo with type Double field from class Base because the overriding return type is not compatible with the other return type."

    - base: |-
          foo(): void {
              res = 1
          }
      derived: |-
          foo(): number {
              res = 2
              return 1.0
          }
      params: override-incompatible return type
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type Double in Derived cannot override foo with type undefined field from class Base because the overriding return type is not compatible with the other return type."

    - base: |-
          foo(): number {
              res = 1
              return 1.0
          }
      derived: |-
          foo(): void {
              res = 2
          }
      params: override-incompatible return type
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type undefined in Derived cannot override foo with type Double field from class Base because the overriding return type is not compatible with the other return type."
