---
cases:
  - parent_ret: Any
    parent_body: 'return 1'
  - parent_ret: Object
    parent_body: 'return new Object()'
  - parent_ret: string
    parent_body: 'return "a"'
  - parent_ret: boolean
    parent_body: 'return true'
  - parent_ret: byte
    parent_body: 'return 1 as byte'
  - parent_ret: short
    parent_body: 'return 1 as short'
  - parent_ret: int
    parent_body: 'return 1'
  - parent_ret: long
    parent_body: 'return 1 as long'
  - parent_ret: float
    parent_body: 'return 1.0 as float'
  - parent_ret: double
    parent_body: 'return 1.0'
  - parent_ret: number
    parent_body: 'return 1.0'
  - parent_ret: char
    parent_body: "return c'a'"
  - parent_ret: bigint
    parent_body: 'return 1n'
  - parent_ret: undefined
    parent_body: 'return undefined'
  - parent_ret: 'null'
    parent_body: 'return null'
  - parent_ret: Error
    parent_body: 'return new Error()'
  - parent_ret: 'Array<int>'
    parent_body: 'return new Array<int>()'
  - parent_ret: 'FixedArray<int>'
    parent_body: 'return [1] as FixedArray<int>'
  - parent_ret: '(p: int) => int'
    parent_body: 'return (p: int): int => 1'
  - parent_ret: 'string|undefined'
    parent_body: 'return undefined'
  - parent_ret: 'Object|null'
    parent_body: 'return null'
  - parent_ret: void
    parent_body: ''
