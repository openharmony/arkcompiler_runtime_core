---
cases:
    - decl: |-
          interface K {
              meth(p: B, q: A, w: Object): A
          }
          interface I extends K {}
          interface J extends I {
              meth(p: A, q: Object, w: Any): B  // override-compatible
          }
          class X implements J {
              meth(p: A, q: Object, w: Any): B {
                  return new B
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth(new B, new A, new Object) instanceof A)
          arktest.assertTrue(i.meth(new B, new A, new Object) instanceof A)
          arktest.assertTrue(j.meth(new A, new Object, null) instanceof B)
    
      # method returns 'this'
    - decl: |-
          interface K {
              meth(p: B, q: A, w: Object): this
          }
          interface I extends K {}
          interface J extends I {
              meth(p: A, q: Object, w: Any): this // override-compatible
          }
          class X implements J {
              meth(p: A, q: Object, w: Any): this {
                  return this
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth(new B, new A, new Object) instanceof K)
          arktest.assertTrue(i.meth(new B, new A, new Object) instanceof I)
          arktest.assertTrue(j.meth(new A, new Object, null) instanceof J)

    - decl: |-
          interface K {
              meth(p: B, q: A, w: Object): Object  // Object  - supertype for 'this'
          }
          interface I extends K {}
          interface J extends I {
              meth(p: A, q: Object, w: Any): this  // override-compatible
          }
          class X implements J {
              meth(p: A, q: Object, w: Any): this {
                  return this
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth(new B, new A, new Object) instanceof K)
          arktest.assertTrue(i.meth(new B, new A, new Object) instanceof I)
          arktest.assertTrue(j.meth(new A, new Object, null) instanceof J)

    # generics
    - decl: |-
          interface K {
              meth<T extends B, U extends A, V extends Object>(p: T, q: U, w: V): A
          }
          interface I extends K {}
          interface J extends I {
              meth<T extends A, U extends Object, V>(p: T, q: U, w: V): B  // override-compatible
          }
          class X implements J {
              meth<T extends A, U extends Object, V>(p: T, q: U, w: V): B {
                  return new B
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth<B, A, Object>(new B, new A, new Object) instanceof A)
          arktest.assertTrue(i.meth<B, A, Object>(new B, new A, new Object) instanceof A)
          arktest.assertTrue(j.meth<A, Object, Any>(new A, new Object, undefined) instanceof B)

    # generic method returns 'this'
    - decl: |-
          interface K {
              meth<T extends B, U extends A, V extends Object>(p: T, q: U, w: V): this
          }
          interface I extends K {}
          interface J extends I {
              meth<T extends A, U extends Object, V extends Any>(p: T, q: U, w: V): this // override-compatible
          }
          class X implements J {
              meth<T extends A, U extends Object, V extends Any>(p: T, q: U, w: V): this {
                  return this
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth<B, A, Object>(new B, new A, new Object) instanceof K)
          arktest.assertTrue(i.meth<B, A, Object>(new B, new A, new Object) instanceof I)
          arktest.assertTrue(j.meth<A, Object, Any>(new A, new Object, undefined) instanceof J)

    - decl: |-
          interface K {
              meth<T extends B, U extends A, V extends Object>(p: T, q: U, w: V): K
          }
          interface I extends K {}
          interface J extends I {
              meth<T extends A, U extends Object, V extends Any>(p: T, q: U, w: V): this // override-compatible
          }
          class X implements J {
              meth<T extends A, U extends Object, V extends Any>(p: T, q: U, w: V): this {
                  return this
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth<B, A, Object>(new B, new A, new Object) instanceof K)
          arktest.assertTrue(i.meth<B, A, Object>(new B, new A, new Object) instanceof I)
          arktest.assertTrue(j.meth<A, Object, Any>(new A, new Object, undefined) instanceof J)

    # several methods of superinterface can be overridden by a single method in subinterface
    - decl: |-
          interface K {
              meth(p: C, q: B, w: A): A
              meth(p: B, q: A, w: Object): B
          }
          interface I extends K {}
          interface J extends I {
              meth(p: A, q: Object, w: Any): C  // override-compatible
          }
          class X implements J {
              meth(p: A, q: Object, w: Any): C {
                  return new C
              }
          }
          let k: K = new X
          let i: I = new X
          let j: J = new X
      use: |-
          arktest.assertTrue(k.meth(new C, new B, new A) instanceof C)
          arktest.assertTrue(i.meth(new B, new A, new Object) instanceof C)
          arktest.assertTrue(j.meth(new A, new Object, null) instanceof C)

    # Any and Object have different effective types: interface method with Object param
    # is overridden by class impl with Any param (Any is contravariant to Object)
    - decl: |-
          interface I {
              foo(a: Object): int { return 0 }
          }
          class Impl1 implements I {
              foo(a: Object): int { return 1 }
          }
          class Impl2 implements I {
              foo(a: Any): int { return 2 }
          }
          let i1: I = new Impl1
          let i2: I = new Impl2
      use: |-
          arktest.assertEQ(i1.foo(new Object()), 1)
          arktest.assertEQ(i1.foo(new A), 1)
          arktest.assertEQ(i2.foo(new Object()), 2)
          arktest.assertEQ(i2.foo(new A), 2)
          arktest.assertEQ(i2.foo(1), 2)

    # Any and Object have different effective types: interface method with Any param
    # is NOT overridden by class impl with Object param
    - decl: |-
          interface I {
              foo(a: Any): int { return 0 }
          }
          class Impl1 implements I {
              foo(a: Object): int { return 1 }
          }
          class Impl2 implements I {
              foo(a: Object): int { return 2 }
              foo(a: Any): int { return 3 }
          }
          let i1: I = new Impl1
          let i2: I = new Impl2
      use: |-
          arktest.assertEQ(i1.foo(null), 0)
          arktest.assertEQ(i1.foo(undefined), 0)
          arktest.assertEQ(i1.foo(new Object()), 0)
          arktest.assertEQ(i2.foo(null), 3)
          arktest.assertEQ(i2.foo(undefined), 3)
          arktest.assertEQ(i2.foo(new Object()), 3)

    # Any and Object have different effective types: interface return type Object
    # is NOT overridden by class return type Any (Any is covariant to Object)
    - decl: |-
          interface I {
              foo(): Object { return 0 }
          }
          class Impl implements I {
              foo(): Any { return 1 }
          }
          let i: I = new Impl
      use: |-
          let v = i.foo()
          arktest.assertEQ(v, 0)

    # Any and Object have different effective types: interface return type Any
    # is overridden by class return type Object (Object is covariant to Any)
    - decl: |-
          interface I {
              foo(): Any { return 0 }
          }
          class Impl implements I {
              foo(): Object { return 1 }
          }
          let i: I = new Impl
      use: |-
          let v = i.foo()
          arktest.assertEQ(v, 1)

    # FixedArray<Any> vs FixedArray<Object> in interface overriding: contravariant param
    - decl: |-
          interface I {
              foo(a: FixedArray<Object>): int { return 0 }
          }
          class Impl implements I {
              foo(a: FixedArray<Any>): int { return 1 }
          }
          let i: I = new Impl
      use: |-
          arktest.assertEQ(i.foo([new Object()]), 1)

    # FixedArray<Any> and FixedArray<Object> have different effective types in interface overriding
    - decl: |-
          interface I {
              foo(a: FixedArray<Any>): int { return 0 }
          }
          class Impl1 implements I {
              foo(a: FixedArray<Object>): int { return 1 }
          }
          class Impl2 implements I {
              foo(a: FixedArray<Object>): int { return 2 }
              foo(a: FixedArray<Any>): int { return 3 }
          }
          let i1: I = new Impl1
          let i2: I = new Impl2
      use: |-
          arktest.assertEQ(i1.foo([1, 2]), 0)
          arktest.assertEQ(i1.foo([null, undefined]), 0)
          arktest.assertEQ(i2.foo([1, 2]), 3)
          arktest.assertEQ(i2.foo([null, undefined]), 3)
