---
cases:
  - assertions:
      - call: foo()
        result: 1

      - call: foo(1)
        result: 0

    definition: |-
      function foo(a?: number, ...rest: string[]) {
          if (a == undefined && rest.length == 0) {
              return 1
          }
          else {
              return 0
          }
      }

  - assertions:
      - call: foo2("mandatory")
        result: 1

      - call: foo2("mandatory", 1)
        result: 0

    definition: |-
      function foo2(x: string, a?: number, ...rest: string[]) {
          if (a == undefined && rest.length == 0) {
              return 1
          }
          else {
              return 0
          }
      }

  - assertions:
      - call: foo3()
        result: 2

      - call: foo3(1)
        result: 1

      - call: foo3(1, "asdsad")
        result: 0

    definition: |-
      function foo3(a?: number, b?: string, ...rest: string[]) {
          if (a == undefined && b == undefined && rest.length == 0) {
            return 2;
          }
          else if (b == undefined && rest.length == 0) {
            return 1;
          }
          else {
            return 0;
          }
      }

  - assertions:
      - call: foo4("mandatory")
        result: 2

      - call: foo4("mandatory", 1)
        result: 1

      - call: foo4("mandatory", 1, "asdsad")
        result: 0

    definition: |-
      function foo4(x: string, a?: number, b?: string, ...rest: string[]) {
          if (a == undefined && b == undefined && rest.length == 0) {
            return 2;
          }
          else if (b == undefined && rest.length == 0) {
            return 1;
          }
          else {
            return 0;
          }
      }

  - assertions:
      - call: foo5()
        result: 3

      - call: foo5(1)
        result: 2

      - call: foo5(1, "asdasd")
        result: 1

      - call: foo5(1, "asdsad", 2)
        result: 0

    definition: |-
      function foo5(a?: number, b?: string, c?: number, ...rest: string[]) {
          if (a == undefined && b == undefined && c == undefined && rest.length == 0) {
            return 3;
          }
          else if (b == undefined && c == undefined && rest.length == 0) {
            return 2;
          }
          else if (c == undefined && rest.length == 0) {
            return 1;
          }
          else {
            return 0;
          }
      }

  - assertions:
      - call: foo6("mandatory")
        result: 3

      - call: foo6("mandatory", 1)
        result: 2

      - call: foo6("mandatory", 1, "asdasd")
        result: 1

      - call: foo6("mandatory", 1, "asdsad", 2)
        result: 0

    definition: |-
      function foo6(x: string, a?: number, b?: string, c?: number, ...rest: string[]) {
          if (a == undefined && b == undefined && c == undefined && rest.length == 0) {
            return 3;
          }
          else if (b == undefined && c == undefined && rest.length == 0) {
            return 2;
          }
          else if (c == undefined && rest.length == 0) {
            return 1;
          }
          else {
            return 0;
          }
      }

  - assertions:
      - call: foo7("mandatory", "mandatory")
        result: 3

      - call: foo7("mandatory", "mandatory", 1)
        result: 2

      - call: foo7("mandatory", "mandatory", 1, "asdasd")
        result: 1

      - call: foo7("mandatory", "mandatory", 1, "asdsad", 2)
        result: 0

    definition: |-
      function foo7(x: string, y: string, a?: number, b?: string, c?: number, ...rest: string[]) {
          if (a == undefined && b == undefined && c == undefined && rest.length == 0) {
            return 3;
          }
          else if (b == undefined && c == undefined && rest.length == 0) {
            return 2;
          }
          else if (c == undefined && rest.length == 0) {
            return 1;
          }
          else {
            return 0;
          }
      }
