cases:
    - decl: |-
          // branching on instanceof
          function foo(p: string|int): string {
              if (p instanceof string) {
                  arktest.assertFalse(p instanceof int)
                  return p.substr(1, 1)
              } else {
                  arktest.assertFalse(p instanceof string)
                  return '' + (p << 1)
              }
          }
      main: |-
          arktest.assertEQ(foo('abc'), 'b')
          arktest.assertEQ(foo(1), '2')

    - main: |-
          // branching on === str (string literal)
          let v: 'a'|int = ((): 'a'|int => 'a')()
          if (v === 'a') {
              arktest.assertFalse(v instanceof int)
              arktest.assertEQ(((p: string) => p + 's')(v), 'as')
          } else {
              arktest.assertTrue(false, 'wrong branch')
          }

          v = ((): 'a'|int => 1)()
          if (v === 'a') {
              arktest.assertTrue(false, 'wrong branch')
          } else {
              arktest.assertTrue(v instanceof int)
              arktest.assertEQ(v << 1, 2)
          }

    - decl: |-
          // branching on === undefined
          function foo(p: string|undefined): string {
              if (p === undefined) {
                  arktest.assertFalse(p instanceof string)
                  return '1'
              } else {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(undefined), '1')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on === null
          function foo(p: string|null): string {
              if (p === null) {
                  arktest.assertFalse(p instanceof string)
                  return '1'
              } else {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(null), '1')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on == undefined
          function foo(p: string|undefined|null): string {
              if (p == undefined) {
                  arktest.assertFalse(p instanceof string)
                  return p === undefined ? '1' : '2'
              } else {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(undefined), '1')
          arktest.assertEQ(foo(null), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on == null
          function foo(p: string|undefined|null): string {
              if (p == null) {
                  arktest.assertFalse(p instanceof string)
                  return p === undefined ? '1' : '2'
              } else {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(undefined), '1')
          arktest.assertEQ(foo(null), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          enum Color { Red = 'r', Green = 'g' }
          // branching on v === ec (enum constant)
          function foo(p: int|Color): string {
              if (p === Color.Green) {
                  return 'g' + p
              } else if (p === Color.Red) {
                  return 'r' + p
              } else {
                  arktest.assertFalse(p instanceof Color)
                  arktest.assertTrue(p instanceof int)
                  return ''
              }
          }
      main: |-
          arktest.assertEQ(foo(Color.Red), 'rr')
          arktest.assertEQ(foo(Color.Green), 'gg')
          arktest.assertEQ(foo(1), '')

    - decl: |-
          // branching on typeof v === boolean
          function foo(p: Object): string {
              if (typeof p === 'boolean') {
                  arktest.assertTrue(p instanceof boolean)
                  return '' + !p
              } else {
                  arktest.assertFalse(p instanceof boolean)
                  return '1'
              }
          }
      main: |-
          arktest.assertEQ(foo(true), 'false')
          arktest.assertEQ(foo(false), 'true')
          arktest.assertEQ(foo('abc'), '1')

    - decl: |-
          // branching on typeof v === string
          function foo(p: Object): string {
              if (typeof p === 'string') {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              } else {
                  arktest.assertFalse(p instanceof string)
                  return '1'
              }
          }
      main: |-
          arktest.assertEQ(foo(new Object()), '1')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === bigint
          function foo(p: Object): string {
              if (typeof p === 'bigint') {
                  arktest.assertTrue(p instanceof BigInt)
                  return '' + (p + 1n)
              } else {
                  arktest.assertFalse(p instanceof BigInt)
                  return 'x'
              }
          }
      main: |-
          arktest.assertEQ(foo(new Object()), 'x')
          arktest.assertEQ(foo(100n), '101')

    - decl: |-
          // branching on typeof v === char
          function foo(p: Object): string {
              if (typeof p === 'char') {
                  arktest.assertTrue(p instanceof Char)
                  return '' + p
              } else {
                  arktest.assertFalse(p instanceof Char)
                  return ''
              }
          }
      main: |-
          arktest.assertEQ(foo(new Object()), '')
          arktest.assertEQ(foo(c'A'), 'A')

    - decl: |-
          // branching on typeof v === undefined
          function foo(p: string|undefined): string {
              if (typeof p === 'undefined') {
                  arktest.assertTrue(p === undefined)
                  return '1'
              } else {
                  arktest.assertFalse(p === undefined)
                  return p.toString()
              }
          }
      main: |-
          arktest.assertEQ(foo(undefined), '1')
          arktest.assertEQ(foo('A'), 'A')

    - decl: |-
          // branching on typeof v === byte
          function foo(p: string|byte): string {
              if (typeof p === 'byte') {
                  arktest.assertTrue(p instanceof byte)
                  return '' + (p + 1)
              } else {
                  arktest.assertFalse(p instanceof byte)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1 as byte), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === short
          function foo(p: string|short): string {
              if (typeof p === 'short') {
                  arktest.assertTrue(p instanceof short)
                  return '' + (p + 1)
              } else {
                  arktest.assertFalse(p instanceof short)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1 as short), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === int
          function foo(p: string|int): string {
              if (typeof p === 'int') {
                  arktest.assertTrue(p instanceof int)
                  return '' + (p + 1)
              } else {
                  arktest.assertFalse(p instanceof int)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1 as int), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === long
          function foo(p: string|long): string {
              if (typeof p === 'long') {
                  arktest.assertTrue(p instanceof long)
                  return '' + (p + 1)
              } else {
                  arktest.assertFalse(p instanceof long)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1 as long), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === float
          function foo(p: string|float): string {
              if (typeof p === 'float') {
                  arktest.assertTrue(p instanceof float)
                  return '' + (p + 1f)
              } else {
                  arktest.assertFalse(p instanceof float)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1f), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === number
          function foo(p: string|double): string {
              if (typeof p === 'number') {
                  arktest.assertTrue(p instanceof double)
                  return '' + (p + 1.0)
              } else {
                  arktest.assertFalse(p instanceof double)
                  return p.substr(1, 1)
              }
          }
      main: |-
          arktest.assertEQ(foo(1.0), '2')
          arktest.assertEQ(foo('abc'), 'b')

    - decl: |-
          // branching on typeof v === object
          function foo(p: Any): string {
              if (typeof p === 'object') {
                  if (p === null) {
                      return '1'
                  } else {
                      return '' + p
                  }
              } else {
                  return 'undefined'
              }
          }
      main: |-
          arktest.assertEQ(foo(undefined), 'undefined')
          arktest.assertEQ(foo(null), '1')
          arktest.assertEQ(foo(new Error()), 'Error')

    - decl: |-
          // branching on v === e
          function foo(p: string|int, q: string|boolean): string {
              if (p === q) {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              } else {
                  return 'x'
              }
          }
      main: |-
          arktest.assertEQ(foo('abc', 'abc'), 'b')
          arktest.assertEQ(foo('abc', true), 'x')
          arktest.assertEQ(foo(1, 'abc'), 'x')
          arktest.assertEQ(foo(1, true), 'x')

    - decl: |-
          // branching on v (truthiness check)
          function foo(p: string|null|undefined): string {
              if (p) {
                  arktest.assertTrue(p instanceof string)
                  return p.substr(1, 1)
              } else {
                  return 'x'
              }
          }
      main: |-
          arktest.assertEQ(foo('abc'), 'b')
          arktest.assertEQ(foo(''), 'x')
          arktest.assertEQ(foo(null), 'x')
          arktest.assertEQ(foo(undefined), 'x')
