---
cases:
 - descr: |-
     Spec example
   decl: |-
     function fooN(n: number): string { return 'fooN' }
     function foo(): string { return 'foo1' }
     function foo(b: boolean): string { return 'foo2' }
     function fooX(x?: number): string { return 'fooX' }

     overload foo { fooN, foo, fooX }
     overload bar { fooX, foo }
   
   asserts: [
     "arktest.assertEQ(foo(1), 'fooN', 'fooN call expected')",
     "arktest.assertEQ(bar(1), 'fooX', 'fooX call expected')",
     "arktest.assertEQ(foo(), 'foo1', 'foo1 call expected')",
     "arktest.assertEQ(bar(), 'fooX', 'fooX call expected')",
     "arktest.assertEQ(foo(true), 'foo2', 'foo2 call expected')",
     "arktest.assertEQ(bar(true), 'foo2', 'foo2 call expected')",
   ]

 - descr: |-
     Reverse order explicit overload
   decl: |-
     function foo(n: int): string { return 'foo1' }
     function foo(m: long): string { return 'foo2' }
     function fooX(x: number): string { return 'fooX' }

     overload foo { fooX, foo }
   
   asserts: [
     "arktest.assertEQ(foo(1), 'fooX', 'fooX call expected')",
     "arktest.assertEQ(foo(1L), 'fooX', 'fooX call expected')",
     "arktest.assertEQ(foo(1.0), 'fooX', 'fooX call expected')",
   ]
