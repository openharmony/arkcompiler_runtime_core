---
cases:
  - decl: |-
      abstract class A {
          abstract m(): string
      }
      class B extends A {
          override m(): string {
              return "A"
          }
      }
    use: |-
      let a: A = new B()
      arktest.assertEQ(a.m(), "A", "via A")
      let b: B = new B()
      arktest.assertEQ(b.m(), "A", "via B")

  - decl: |-
      abstract class A {
          abstract m(): string
      }
      abstract class A1 extends A {}
      class B extends A1 {
          override m(): string {
              return "A"
          }
      }
    use: |-
      let a: A = new B()
      arktest.assertEQ(a.m(), "A", "via A")
      let a1: A1 = new B()
      arktest.assertEQ(a1.m(), "A", "via A1")
      let b: B = new B()
      arktest.assertEQ(b.m(), "A", "via B")

