  - decl: |-
      interface I {
          m(): string
      }      
      abstract class A implements I {
          abstract m(): string
      }
      class B extends A {
          override m(): string {
              return "A"
          }
      }
      abstract class AA implements I {}
      class BB extends AA {
          override m(): string {
              return "A"
          }
      }
    use: |-
      let i: I = new B()
      arktest.assertEQ(i.m(), "A", "via I")
      let a: A = new B()
      arktest.assertEQ(a.m(), "A", "via A")
      let b: B = new B()
      arktest.assertEQ(b.m(), "A", "via B")
      let ii: I = new BB()
      arktest.assertEQ(ii.m(), "A", "via I - BB")
      let aa: AA = new BB()
      arktest.assertEQ(aa.m(), "A", "via AA")
      let bb: BB = new BB()
      arktest.assertEQ(bb.m(), "A", "via BB")

