  - decl: |-
      interface I {
          m(): string {
              return "A"
          }
      }      
      abstract class A implements I {
          abstract m(): string
      }
      class B extends A {} // relies on default method instead of one defined in parent class
      abstract class AA implements I {}
      class BB extends AA {} // relies on default method having none in parent class
    use: |-
      let i: I = new B()
      arktest.assertEQ(i.m(), "A", "via I")
      let a: A = new B()
      arktest.assertEQ(a.m(), "A", "via A")
      let b: B = new B()
      arktest.assertEQ(b.m(), "A", "via B")
      let ii: I = new BB()
      arktest.assertEQ(ii.m(), "A", "via I - BB")
      let aa: AA = new BB()
      arktest.assertEQ(aa.m(), "A", "via AA")
      let bb: BB = new BB()
      arktest.assertEQ(bb.m(), "A", "via BB")

