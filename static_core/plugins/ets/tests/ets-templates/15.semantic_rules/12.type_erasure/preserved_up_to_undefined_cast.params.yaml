---
cases:
    # A is preserved up to undefined
    - decl: |-
          class A<T> {
              fld: T
              constructor(p: T) {
                  this.fld = p
              }
          }

          let obj = ((): Object => new A<string>('a'))()
      main: |-
          let str = obj as A<string>|undefined
          arktest.assertEQ(str!.fld, 'a')

          let num = obj as A<number>|undefined
          arktest.expectThrow(
              () => { num!.fld },
              (e) => e instanceof ClassCastError
          )

    # Array is preserved up to undefined
    - decl: |-
          let obj = ((): Any => new Array<string>('a'))()
      main: |-
          let str = obj as Array<string>|undefined
          arktest.assertEQ(str![0], 'a')

          let num = obj as Array<number>|undefined
          arktest.expectThrow(
              () => { num![0] },
              (e) => e instanceof ClassCastError
          )

    # undefined is preserved
    - main: |-
          let obj = ((): Any => undefined)()

          let und = obj as undefined
          arktest.assertEQ(und, undefined)

          let str = obj as Array<string>|undefined
          arktest.assertEQ(str, undefined)

          let num = obj as Array<number>|undefined
          arktest.assertEQ(num, undefined)

    # string is preserved
    - main: |-
          let obj = ((): string|number|undefined => 'abc')()

          arktest.assertEQ(obj as string, 'abc')
          arktest.assertEQ(obj as string|undefined, 'abc')

          arktest.expectThrow(
              () => { obj as number|undefined },
              (e) => e instanceof ClassCastError
          )
          arktest.expectThrow(
              () => { obj as number },
              (e) => e instanceof ClassCastError
          )

          obj = ((): string|number|undefined => undefined)()
          arktest.assertEQ(obj as string|undefined, undefined)
          arktest.assertEQ(obj as number|undefined, undefined)
          arktest.assertEQ(obj as undefined, undefined)
