# Spec contradiction tests: tuple types [T1,...,Tn] where element types don't
# include undefined. Same "preserved up to undefined" issue as FixedArray.

---
cases:
    # [int, string]: elements don't include undefined → NOT preserved up to undefined → CTE
    - decl: |-
          let x: [int, string] = [42, "abc"]
      use: >-
          ((): Object => x)() instanceof [int, string]
      expected_out: |-
            Type parameter is erased

    # [number]: single element without undefined → CTE
    - decl: |-
          let x: [number] = [1.0]
      use: >-
          ((): Object => x)() instanceof [number]
      expected_out: |-
            Type parameter is erased
