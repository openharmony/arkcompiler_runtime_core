--- # List of invalid switch statements
switch_statements:
  - type: byte
    param1: 1
    param2: 2
  - type: short
    param1: 1
    param2: 2
  - type: int
    param1: 1
    param2: 2
  - type: long
    param1: 1
    param2: 2
  - type: bigint
    param1: 1n
    param2: 2n
  - type: float
    param1: 1.0f
    param2: 2.5f
  - type: double
    param1: 1.0
    param2: 2.5
  - type: int|null
    param1: 1
    param2: "null"
  - type: int|undefined
    param1: 1
    param2: "undefined"
  - type: Any
    param1: 1
    param2: "'abc'"
  - type: Function
    param1: () => {}
    param2: "(a: int): int  => { return a }"
  - type: Object
    param1: 1
    param2: "'abc'"
  - type: boolean
    param1: "true"
    param2: "false"
  - type: int[]
    param1: "[0, 1, 2]"
    param2: "[3, 4, 5]"
  - type: FixedArray<int>
    param1: new FixedArray<int>(1, 1)
    param2: new FixedArray<int>(2, 2)
