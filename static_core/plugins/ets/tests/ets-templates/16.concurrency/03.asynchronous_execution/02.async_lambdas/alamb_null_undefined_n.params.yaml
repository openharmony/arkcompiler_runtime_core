---
cases:
    - decl: |-
          let func = async (): Promise<undefined> => {
              return null;
          }
      expected_out: "Semantic error ESE0091: Type 'null' is not compatible with the enclosing method's return type 'Promise<undefined>'"

    - decl: |-
          let func = async (): Promise<undefined> => {
              return Promise.resolve(null);
          }
      expected_out: "Semantic error ESE0091: Type 'Promise<null>' is not compatible with the enclosing method's return type 'Promise<undefined>'"

    - decl: |-
          let func = async (): Promise<void> => {
              return null;
          }    
      expected_out: "Semantic error ESE0091: Type 'null' is not compatible with the enclosing method's return type 'Promise<undefined>'"

    - decl: |-
          let func = async (): Promise<void> => {
              return Promise.resolve(null);
          }
      expected_out: "Semantic error ESE0091: Type 'Promise<null>' is not compatible with the enclosing method's return type 'Promise<undefined>'"

    - decl: |-
          let func = async (): Promise<null> => {
          }
      expected_out: "Semantic error ESE57199: Lambda with a non-void return type must return a value."

    - decl: |-
          let func = async (): Promise<null> => {
              return
          }
      expected_out: "Semantic error ESE0032: Missing return value."

    - decl: |-
          let func = async (): Promise<null> => {
              return undefined
          }
      expected_out: "Semantic error ESE0091: Type 'undefined' is not compatible with the enclosing method's return type 'Promise<null>'"

    - decl: |-
          let func = async (): Promise<null> => {
              return Promise.resolve()
          }
      expected_out: "Semantic error ESE0091: Type 'Promise<undefined>' is not compatible with the enclosing method's return type 'Promise<null>'"

    - decl: |-
          let func = async (): Promise<null> => {
              return Promise.resolve(undefined)
          }
      expected_out: "Semantic error ESE0091: Type 'Promise<undefined>' is not compatible with the enclosing method's return type 'Promise<null>'"
