--- # List of invalid integer literals

cases:
  - {lit: '0e',          exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0e',        exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0e+',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0e-',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0E',        exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0E+',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '0.0E-',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '.0e',         exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '.0e+',        exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '.0e-',        exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1e',          exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1e+',         exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1e-',         exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1.0e',        exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1.0e+',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '1.0e-',       exp_out: "Syntax error ESY0251: Invalid numeric literal."}
  - {lit: '123.123e_12', exp_out: "Syntax error ESY0251: Invalid numeric literal."}

  - {lit: '1__23.123e12', exp_out: "Syntax error ESY0254: Invalid numeric separator."}

  - {lit: '_123.123e12', exp_out: "Semantic error ESE0143: Unresolved reference _123"}
  - {lit: '_6.78',       exp_out: "Semantic error ESE0143: Unresolved reference _6"}

  - {lit: '123.123_e12',  exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '123_.123e12',  exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '123.123e12_',  exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '123.123_e12',  exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '123.123_e_12', exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '5__6.78',      exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '6.78_',        exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
  - {lit: '6_.78',        exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}

  - {lit: '.',           exp_out: "Syntax error ESY0227: Unexpected token '.'."}
  - {lit: '.e',          exp_out: "Syntax error ESY0227: Unexpected token 'e'."}
  - {lit: '55.66.77',    exp_out: "Syntax error ESY0227: Unexpected token '.77'."}
  - {lit: '123._123e12', exp_out: "Syntax error ESY0227: Unexpected token '_123e12'."}
  - {lit: '6._78',       exp_out: "Syntax error ESY0227: Unexpected token '_78'."}
