---
cases:
    # functions
    - ambient_declarations: |-
          export declare type Func<T> = (p: int) => T;
      import: Func
      main: |-
          let v: Func<Int> = (p: int): Int => { return new Int(p); };
          arktest.assertEQ(v(1), 1);

    - ambient_declarations: |-
          declare type Func<T> = (p: int) => T;
          export declare type NullableFunc<T> = Func<T>|null;
      import: NullableFunc
      main: |-
          let v: NullableFunc<Int> = (p: int): Int => { return new Int(p); };
          arktest.assertEQ(v!(1), 1);

    - ambient_declarations: |-
          declare type Func<T> = (p: int) => T;
          export declare type NullableFunc<T> = Func<T>|null;
      import: NullableFunc
      main: |-
          let v: NullableFunc<Int> = null;
          arktest.assertEQ(v, null);

    - ambient_declarations: |-
          declare type Foo<T> = (p: int) => T;
          declare type Bar<T> = Foo<T>
          export declare type Baz<T> = Bar<T>
      import: Baz
      main: |-
          let v: Baz<String> = (p: int): String => { return 'a' + p }
          arktest.assertEQ(v(42), 'a42')

    - ambient_declarations: |-
          declare type Foo<V, T> = (p: V) => T;
          declare type Bar<V> = Foo<Number, V>
          export declare type Baz = Bar<String>
      import: Baz
      main: |-
          let v: Baz = (p: Number): String => { return 'a' + p }
          arktest.assertEQ(v(42.0), 'a42')

    - ambient_declarations: |-
          declare type Func<T> = (p: int) => T;
          export declare type FF = Func<Int>[]
      import: FF
      main: |-
          let v: FF = [(p: int): Int => { return new Int(p); }]
          arktest.assertEQ(v[0](1), 1);

    - ambient_declarations: |-
          declare type Func<T> = (p: int) => T;
          export declare type FF<T> = Func<T>[]
      import: FF
      main: |-
          let v: FF<Int> = [(p: int): Int => { return new Int(p); }]
          arktest.assertEQ(v[0](1), 1);

    # classes
    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB<T> = B<T>;
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BetterB
      main: |-
          let v: BetterB<Int> = new BetterB<Int>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB = B<Int>;
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BetterB
      main: |-
          let v: BetterB = new BetterB();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<T, V> {
              public ok: boolean
          }
          export declare type BetterB<T> = B<T, Boolean>;
      implementation_declarations: |-
          export class B<T, V> {
              public ok: boolean = true
          }
      import: BetterB, B
      main: |-
          let v: BetterB<Long> = new B<Long, Boolean>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<out T, in U, V extends Error> {
              public ok: boolean
          }
          export declare type BetterB<T, U> = B<T, U, NullPointerError>;
      implementation_declarations: |-
          export class B<out T, in U, V extends Error> {
              public ok: boolean = true
          }
      import: BetterB
      main: |-
          let v: BetterB<Int, Long> = new BetterB<Int, Long>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class Outer {
              public ok: boolean
          }
          export declare type Shortcut = Outer
      implementation_declarations: |-
          export class Outer {
              public ok: boolean = true
          }
      import: Shortcut
      main: |-
          let v: Shortcut = new Shortcut();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB<T> = B<T>;
          export declare type BestB<V> = BetterB<V>
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BestB
      main: |-
          let v: BestB<Int> = new BestB<Int>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB = B<Boolean>;
          export declare type BestB = BetterB
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BestB, B
      main: |-
          let v: BestB = new B<Boolean>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB<T> = B<T>;
          export declare type BB = BetterB<Int>[]
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BB, BetterB
      main: |-
          let v: BB = [new BetterB<Int>()]
          arktest.assertTrue(v[0].ok);

    - ambient_declarations: |-
          export declare class B<T> {
              public ok: boolean
          }
          export declare type BetterB<T> = B<T>;
          export declare type BB<T> = BetterB<T>[]
      implementation_declarations: |-
          export class B<T> {
              public ok: boolean = true
          }
      import: BB, BetterB
      main: |-
          let v: BB<Int> = [new BetterB<Int>()]
          arktest.assertTrue(v[0].ok);

    # interfaces
    - ambient_declarations: |-
          export declare interface I<T> {
              ok: boolean
          }
          export declare type Intf<T> = I<T>;
          export declare class A<T> implements I<T> {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<T> {
              ok: boolean
          }
          export class A<T> implements I<T> {
              public ok: boolean = true
          }
      import: Intf, A
      main: |-
          let v: Intf<Error> = new A<Error>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare interface I<T, V> {
              ok: boolean
          }
          export declare type Intf<T> = I<T, Int>;
          export declare class A<T> implements Intf<T> {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<T, V> {
              ok: boolean
          }
          export class A<T> implements I<T, Int> {
              public ok: boolean = true
          }
      import: Intf, A
      main: |-
          let v: Intf<Boolean> = new A<Boolean>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare interface I<out T, in V, U extends Error> {
              ok: boolean
          }
          export declare type Intf = I<Int, Long, NullPointerError>;
          export declare class A implements Intf {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<out T, in V, U extends Error> {
              ok: boolean
          }
          export class A implements I<Int, Long, NullPointerError> {
              public ok: boolean = true
          }
      import: Intf, A
      main: |-
          let v: Intf = new A();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare interface I<T, U> {
              ok: boolean
          }
          export declare type Intf<T, U> = I<T, U>
          export declare type Intf2<T> = Intf<Error, T>
          export declare class A<T> implements I<T, Error> {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<T, U> {
              ok: boolean
          }
          export class A<T> implements I<T, Error> {
              public ok: boolean = true
          }
      import: Intf2, A
      main: |-
          let v: Intf2<Error> = new A<Error>();
          arktest.assertTrue(v.ok);

    - ambient_declarations: |-
          export declare interface I<T> {
              ok: boolean
          }
          export declare type Intf<T> = I<T>
          export declare type II = Intf<Error>[]
          export declare class A<T> implements I<T> {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<T> {
              ok: boolean
          }
          export class A<T> implements I<T> {
              public ok: boolean = true
          }
      import: II, A
      main: |-
          let v: II = [new A<Error>()]
          arktest.assertTrue(v[0].ok)

    - ambient_declarations: |-
          export declare interface I<T> {
              ok: boolean
          }
          export declare type Intf<T> = I<T>
          export declare type II<T> = Intf<T>[]
          export declare class A<T> implements I<T> {
              public ok: boolean
          }
      implementation_declarations: |-
          export interface I<T> {
              ok: boolean
          }
          export class A<T> implements I<T> {
              public ok: boolean = true
          }
      import: II, A
      main: |-
          let v: II<Error> = [new A<Error>()]
          arktest.assertTrue(v[0].ok)

    - ambient_declarations: |-
          export declare type Func<I, T> = (p: I) => T
      import: Func
      main: |-
          let xx: Func<String, Number> = (p: String): Number => p.length
          arktest.assertEQ(xx('Hello World'), 11);

    - ambient_declarations: |-
          export declare class FinitaLaComedia {}
          export declare type Alias<T extends FinitaLaComedia = FinitaLaComedia> = T
      implementation_declarations: |-
          export final class FinitaLaComedia {}
      import: Alias, FinitaLaComedia
      main: |-
          let xx = new Alias
          arktest.assertTrue(xx instanceof FinitaLaComedia)
          arktest.assertTrue(xx instanceof Alias);

    - ambient_declarations: |-
          declare type None = undefined
          declare type Some<T> = T
          export declare type Maybe<T> = Some<T> | None
      import: Maybe
      main: |-
          let v0: Maybe<string> = undefined
          let v1: Maybe<string> = 'Hello World'
          arktest.assertEQ(v0, undefined)
          arktest.assertTrue(v1 instanceof string)
          arktest.assertEQ(v1, 'Hello World')

    - ambient_declarations: |-
          export declare type Lazy<T> = T | () => T
      import: Lazy
      main: |-
          let vl: Lazy<string> = 'Hello World'
          vl = () => 'Call Me'
          arktest.assertTrue(vl instanceof Function)
          arktest.assertEQ(vl(), 'Call Me')

    - ambient_declarations: |-
          export declare type TU<T1, T2> = T1 | T2
          export declare type EX<T1, T2> = Record<string, int | TU<T1, T2> | undefined>
      import: TU, EX
      main: |-
          let tv: TU<string, boolean> = 'I am String'
          let v: EX<string, boolean> = {'s1': 'String', 's2': true, 's3': 42, 's4': undefined, 's5': tv}
          arktest.assertEQ(v['s1'], 'String')
          arktest.assertEQ(v['s2'], true)
          arktest.assertEQ(v['s3'], 42)
          arktest.assertEQ(v['s4'], undefined)
          arktest.assertEQ(v['s5'], 'I am String')
