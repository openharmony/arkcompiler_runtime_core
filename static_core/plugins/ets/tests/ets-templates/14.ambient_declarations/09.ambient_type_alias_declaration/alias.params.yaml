---
cases:
  # primitives
  - decl: |-
      declare type Rating = double
    use: |-
      let v: Rating = 1.1
      let ok = (v as double) == 1.1
  
  # arrays
  - decl: |-
      declare type IntArray = int[]
    use: |-
      let v: IntArray = [1]
      let ok = v.length == 1

  - decl: |-
      declare type LongArray = Long[];
    use: |-
      let v: LongArray[] = [ [new Long(0)] ]
      let ok = v.length == 1;

  - decl: |-
      declare type Matrix3D = Byte[][][];
    use: |-
      let v: Matrix3D = [
          [ [new Byte(0), new Byte(0)] ]
      ]
      let ok = v.length == 1;

  - decl: |-
      declare type A = Error[]
      declare type B = A
      declare type C = B
    use: |-
      let v: C = [new Error()]
      let ok = v.length == 1

  - decl: |-
      declare type NumArray1 = Number[]
      declare type NumArray2 = NumArray1[]
    use: |-
      let v: NumArray2[] = [
          [ [new Double(0), new Double(0)] ]
      ]
      let ok = v.length == 1

  - decl: |-
      declare type IAN = int[]|null
      declare type IAN2 = IAN[]|null
    use: |-
      let v1: IAN2 = null
      let v2: IAN2 = [null, null]
      let v3: IAN2 = [[1, 2], [3, 4]]
      let v4: IAN2 = [null, [1, 2, 3]]
      let ok = v1 == null &&
          v2[0] == null && v2[1] == null &&
          v3[0]!.length == 2 && v3[1]!.length == 2 && v3[1]![1] == 4 &&
          v4.length == 2 && v4[0] == null && v4[1]!.length == 3
  
  # functions
  - decl: |-
      declare type Foo = (p: int) => int
    use: |-
      let v: Foo = (p: int): int => { return p + 1 }
      let ok = v(42) == 43

  - decl: |-
      declare type b = boolean
      declare type BooFunc = (p: b) => b
      declare type NullableBooFunc = BooFunc|null
    use: |-
      let v1: NullableBooFunc = null
      let v2: NullableBooFunc = (p: b): b => { return !p }
      let ok = v1 == null && v2!(false)

  - decl: |-
      function foo(p: long): Long {
          return new Long(p);
      }
      declare type Func = (p: long) => Long
    use: |-
      let v: Func = foo
      let ok = v(-9223372036854775807-1 as long) == Long.MIN_VALUE
  
  # classes
  - decl: |-
      class X {}
      declare type X2 = X
      declare type X3 = X2
    use: |-
      let v: X2 = new X2()
      let ok = v instanceof X && v instanceof X2 && v instanceof X3
  
  # interfaces
  - decl: |-
      interface I {}
      class A implements I {}
      declare type Intf = I
    use: |-
      let v: Intf = new A()
      let ok = v instanceof I && v instanceof Intf && v instanceof A
  
  # unions
  - decl: |-
      declare type N = number|undefined
      declare type SN = N|string|null
    use: |-
      let v1: SN = undefined
      let v2: SN = 42.0
      let v3: SN = 'abc'
      let v4: SN = null
      let ok = v1 === undefined &&
          v2 as Number == 42.0 &&
          v3 as String == 'abc' &&
          v4 === null

  - decl: |-
      declare type N = number|null|undefined
      declare type AN = number[]|N|null|undefined
    use: |-
      let v1: AN = null
      let v2: AN = undefined
      let v3: AN = 42.0
      let v4: AN = [1.0, 2.0, 3.0]
      let ok = v1 === null &&
          v2 === undefined &&
          v3 as Number == 42.0 &&
          (v4 as number[]).length == 3
  
  # tuples
  - decl: |-
      declare type TT = [number, string]
      declare type TTT = [TT, TT]
    use: |-
      let v1: TT = [42.0, 'abc']
      let v2: TT = [43.0, 'xyz']
      let v3: TTT = [v1, v2]
      let ok = v3[0][0] == 42.0 && v3[0][1] == 'abc' &&
          v3[1][0] == 43.0 && v3[1][1] == 'xyz'

  - decl: |-
      declare type NN = number|null|undefined
      declare type SN = string|null|undefined
      declare type TT = [NN, SN]|null|undefined
    use: |-
      let v1: TT = null
      let v2: TT = undefined
      let v3: TT = [null, undefined]
      let v4: TT = [null, 'abc']
      let v5: TT = [42.0, undefined]
      let v6: TT = [43.0, 'xyz']
      let ok = v1 == null && v2 == undefined && v3[0] == null && v3[1] == null && v4[0] == null &&
          v5[1] == null && v6[0] == 43.0 && v6[1] == 'xyz'

  - decl: |-
      enum Color { Red, Green, Blue };
      declare type BaseColor = Color;
    use: |-
      let v: BaseColor = BaseColor.Blue;
      let ok = (v == 2);

  # constructor on type alias for primitive
  - decl: |-
      declare type k = int
    use: |-
      let x = new k(4)
      let ok = x == 4

  - decl: |-
      declare type K = Int
    use: |-
      let x = new K(4)
      let ok = x == 4

  - decl: |-
      declare type K = Array<int>
    use: |-
      let x = new K(1, 3, 10)
      let ok = x[0] == 1 && x[1] == 3 && x[2] == 10
