cases:
    # interfaces
    - import: |-
          A
      decl: |-
          class B implements A {
            a: string = 'b'
          }
          const b: A  = new B
      use: |-
          arktest.assertTrue(b.a instanceof number) // should fail on verifier
          arktest.assertEQ(b.a, 'b') //  should be unreachable
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 03a7ac] E/verifier: Cannot link class: Cannot find method '%%get-a ()Lstd/core/String;' in class 'interface_declarations.A'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 03a7ac] E/verifier: Cannot link class: Cannot find method '%%get-a ()Lstd/core/String;' in class 'interface_declarations.A'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          B
      decl: |-
          class C implements B {
            a: int = 1
            b: float = 1.0f
            c: FixedArray<string> = ["c"]
          }
          const c: B  = new C
      use: |-
          arktest.assertEQ(c.a, 1)
          arktest.assertEQ(c.b, 1.0)
          arktest.assertTrue(c.c[0] instanceof Byte) // should fail on verifier
          arktest.assertEQ(c.c[0], "c") // should be unreachable
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 042920] E/verifier: Cannot link class: Cannot find method '%%get-c ()[Lstd/core/String;' in class 'interface_declarations.B'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 042920] E/verifier: Cannot link class: Cannot find method '%%get-c ()[Lstd/core/String;' in class 'interface_declarations.B'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          C
      decl: |-
          class D implements C {
            foo(x: number, y: string, z: double[]): string {
              return x.toString() + y + z.toString();
            }
          }
          const d: C  = new D
      use: |-
          arktest.assertEQ(d.foo(1, '1', [1]), '111')  // should fail on verifier
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 04292b] E/verifier: Cannot link class: Cannot find method 'foo (DLstd/core/String;Lstd/core/Array;)Lstd/core/String;' in class 'interface_declarations.C'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 04292b] E/verifier: Cannot link class: Cannot find method 'foo (DLstd/core/String;Lstd/core/Array;)Lstd/core/String;' in class 'interface_declarations.C'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          D
      decl: |-
          class E implements D<string, number> {
            a: string = 'a'
            b: number = 1
          }
          const e: D<string, number> = new E
      use: |-
          arktest.assertEQ(e.a, 'a')
          arktest.assertTrue(e.b instanceof Number) // should fail on verifier
          arktest.assertEQ(e.b, 1) // should be unreachable
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "E/verifier: Cannot link class: Cannot find method '%%get-b ()Lstd/core/Object;' in class 'interface_declarations.D'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "E/verifier: Cannot link class: Cannot find method '%%get-b ()Lstd/core/Object;' in class 'interface_declarations.D'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          E
      decl: |-
          class F implements E<number,number,string> {
            foo(x: number, y: number): string {
              return (x + y).toString()
            }
          }
          const f: E<number,number,string> = new F
      use: |-
          arktest.assertEQ(f.foo(1,1), '2') // should fail on verifier
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "E/verifier: Cannot link class: Cannot find method 'foo (Lstd/core/Object;Lstd/core/Object;)Lstd/core/Object;' in class 'interface_declarations.E'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "E/verifier: Cannot link class: Cannot find method 'foo (Lstd/core/Object;Lstd/core/Object;)Lstd/core/Object;' in class 'interface_declarations.E'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          M,F
      decl: |-
          class C implements M {
            f: string = 'a'
          }
          const c: M = new C
      use: |-
          arktest.assertTrue(c.f instanceof Number) // should fail on verifier
          arktest.assertEQ(c.f, 'a')
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 042926] E/verifier: Cannot link class: Cannot find method '%%get-f ()Lstd/core/String;' in class 'interface_declarations.F'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 042926] E/verifier: Cannot link class: Cannot find method '%%get-f ()Lstd/core/String;' in class 'interface_declarations.F'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          K
      decl: |-
          class B implements K {
            a: int = 1
            get foo(): int {return this.a}
            set foo(v: int) { this.a = v}
          }
          const b: K = new B
      use: |-
          arktest.assertTrue(b.a instanceof String) // should fail on verifier
          arktest.assertEQ(b.a, 1) // should be unreachable
          b.a = 2
          arktest.assertEQ(b.a, 2)
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 042924] E/verifier: Cannot link class: Cannot find method '%%get-a ()I' in class 'interface_declarations.K'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 042924] E/verifier: Cannot link class: Cannot find method '%%get-a ()I' in class 'interface_declarations.K'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }


    - import: |-
          J
      decl: |-
          class I implements J {}
          const i: J = new I
      use: |-
          arktest.assertEQ(i.foo(1), '1') // should fail on verifier
      expected_data: |-
          expected_error: { 
              compile.verifier: [ "[TID 042915] E/verifier: Cannot link class: Cannot find method 'foo (D)Lstd/core/String;' in class 'interface_declarations.J'" ],
              runtime.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-with-jit-repeats.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              ark-after-aot.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ],
              hybrid-es2panda-verifier.verifier: [ "[TID 042915] E/verifier: Cannot link class: Cannot find method 'foo (D)Lstd/core/String;' in class 'interface_declarations.J'" ],
              hybrid-ark.ark: [ "Unhandled exception: std.core.LinkerVerificationError" ]
          }
