---
cases:
  - desc: "15.11 Override of concrete method (Dog.speak overrides Animal.speak)"
    imports: "import { testOverrideSpeak } from '@panda/app/app_main'"
    call: "testOverrideSpeak()"
    expected: "Rex:woof"

  - desc: "15.11 Abstract method override (HtmlRenderer implements Renderer.render)"
    imports: "import { testAbstractOverride } from '@panda/app/app_main'"
    call: "testAbstractOverride()"
    expected: ">>><hi>"

  - desc: "15.11.10 Default interface method kept when not overridden (SimpleTag.fullLabel)"
    imports: "import { testDefaultMethodKept } from '@panda/app/app_main'"
    call: "testDefaultMethodKept()"
    expected: "[simple]"

  - desc: "15.11.6 Super call resolves to base class method at compile-time (Dog.speakBoth)"
    imports: "import { testSuperCall } from '@panda/app/app_main'"
    call: "testSuperCall()"
    expected: "Rex:generic,Rex:woof"

  - desc: "15.11.10 Static methods have no dynamic dispatch (Counter)"
    imports: "import { testStaticMethod } from '@panda/app/app_main'"
    call: "testStaticMethod()"
    expected: "3"

  - desc: "15.12 Generic Holder with different type parameters (type erasure)"
    imports: "import { testGenericHolder } from '@panda/app/app_ext'"
    call: "testGenericHolder()"
    expected: "42,hi"

  - desc: "15.11.10 Default interface method overridden (FancyTag.fullLabel)"
    imports: "import { testDefaultMethodOverridden } from '@panda/app/app_ext'"
    call: "testDefaultMethodOverridden()"
    expected: "*fancy*"

  - desc: "15.10 Method overloading (TextFormatter.format with number and string)"
    imports: "import { testMethodOverload } from '@panda/app/app_ext'"
    call: "testMethodOverload()"
    expected: "fmt_n:42,fmt_s:hi"

  - desc: "15.10 Function overloading (describe with number and string)"
    imports: "import { testFunctionOverload } from '@panda/app/app_ext'"
    call: "testFunctionOverload()"
    expected: "desc_n:3.14,desc_s:text"

  - desc: "15.10 Cross-package overloaded function dispatch via lib_utils"
    imports: "import { testCrossPackageOverload } from '@panda/app/app_ext'"
    call: "testCrossPackageOverload()"
    expected: "fmt_n:7,fmt_s:ok"
