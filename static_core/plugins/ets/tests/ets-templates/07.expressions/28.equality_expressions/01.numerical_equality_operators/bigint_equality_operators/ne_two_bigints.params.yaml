---
cases:
    # primitive values
    - a: 1n
      values:
          - 0n
          - -0n
          - new BigInt(0)
          - new BigInt(-0.0)
          - new BigInt(-(new BigInt(0)))
    - a: -1n
      values:
          - 1n
          - new BigInt(1)
          - new BigInt(0.1e1f)
          - new BigInt(+1n)
