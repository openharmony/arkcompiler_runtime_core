---
cases:
    # primitive values
    - a: 1n
      values:
          - 0n
          - -0n

    - a: -1n
      values:
          - 1n
          - +1n

    # int
    - a: 2147483646n
      values:
          - 2147483647n # Int.MAX_VALUE

    - a: 2147483648n
      values:
          - 2147483647n # Int.MAX_VALUE

    - a: -2147483647n
      values:
          - -2147483648n # Int.MIN_VALUE

    - a: -2147483649n
      values:
          - -2147483648n # Int.MIN_VALUE

    # long
    - a: 9223372036854775808n
      values:
          - 9223372036854775807n # Long.MAX_VALUE

    - a: 9223372036854775806n
      values:
          - 9223372036854775807n # Long.MAX_VALUE

    - a: -9223372036854775807n
      values:
          - -9223372036854775808n # Long.MIN_VALUE

    - a: -9223372036854775809n
      values:
          - -9223372036854775808n # Long.MIN_VALUE

    # float
    - a: 16777216n
      values:
          - 16777215n # max safe integer in float

    - a: 16777214n
      values:
          - 16777215n # max safe integer in float

    # double
    - a: 9007199254740992n
      values:
          - 9007199254740991n # max safe integer in double

    - a: 9007199254740990n
      values:
          - 9007199254740991n # max safe integer in double

    - a: -9007199254740990n
      values:
          - -9007199254740991n # min safe integer in double

    - a: -9007199254740992n
      values:
          - -9007199254740991n # min safe integer in double

    # bigint
    - a: 94876543875610289630123457n
      values:
          - 94876543875610289630123456n

    - a: 94876543875610289630123455n
      values:
          - 94876543875610289630123456n

    - a: -1010101010101010101010101010101010102n
      values:
          - -1010101010101010101010101010101010101n
