# Numeric equality through Any-typed parameters.
# Tests runtime ets.equals/ets.strictequals bytecodes.
# Values are auto-boxed when passed to Any. Primitive type is controlled
# via literals (0, 0.0f, 0.0) or casts (0 as byte, 0 as short, 0 as long).
# All values within each eq_cases group are expected to be pairwise equal.
# For ne_cases, 'a' is not equal to any value in 'values'.

---
eq_cases:
    # --- byte values ---
    - values:
          - 0 as byte
          - 0 as byte
    - values:
          - 127 as byte
          - 127 as byte
    - values:
          - -128 as byte
          - -128 as byte
    # --- short values ---
    - values:
          - 0 as short
          - 0 as short
    - values:
          - 32767 as short
          - 32767 as short
    - values:
          - -32768 as short
          - -32768 as short
    # --- int values ---
    - values:
          - 0
          - 0
    - values:
          - 42
          - 42
    - values:
          - 2147483647
          - 2147483647
    - values:
          - -2147483648
          - -2147483648
    # --- long values ---
    - values:
          - 0 as long
          - 0 as long
    - values:
          - 1 as long
          - 1 as long
    - values:
          - 9223372036854775807 as long
          - 9223372036854775807 as long
    # --- float values ---
    - values:
          - 0.0f
          - 0.0f
    - values:
          - 3.14f
          - 3.14f
    # --- double values ---
    - values:
          - 0.0
          - 0.0
    - values:
          - 3.14159
          - 3.14159
    # --- cross-type numeric equality through Any ---
    # Runtime GetBoxedNumericValue<EtsDouble> converts all boxed numerics to double for comparison.
    # So different boxed types with the same numeric value ARE equal through Any.
    - values:
          - 1 as byte
          - 1 as short
          - 1
          - 1.0f
          - 1.0
    - values:
          - 0 as byte
          - 0 as short
          - 0
          - 0 as long
          - 0.0f
          - 0.0
    - values:
          - 42 as byte
          - 42 as short
          - 42
          - 42 as long
          - 42.0

ne_cases:
    # --- different byte values ---
    - a: 0 as byte
      values:
          - 1 as byte
          - 127 as byte
          - -1 as byte
    # --- different short values ---
    - a: 100 as short
      values:
          - 0 as short
          - -100 as short
          - 32767 as short
    # --- different int values ---
    - a: 42
      values:
          - 0
          - 43
          - -1
    # --- different long values ---
    - a: 1 as long
      values:
          - 0 as long
          - -1 as long
          - 9223372036854775807 as long
    # --- different float values ---
    - a: 1.0f
      values:
          - 0.0f
          - -1.0f
          - 3.14f
    # --- different double values ---
    - a: 0.0
      values:
          - 1.0
          - -1.0
          - 3.14159
    # --- cross-type with different values ---
    - a: 1 as byte
      values:
          - 2 as short
          - 3
          - 4.0
