---
cases:
    - warning: |-
          Warning W65000: The equality expression is always true.
      main: |-
          arktest.assertTrue('a' != 'b') // different literal values

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          function foo() {}
          function bar() {}
      main: |-
          arktest.assertTrue(foo != bar) // different references

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          class A {}
      main: |-
          arktest.assertTrue(new A != new A) // different references

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          class A {}
          class B {}
          let a = new A
          let b = new B
      main: |-
          arktest.assertTrue(a != b) // instances of different classes

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          class A {}
          let a = new A
      main: |-
          arktest.assertTrue(a != undefined) // instance of class and undefined

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          class A {}
          let a = new A
      main: |-
          arktest.assertTrue(a != null) // instance of class and null

    - warning: |-
          Semantic error ESE0127: No matching call signature for assertTrue(Boolean)
          Semantic error ESE0105: Operator '!=' cannot be applied to types 'String' and 'Char'.
      tags: [negative, compile-only]
      decl: |-
          let a = 'A'
          let b = c'A'
      main: |-
          arktest.assertTrue(a != b) // different types

    - warning: |-
          Warning W0018: Values of BigInt type are never equal to numerics.
      decl: |-
          let a = 1n
          let b = 1
      main: |-
          arktest.assertTrue(a != b) // different types

    - warning: |-
          Semantic error ESE0127: No matching call signature for assertTrue(Boolean)
          Semantic error ESE0114: Bad operand type, the types of the operands must be numeric, same enumeration, or boolean type.
      tags: [negative, compile-only]
      decl: |-
          enum RGB { Red, Green, Blue }
          enum YMC { Yellow, Magenta, Cyan }
          let a = RGB.Red
          let b = YMC.Yellow
      main: |-
          arktest.assertTrue(a != b) // different enumeration types

    - warning: |-
          Semantic error ESE0127: No matching call signature for assertTrue(Boolean)
          Semantic error ESE0105: Operator '!==' cannot be applied to types 'Double|Boolean|undefined' and 'String|null'.
      tags: [negative, compile-only]
      decl: |-
          let a: number|boolean|undefined = 1
          let b: string|null = ""
      main: |-
          arktest.assertTrue(a !== b) // non-overlapping union types

    - warning: |-
          Semantic error ESE0127: No matching call signature for assertTrue(Boolean)
          Semantic error ESE0105: Operator '!=' cannot be applied to types 'Double' and '""'.
      tags: [negative, compile-only]
      main: |-
          let a: number|string = 1
          arktest.assertTrue(a != "") // different types after smart cast

    - warning: |-
          Warning W65000: The equality expression is always true.
      decl: |-
          class A {}
      main: |-
          let a: A|undefined
          if (a instanceof A) {
              arktest.assertTrue(a != undefined) // instance of class and undefined after smart cast
          }
