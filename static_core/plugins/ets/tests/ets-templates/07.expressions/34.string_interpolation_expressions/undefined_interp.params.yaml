---
cases:
    # Class field initialized to undefined, method returns it, used in template literal
    - defs: |-
          class A1 {
              x: Object|undefined = undefined
              get(): Object|undefined {
                  return this.x
              }
          }
      call: |-
          ${new A1().get()}
      expected: |-
          'undefined'

    # Void function return used in template literal
    - defs: |-
          function voidFoo(): void {}
      call: |-
          ${voidFoo()}
      expected: |-
          'undefined'

    # Void function return combined with other text in template literal
    - defs: |-
          function voidBar(): void {}
      call: |-
          result: ${voidBar()}
      expected: |-
          'result: undefined'

    # Class method returning undefined mixed with text in template literal
    - defs: |-
          class A2 {
              x: Object|undefined = undefined
              get(): Object|undefined {
                  return this.x
              }
          }
      call: |-
          value is ${new A2().get()}
      expected: |-
          'value is undefined'

    # Multiple undefined interpolations in one template literal
    - defs: |-
          class A3 {
              x: Object|undefined = undefined
              get(): Object|undefined {
                  return this.x
              }
          }
          function voidBaz(): void {}
      call: |-
          ${new A3().get()} ${voidBaz()}
      expected: |-
          'undefined undefined'

    # Undefined from class getter alongside non-undefined values
    - defs: |-
          class A4 {
              x: Object|undefined = undefined
              y: string = "hello"
              getX(): Object|undefined {
                  return this.x
              }
              getY(): string {
                  return this.y
              }
          }
      call: |-
          ${new A4().getX()} ${new A4().getY()}
      expected: |-
          'undefined hello'

    # Single undefined expression
    - call: |-
          ${undefined}
      expected: |-
          'undefined'
