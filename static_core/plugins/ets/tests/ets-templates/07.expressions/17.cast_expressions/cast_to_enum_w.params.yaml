---
cases:
    # same base types

    - decl: |-
          enum Enum1 { Red, Green, Blue }
          enum Enum2 { Red, Green, Blue }

    - decl: |-
          enum Enum1 { Red = 'r', Green = 'g', Blue = 'b' }
          enum Enum2 { Red = 'r', Green = 'g', Blue = 'b' }

    - decl: |-
          enum Enum1: byte { Red = 1, Green = 2, Blue }
          enum Enum2: byte { Red = 1, Green = 2, Blue }

    - decl: |-
          enum Enum1: short { Red = 100, Green = 200, Blue }
          enum Enum2: short { Red = 100, Green = 200, Blue }

    - decl: |-
          enum Enum1: long { Red = 100, Green = 200, Blue }
          enum Enum2: long { Red = 100, Green = 200, Blue }

    - decl: |-
          enum Enum1: float { Red = 0.1f, Green = 0.2f, Blue = 0.3f }
          enum Enum2: float { Red = 0.1f, Green = 0.2f, Blue = 0.3f }

    - decl: |-
          enum Enum1: double { Red = 0.1, Green = 0.2, Blue = 0.3 }
          enum Enum2: double { Red = 0.1, Green = 0.2, Blue = 0.3 }

    # different base types

    - decl: |-
          enum Enum1 { Red, Green, Blue }
          enum Enum2 { Red = 'r', Green = 'g', Blue = 'b' }

    - decl: |-
          enum Enum1 { Red = 'r', Green = 'g', Blue = 'b' }
          enum Enum2: byte { Red = 1, Green = 2, Blue }

    - decl: |-
          enum Enum1: byte { Red = 1, Green = 2, Blue }
          enum Enum2 { Red, Green, Blue }

    - decl: |-
          enum Enum1: short { Red = 100, Green = 200, Blue }
          enum Enum2: float { Red = 0.1f, Green = 0.2f, Blue = 0.3f }

    - decl: |-
          enum Enum1: long { Red = 100, Green = 200, Blue }
          enum Enum2: double { Red = 0.1, Green = 0.2, Blue = 0.3 }

    - decl: |-
          enum Enum1: float { Red = 0.1f, Green = 0.2f, Blue = 0.3f }
          enum Enum2: short { Red = 100, Green = 200, Blue }

    - decl: |-
          enum Enum1: double { Red = 0.1, Green = 0.2, Blue = 0.3 }
          enum Enum2: long { Red = 100, Green = 200, Blue }
