  - test_suffix: req1_opt2
    target: '(v: string) => void'
    expr: '(v1: string, v2?: string, v3?: string) => {}'
  - test_suffix: req1_default1
    target: '(v: string) => void'
    expr: '(v1: string, v2: string = "d") => {}'
