---
cases:
  - description: "Basic BigInt power operation"
    val1: "10"
    val2: "2" 
    expected: "100"

  - description: "Large BigInt power operation"
    val1: "2"
    val2: "50"
    expected: "1125899906842624"

  - description: "BigInt with zero exponent"
    val1: "123456789"
    val2: "0"
    expected: "1"

  - description: "BigInt zero base"
    val1: "0"
    val2: "5"
    expected: "0"

  - description: "BigInt one base"
    val1: "1"
    val2: "100"
    expected: "1"

  - description: "BigInt exponent one"
    val1: "42"
    val2: "1"
    expected: "42"

  - description: "BigInt 0n ** 0n equals 1n"
    val1: "0"
    val2: "0"
    expected: "1"

  - description: "BigInt negative base even exponent"
    val1: "-2"
    val2: "4"
    expected: "16"

  - description: "BigInt negative base odd exponent"
    val1: "-3"
    val2: "3"
    expected: "-27"
