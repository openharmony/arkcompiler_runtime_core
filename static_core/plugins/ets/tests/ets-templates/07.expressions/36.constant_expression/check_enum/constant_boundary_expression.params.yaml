---
cases:
  # Zero operations
  - { expression: '0 + 0',       expected: 0    }
  - { expression: '0 * 100',     expected: 0    }
  - { expression: '0 - 0',       expected: 0    }

  # Identity operations
  - { expression: '42 + 0',      expected: 42   }
  - { expression: '42 - 0',      expected: 42   }
  - { expression: '42 * 1',      expected: 42   }
  - { expression: '42 / 1',      expected: 42   }

  # Negation
  - { expression: '-(-42)',      expected: 42   }
  - { expression: '-(0)',        expected: 0    }

  # Bitwise on boundaries
  - { expression: '~0',          expected: -1   }
  - { expression: '~(-1)',       expected: 0    }
  - { expression: '0xFF & 0xFF', expected: 255  }
  - { expression: '0 | 0',       expected: 0    }
  - { expression: '0 ^ 0',       expected: 0    }

  # Shift boundaries
  - { expression: '1 << 0',      expected: 1    }
  - { expression: '1 << 10',     expected: 1024 }
  - { expression: '1024 >> 10',  expected: 1    }
  - { expression: '-1 >>> 31',   expected: 1    }
