---
cases:
  # byte + int
  - { type1: byte,  value1: 10,    type2: int,    value2: 20,   sign: '+', expected: 30     }
  - { type1: byte,  value1: 10,    type2: int,    value2: 5,    sign: '*', expected: 50     }

  # short + int
  - { type1: short, value1: 100,   type2: int,    value2: 200,  sign: '+', expected: 300    }
  - { type1: short, value1: 100,   type2: int,    value2: 10,   sign: '-', expected: 90     }

  # int + long
  - { type1: int,   value1: 100,   type2: long,   value2: 200,  sign: '+', expected: 300    }
  - { type1: int,   value1: 50,    type2: long,   value2: 3,    sign: '*', expected: 150    }

  # int + float
  - { type1: int,   value1: 10,    type2: float,  value2: 2.5f, sign: '+', expected: 12.5f  }
  - { type1: int,   value1: 10,    type2: float,  value2: 3.0f, sign: '*', expected: 30.0f  }

  # int + number
  - { type1: int,   value1: 10,    type2: number, value2: 2.5,  sign: '+', expected: 12.5   }
  - { type1: int,   value1: 10,    type2: number, value2: 3.0,  sign: '*', expected: 30.0   }

  # byte + short
  - { type1: byte,  value1: 5,     type2: short,  value2: 100,  sign: '+', expected: 105    }

  # long + float
  - { type1: long,  value1: 100,   type2: float,  value2: 0.5f, sign: '+', expected: 100.5f }

  # float + number
  - { type1: float, value1: 1.5f,  type2: number, value2: 2.5,  sign: '+', expected: 4.0    }
