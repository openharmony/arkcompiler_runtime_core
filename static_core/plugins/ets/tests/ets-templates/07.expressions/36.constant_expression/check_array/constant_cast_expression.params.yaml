---
cases:
  # int-to-same-type cast
  - { expr: '(26 as int)',                       expected: 26  }
  # double/float-to-int via explicit conversion (as cast deprecated for these)
  - { expr: 'Double.toInt(3.14)',                expected: 3   }
  - { expr: 'Float.toInt(100.9f)',               expected: 100 }
  # double-to-long via explicit conversion, then to int
  - { expr: 'Double.toLong(3.14).toInt()',       expected: 3   }
