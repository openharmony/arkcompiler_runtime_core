cases:
  - { type1: byte,  value1: 10,  type2: int,    value2: 20,   sign: '+', conversion: '',       expected: 30  }
  - { type1: byte,  value1: 5,   type2: short,  value2: 10,   sign: '+', conversion: '',       expected: 15  }
  - { type1: short, value1: 100, type2: int,    value2: 50,   sign: '-', conversion: '',       expected: 50  }
  - { type1: int,   value1: 10,  type2: long,   value2: 20,   sign: '+', conversion: .toInt(), expected: 30  }
  - { type1: int,   value1: 5,   type2: float,  value2: 3.0f, sign: '*', conversion: .toInt(), expected: 15  }
  - { type1: int,   value1: 10,  type2: number, value2: 5.0,  sign: '+', conversion: .toInt(), expected: 15  }
  - { type1: long,  value1: 50,  type2: float,  value2: 2.0f, sign: '*', conversion: .toInt(), expected: 100 }
  - { type1: byte,  value1: 3,   type2: int,    value2: 5,    sign: '*', conversion: '',       expected: 15  }
