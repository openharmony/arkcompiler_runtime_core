---
cases:
    # Conditional-and &&
    - { expression: 'true && true', if_true: -10, if_false: 5 }
    - { expression: 'true && false', if_true: 10, if_false: -5 }
    - { expression: 'false && true', if_true: 10, if_false: -5 }
    - { expression: 'false && false', if_true: 10, if_false: -5 }

    # Conditional-or ||
    - { expression: 'true || false', if_true: -10, if_false: 5 }
    - { expression: 'false || true', if_true: -10, if_false: 5 }
    - { expression: 'false || false', if_true: 10, if_false: -5 }

    # Logical NOT !
    - { expression: '!true', if_true: 10, if_false: -5 }
    - { expression: '!false', if_true: -10, if_false: 5 }
    - { expression: '!!true', if_true: -10, if_false: 5 }

    # Boolean bitwise
    - { expression: 'true & true', if_true: -10, if_false: 5 }
    - { expression: 'true ^ false', if_true: -10, if_false: 5 }
    - { expression: 'false | false', if_true: 10, if_false: -5 }

    # Combined
    - { expression: '(true && false) || true', if_true: -10, if_false: 5 }
    - { expression: 'true && !false', if_true: -5, if_false: 10 }
