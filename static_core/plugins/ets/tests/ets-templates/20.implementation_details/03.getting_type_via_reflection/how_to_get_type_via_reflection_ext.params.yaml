--- 
cases:
  - desc: How to get number[] via reflection.
    logic: |-
      let type_from_array_number = Class.from<number[]>();
      let type_of_array_number = Class.of(new Array<number>);
      arktest.assertEQ(type_from_array_number, type_of_array_number);
      arktest.assertEQ(type_from_array_number.getName(), "std.core.Array");
  - desc: How to get object[] via reflection.
    logic: |-
