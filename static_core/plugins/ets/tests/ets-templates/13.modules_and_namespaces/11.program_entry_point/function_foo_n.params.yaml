---
cases:
    # entry point function cannot have overloading, void return type
    - entry_point: foo
      tags: negative
      use: |-
          export overload foo { foo1 }

          export function foo1(): void {
              arktest.assertTrue(true)
          }

          export function main(): void {
              arktest.assertTrue(true)
          }
      expected_data: |-
          expected_error: { runtime: "[TID 39a225] E/runtime: Cannot find method 'function_foo_n_0.ETSGLOBAL::foo'" }

    - entry_point: foo
      tags: negative
      use: |-
          overload foo { foo1 }
          export { foo, foo1, main }

          function foo1(): void  {
              arktest.assertTrue(true)
          }

          function main(): void  {
              arktest.assertTrue(true)
          }
      expected_data: |-
          expected_error: { runtime: "[TID 01f4ea] E/runtime: Cannot find method 'function_foo_n_1.ETSGLOBAL::foo'" }

    - entry_point: main
      tags: 'compile-only, negative'
      use: |-
          overload main { foo1, main }
          export { foo1, main }

          function foo1(): void  { // should not be called
              arktest.assertTrue(false)
          }

          function main(): void  {
              arktest.assertTrue(true)
          }
      expected_data: |-
          expected_out: [
              "Semantic error ESE0330: Identifier 'main' is used in wrong context.",
              "Semantic error ESE0384: overloaded name must refer to an accessible method.",
              "Semantic error ESE0369: Identifier 'main' has already been declared.",
              "Semantic error ESE0351: Variable 'main' has already been declared.",
          ]

    # entry point function cannot have overloading, int return type
    - entry_point: foo
      tags: negative
      use: |-
          export overload foo { foo1 }

          export function foo1(): int {
              return 0
          }

          export function main(): int {
              return 0
          }
      expected_data: |-
          expected_error: { runtime: "[TID 39e0dc] E/runtime: Cannot find method 'function_foo_n_3.ETSGLOBAL::foo'" }

    - entry_point: main
      tags: 'compile-only, negative'
      use: |-
          export overload main { foo1, main }

          export function foo1(): int {
              return 1
          }

          export function main(): int {
              return 0
          }
      expected_data: |-
          expected_out: [
              "Semantic error ESE0330: Identifier 'main' is used in wrong context.",
              "Semantic error ESE0384: overloaded name must refer to an accessible method.",
              "Semantic error ESE0369: Identifier 'main' has already been declared.",
              "Semantic error ESE0351: Variable 'main' has already been declared.",
          ]

    - entry_point: foo
      tags: negative
      use: |-
          overload foo { foo1 }

          function foo1(): int {
              return 0
          }

          function main(): int {
              return 0
          }

          export { main, foo, foo1 }
      expected_data: |-
          expected_error: { runtime: "[TID 3a65cf] E/runtime: Cannot find method 'function_foo_n_5.ETSGLOBAL::foo'" }

    - entry_point: main
      tags: 'compile-only, negative'
      use: |-
          overload main { foo1, main }

          function foo1(): int {
              return 1
          }

          function main(): int {
              return 0
          }

          export { main, foo1 }
      expected_data: |-
          expected_out: [
              "Semantic error ESE0330: Identifier 'main' is used in wrong context.",
              "Semantic error ESE0384: overloaded name must refer to an accessible method.",
              "Semantic error ESE0369: Identifier 'main' has already been declared.",
              "Semantic error ESE0351: Variable 'main' has already been declared.",
          ]

    # call main from another entry point
    - entry_point: foo
      tags: negative
      use: |-
          export function foo(): void  {
              main()
              arktest.assertTrue(false)
          }
      expected_data: |-
          expected_error: { runtime: [
              "expected true but was false",
              "Unhandled exception: std.core.AssertionError",
              "AssertionError: expected true but was false"              
          ]}

    # return value from namespace
    - entry_point: foo
      tags: negative
      use: |-
          namespace NS {
              export let retCode: int
              export function foo(): void  {
                  arktest.assertEQ(retCode, 0)
              }
          }

          export function foo(): void {
              NS.retCode = 42
              NS.foo()
          }

          export function main(): int {
              return 0
          }
      expected_data: |-
          expected_error: { runtime: [
              "expected equality failed: '42' === '0'",
              "Unhandled exception: std.core.AssertionError",
              "AssertionError: expected equality failed: '42' === '0'"
          ]}

    # entry point function cannot have overloading, void return type
    - entry_point: main
      tags: 'compile-only, negative'
      use: |-
          export overload main { foo1, main }

          export function foo1(): void { // should not be called
              arktest.assertTrue(false)
          }
      expected_data: |-
          expected_out: [
              "Warning W2323: The order of entities in an overload set implies that the overloaded entity with the signature '() => undefined' will never be selected for a call, as the preceding entity with the signature '() => undefined' prevails.",
              "Semantic error ESE0456: The overload function must be exported along because the overload alias is exported."
          ]
