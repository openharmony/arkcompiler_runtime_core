  - desc: |-
      >-
        If some but not all members have their values set explicitly,
        then the values of the members are set by the following rules:
        • If an initializer is not a constant expression (see Constant
        Expressions), all subsequent members must be explicitly initialized.
        Otherwise, a compile-time error occurs.
        • The member which is the first and has no explicit initializer
        gets zero value.
        • Member with an explicit initializer has that explicit value.
        • Member that is not the first and has no explicit initializer
        takes the value of the immediately preceding constant
        plus one.
    params: |-
      >-
        part have not a constant expression initializers,
        part do not have initializers,
        using different expression values types assignable to type int
    decl_variants:
      - |-
        function foo_byte(): byte {
            return 5
        }
        function foo_short(): short {
            return 7
        }
        function foo_int(): int {
            return 9
        }
        function foo_long(): long {
            return 13
        }
        enum Enum { A, B, C = foo_byte(), D = foo_short(),
          E = foo_int(), F = foo_long().toInt() }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.A instanceof Enum)
        arktest.assertTrue(Enum.B instanceof Enum)
        arktest.assertTrue(Enum.C instanceof Enum)
        arktest.assertTrue(Enum.D instanceof Enum)
        arktest.assertTrue(Enum.E instanceof Enum)
        arktest.assertTrue(Enum.F instanceof Enum)
        arktest.assertTrue(Enum.A.valueOf() instanceof int)
        arktest.assertTrue(Enum.B.valueOf() instanceof int)
        arktest.assertTrue(Enum.C.valueOf() instanceof int)
        arktest.assertTrue(Enum.D.valueOf() instanceof int)
        arktest.assertTrue(Enum.E.valueOf() instanceof int)
        arktest.assertTrue(Enum.F.valueOf() instanceof int)
        arktest.assertEQ(Enum.A, 0)
        arktest.assertEQ(Enum.B, 1)
        arktest.assertEQ(Enum.C, 5)
        arktest.assertEQ(Enum.D, 7)
        arktest.assertEQ(Enum.E, 9)
        arktest.assertEQ(Enum.F, 13)
    test_suffix: "phnacei3"
