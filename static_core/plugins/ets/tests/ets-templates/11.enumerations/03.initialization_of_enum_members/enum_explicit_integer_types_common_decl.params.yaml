  - desc: |-
      >-
        If some but not all members have their values set explicitly,
        then the values of the members are set by the following rules:
        • If an initializer is not a constant expression (see Constant
        Expressions), all subsequent members must be explicitly initialized.
        Otherwise, a compile-time error occurs.
        • The member which is the first and has no explicit initializer
        gets zero value.
        • Member with an explicit initializer has that explicit value.
        • Member that is not the first and has no explicit initializer
        takes the value of the immediately preceding constant
        plus one.
    params: |-
      checking integer type overflow on max value
    check_variants:
      - {check_type: "long", max_value: "9223372036854775807"}
      - {check_type: "int", max_value: "2147483647"}
      - {check_type: "short", max_value: "32767"}
      - {check_type: "byte", max_value: "127"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first = [max_value] - 1, second, third }
    sub_cases_logic:
      - |-
        let v1: [check_type] = [max_value] - 1
        let v2: [check_type] = v1
        v2++
        let v3: [check_type] = v2
        v3++
        arktest.assertEQ(Enum.first.valueOf(), v1)
        arktest.assertEQ(Enum.second.valueOf(), v2)
        arktest.assertEQ(Enum.third.valueOf(), v3)
    test_suffix: "citoomaxv1"

