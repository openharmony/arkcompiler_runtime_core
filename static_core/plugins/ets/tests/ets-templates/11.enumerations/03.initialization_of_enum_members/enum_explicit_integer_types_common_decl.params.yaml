      - {check_type: "long", min_value: "-9223372036854775808"}
      - {check_type: "int", min_value: "-2147483648"}
      - {check_type: "short", min_value: "-32768"}
      - {check_type: "byte", min_value: "-128"}
    decl_variants:
      - |-
