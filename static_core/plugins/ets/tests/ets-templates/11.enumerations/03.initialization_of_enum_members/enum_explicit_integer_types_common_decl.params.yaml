cases:
  - desc: |-
      >-
        An initializer can be omitted if an enumeration base type is an
        integer type.
        If initializers for all members are omitted, then the first member
        is assigned the value zero. The other member is assigned the value
        of the immediately preceding member plus one.
    params: |-
      initializers for all members are omitted
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first, second, third }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof [check_type])
        arktest.assertTrue(Enum.second.valueOf() instanceof [check_type])
        arktest.assertTrue(Enum.third.valueOf() instanceof [check_type])
        arktest.assertEQ(Enum.first.valueOf(), 0)
        arktest.assertEQ(Enum.second.valueOf(), 1)
        arktest.assertEQ(Enum.third.valueOf(), 2)
    test_suffix: "ifamao"

  - desc: |-
      >-
        If some but not all members have their values set explicitly,
        then the values of the members are set by the following rules:
        • If an initializer is not a constant expression (see Constant
        Expressions), all subsequent members must be explicitly initialized.
        Otherwise, a compile-time error occurs.
        • The member which is the first and has no explicit initializer
        gets zero value.
        • Member with an explicit initializer has that explicit value.
        • Member that is not the first and has no explicit initializer
        takes the value of the immediately preceding constant
        plus one.
    params: |-
      >-
        part have constant expression initializers,
        part do not have initializers
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Color: [check_type] { Red, Blue = 5, Green }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Color.Red instanceof Color)
        arktest.assertTrue(Color.Blue instanceof Color)
        arktest.assertTrue(Color.Green instanceof Color)
        arktest.assertTrue(Color.Red.valueOf() instanceof [check_type])
        arktest.assertTrue(Color.Blue.valueOf() instanceof [check_type])
        arktest.assertTrue(Color.Green.valueOf() instanceof [check_type])
        arktest.assertEQ(Color.Red.valueOf(), 0)
        arktest.assertEQ(Color.Blue.valueOf(), 5)
        arktest.assertEQ(Color.Green.valueOf(), 6)
    test_suffix: "phcei1"

  - desc: |-
      >-
        If some but not all members have their values set explicitly,
        then the values of the members are set by the following rules:
