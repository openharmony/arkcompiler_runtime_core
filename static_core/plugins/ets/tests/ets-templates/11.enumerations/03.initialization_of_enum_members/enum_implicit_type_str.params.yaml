cases:
  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using string literals in initializer expressions
    decl_variants:
      - |-
        enum Enum { first = "Line 1", second = "Line 2", third = "Line 1" + "\nLine 2" }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "Line 1")
        arktest.assertEQ(Enum.second.valueOf(), "Line 2")
        arktest.assertEQ(Enum.third.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Enum.first.toString(), "Line 1")
        arktest.assertEQ(Enum.second.toString(), "Line 2")
        arktest.assertEQ(Enum.third.toString(), "Line 1\nLine 2")
    test_suffix: "usliie"
    ids: "0"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using enum members values in initializers expressions
    decl_variants:
      - |-
        enum Enum { first = "Line 1", second = "Line 2", third = first + "\n" + second }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "Line 1")
        arktest.assertEQ(Enum.second.valueOf(), "Line 2")
        arktest.assertEQ(Enum.third.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Enum.first.toString(), "Line 1")
        arktest.assertEQ(Enum.second.toString(), "Line 2")
        arktest.assertEQ(Enum.third.toString(), "Line 1\nLine 2")
    test_suffix: "uemviie"
    ids: "1"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using other enum members values as enum members initializers
    decl_variants:
      - |-
        enum Enum1 { first = "Line 1", second = "Line 2", third = "Line 1\nLine 2" }
        enum Enum2 { first = Enum1.second, second = Enum1.third, third = Enum1.first }
      - |-
        enum Enum1 { first = "Line 1", second = "Line 2", third = "Line 1\nLine 2" }
        enum Enum2 { first = Enum1.second.valueOf(), second = Enum1.third.toString(), third = Enum1.first }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum1.first instanceof Enum1)
        arktest.assertTrue(Enum1.second instanceof Enum1)
        arktest.assertTrue(Enum1.third instanceof Enum1)
        arktest.assertFalse(Enum1.first instanceof Enum2)
        arktest.assertFalse(Enum1.second instanceof Enum2)
        arktest.assertFalse(Enum1.third instanceof Enum2)
        arktest.assertTrue(Enum1.first.valueOf() instanceof string)
        arktest.assertTrue(Enum1.second.valueOf() instanceof string)
        arktest.assertTrue(Enum1.third.valueOf() instanceof string)
        arktest.assertEQ(Enum1.first.valueOf(), "Line 1")
        arktest.assertEQ(Enum1.second.valueOf(), "Line 2")
        arktest.assertEQ(Enum1.third.valueOf(), "Line 1\nLine 2")
        arktest.assertTrue(Enum2.first instanceof Enum2)
        arktest.assertTrue(Enum2.second instanceof Enum2)
        arktest.assertTrue(Enum2.third instanceof Enum2)
        arktest.assertFalse(Enum2.first instanceof Enum1)
        arktest.assertFalse(Enum2.second instanceof Enum1)
        arktest.assertFalse(Enum2.third instanceof Enum1)
        arktest.assertTrue(Enum2.first.valueOf() instanceof string)
        arktest.assertTrue(Enum2.second.valueOf() instanceof string)
        arktest.assertTrue(Enum2.third.valueOf() instanceof string)
        arktest.assertEQ(Enum2.first.valueOf(), "Line 2")
        arktest.assertEQ(Enum2.second.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Enum2.third.valueOf(), "Line 1")
    test_suffix: "uoemvaemi"
    ids: "2-3"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using const variables in initializer expressions
    decl_variants:
      - |-
        const a: string = "ABC"
        const b: string = "EFG"
        enum Enum { first = a, second = b }
      - |-
        const a: "ABC" = "ABC"
        const b: "EFG" = "EFG"
        enum Enum { first = a, second = b }
      - |-
        const a = "A"
        const b = "G"
        enum Enum { first = a + "BC", second = "EF" + b }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "ABC")
        arktest.assertEQ(Enum.second.valueOf(), "EFG")
    test_suffix: "ucviie"
    ids: "4-6"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using variables in initializer expressions
    decl_variants:
      - |-
        let a: string = "ABC"
        let b: string = "EFG"
        enum Enum { first = a, second = b }
      - |-
        let a: "ABC" = "ABC"
        let b: "EFG" = "EFG"
        enum Enum { first = a, second = b }
      - |-
        let a = "A"
        let b = "G"
        enum Enum { first = a + "BC", second = "EF" + b }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "ABC")
        arktest.assertEQ(Enum.second.valueOf(), "EFG")
    test_suffix: "uviie"
    ids: "7-9"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using functions in initializer expressions
    decl_variants:
      - |-
        function fa(): string {
          return "ABC"
        }
        function fb(): string {
          return "EFG"
        }
        enum Enum { first = fa(), second = fb() }
      - |-
        function fa(): "ABC" {
          return "ABC"
        }
        function fb(): "EFG" {
          return "EFG"
        }
        enum Enum { first = fa(), second = fb() }
      - |-
        function fa() {
          return "ABC"
        }
        function fb() {
          return "EFG"
        }
        enum Enum { first = fa() + "BC", second = "EF" + fb() }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "ABC")
        arktest.assertEQ(Enum.second.valueOf(), "EFG")
    test_suffix: "ufiie"
    ids: "10-12"
