cases:
  - desc: |-
      >-
        If enumeration type is exported, then all enumeration members
        are exported along with the mandatory qualification.
    check_variants:
      - {enum_name: "ImpColorsInt", enum_type: "imp", enum_base_type: "int",
        red_value: "1", green_value: "2", blue_value: "4",
        imported_module: "./to_export.ets"}
      - {enum_name: "ImpColorsStr", enum_type: "imp", enum_base_type: "string",
        red_value: "\"One\"", green_value: "\"Two\"", blue_value: "\"Three\"",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsLong", enum_type: "exp", enum_base_type: "long",
        red_value: "0x7FFF_FFFF_1", green_value: "0x7FFF_FFFF_2",
        blue_value: "0x7FFF_FFFF_4", imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsInt", enum_type: "exp", enum_base_type: "int",
        red_value: "1", green_value: "2", blue_value: "4",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsShort", enum_type: "exp", enum_base_type: "short",
        red_value: "1", green_value: "2", blue_value: "4",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsByte", enum_type: "exp", enum_base_type: "byte",
        red_value: "1", green_value: "2", blue_value: "4",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsDouble", enum_type: "exp", enum_base_type: "double",
        red_value: "1.0", green_value: "2.5", blue_value: "5.0",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsFloat", enum_type: "exp", enum_base_type: "float",
        red_value: "1.0f", green_value: "2.5f", blue_value: "5.0f",
        imported_module: "./to_export.ets"}
      - {enum_name: "ExpColorsStr", enum_type: "exp", enum_base_type: "string",
        red_value: "\"One\"", green_value: "\"Two\"", blue_value: "\"Three\"",
        imported_module: "./to_export_exp_str.ets"}
    decl: |-
      import { [enum_name] } from "[imported_module]"
    logic: |-
      let r: [enum_name] = [enum_name].Red
      let g: [enum_name] = [enum_name].Green
      let b: [enum_name] = [enum_name].Blue
      let r2 = [enum_name].Red
      let g2 = [enum_name].Green
      let b2 = [enum_name].Blue
      arktest.assertTrue(r instanceof [enum_name])
      arktest.assertTrue(g instanceof [enum_name])
      arktest.assertTrue(b instanceof [enum_name])
      arktest.assertEQ(r, [red_value])
      arktest.assertEQ(g, [green_value])
      arktest.assertEQ(b, [blue_value])
      arktest.assertTrue(r2 instanceof [enum_name])
      arktest.assertTrue(g2 instanceof [enum_name])
      arktest.assertTrue(b2 instanceof [enum_name])
      arktest.assertEQ(r2, [red_value])
      arktest.assertEQ(g2, [green_value])
      arktest.assertEQ(b2, [blue_value])
      arktest.assertTrue([enum_name].Red instanceof [enum_name])
      arktest.assertTrue([enum_name].Green instanceof [enum_name])
      arktest.assertTrue([enum_name].Blue instanceof [enum_name])
      arktest.assertTrue([enum_name].Red.valueOf() instanceof [enum_base_type])
      arktest.assertTrue([enum_name].Green.valueOf() instanceof [enum_base_type])
      arktest.assertTrue([enum_name].Blue.valueOf() instanceof [enum_base_type])
      arktest.assertEQ([enum_name].Red, [red_value])
      arktest.assertEQ([enum_name].Green, [green_value])
      arktest.assertEQ([enum_name].Blue, [blue_value])
