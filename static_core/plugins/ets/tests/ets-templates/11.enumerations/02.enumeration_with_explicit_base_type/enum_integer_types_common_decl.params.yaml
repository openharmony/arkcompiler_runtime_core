    check_variants:
      - {check_type: "long", v1_type: "byte", v2_type: "short",
        v3_type: "int", v4_type: "long"}
      - {check_type: "int", v1_type: "byte", v2_type: "short",
        v3_type: "int", v4_type: "byte"}
      - {check_type: "short", v1_type: "byte", v2_type: "short",
        v3_type: "byte", v4_type: "short"}
      - {check_type: "byte", v1_type: "byte", v2_type: "byte",
        v3_type: "byte", v4_type: "byte"}
    decl_variants:
      - |-
        const v1: [v1_type] = 11
        const v2: [v2_type] = 13
        const v3: [v3_type] = 15
        const v4: [v4_type] = 17
        enum Enum: [check_type] { A = v1, B = v2, C = v3, D = v4 }
      - |-
        let v1: [v1_type] = 11
        let v2: [v2_type] = 13
        let v3: [v3_type] = 15
        let v4: [v4_type] = 17
        enum Enum: [check_type] { A = v1, B = v2, C = v3, D = v4 }
      - |-
        enum Enum: [check_type] { A = 11 as [v1_type], B = 13 as [v2_type],
          C = 15 as [v3_type], D = 17 as [v4_type] }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.A instanceof Enum)
        arktest.assertTrue(Enum.B instanceof Enum)
        arktest.assertTrue(Enum.C instanceof Enum)
        arktest.assertTrue(Enum.D instanceof Enum)
        arktest.assertTrue(Enum.A.valueOf() instanceof [check_type])
        arktest.assertTrue(Enum.B.valueOf() instanceof [check_type])
        arktest.assertTrue(Enum.C.valueOf() instanceof [check_type])
        arktest.assertTrue(Enum.D.valueOf() instanceof [check_type])
        arktest.assertEQ(Enum.A.valueOf(), 11)
        arktest.assertEQ(Enum.B.valueOf(), 13)
        arktest.assertEQ(Enum.C.valueOf(), 15)
        arktest.assertEQ(Enum.D.valueOf(), 17)
    test_suffix: "udvt"

