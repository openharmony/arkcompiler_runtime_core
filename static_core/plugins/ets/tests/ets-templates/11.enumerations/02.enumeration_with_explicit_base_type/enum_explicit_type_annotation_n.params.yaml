---
cases:
  - decl: |-
      type customType = int
      enum Enum: customType { first = 1 }
  - decl: |-
      type customType = byte
      enum Enum: customType { first = 1 }
  - decl: |-
      type customType = short
      enum Enum: customType { first = 1 }
  - decl: |-
      type customType = long
      enum Enum: customType { first = 1 }
  - decl: |-
      type customType = double
      enum Enum: customType { first = 1.2 }
  - decl: |-
      type customType = float
      enum Enum: customType { first = 1.2f }
  - decl: |-
      type customType = string
      enum Enum: customType { first = "abc" }
  - decl: |-
      enum Enum: double | string { first = 1.2 }
  - decl: |-
      enum Enum: Object { first = 5 }
  - decl: |-
      enum Enum: Any { first = 5 }
  - decl: |-
      enum Enum: bigint { first = 5n }
  - decl: |-
      enum Enum: char { first = c'a' }
  - decl: |-
      enum Enum: bool { first = true }
  - decl: |-
      enum Enum: null { first = null }
  - decl: |-
      enum Enum: undefined { first = undefined }
  - decl: |-
      class A {}
      enum Enum: A { first = new A }
  - decl: |-
      enum Enum: Array<int> { first = [1, 2, 3] }
  - decl: |-
      enum Enum1 { first }
      enum Enum2: Enum1 { first = Enum1.first }
