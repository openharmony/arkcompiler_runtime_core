---
cases:
  - doc: Interface and superinterface generic types are different - string and int
    error: |-
      Semantic error ESE0318: Type 'B<String>' cannot be assigned to type 'A<Int>'
    decl: |-
      interface A<T> {}
      interface B<T> extends A<T> {}
      function main() {
        let i: B<string> = {}
        let j: A<int> = i
      }
  - doc: Interface and superinterface generic types are different - base and derived classes
    error: |-
      Semantic error ESE0318: Type 'B<D>' cannot be assigned to type 'A<C>'
    decl: |-
      class C {}
      class D extends C {}
      interface A<T> {}
      interface B<T> extends A<T> {}
      function main() {
        let i: B<D> = {}
        let j: A<C> = i
      }
