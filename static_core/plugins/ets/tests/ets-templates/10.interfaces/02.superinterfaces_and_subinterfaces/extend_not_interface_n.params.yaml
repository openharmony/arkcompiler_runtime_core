---

# List of types
types:
    - type: byte
      error: |-
        "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: short
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: int
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: long
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: float
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: double
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: char
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: boolean
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: ColorEnum
      decl: |-
        enum ColorEnum { Red, Green, Blue }
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: Boolean | String
      error: |-
          "Semantic error ESE0179: Interface expected here."
    - type: FuncOp
      decl: |-
        type FuncOp = () => void
      error: |-
          "Semantic error ESE0179: Interface expected here."
    - type: C
      decl: |-
        class C {}
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: Object
      error: |-
          "Semantic error ESE0378: Interfaces cannot extend classes, only other interfaces."
    - type: Any
      error: |-
          "Semantic error ESE0179: Interface expected here."
