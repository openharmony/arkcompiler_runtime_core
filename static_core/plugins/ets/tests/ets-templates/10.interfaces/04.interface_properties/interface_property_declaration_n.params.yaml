--- # List of invalid interface members
cases:
  - doc: Setter should have no implementation body
    error: |-
      "Syntax error ESY0031: Getter and setter methods must be abstracts in the interface body."
    decl: |-
      interface I {
        set text(s: string) { }
      }
  - doc: Getter should have no implementation body
    error: |-
      "Syntax error ESY0031: Getter and setter methods must be abstracts in the interface body."
    decl: |-
      interface I {
        get text(): string { }
      }
  - doc: Access setter when only getter is configured
    error: |-
      "Semantic error ESE0211: Cannot read from this property because it is writeonly."
    decl: |-
      interface I {
        set text(s: string)
      }
      function main() {
        let i: I = {}
        i.text
      }
  - doc: Access setter when only getter is configured
    error: |-
      "Semantic error ESE0209: Cannot assign to this property because it is readonly."
    decl: |-
      interface I {
        get text(): string
      }
      function main() {
        let i: I = {text: "def"}
        i.text = "abc"
      }
  - doc: Non-initialized mandatory field
    error: |-
      "Semantic error ESE0400: Non-optional property 'text' in type 'I' is missing in object literal."
    decl: |-
      interface I {
        text: string
      }
      function main() {
        let i: I = {}
      }
  - doc: Mandatory field should be initialized
    error: |-
      "Semantic error ESE0188: C is not abstract and does not implement getter for text property in I"
    decl: |-
      interface I {
        text: string
      }
      class C implements I {}
  - doc: Getter and setter expected to be of the same type
    error: |-
      "#33901 CTE is missing"
    decl: |-
      interface I {
        set text(i: string)
        get text(): int
      }
