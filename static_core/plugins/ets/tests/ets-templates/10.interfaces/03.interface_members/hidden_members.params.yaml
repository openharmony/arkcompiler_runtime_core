---
cases:
  - doc: Public interface members visibility is not affected by private interface method
    decl: |-
      interface I {
        private foo(): int { return 1 }
        goo(): int { return this.foo() }
        boo(): int { return 2 }
        z: string
      }
      interface II extends I { }
      function main() {
        let i: II = { z: "str" }
        arktest.assertEQ(i.z, "str")
        arktest.assertEQ(i.boo(), 2)
        arktest.assertEQ(i.goo(), 1)
      }
  - doc: Superinterface private method is not visible at subinterface
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      interface II extends I {
        foo(): int { return 2 }
      }
      function main() {
        let i: II = { }
        arktest.assertEQ(i.foo(), 2)
      }
  - doc: Superinterface private method is not visible at literal object
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      function main() {
        let i: I = { foo(): int {return 2} }
        arktest.assertEQ(i.foo(), 2)
      }
