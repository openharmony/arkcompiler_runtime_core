---
cases:
  - doc: Object public method
    error: |-
      "TBD Error #33880"
    decl: |-
      interface I {
        toString(): string;
      }
  - doc: Object public method with updated param list
    error: |-
      "TBD Error #33880"
    decl: |-
      interface I {
        toString(i: int): string;
      }
  - doc: Object public method configured to be have no params
    error: |-
      "Semantic error ESE0130: Function bar is already declared.'"
    decl: |-
      interface I {
        bar(): int
        bar(): void
      }
  - doc: Different return value type
    error: |-
      "TBD Error #33880"
    decl: |-
      interface I {
        hasOwnProperty(key: string): int
      }
  - doc: No return value
    error: |-
      "TBD Error #33880"
    decl: |-
      interface I {
        toString(): void;
      }
  - doc: Static public method
    error: |-
      "TBD Error #33880"
    decl: |-
      interface I {
        entries(o: Object): [string, Any] | null | undefined[] 
      }
