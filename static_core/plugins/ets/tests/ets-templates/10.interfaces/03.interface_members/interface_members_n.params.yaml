--- # List of invalid interface members
interface_members:
  - decl: "enum Color {Red, Green}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'enum'."
  - decl: "class B{}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'class'."
  - decl: "abstract class B{}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'abstract'."
  - decl: "interface I{}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'interface'."
  - decl: "type f = int"
    error: |-
      "Semantic error ESE0371: Cannot find type 'f'."
  - decl: "constructor() {}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'constructor'."
  - decl: "export i: int"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'export'."
  - decl: "namespace NS {}"
    error: |-
      "Semantic error ESE0371: Cannot find type 'NS'."
  - decl: "static foo(): int { return 1}"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'static'."
  - decl: "static f: int"
    error: |-
      "Syntax error ESY0224: Identifier expected, got 'static'."
