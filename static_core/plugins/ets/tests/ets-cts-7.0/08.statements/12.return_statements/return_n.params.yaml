--- # List of valid expression statements
block_statements:
  - decl: |
      class A {
        public static x: int
        static {
          A.x = 5
          return 5
        }
      }
    exp_out: "Syntax error ESY0287: Unexpected return value."
  - decl: |
      class A {
        constructor() {
          return 5
        }
      }
    exp_out: "Semantic error ESE0033: Return statement with expression isn't allowed in constructor."
  - decl: |
      class A {
        foo(): void { return 5 }
      }
    exp_out: "Semantic error ESE0091: Type 'Int' is not compatible with the enclosing method's return type 'undefined'"
  - decl: |
      function foo(): void { return 5 }
    exp_out: "Semantic error ESE0091: Type 'Int' is not compatible with the enclosing method's return type 'undefined'"
  - decl: |
      class A {
        foo(): int { return }
      }
    exp_out: "Semantic error ESE0032: Missing return value."
  - decl: |
      class A {
        foo(): int { return false }
      }
    exp_out: "Semantic error ESE0091: Type 'Boolean' is not compatible with the enclosing method's return type 'Int'"
  - decl: |
      class A {
        return
      }
    exp_out: "Syntax error ESY0227: Unexpected token 'return'."
  - decl: |
      return
    exp_out: "Syntax error ESY0163: return keyword should be used in function body."
  - decl: |
      {
        return
      }
    exp_out: "Syntax error ESY0163: return keyword should be used in function body."
  - decl: |
      namespace NS {
        return
      }
    exp_out: "Syntax error ESY0163: return keyword should be used in function body."
