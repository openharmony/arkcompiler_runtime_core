cases:
  - xType: short
    matchType: byte
    expression: x
    caseExpression: Byte.toShort(match)

  - xType: byte
    matchType: short
    expression: Byte.toShort(x)
    caseExpression: 'match'

  - xType: short
    matchType: short
    expression: x
    caseExpression: 'match'

  - xType: byte
    matchType: char
    matchInit: Int.toChar(5)
    expression: Byte.toShort(x)
    caseExpression: match

  - xType: char
    init: Int.toChar(5)
    matchType: short
    expression: Char.toShort(x)
    caseExpression: match

  - xType: short
    matchType: short
    expression: x
    caseExpression: match

  - xType: short
    matchType: float
    matchInit: 5.0f
    expression: x
    caseExpression: Double.toShort(match)

  - xType: short
    matchType: double
    matchInit: 5.0f
    expression: x
    caseExpression: Double.toShort(match)

  - xType: short
    matchType: short
    expression:  x
    caseExpression: Float.toShort(5.0f)

  - xType: char
    init: c'M'
    matchType: short
    expression:  Char.toString(x)
    caseExpression: "'M'"

  - xType: char
    init: Int.toChar(5)
    matchType: byte
    expression:  x.toInt()
    caseExpression: match
