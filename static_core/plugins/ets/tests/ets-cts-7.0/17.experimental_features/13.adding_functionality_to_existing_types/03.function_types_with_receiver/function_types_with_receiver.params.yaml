---
cases:
  - decl: |
      class A {}
      type T = (this: A) => int;
    use: |
      let a: A = new A()
      let t: T = (this: A): int => { return 1 }
      arktest.assertEQ(t(a), 1)
  - decl: |
      class A {}
      type T = (this: A) => int;
    use: |
      let a: A = new A()
      let t: T = (this: A): int => { return 1 }
      arktest.assertEQ(t(a), 1)
  - decl: |
      interface I {}
      type T = (this: I) => int;
    use: |
      let i: I = {}
      let t: T = (this: I): int => { return 1 }
      arktest.assertEQ(t(i), 1)
  - decl: |
      interface I {}
      type T = (this: I) => int;
    use: |
      let i: I = {}
      let t: T = (this: I): int => { return 1 }
      arktest.assertEQ(t(i), 1)
  - decl: |
      type T = (this: boolean[]) => boolean
    use: |
      let b: boolean[] = [true, false]
      let t: T = (this: boolean[]): boolean => { return true }
      arktest.assertEQ(t(b), true)
  - decl: |
      type T = (this: boolean[]) => boolean
    use: |
      let b: boolean[] = [true, false]
      let t: T = (this: boolean[]): boolean => { return true }
      arktest.assertEQ(t(b), true)
  - decl: |
      class A {}
      type t1 = (this: A) => boolean
      type t2 = (a: A) => boolean
      function foo(this: A): boolean { return true }
      function bar(a: A): boolean { return false }
    use: |
      let f: t1 = foo
      let b: t2 = bar
      let a: A = new A()
      arktest.assertEQ(b(a), false)
      b = foo
      f = b
      arktest.assertEQ(b(a), true)
      arktest.assertEQ(f(a), true)
  - decl: |
      class A {}
    use: |
      let a: A = new A()
      let t: Function = (this: A): int => { return 1 }
      arktest.assertEQ(t.unsafeCall(a), 1)
  - decl: |
      interface I {}
    use: |
      let i: I = {}
      let t: Function = (this: I): int => { return 1 }
      arktest.assertEQ(t.unsafeCall(i), 1)
  - decl: |
      class A { }
      type FA = (this: A) => boolean
      type FN = (this: number[], max: number) => number
    use: |
      let a: A = new A()
      let fa: FA = (this: A): boolean => { return true }
      arktest.assertTrue(fa(a))
      let fn: FN = (this: number[], max: number): number => { return max }
      arktest.assertEQ(fn([1, 2], 3), 3)
      let n: number[] = [1, 2]
      arktest.assertEQ(fn(n, 3), 3)
  - decl: |
      class B<T> { }
      type FB<T> = (this: B<T>, x: T) => T
      type FBS = (this: B<string>, x: string) => string
    use: |
      let fb1: FB<int> = (this: B<int>, x: int): int => { return x }
      let fb2: FB<string> = (this: B<string>, x: string): string => { return x }
      let fbs: FBS = (this: B<string>, x: string): string => { return x }
      arktest.assertEQ(fb1(new B<int>(), 1), 1)
      arktest.assertEQ(fb2(new B<string>(), "abc"), "abc")
      arktest.assertEQ(fbs(new B<string>(), "abc"), "abc")
  - decl: |
      interface I<T> { }
      type FI<T> = (this: I<T>, x: T) => T
      type FIS = (this: I<string>, x: string) => string
    use: |
      let fi1: FI<int> = (this: I<int>, x: int): int => { return x }
      let fi2: FI<string> = (this: I<string>, x: string): string => { return x }
      let fis: FIS = (this: I<string>, x: string): string => { return x }

      let it: I<int> = {}
      arktest.assertEQ(fi1(it, 1), 1)

      let is: I<string> = {}
      arktest.assertEQ(fi2(is, "abc"), "abc")
      arktest.assertEQ(fis(is, "abc"), "abc")
  - decl: |
      class A { }
      type F1 = (this: A) => boolean
      type F2 = (a: A) => boolean

      function foo(this: A): boolean { return true }
      function goo(a: A): boolean { return false }
    use: |
      let f1: F1 = foo
      arktest.assertTrue(f1(new A()))
      f1 = goo
      arktest.assertFalse(f1(new A()))

      let f2: F2 = goo
      arktest.assertFalse(f2(new A()))
      f2 = foo
      arktest.assertTrue(f2(new A()))
      f1 = f2
      arktest.assertTrue(f1(new A()))
  - decl: |
      interface I { }
      type F1 = (this: I) => boolean
      type F2 = (i: I) => boolean

      function foo(this: I): boolean { return true }
      function goo(i: I): boolean { return false }
    use: |
      let f1: F1 = foo
      let i: I = {}
      arktest.assertTrue(f1(i))
      f1 = goo
      arktest.assertFalse(f1(i))

      let f2: F2 = goo
      arktest.assertFalse(f2(i))
      f2 = foo
      arktest.assertTrue(f2(i))
      f1 = f2
      arktest.assertTrue(f1(i))
  - decl: |
      function foo(p: number, f: (this: number) => number) {
        return f(p)
      }
      function goo(this: number) { return this - 1 }
      function bar(this: number) { return this + 1 }
      function compat(n: number) { return n }
    use: |
      let n: number = 1
      arktest.assertEQ(foo(n, goo), 0)
      arktest.assertEQ(foo(n, bar), 2)
      arktest.assertEQ(foo(n, compat), 1)
  - decl: |
      function foo<T extends Object>(this: T, functor: (this: T)=> T): T {
        return functor(this)
      }

      function bar<T>(this: T): T {
        return this
      }
    use: |
      let x = 5
      arktest.assertEQ(x.foo(bar<int>), 5)
      let y = bar<int>
      arktest.assertEQ(x.foo(y), 5)
  - decl: |
      class A { p: string = "abc" }
      class B extends A {
        m() { return true }
      }

      type FA = (this: A) => string
      type FB = (this: B) => string
    use: |
      let fa: FA = (this: A): string => { return this.p }
      let fb: FB = (this: B): string => { return this.p }

      let f: FB
      f = fa
      arktest.assertEQ(f(new B()), "abc")
      f = fb
      arktest.assertEQ(f(new B()), "abc")
  - decl: |
      interface A { p: string }
      interface B extends A {
        p1: int
      }

      type FA = (this: A) => string
      type FB = (this: B) => string
    use: |
      let ia: A = {p: "abc"}
      let ib: B = {p: "def", p1: 1}
      let fa: FA = (this: A): string => { return this.p }
      let fb: FB = (this: B): string => { return this.p }

      let f: FB
      f = fa
      arktest.assertEQ(f(ib), "def")
      f = fb
      arktest.assertEQ(f(ib), "def")
  - decl: |
      class A { fld = 1 }
      type FA = (this: A) => number
      class B {
        fld = 2
        m: FA = (this: A): number => { return this.fld }
      }
    use: |
      arktest.assertEQ(new B().m(new A()), 1)
  - decl: |
      class A {  }
      type FA = (this: A) => A
    use: |
      let f: FA = (this: A): A => { return this }
      let a: A = new A()
      arktest.assertEQ(f(a), a)
  - decl: |
      class A { }
      type FA = (this: A, p: int) => int
    use: |
      let a: A = new A()
      let f: FA = (this: A, p: int): int => { return p }
      arktest.assertEQ(f(a, 1), 1)
  - decl: |
      interface I { }
      type FI = (this: I, p: int) => int
    use: |
      let i: I = {}
      let f: FI = (this: I, p: int): int => { return p }
      arktest.assertEQ(f(i, 1), 1)
  - decl: |
      class A { fld: int = 1 }
      type FA = (this: A) => int
    use: |
      let a: A = new A()
      let f: FA = (this: A): int => { return this.fld }
      arktest.assertEQ(f(a), 1)
  - decl: |
      interface I { fld: int }
      type FI = (this: I) => int
    use: |
      let i: I = {fld: 1}
      let f: FI = (this: I): int => { return this.fld }
      arktest.assertEQ(f(i), 1)
  - decl: |
      class A {
        fld: int
        constructor(p: int) { this.fld = p }
      }
      type T = (this: A) => int;
    use: |
      let a1: A = new A(1)
      let a2: A = new A(2)
      let t: T = (this: A): int => { return this.fld }
      arktest.assertEQ(t(a1), 1)
      arktest.assertEQ(t(a2), 2)
  - decl: |
      interface I { fld: int }
      type T = (this: I) => int;
    use: |
      let i1: I = {fld: 1}
      let i2: I = {fld: 2}
      let t: T = (this: I): int => { return this.fld }
      arktest.assertEQ(t(i1), 1)
      arktest.assertEQ(t(i2), 2)
  - decl: |
      class A { }

      type FA = (a: A) => int
      type FAr = (this: A) => int
    use: |
      let fa: FA = (this: A): int => { return 0 }
      let far: FAr = (a: A): int => { return 1 }
      arktest.assertEQ(fa(new A), 0)
      arktest.assertEQ(far(new A), 1)
