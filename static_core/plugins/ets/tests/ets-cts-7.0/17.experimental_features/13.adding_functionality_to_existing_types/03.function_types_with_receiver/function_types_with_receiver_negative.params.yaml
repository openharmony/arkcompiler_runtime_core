---
cases:
  - decl: |
      class A {}
      type t1 = (this: A) => boolean
      type t2 = (a: A) => boolean
      function foo(this: A): boolean { return true }
      function bar(a: A): boolean { return true }
    use: |
      let f: t1 = foo
      let b: t2 = bar
      b = foo
      f = b
      let a: A = new A()
      a.b()
    out: "Semantic error ESE0087: Property 'b' does not exist on type 'A'"
  - decl: |
      class B<T> { }
      type FB<T> = (this: B<T>, x: T) => T
    use: |
      let fb1: FB<int> = (this: B<int>, x: int): int => { return x }
      arktest.assertEQ(new B<char>().fb1(1), 1)
    out: "Semantic error ESE0046: Type 'B<Char>' is not compatible with type 'B<Int>' at index 1"
  - decl: |
      class A { }
      type F1 = (this: A) => boolean
      type F2 = (a: A) => boolean

      function foo(this: A): boolean { return true }
      function goo(a: A): boolean { return false }
    use: |
      let f1: F1 = goo
      arktest.assertFalse(new A().f1())

      let f2: F2 = goo
      arktest.assertFalse(new A().f2())
      f2 = foo
      arktest.assertTrue(new A().f2())
    out: |
      Semantic error ESE0127: No matching call signature for assertFalse(...)\n
      Semantic error ESE0087: Property 'f2' does not exist on type 'A'\n
      Semantic error ESE0127: No matching call signature for assertTrue(...)\n
      Semantic error ESE0087: Property 'f2' does not exist on type 'A'\n
  - decl: |
      function foo<T extends Object>(this: T, functor: (this: T)=> void): void {
        functor(this)
        this.functor()
      }

      function bar<T>(this: T): void {
        console.log(this)
      }
    use: |
      let x = 5
      x.foo(x.bar)
      x.foo(x.bar<int>)
      let z = x.bar
      let y = x.bar<int>
    out: |
      Semantic error ESE0127: No matching call signature for foo(Int, x.bar)\n
      Semantic error ESE655063: Generic function bar requires explicit type arguments when used as a value.\n
      Semantic error ESE0127: No matching call signature for foo(Int, ...)\n
      Semantic error ESE0087: Property 'bar' does not exist on type 'Int'\n
      Semantic error ESE0087: Property 'bar' does not exist on type 'Int'\n
      Semantic error ESE0087: Property 'bar' does not exist on type 'Int'\n
  - decl: |
      class A {
        readonly fld = 0
      }
      type Foo = (this: A) => number
    use: |
      let f1: Foo = (this: A): number => { return this.fld++ }
    out: "Semantic error ESE4002: Cannot assign to a readonly field fld"
  - decl: |
      class A {
        readonly fld = 0
      }
      function bar(this: A): number { return this.fld++ }
    use: |
      let f1 = bar
    out: |
      Semantic error ESE4002: Cannot assign to a readonly field fld\n
  - decl: |
      class A { p: string = "abc" }
      class B extends A {
        m() { return true }
      }

      type FA = (this: A) => string
      type FB = (this: B) => string
    use: |
      let fa: FA = (this: A): string => { return this.p }
      let fb: FB = (this: B): string => { return this.p }

      let f: FA
      f = fb
    out: "Semantic error ESE0318: Type '((p1: B) => String)' cannot be assigned to type '((p1: A) => String)'"
  
  - decl: | # The method call syntax cannot be used when assigning the actual entity to a variable of function type with receiver
      class A {}
      type FA = (this: A) => void
      function foo(this: A): void {}
    use: |
      let a: A = new A()
      let f: FA = a.foo
    out: "Semantic error ESE0087: Property 'foo' does not exist on type 'A'"
