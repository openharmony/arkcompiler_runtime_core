---
cases:
  # All test cases moved to deprecated/NF70
  # and some of them deleted from this file
  - decl: |
      class A {
        foo(): int { return 0 }
      }
      function f(context: (this: A) => void) { context(new A()) }
      f((this: A): void => {
        arktest.assertEQ(this.foo(), 0)
      })
  - decl: |
      class A {
        m: int = 0
      }
      function f(context: (this: A) => void) { context(new A()) }
      f((this: A): void => {
        arktest.assertEQ(this.m, 0)
      })
  - decl: |
      class A {
        m: int = 0
      }
      function f(context: (this: A) => void) { context(new A()) }
      f() {
        arktest.assertEQ(this.m, 0)
      }
  - decl: |
      class A {
        foo(): int { return 0 }
      }
      function f(context: (this: A) => void) { context(new A()) }
      f() {
        arktest.assertEQ(this.foo(), 0)
      }
