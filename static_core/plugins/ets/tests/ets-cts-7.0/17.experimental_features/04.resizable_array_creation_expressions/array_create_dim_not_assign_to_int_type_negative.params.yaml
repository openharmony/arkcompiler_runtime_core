---
cases:
  - use: |-
      let v: number[] = new number[new Boolean(true)](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Boolean' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[false](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Boolean' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[new Object()](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Object' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[new Error()](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Error' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[null](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'null' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[undefined](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'undefined' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number["abc"](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type '\"abc\"' is not compatible with type 'Int' at index 1"

  - use: |-
      let v: number[] = new number[c'a'](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Char' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: int|short = 42 as short
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Int|Short' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: BigInt = new BigInt(1n)
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'BigInt' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: bigint = 1n
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'BigInt' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: Long = new Long(1 as long)
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[] = new number[size](1.0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[] = new number[size]((index): number => { return 1.0 }) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][] = new number[size][1] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Double>>'"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][] = new number[1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Double>>'"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][] = new number[1][size](1.0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 2"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][] = new number[1][size]((index1, index2): number => { return 1.0 }) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 2"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][][] = new number[size][1][1] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Array<Double>>>'"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][][] = new number[1][size][1] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Array<Double>>>'"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][][] = new number[1][1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Array<Double>>>'"

  - decl: |-
      let size: long = 1
    use: |-
      let v: number[][][] = new number[1][1][size](1.0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Long' is not compatible with type 'Int' at index 3"

  - decl: |-
      let size: Number = new Number(1.0)
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Double' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: number = 1.0
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Double' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: number = 1.0
    use: |-
      let v: number[][] = new number[1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Double>>'"

  - decl: |-
      let size: number = 1.0
    use: |-
      let v: number[][][] = new number[1][1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Array<Double>>>'"

  - decl: |-
      let size: Float = new Float(1.0f)
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Float' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: float = 1.0f
    use: |-
      let v: number[] = new number[size](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Float' is not compatible with type 'Int' at index 1"

  - decl: |-
      let size: float = 1.0f
    use: |-
      let v: number[][] = new number[1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Double>>'"

  - decl: |-
      let size: float = 1.0f
    use: |-
      let v: number[][][] = new number[1][1][size] // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0318: Type 'Double' cannot be assigned to type 'Array<Array<Array<Double>>>'"

  - decl: |-
      // enum constants of string type
      enum Color { Red = 'r', Green = 'g', Blue = 'b' }
    use: |-
      let v: number[] = new number[Color.Green](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Color' is not compatible with type 'Int' at index 1"

  - decl: |-
      // enum constants of long type
      enum Color { Red = 9223372036854775807, Green = 2, Blue = 3 }
    use: |-
      let v: number[] = new number[Color.Green](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Color' is not compatible with type 'Int' at index 1"

  - decl: |-
      // enum constants of long type
      enum Color: long { Red = 1, Green = 2, Blue = 3 }
    use: |-
      let v: number[] = new number[Color.Green](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Color' is not compatible with type 'Int' at index 1"

  - decl: |-
      // enum constants of float type
      enum Color: float { Red = 1.0f, Green = 2.0f, Blue = 3.0f }
    use: |-
      let v: number[] = new number[Color.Green](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Color' is not compatible with type 'Int' at index 1"

  - decl: |-
      // enum constants of double type
      enum Color: double { Red = 1.0, Green = 2.0, Blue = 3.0 }
    use: |-
      let v: number[] = new number[Color.Green](0) // CTE: dimension is not assignable to int type
    expected_out: "Semantic error ESE0046: Type 'Color' is not compatible with type 'Int' at index 1"
