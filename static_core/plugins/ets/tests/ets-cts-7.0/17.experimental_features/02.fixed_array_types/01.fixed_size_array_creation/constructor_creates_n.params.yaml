cases:
    - decl: FixedArray<number>(3.14)
      exp_out: "Semantic error ESE0236: Type 'Double' cannot be used as an index type. Only primitive or unboxable integral types can be used as index."
    - decl: FixedArray<string>("5", "a")
      exp_out: "Semantic error ESE0236: Type '\"5\"' cannot be used as an index type. Only primitive or unboxable integral types can be used as index."

    - decl: FixedArray<float>(-1)
      exp_out: "Semantic error ESE0247: Index value cannot be less than zero."
    - decl: FixedArray<string>(-20, 'a')
      exp_out: "Semantic error ESE0247: Index value cannot be less than zero."

    - decl: FixedArray<object>()
      exp_out: "Semantic error ESE421701: Missing array size when create fixed-size array FixedArray<Object>."

    - decl: FixedArray<int|string>(5,0)
      exp_out: "Semantic error ESE0051: Cannot use array creation expression with non-constructable element type which is non-assignable from undefined."

    - decl: FixedArray(5,0)
      exp_out: "Semantic error ESE0277: FixedArray<T> must have only one type parameter."

    - decl: FixedArray<boolean>(5,0)
      exp_out: "Semantic error ESE0318: Type 'Int' cannot be assigned to type 'Boolean'"

    - decl: "FixedArray<Function>(30, () => '')"
      exp_out: "Semantic error ESE0050: Cannot use array creation expression with abstract classes and interfaces."

    - decl: "FixedArray<MyAbstractClass>(30, new IImpl)"
      exp_out: "Semantic error ESE0050: Cannot use array creation expression with abstract classes and interfaces."
