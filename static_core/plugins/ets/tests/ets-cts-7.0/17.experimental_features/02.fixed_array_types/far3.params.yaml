---
cases:
    - use: |-
          let obj = new A<Number>(1.0, 2.0).toObj()
          let arr = foo<Number>(obj)
          let v: number = arr[0]
          arr[1] = arr[1] + v
          arktest.assertEQ(arr[1], 3.0)

    - use: |-
          let obj = new A<String>("a", "b").toObj()
          let arr = foo<String>(obj)
          let v: string = arr[0]
          arr[1] = arr[1] + v
          arktest.assertEQ(arr[1], 'ba')

    - use: |-
          let obj = new A<Boolean>(true, false).toObj()
          let arr = foo<Boolean>(obj)
          let v: boolean = arr[0]
          arr[1] = arr[1] & v
          arktest.assertEQ(arr[1], false)
