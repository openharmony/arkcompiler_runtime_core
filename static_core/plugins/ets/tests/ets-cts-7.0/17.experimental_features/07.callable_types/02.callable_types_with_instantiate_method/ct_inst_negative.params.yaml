cases:
#0
    - decl: |-
          // missing explicit factory
          class C {
              static $_instantiate(f: ()=>C): C {
                  return f()
              }
          }
      use: |-
          let x = C.$_instantiate()
#1
    - decl: |-
          // missing explicit factory with args
          class C {
              static $_instantiate(f: ()=>C, p: C): C {
                  return f()
              }
          }
      use: |-
          let x = C.$_instantiate(new C())
#2
    - decl: |-
          // wrong type explicit factory
          class C {
              static $_instantiate(f: ()=>C): C {
                  return f()
              }
          }
      use: |-
          let x = C.$_instantiate(() => { return new Object() })
#3
    - decl: |-
          // wrong type explicit factory
          class C {
              static $_instantiate(f: ()=>C): C {
                  return f()
              }
          }
          type FU = (() => C) | undefined
          let f: FU = (): C => { return new C() }
      use: |-
          let x = C.$_instantiate(f)
#4
    - decl: |-
          // wrong factory definition
          class C {
              static $_instantiate(f: C): C {
                  return f
              }
          }
      use: |-
          let x = C(new C())
#5
    - decl: |-
          // the class has no default constructor
          class C {
              static $_instantiate(f: ()=>C): C {
                  return f()
              }
              constructor(p: string) {}
          }
      use: |-
          let x = C()
#6
    - decl: |-
          //generic
          class C<T> {
              static $_instantiate<T>(f: () => C<T>): C<T> {
                  return new C<T>(f)
              }
              constructor (f: () => C<T>) {}
              constructor () {}
          }
      use: |-
          let y = C.$_instantiate<int>(() => { return new C<int>()})
          arktest.assertTrue(y instanceof C)
