cases:
#0
    - decl: |-
          // error propagation from invoke
          class B {
              static $_invoke(p: boolean): string {
                  if (p) {
                      throw new Error('invoke error')
                  }
                  return 'B'
              }
          }
          class C extends B {
              $_invoke(): C { return new C() }
          }
          function foo(p: boolean): string {
              return C(p)
          }
      use: |-
          let checkException = (e: Error): boolean => { return e instanceof Error }
          arktest.expectThrow(() => {
              foo(true)
          }, checkException)
      expected: 'Semantic error ESE854298: Class static member $_invoke must be
          accessed with the class name B qualification only.'
