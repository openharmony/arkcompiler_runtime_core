          }
          arktest.assertEQ(res, 11)
          arktest.assertEQ(res2, '710')

          res = 0
          for (let v: int|string of
              ((): FixedArray<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v instanceof int ? v : 100
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4>'
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: short { Four = 4 }
      main: |-
          let res2 = ''
          for (let v: int|string of
              ((): EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => new EnumIterable<Enum1|Enum2>([Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]))()) {
              if (v instanceof string) {
                  res2 += v
              } else if (v instanceof int) {
                  res += v
              }
          }
          arktest.assertEQ(res, 11)
          arktest.assertEQ(res2, '710')

          res = 0
          for (let v: int|string of
              ((): EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => new EnumIterable<Enum3|Enum4>([Enum3.Three, Enum4.Four]))())
              res += v instanceof int ? v : 100
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4>'
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: short { Four = 4 }
      main: |-
          let res2 = ''
          for (let v: int|string of
              ((): EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4> => new EnumIterable<Enum1|Enum2>([Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]))()) {
              if (v instanceof string) {
                  res2 += v
              } else if (v instanceof int) {
                  res += v
              }
          }
          arktest.assertEQ(res, 11)
          arktest.assertEQ(res2, '710')

          res = 0
          for (let v: int|string of
              ((): EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v instanceof int ? v : 100
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over FixedArray<Enum1|Enum2>|EnumIterable<Enum3|Enum4>'
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: short { Four = 4 }
      main: |-
          let res2 = ''
          for (let v: int|string of
              ((): FixedArray<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => [Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])()) {
              if (v instanceof string) {
