---
cases:
    # iterables

    - desc: 'Iterating over Array<Enum1>'
      main: |-
          for (let v: byte of [Enum1.Zero, Enum1.Five, Enum1.Six])
              res += v
          arktest.assertEQ(res, 11)

    - desc: 'Iterating over FixedArray<Enum1>'
      main: |-
          let fixed_array: FixedArray<Enum1> = [Enum1.Zero, Enum1.Five, Enum1.Six]
          for (let v: byte of fixed_array)
              res += v
          arktest.assertEQ(res, 11)

    - desc: 'Iterating over EnumIterable<Enum1>'
      main: |-
          for (let v: byte of new EnumIterable<Enum1>([Enum1.Zero, Enum1.Five, Enum1.Six]))
              res += v
          arktest.assertEQ(res, 11)

    # unions of iterables

    - desc: 'Iterating over union Array<Enum1>|Array<Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          for (let v: byte of ((): Enum1[]|Enum2[] => [Enum1.Zero, Enum1.Five, Enum1.Six])())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of ((): Enum1[]|Enum2[] => [Enum2.Seven, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 24)

    - desc: 'Iterating over union FixedArray<Enum1>|FixedArray<Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          for (let v: byte of ((): FixedArray<Enum1>|FixedArray<Enum2> => [Enum1.Zero, Enum1.Five, Enum1.Six])())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of ((): FixedArray<Enum1>|FixedArray<Enum2> => [Enum2.Seven, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 24)

    - desc: 'Iterating over union Array<Enum1>|FixedArray<Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0402: Unions of types with iterator and fixed/value arrays are currently unsupported in an iteration: Array<Enum1>|FixedArray<Enum2>."
      main: |-
          for (let v: byte of ((): Enum1[]|FixedArray<Enum2> => [Enum1.Zero, Enum1.Five, Enum1.Six])())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of ((): Enum1[]|FixedArray<Enum2> => [Enum2.Seven, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 24)

    - desc: 'Iterating over union of EnumIterables'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          for (let v: byte of
              ((): EnumIterable<Enum1>|EnumIterable<Enum2> => new EnumIterable<Enum1>([Enum1.Zero, Enum1.Five, Enum1.Six]))())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of
              ((): EnumIterable<Enum1>|EnumIterable<Enum2> => new EnumIterable<Enum2>([Enum2.Seven, Enum2.Seven, Enum2.Ten]))())
              res += v
          arktest.assertEQ(res, 24)

    - desc: 'Iterating over union of EnumIterable<Enum1> and Array<Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          for (let v: byte of
              ((): EnumIterable<Enum1>|Array<Enum2> => new EnumIterable<Enum1>([Enum1.Zero, Enum1.Five, Enum1.Six]))())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of
              ((): EnumIterable<Enum1>|Array<Enum2> => [Enum2.Seven, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 24)

    - desc: 'Iterating over union of EnumIterable<Enum1> and FixedArray<Enum2>'
      main: |-
          for (let v: byte of
              ((): EnumIterable<Enum1>|FixedArray<Enum2> => new EnumIterable<Enum1>([Enum1.Zero, Enum1.Five, Enum1.Six]))())
              res += v
          arktest.assertEQ(res, 11)

          res = 0
          for (let v: byte of
              ((): EnumIterable<Enum1>|FixedArray<Enum2> => [Enum2.Seven, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 24)

    # iterables over union

    - desc: 'Iterating over Array<Enum1|Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          let array: Array<Enum1|Enum2> = [Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]
          for (let v: byte of array)
              res += v
          arktest.assertEQ(res, 28)

    - desc: 'Iterating over FixedArray<Enum1|Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          let fixed_array: FixedArray<Enum1|Enum2> = [Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]
          for (let v: byte of fixed_array)
              res += v
          arktest.assertEQ(res, 28)

    - desc: 'Iterating over EnumIterable<Enum1|Enum2>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2' is not assignable to the loop iterator type 'Byte'."
      main: |-
          let iterable: EnumIterable<Enum1|Enum2> = new EnumIterable<Enum1|Enum2>([Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])
          for (let v: byte of iterable)
              res += v
          arktest.assertEQ(res, 28)

    # union of unions

    - desc: 'Iterating over Array<Enum1|Enum2>|Array<Enum3|Enum4>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2|Enum3|Enum4' is not assignable to the loop iterator type 'Byte'."
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): Array<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): Array<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over FixedArray<Enum1|Enum2>|FixedArray<Enum3|Enum4>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2|Enum3|Enum4' is not assignable to the loop iterator type 'Byte'."
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|FixedArray<Enum3|Enum4> => [Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|FixedArray<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over FixedArray<Enum1|Enum2>|Array<Enum3|Enum4>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0402: Unions of types with iterator and fixed/value arrays are currently unsupported in an iteration: FixedArray<(Enum1|Enum2)>|Array<Enum3|Enum4>."
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2|Enum3|Enum4' is not assignable to the loop iterator type 'Byte'."
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => new EnumIterable<Enum1|Enum2>([Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]))())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): EnumIterable<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => new EnumIterable<Enum3|Enum4>([Enum3.Three, Enum4.Four]))())
              res += v
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4>'
      tags: [compile-only, negative]
      exp_out: "Semantic error ESE0069: Source element type 'Enum1|Enum2|Enum3|Enum4' is not assignable to the loop iterator type 'Byte'."
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4> => new EnumIterable<Enum1|Enum2>([Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten]))())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): EnumIterable<Enum1|Enum2>|Array<Enum3|Enum4> => [Enum3.Three, Enum4.Four])())
              res += v
          arktest.assertEQ(res, 7)

    - desc: 'Iterating over FixedArray<Enum1|Enum2>|EnumIterable<Enum3|Enum4>'
      decl: |-
          enum Enum3: byte { Three = 3 }
          enum Enum4: byte { Four = 4 }
      main: |-
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => [Enum1.Zero, Enum1.Five, Enum1.Six, Enum2.Seven, Enum2.Ten])())
              res += v
          arktest.assertEQ(res, 28)

          res = 0
          for (let v: byte of
              ((): FixedArray<Enum1|Enum2>|EnumIterable<Enum3|Enum4> => new EnumIterable<Enum3|Enum4>([Enum3.Three, Enum4.Four]))())
              res += v
          arktest.assertEQ(res, 7)
