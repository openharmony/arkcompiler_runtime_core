---
cases:
  - doc: Namespace cannot be used as object - assignment is not allowed
    decl: |-
        namespace A {}
        namespace B {}
        A = B
    expected: "Syntax error ESY0318: Namespace cannot be used as object."

  - doc: Namespace identifier is not a string literal
    decl: |-
        namespace A\u0027 {}
    expected: "Syntax error ESY0263: Invalid identifier part."

  - doc: Comma-separated namespace declaration is not allowed
    decl: |-
        namespace A,B {}
    expected: "Syntax error ESY0227: Unexpected token ','."
