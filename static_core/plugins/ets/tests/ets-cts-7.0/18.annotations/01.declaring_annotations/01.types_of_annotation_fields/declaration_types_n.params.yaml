---

cases:
  - type: () => { return 1 }
    value: () => { return 1 }
    expected_out: 
      - "Semantic error ESE0042: Invalid annotation field type. Only numeric, boolean, string, enum, or arrays of these types are permitted for annotation fields."
  - type: SomeClass
    value: {someField: "str"}
    expected_out: 
      - "Semantic error ESE0042: Invalid annotation field type. Only numeric, boolean, string, enum, or arrays of these types are permitted for annotation fields."
  - type: SomeUnion
    value: '"One"'
    expected_out: 
      - "Semantic error ESE0042: Invalid annotation field type. Only numeric, boolean, string, enum, or arrays of these types are permitted for annotation fields."
  - type: [number]
    value: tuple
    expected_out: 
      - "Semantic error ESE0042: Invalid annotation field type. Only numeric, boolean, string, enum, or arrays of these types are permitted for annotation fields."
  - type: constructor
    value: new String("str")
    expected_out: 
      - "Syntax error ESY0027: Invalid value for annotation field, expected a constant literal."
