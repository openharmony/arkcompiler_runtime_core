cases:
#0
  - signature1: "foo()"
    signature2: "foo(x: number)"
    use: |
      arktest.assertEQ(new A0().foo(), 1)
      arktest.assertEQ(new A0().foo(2), 2)
#1
  - signature1: "foo()"
    signature2: "foo(x: number[])"
    use: |
      arktest.assertEQ(new A1().foo(), 1)
      arktest.assertEQ(new A1().foo([1]), 2)
#2
  - signature1: "foo()"
    signature2: "foo(x: string)"
    use: |
      arktest.assertEQ(new A2().foo(), 1)
      arktest.assertEQ(new A2().foo("abc"), 2)
#3
  - signature1: "foo(x: number)"
    signature2: "foo(x: number[])"
    use: |
      arktest.assertEQ(new A3().foo(1), 1)
      arktest.assertEQ(new A3().foo([1, 2]), 2)
#4
  - signature1: "foo(x: number)"
    signature2: "foo(x: string)"
    use: |
      arktest.assertEQ(new A4().foo(1), 1)
      arktest.assertEQ(new A4().foo("abc"), 2)
#5
  - signature1: "foo(x: number[])"
    signature2: "foo(x: string)"
    use: |
      arktest.assertEQ(new A5().foo([1, 2]), 1)
      arktest.assertEQ(new A5().foo("abc"), 2)
#6  
  - signature1: "foo(x: number)"
    signature2: "foo(y: Any)"
    use: |
      arktest.assertEQ(new A6().foo(1), 1)
      arktest.assertEQ(new A6().foo(new Object), 2)
      arktest.assertEQ(new A6().foo(null), 2)
      arktest.assertEQ(new A6().foo("abc"), 2)
      arktest.assertEQ(new A6().foo(c'a'), 2)
  #7  
  - signature1: "foo(x: number)"
    signature2: "foo(y: Object)"
    use: |
      arktest.assertEQ(new A7().foo(1), 1)
      arktest.assertEQ(new A7().foo(new Object), 2)
  #8  
  - signature1: "foo(x: number)"
    signature2: "foo(y: null)"
    use: |
      arktest.assertEQ(new A8().foo(1), 1)
      arktest.assertEQ(new A8().foo(null), 2)
