---
cases:
    - desc: tuple-element union recursive reference
      defs: |-
          type NestedTup = [boolean, NestedTup|undefined, string]
      use: |-
          let v1: NestedTup = [true, undefined, 'abc']
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: function-parameter-type recursive reference
      defs: |-
        type Func = (p: int, q: Func) => int;
      use: |-
        let a:Func = (p: int, q: Func):int => {return 1};
        arktest.assertEQ(a(10, a), 1)
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: function-return-type union recursive reference
      defs: |-
          type I = () => I | null
      use: |-
          const i: I = () => null
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: function-return-type union recursive reference with cast
      defs: |-
          type I = () => I | null
      use: |-
          const i: I = () => (() => null) as I
      expected_out: "Semantic error ESE0311: Circular type alias reference"

    - desc: union with function-return-type and promise recursive reference
      defs: |-
          type EffectResult = (() => EffectResult) | Promise<EffectResult>
      use: |-
          let fn: EffectResult = (): EffectResult => new Promise<EffectResult>((resolve: (value: EffectResult) => void) => {})
      expected_out: "Semantic error ESE0311: Circular type alias reference"
