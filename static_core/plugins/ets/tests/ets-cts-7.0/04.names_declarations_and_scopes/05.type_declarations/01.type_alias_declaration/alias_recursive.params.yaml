cases:
  - defs: |-
      type A = A[]
    use: |-
      let v1: A = new Array<A>()
      let v2: A = [new Array<A>(), v1]
      let v3: A = [new Array<A>(), v2, v1]
      arktest.assertTrue(v1 instanceof A)
      arktest.assertTrue(v1 instanceof Array)
      arktest.assertEQ(v1.length, 0)
      arktest.assertTrue(v2 instanceof A)
      arktest.assertTrue(v2 instanceof Array)
      arktest.assertEQ(v2.length, 2)
      arktest.assertTrue(v2[0] instanceof A)
      arktest.assertTrue(v2[0] instanceof Array)
      arktest.assertEQ(v2[0].length, 0)
      arktest.assertTrue(v2[1] instanceof A)
      arktest.assertTrue(v2[1] instanceof Array)
      arktest.assertEQ(v2[1].length, 0)
      arktest.assertTrue(v3 instanceof A)
      arktest.assertTrue(v3 instanceof Array)
      arktest.assertEQ(v3.length, 3)
      arktest.assertTrue(v3[0] instanceof A)
      arktest.assertTrue(v3[0] instanceof Array)
      arktest.assertEQ(v3[0].length, 0)
      arktest.assertTrue(v3[1] instanceof A)
      arktest.assertTrue(v3[1] instanceof Array)
      arktest.assertEQ(v3[1].length, 2)
      arktest.assertTrue(v3[1][0] instanceof A)
      arktest.assertTrue(v3[1][0] instanceof Array)
      arktest.assertEQ(v3[1][0].length, 0)
      arktest.assertTrue(v3[1][1] instanceof A)
      arktest.assertTrue(v3[1][1] instanceof Array)
      arktest.assertEQ(v3[1][1].length, 0)
      arktest.assertTrue(v3[2] instanceof A)
      arktest.assertTrue(v3[2] instanceof Array)
      arktest.assertEQ(v3[2].length, 0)

  - defs: |-
      type A = string | Array<A>
    use: |-
      let v1: A = "abc"
      let v2: A = [new Array<A>(), v1]
      let v3: A = [new Array<A>(), v2, "efg"]
      arktest.assertTrue(v1 instanceof A)
      arktest.assertTrue(v1 instanceof string)
      arktest.assertEQ(v1, "abc")
      arktest.assertTrue(v2 instanceof A)
      arktest.assertTrue(v2 instanceof Array)
      arktest.assertEQ(v2.length, 2)
      arktest.assertTrue(v2[0] instanceof A)
      arktest.assertTrue(v2[0] instanceof Array)
      arktest.assertEQ((v2[0] as Array<A>).length, 0)
      arktest.assertTrue(v2[1] instanceof A)
      arktest.assertTrue(v2[1] instanceof string)
      arktest.assertEQ(v2[1], "abc")
      arktest.assertTrue(v3 instanceof A)
      arktest.assertTrue(v3 instanceof Array)
      arktest.assertEQ(v3.length, 3)
      arktest.assertTrue(v3[0] instanceof A)
      arktest.assertTrue(v3[0] instanceof Array)
      arktest.assertEQ((v3[0] as Array<A>).length, 0)
      arktest.assertTrue(v3[1] instanceof A)
      arktest.assertTrue(v3[1] instanceof Array)
      arktest.assertEQ((v3[1] as Array<A>).length, 2)
      arktest.assertTrue((v3[1] as Array<A>)[0] instanceof A)
      arktest.assertTrue((v3[1] as Array<A>)[0] instanceof Array)
      arktest.assertEQ(((v3[1] as Array<A>)[0] as Array<A>).length, 0)
      arktest.assertTrue((v3[1] as Array<A>)[1] instanceof A)
      arktest.assertTrue((v3[1] as Array<A>)[1] instanceof string)
      arktest.assertEQ((v3[1] as Array<A>)[1], "abc")
      arktest.assertTrue(v3[2] instanceof A)
      arktest.assertTrue(v3[2] instanceof string)
      arktest.assertEQ(v3[2], "efg")

  - defs: |-
      class C<T> {
        value: T | null
        constructor(value: T | null) {
          this.value = value
        }
      }
      type B = C<B>
    use: |-
      let v1: B = new C<B>(null)
      let v2: B = new C<B>(v1)
      let v3: B = new C<B>(v2)
      arktest.assertEQ(v1.value, null)
      arktest.assertEQ(v2.value!.value, null)
      arktest.assertEQ(v3.value!.value!.value, null)
      let first = v3 as C<B>
      let second = first.value as B
      let third = (second as C<B>).value as B
      let fourth = third as C<B>
      arktest.assertNE(first.value, null)
      arktest.assertNE(second.value, null)
      arktest.assertNE(third, null)
      arktest.assertEQ(fourth.value, null)

  - defs: |-
      class C<T> {
        value: T | null
        constructor(value: T | null) {
          this.value = value
        }
      }
      type M = C<F>
      type F = C<M>
    use: |-
      let v1: M = new C<F>(null)
      let v2: F = new C<M>(v1)
      let v3: M = new C<F>(v2)
      arktest.assertEQ(v1.value, null)
      arktest.assertEQ(v2.value!.value, null)
      arktest.assertEQ(v3.value!.value!.value, null)
      let first = v3 as C<F>
      let second = first.value as F
      let third = (second as C<M>).value as M
      let fourth = third as C<F>
      arktest.assertNE(first.value, null)
      arktest.assertNE(second.value, null)
      arktest.assertNE(third, null)
      arktest.assertEQ(fourth.value, null)

  - defs: |-
      type NestedNumArray = number | Array<NestedNumArray>
    use: |-
      let v1: NestedNumArray = new Array<NestedNumArray>()
      v1.push(1.0)
      let v2: NestedNumArray = new Array<NestedNumArray>()
      v2.push(2.0)
      v2.push(3.0)
      let v3: NestedNumArray = new Array<NestedNumArray>()
      v3.push(v1)
      v3.push(4.0)
      v3.push(v2)
      let v4: NestedNumArray = new Array<NestedNumArray>()
      v4.push(v3)
      arktest.assertEQ(v1.length, 1)
      arktest.assertEQ(v1[0], 1.0)
      arktest.assertEQ(v2.length, 2)
      arktest.assertEQ(v2[0], 2.0)
      arktest.assertEQ(v2[1], 3.0)
      arktest.assertEQ(v3.length, 3)
      arktest.assertEQ((v3[0] as Array<NestedNumArray>).length, 1)
      arktest.assertEQ((v3[0] as Array<NestedNumArray>)[0], 1.0)
      arktest.assertEQ(v3[1], 4.0)
      arktest.assertEQ((v3[2] as Array<NestedNumArray>).length, 2)
      arktest.assertEQ((v3[2] as Array<NestedNumArray>)[0], 2.0)
      arktest.assertEQ((v3[2] as Array<NestedNumArray>)[1], 3.0)
      arktest.assertEQ(v4.length, 1)
      arktest.assertEQ(((v4[0] as Array<NestedNumArray>)[0] as Array<NestedNumArray>).length, 1)
      arktest.assertEQ(((v4[0] as Array<NestedNumArray>)[0] as Array<NestedNumArray>)[0], 1.0)
      arktest.assertEQ((v4[0] as Array<NestedNumArray>)[1], 4.0)
      arktest.assertEQ(((v4[0] as Array<NestedNumArray>)[2] as Array<NestedNumArray>).length, 2)
      arktest.assertEQ(((v4[0] as Array<NestedNumArray>)[2] as Array<NestedNumArray>)[0], 2.0)
      arktest.assertEQ(((v4[0] as Array<NestedNumArray>)[2] as Array<NestedNumArray>)[1], 3.0)

  - defs: |-
      class C<out T> {
        readonly fld: T
        constructor(p: T) {
          this.fld = p
        }
      }
      type NestedC = String | C<NestedC> | Error
    use: |-
      let v1: NestedC = 'A'
      let v2: NestedC = new Error()
      let v3: NestedC = new C<String>('A')
      let v4: NestedC = new C<C<Error>>(new C<Error>(new Error()))
      let v5: NestedC = new C<C<C<NestedC>>>(new C<C<String>>(new C<String>('X')))
      arktest.assertEQ(v1, 'A')
      arktest.assertTrue(v2 instanceof Error)
      arktest.assertTrue(v3 instanceof C)
      arktest.assertEQ(v3.fld, 'A')
      arktest.assertTrue(v4 instanceof C)
      arktest.assertTrue(v4.fld instanceof C)
      arktest.assertTrue(v4.fld.fld instanceof Error)
      arktest.assertTrue(v5 instanceof C)
      arktest.assertTrue(v5.fld instanceof C)
      arktest.assertTrue(v5.fld.fld instanceof C)
      arktest.assertEQ(v5.fld.fld.fld, 'X')

  - defs: |-
      type NestedTup = [boolean, NestedTup|undefined, string]
    use: |-
      let v1: NestedTup = [true, [false, undefined, 'xyz'], 'abc']
      arktest.assertEQ(v1[0], true)
      arktest.assertTrue(v1[1] instanceof NestedTup)
      arktest.assertEQ((v1[1] as NestedTup)[0], false)
      arktest.assertEQ((v1[1] as NestedTup)[1], undefined)
      arktest.assertEQ((v1[1] as NestedTup)[2], 'xyz')
      arktest.assertEQ(v1[2], 'abc')

  - defs: |-
      type NestedNumArray = number | NestedNumArray[]
    use: |-
      let v1: NestedNumArray = 1.0
      let v2: NestedNumArray = [1.0, 2.0, 3.0] as NestedNumArray[]
      let v3: NestedNumArray = [1.0, [2.0, 3.0] as NestedNumArray[], 4.0] as NestedNumArray[]
      let v4: NestedNumArray = [[1.0] as NestedNumArray[]] as NestedNumArray[]
      let v5: NestedNumArray = [1.0, [[[2.0] as NestedNumArray[]]]] as NestedNumArray[]
      arktest.assertEQ(v1, 1.0)
      arktest.assertEQ(v2[0] as number, 1.0)
      arktest.assertEQ(v2[1] as number, 2.0)
      arktest.assertEQ(v2[2] as number, 3.0)
      arktest.assertEQ(v3[0] as number, 1.0)
      arktest.assertEQ((v3[1] as NestedNumArray[])[0], 2.0)
      arktest.assertEQ((v3[1] as NestedNumArray[])[1], 3.0)
      arktest.assertEQ(v3[2] as number, 4.0)
      arktest.assertEQ(((v4[0] as NestedNumArray[])[0] as number), 1.0)
      arktest.assertEQ(v5[0] as number, 1.0)
      arktest.assertEQ((((v5[1] as NestedNumArray[])[0] as NestedNumArray[])[0] as NestedNumArray[])[0] as number, 2.0)

  - defs: |-
      type Foo = (p: string) => string
      type NestedFunc = NestedFunc[] | Foo
    use: |-
      let v1: NestedFunc = []
      let v2: NestedFunc = (p: string): string => { return p + p }
      let v3: NestedFunc = [v1, v2, (p: string): string => { return p + p }]
      arktest.assertEQ(v3.length, 3)
      arktest.assertEQ(((v3 as NestedFunc[])[0] as NestedFunc[]).length, 0)
      arktest.assertEQ(((v3 as NestedFunc[])[1] as Foo)('abc'), 'abcabc')
      arktest.assertEQ(((v3 as NestedFunc[])[2] as Foo)('xyz'), 'xyzxyz')

  - defs: |-
      type Func = (p: int, q: Func) => int;
    use: |-
      let a:Func = (p: int, q: Func):int => {return 1};
      arktest.assertEQ(a(10, a), 1)

  - defs: |-
      type I = () => I | null
    use: |-
      const i: I = () => null
      arktest.assertEQ(i(), null)

  - defs: |-
      type I = () => I | null
    use: |-
      const i: I = () => (() => null) as I
      arktest.assertEQ((i() as I)(), null)

  - defs: |-
      type EnvFunction<T> = () => T
      type SimpleType = string | Promise<SimpleType>
    use: |-
      let simple: SimpleType = 'hello'
      let env: EnvFunction<SimpleType> = (): SimpleType => simple
      let result = env()
      arktest.assertTrue(result instanceof string)
      arktest.assertEQ(result as string, 'hello')

  - defs: |-
      type RecPromise = Promise<RecPromise> | RecPromise[]
    use: |-
      let arr: RecPromise = new Array<RecPromise>()
      let p: RecPromise = new Promise<RecPromise>((resolve: (value: RecPromise) => void) => { resolve(arr) })
      arktest.assertTrue(p instanceof Promise)
      arktest.assertTrue(arr instanceof Array)

  - defs: |-
      type EffectResult = (() => EffectResult) | Promise<EffectResult>
    use: |-
      let inner: EffectResult = new Promise<EffectResult>((resolve: (value: EffectResult) => void) => {})
      let fn: EffectResult = (): EffectResult => { return inner }
      arktest.assertTrue(fn instanceof Function)
