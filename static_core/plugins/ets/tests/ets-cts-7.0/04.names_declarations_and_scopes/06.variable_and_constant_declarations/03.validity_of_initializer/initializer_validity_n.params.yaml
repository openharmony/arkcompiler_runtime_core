---
cases:
  # code examples from spec
  - decl: |-
      // constant
      const a: number = b // compile-time error
      let b = 1
    expected_out: "Semantic error ESE0375: Variable 'b' is used before being assigned."

  - decl: |-
      // variable
      let c: number = d // compile-time error
      const d = 123
    expected_out: "Semantic error ESE0375: Variable 'd' is used before being assigned."

  # class implementing interface too late
  - decl: |-
      // constant
      interface I {}
      class A implements I {}
      const cls: I = a
      const a: A = new A
    expected_out: "Semantic error ESE0375: Variable 'a' is used before being assigned."

  - decl: |-
      // variable
      interface I {}
      class A implements I {}
      let cls: I = a
      let a: A = new A
    expected_out: "Semantic error ESE0375: Variable 'a' is used before being assigned."
