---
function_decls:
  - decl: |-
        class A {
          s: Long[][] = new Long[1][1]
          foo(): long[][] {
              if (this.s != null)
                  return this.s
              else
                  return new Long[2][2]
          }
        }
    call: |-
        let a = new A()
        let v = a.foo()
        arktest.assertTrue(new A().foo() instanceof Array)

  - decl: |-
      class A {
        s: long[][] = new long[1][1]
        foo(): Error[][] | long[][] {
            if (this.s != null)
                return this.s
            else
                return new Error[1][1]
        }
      }
    call: |-
        let a = new A()
        let v = a.foo() as long[][]
        v[0][0] = 0
        arktest.assertEQ(v[0][0], 0)

  - decl: |-
        class A {
          s: Long[][] = new Long[1][1]
          foo(): Error[] | long[][] {
              if (this.s == null)
                  return this.s
              else
                  return new Error[1](new Error())
          }
        }
    call: |-
        let a = new A()
        let v = a.foo() as Error[]
        arktest.assertEQ(v.length, 1)

  - decl: |-
        class A {
          s: Long[][] | null = new Long[1][1]
          foo(): Error | long[][] | null {
              if (this.s != null)
                  return this.s
              else
                  return new Error()
          }
        }
    call: |-
        let a = new A()
        let v = a.foo()
        arktest.assertTrue(v instanceof Object)

  - decl: |-
        class A {
          static foo(): long[][] {
              let s: Long[][] = new Long[1][1]
              if (s != null)
                  return s
              else
                  return new Long[2][2]
          }
        }
    call: |-
        arktest.assertTrue(A.foo() instanceof Array)

  - decl: |-
        class A {
          static foo(): Error[][]|long[][] {
              let s: long[][] = new long[1][1]
              if (s != null)
                  return s
              else
                  return new Error[1][1]
          }
        }
    call: |-
        let v = A.foo() as long[][]
        v[0][0] = 0
        arktest.assertEQ(v[0][0], 0)

  - decl: |-
        class A {
          static foo(): Error[]|Long[][] {
              let s: Long[][] = new Long[1][1]
              if (s == null)
                  return s
              else
                  return new Error[1](new Error())
          }
        }
    call: |-
        let v = A.foo() as Error[]
        arktest.assertEQ(v.length, 1)

  - decl: |-
        class A {
          static foo(): Error|Long[][] {
              let s: Long[][] | null = new Long[1][1]
              if (s != null)
                  return s
              else
                  return new Error()
          }
        }
    call: |-
        let v = A.foo()
        arktest.assertTrue(v instanceof Object)