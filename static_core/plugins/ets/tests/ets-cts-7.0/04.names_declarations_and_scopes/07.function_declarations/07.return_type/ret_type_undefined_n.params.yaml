---
function_decls:
    # function: return value
    - decl: |-
          function foo(): undefined {
              return 42
          }
      expected_out: "Semantic error ESE0091: Type 'Int' is not compatible with the enclosing method's return type 'undefined'"    

    # function: conditional return value
    - decl: |-
          let flag = true
          function foo(): undefined {
              if (flag) return undefined
              else return 42
          }
      expected_out: "Semantic error ESE0091: Type 'Int' is not compatible with the enclosing method's return type 'undefined'"    

    # lambda: return value
    - decl: |-
          let foo = (): undefined => {
              return "abc"
          }
      expected_out: "Semantic error ESE0091: Type '\\\"abc\\\"' is not compatible with the enclosing method's return type 'undefined'"    

    # lambda: conditional return value
    - decl: |-
          let foo = (p: int): undefined => {
              if (p > 0) {
                  return undefined;
              }
              return "abc"
          }
      expected_out: "Semantic error ESE0091: Type '\\\"abc\\\"' is not compatible with the enclosing method's return type 'undefined'"    

    # class instance method: return value
    - decl: |-
          class A {
              foo(): undefined {
                  return true
              }
          }
      expected_out: "Semantic error ESE0091: Type 'Boolean' is not compatible with the enclosing method's return type 'undefined'"    

    # class instance method: conditional return value
    - decl: |-
          class A {
              foo(p: int): undefined {
                  if (p == 0) {
                      return undefined
                  } else if (p > 0) {
                      return 1.0
                  }
                  return undefined
              }
          }
      expected_out: "Semantic error ESE0091: Type 'Double' is not compatible with the enclosing method's return type 'undefined'"    
