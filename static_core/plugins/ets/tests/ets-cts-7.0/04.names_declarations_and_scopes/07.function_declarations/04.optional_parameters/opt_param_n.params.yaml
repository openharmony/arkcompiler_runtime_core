---
cases:
#0
    - decl: |-
          function foo(p?: Object, q: Object) {}  // CTE, default before required
      call: foo(new Object(), new Object())
      expected: "Syntax error ESY0219: A required parameter cannot follow an optional parameter."
#1
    - decl: |-
          function foo(p: string = 'abc', q: string) {}  // CTE, default before required
      call: foo('def', 'ghi')
      expected: "Syntax error ESY0219: A required parameter cannot follow an optional parameter."
#2
    - decl: |-
          function foo(e: string = 'abc') {
              e = null;    // CTE, cannot assign null to string type
          }
      call: foo()
      expected: "Semantic error ESE0318: Type 'null' cannot be assigned to type 'String'"
#3
    - decl: |-
          function foo(e: string = 'abc') {}
      call: foo(null)  // CTE, cannot set null for string type'
      expected: "Semantic error ESE0127: No matching call signature for foo(null)"
#4

    - decl: |-
          function foo(e?: string = 'abc') {} // CTE, ambiguity
      call: foo()
      expected: "Syntax error ESY0132: Not enable default value with default undefined."
#5
    - decl: |-
        // omitting different arguments
        function foo(a: int = 1, b: int = 2, c: int = 3): int {
          return a + b + c
        }
      call: |-
        arktest.assertEQ( foo(, 11), 15 )
        arktest.assertEQ( foo(,, 11), 14 )
        arktest.assertEQ( foo(11,, 11), 24 )
        arktest.assertEQ( foo(,,), 6 )
      expected: "Semantic error ESE0124: Expected 2 arguments, got 1."
#6
    - decl: |-
        type OptL = () => int
        function foo(i: int, ov?: OptL = () => 0): int {
            return ov()
        }
      call: |-
        foo(0)
      expected: "Syntax error ESY0132: Not enable default value with default undefined."
#7
    - decl: |-
        type OptL = () => int
        class OptionalMethodOwner {
          test(i: int, ov?: OptL = () => 0): int {
              return ov()
          }
        }
      call: |-
        const test = new OptionalMethodOwner
        arktest.assertEQ(0, test.test(1))
      expected: "Syntax error ESY0132: Not enable default value with default undefined."
#8
    - decl: |-
        type OptL = () => int
        class OptionalMethodOwner {
          static test(i: int, ov?: OptL = () => 0): int {
              return ov()
          }
        }
      call: |-
        arktest.assertEQ(0, OptionalMethodOwner.test(1))
      expected: "Syntax error ESY0132: Not enable default value with default undefined."
#9
    - decl: |-
        //This form with the default value can be used only for functions or methods with an implementation body
        function foo(p: number | undefined = undefined)
        function foo(...p: Any[]): Any {}
      call: foo()
      expected: "Semantic error ESE0017: Only abstract or native methods can't have body."
#10
    - decl: |-
        //This form with the default value can be used only for functions or methods with an implementation body
        class OMO {
          foo(p: number | undefined = undefined)
          foo(...p: Any[]): Any {}
        }
      call: |-
        let test = new OMO
        test.foo()
      expected: "Semantic error ESE0017: Only abstract or native methods can't have body."

#11
    - decl: |-
        // If type annotation is omitted and type can't be inferred, then a compile-time error occurs
        function foo (p = {f: 1}) {}
      call: ''
      expected: "Syntax error ESY0194: Parameter declaration should have an explicit type annotation."
