  - { type: "Uint8Array", init: 'new Uint8Array([1, 2, 3])', index: '[0]', check: "1" }
  - { type: "Int16Array", init: 'new Int16Array([-1, 1])', index: '[1]', check: "1" }
  - { type: "Uint16Array", init: 'new Uint16Array([1, 2])', index: '[1]', check: "2" }
  - { type: "Int32Array", init: 'new Int32Array([-2147483648, 0, 2147483647])', index: '[1]', check: "0" }
  - { type: "Float32Array", init: 'new Float32Array([1.1, 2.2, 3.3])', index: '[2]', check: "3.3f" }
  - { type: "Float64Array", init: 'new Float64Array([1.1, 2.2, 3.3])', index: '[1]', check: "2.2" }
  - { type: "number[][]", init: '[[1, 2], [3, 4]]', index: '[0][1]', check: "2" }
