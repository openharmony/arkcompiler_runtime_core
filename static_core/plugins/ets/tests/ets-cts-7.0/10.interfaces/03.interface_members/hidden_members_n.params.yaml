---
cases:
  - doc: Superinterface provides no access to own private methods for subinterface
    error: |-
      "Semantic error ESE0127: No matching call signature for foo()"
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      interface II extends I {
        goo(): int { return this.foo() }
      }
  - doc: Superinterface provides no access to own private methods for class
    error: |-
      "Semantic error ESE0127: No matching call signature for foo()"
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      class C implements I {
        goo(): int { return this.foo() }
      }
  - doc: Superinterface provides no access to own private methods outside
    error: |-
      "Semantic error ESE0127: No matching call signature for foo()"
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      function main() {
        let i: I = {}
        i.foo()
      }
  - doc: Superinterface provides no access to own private methods outside
    error: |-
      "Semantic error ESE0127: No matching call signature for foo()"
    decl: |-
      interface I {
        private foo(): int { return 1 }
      }
      function main() {
        let i: I = {}
        i.foo()
      }
