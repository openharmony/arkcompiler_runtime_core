---
cases:
  - doc: method and variable with the same name
    error: |-
      "Semantic error ESE567795: Method 'bar' in I cannot overload property bar in I."
    decl: |-
      interface I {
        bar(): int
        bar: int
      }
  - doc: 2 methods with the same name
    error: |-
      "Semantic error ESE0130: Function bar is already declared."
    decl: |-
      interface I {
        bar(): int
        bar(): void
      }
  - doc: 2 variables with the same name
    error: |-
      "Semantic error ESE0130: Function bar is already declared."
    decl: |-
      interface I {
        bar: int
        bar: string
      }
  - doc: method and variable with the same name in super and sub interfaces
    error: |-
      "Semantic error ESE567795: Method 'bar' in I cannot overload property bar in II."
    decl: |-
      interface I {
        bar(): int
      }
      interface II extends I {
        bar: int
      }
  - doc: 2 variables with the same name of different types in super and sub interfaces
    error: |-
      "Semantic error ESE0136: Method bar(): String in II not overriding any method"
    decl: |-
      interface I {
        bar: int
      }
      interface II extends I {
        bar: string
      }
