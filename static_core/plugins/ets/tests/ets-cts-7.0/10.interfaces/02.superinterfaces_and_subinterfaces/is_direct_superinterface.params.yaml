---
cases:
  - doc: Variable of subinterface generic type could be assigned to variable of its superinterface type
    decl: |-
      interface A {}
      interface B<T> extends A {}
      function main() {
        let i: B<string> = {}
        let j: A = i
      }
  - doc: Variable of subinterface generic type could be assigned to variable of its generic superinterface type
    decl: |-
      interface A<T> {}
      interface B<T> extends A<T> {}
      function main() {
        let i: B<string> = {}
        let j: A<string> = i
      }
  - doc: Superinterface type is of generic class type
    decl: |-
      interface A<T> {}
      interface B<T> extends A<Array<T>> {}
      function main() {
        let i: B<string> = {}
        let j: A<Array<string>> = i
      }
  - doc: Superinterface has default value for generic type
    decl: |-
      interface A<T=string> {}
      interface B<T> extends A {}
      function main() {
        let i: B<string> = {}
        let j: A<string> = i
      }
  - doc: Reorder parameters
    decl: |-
      interface A<T,V> {
        t: T
        v: V
      }
      interface B<V,T> extends A<T,V> {}
      function main() {
        let i: B<string, int> = {t: 3, v: "str"}
        let j: A<int, string> = i
        arktest.assertEQ(j.t, 3)
        arktest.assertEQ(j.v, "str")
      }
  - doc: Hardcoded parameter
    decl: |-
      interface A<T,V> {
        t: T
        v: V
      }
      interface B<T,V> extends A<V,int> {}
      function main() {
        let i: B<int, string> = {t: "str", v: 4}
        let j: A<string, int> = i
        arktest.assertEQ(j.t, "str")
        arktest.assertEQ(j.v, 4)
      }
