--- # List of invalid interface members
cases:
  - doc: String property of the interface
    decl: |-
      interface I {
        text: string;
      }
      function main() {
        let i: I = {text: "smth"}
        arktest.assertEQ(i.text, "smth")
      }
  - doc: String interface property configured via getter and setter
    decl: |-
      interface I {
        get text(): string;
        set text(s: string);
      }
      function main() {
        let i: I = {text: "smthng"}
        arktest.assertEQ(i.text, "smthng")
        i.text = "anthr"
        arktest.assertEQ(i.text, "anthr")
      }
  - doc: Only getter is configured which makes property read-only
    decl: |-
      interface I {
        get text(): string;
      }
      function main() {
        let i: I = {text: "str"}
        arktest.assertEQ(i.text, "str")
      }
  - doc: Only setter is configured
    decl: |-
      interface I {
        set text(s: string)
      }
      function main() {
        let i: I = {text: "smthng"}
        i.text = "anthr"
      }
  - doc: Readonly property configured
    decl: |-
      interface I {
        readonly text: string;
      }
      function main() {
        let i: I = {text: "str"}
        arktest.assertEQ(i.text, "str")
      }
  - doc: Optional property configured
    decl: |-
      interface I {
        text?: string
      }
      function main() {
        let i: I = {text: "smthng"}
        let j: I = {}
        arktest.assertEQ(i.text, "smthng")
        arktest.assertEQ(j.text, undefined)
        j.text = "anthr"
        arktest.assertEQ(j.text, "anthr")
      }
