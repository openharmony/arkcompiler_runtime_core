---
cases:
  - doc: implicit return type
    decl: |-
      interface I {
        foo() {
          return "string"
        }
      }
      function main() {
        let i: I = {}
        arktest.assertEQ(i.foo(), "string")
      }
  - doc: explicit return type
    decl: |-
      interface I {
        foo(): number {
          return 8.9
        }
      }
      function main() {
        let i: I = {}
        arktest.assertEQ(i.foo(), 8.9)
      }
  - doc: Default interface method could be rewritten
    decl: |-
      let res: number = 0.0
      interface I {
        foo(i: number) {
          res = i
        }
      }
      class C implements I {
        foo(i: number) {
          res += i
        }
      }
      function main() {
        res = 0.0
        let i: I = {}
        let j: I = {foo(i: number) { res -= i}}
        let k: I = new C()
        i.foo(8.9)
        arktest.assertEQ(res, 8.9)
        j.foo(4.9)
        arktest.assertEQ(res, 4)
        k.foo(3)
        arktest.assertEQ(res, 7)
      }
  - doc: Use get/set as method name
    decl: |-
      interface I {
        f: int
        set() { return 2}
        get(i: int) { this.f = i }
      }
      function main() {
        let i: I = {f: 1}
        arktest.assertEQ(i.set(), 2)
        i.get(3)
        arktest.assertEQ(i.f, 3)
      }
