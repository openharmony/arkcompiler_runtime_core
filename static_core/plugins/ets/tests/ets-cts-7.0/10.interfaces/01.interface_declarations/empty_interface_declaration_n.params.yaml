--- 
# List of identifiers
identifiers:
  - id: interface
    error: |-
      Syntax error ESY0316: Hard keyword 'interface' cannot be used as identifier
  - id: class
    error: |-
      Syntax error ESY0316: Hard keyword 'class' cannot be used as identifier
  - id: abstract
    error: |-
      Syntax error ESY0316: Hard keyword 'abstract' cannot be used as identifier
  - id: implements
    error: |-
      Syntax error ESY0316: Hard keyword 'implements' cannot be used as identifier
  - id: "null"
    error: |-
      Syntax error ESY0224: Identifier expected, got 'null'.
  - id: var
    error: |-
      Syntax error ESY0145: Cannot be used as user-defined type.
  - id: yield
    error: |-
      Syntax error ESY0145: Cannot be used as user-defined type.
  - id: return
    error: |-
      Syntax error ESY0316: Hard keyword 'return' cannot be used as identifier

