---
cases:
  - desc: Asynchronous mutex basic functionality.
    logic: |-
      class SharedState {
        value: string = "nothing"
      }
      let whatIsInTheBag: SharedState = new SharedState
      function checkAndModify(data: SharedState, expected: string, updated: string) {
        if (data.value != expected) {
          console.log("race!")
        }
        data.value = updated
      }
      
      async function startTest() {

        let lock = new concurrency.stackless.AsyncMutex()

        const f = async () => {
          await lock.lock();
          checkAndModify(whatIsInTheBag, "nothing", "paraglider")
          arktest.assertEQ(whatIsInTheBag.value,  "paraglider")
          checkAndModify(whatIsInTheBag, "paraglider", "nothing")
          arktest.assertEQ(whatIsInTheBag.value,  "nothing")
          lock.unlock()
        }

        const g = async () => {
          await lock.lock()
          checkAndModify(whatIsInTheBag, "nothing", "apple")
          arktest.assertEQ(whatIsInTheBag.value,  "apple")
          checkAndModify(whatIsInTheBag, "apple", "nothing")
          arktest.assertEQ(whatIsInTheBag.value,  "nothing")
          lock.unlock()
        }
        await Promise.all([f(), g()]);
      }
  - desc: Asynchronous mutex multi-threaded.
    logic: |-
      async function startTest(): Promise<void> {
        let lock = new concurrency.stackless.AsyncMutex()
        let counter = 0;
        let cycleCounter = 10;
        const ea1 = new EAWorker();
        ea1.start();
        let promise1 = ea1.run<void>(
          () => {
            (async () => {
              await lock.lock();
              for(let i = 0; i < cycleCounter; ++i) {
                ++counter;
              }
              arktest.assertTrue(counter == cycleCounter || counter == cycleCounter * 2);
              lock.unlock();
            })().awaitSync();
          }
        )

        const ea2 = new EAWorker();
        ea2.start();
        let promise2 = ea2.run<void>(
          () => {
            (async () => {
              await lock.lock();
              for(let i = 0; i < cycleCounter; ++i) {
                ++counter;
              }
              arktest.assertTrue(counter == cycleCounter || counter == cycleCounter * 2);
              lock.unlock();
            })().awaitSync();
          }
        )
        await promise1;
        await promise2;
        ea1.quit();
        ea2.quit();
        arktest.assertEQ(counter, cycleCounter * 2)
      }
