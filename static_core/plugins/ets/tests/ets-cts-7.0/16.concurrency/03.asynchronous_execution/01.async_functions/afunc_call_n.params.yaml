---
cases:
    - decl: |-
        // A compile-time error occurs if async function is called in a static initializer
        async function testAsync(): Promise<void> {}
        class MyClass {
            static {
                testAsync();
            }
        }
      tags: "[compile-only, negative]"
      step_kind: compiler
      expected_out: "Semantic error ESE1339359: An async function call is not allowed in a static initializer"

    - decl: |-
        // A compile-time error occurs if async function is called in a static initializer
        async function testAsync(): Promise<void> {}
        class MyClass {
            public static myVar = testAsync();
        }
      tags: "[compile-only, negative]"
      step_kind: compiler
      expected_out: "Semantic error ESE1339359: An async function call is not allowed in a static initializer"

    - decl: |-
        // A compile-time error occurs if async function is called in a static initializer, including module scope;
        async function testAsync(): Promise<void> {}
        testAsync()
      tags: "[compile-only, negative]"
      step_kind: compiler
      expected_out: "Semantic error ESE1339359: An async function call is not allowed in a static initializer"

    - decl: |-
        // A compile-time error occurs if async method is called in a static field initializer
        class MyClass {
            static async doWork(): Promise<void> {}
            static val: Promise<void> = MyClass.doWork()
        }
      tags: "[compile-only, negative]"
      step_kind: compiler
      expected_out: "Semantic error ESE1339359: An async function call is not allowed in a static initializer"

    - decl: |-
        // A compile-time error occurs if async function is called in a static initializer
        async function crasher(): Promise<Int> {
            return await Promise.resolve(1);
        }
        try {
            let x = crasher();
        } catch (e) {
            arktest.assertTrue(e instanceof InvalidJobOperationError);
        }
      tags: "[compile-only, negative]"
      step_kind: compiler
      expected_out: "Semantic error ESE1339359: An async function call is not allowed in a static initializer"

    - decl: |-
        // A runtime-time error occurs if async function is called in a static initializer
        async function crasher(): Promise<Int> {
            return await Promise.resolve(1);
        }
        let f: Function = crasher;
        f.unsafeCall();
      tags: "[negative]"
      step_kind: runtime
      expected_error: "InvalidJobOperationError: Cannot call async in the current context!"

    - decl: |-
        // A runtime-time error occurs if async function is called in a static initializer
        async function crasher(): Promise<Int> {
            return await Promise.resolve(1);
        }
        let f: Any = crasher;
        (f as Function).unsafeCall();
      tags: "[negative]"
      step_kind: runtime
      expected_error: "InvalidJobOperationError: Cannot call async in the current context!"

    - decl: |-
        // A runtime-time error occurs if async function is called in a static initializer
        async function crasher(): Promise<Int> {
            return await Promise.resolve(1);
        }
        let f: Any = crasher;
        (f as () => Promise<Int>)();
      tags: "[negative]"
      step_kind: runtime
      expected_error: "InvalidJobOperationError: Cannot call async in the current context!"
