---
cases:
    - decl: |-
          async function foo1(): Promise<undefined> {
              return undefined;
          }
          async function foo2(): Promise<undefined> {
              return;
          }
          async function foo3(): Promise<undefined> {
          }
          async function foo4(): Promise<undefined> {
              return Promise.resolve(undefined);
          }
          async function foo5(): Promise<undefined> {
              return Promise.resolve();
          }
      use: |-
          arktest.assertEQ(await foo1(), undefined)
          arktest.assertEQ(await foo2(), undefined)
          arktest.assertEQ(await foo3(), undefined)
          arktest.assertEQ(await foo4(), undefined)
          arktest.assertEQ(await foo5(), undefined)

    - decl: |-
          async function foo1(): Promise<void> {
              return;
          }
          async function foo2(): Promise<void> {
              return undefined;
          }
          async function foo3(): Promise<void> {
          }
          async function foo4(): Promise<void> {
              return Promise.resolve()
          }
          async function foo5(): Promise<void> {
              return Promise.resolve(undefined)
          }
      use: |-
          arktest.assertEQ(await foo1(), undefined)
          arktest.assertEQ(await foo2(), undefined)
          arktest.assertEQ(await foo3(), undefined)
          arktest.assertEQ(await foo4(), undefined)
          arktest.assertEQ(await foo5(), undefined)

    - decl: |-
          async function foo1(): Promise<null> {
              return null;
          }
          async function foo2(): Promise<null> {
              return Promise.resolve(null);
          }
      use: |-
          arktest.assertEQ(await foo1(), null);
          arktest.assertEQ(await foo2(), null);

    - decl: |-
          async function foo<T>(value: T): Promise<T|null> {
              if (value !== "null") {
                  return value
              }
              return null
          }
      use: |-
          arktest.assertEQ(await foo("Generic!"), "Generic!")
          arktest.assertEQ(await foo(27), 27)
          arktest.assertEQ(await foo(undefined), undefined)
          arktest.assertEQ(await foo(null), null)
          arktest.assertEQ(await foo("null"), null)

    - decl: |-
          async function foo<T>(value: T): Promise<T|undefined> {
              if (value !== "undefined") {
                  return value
              }
          }
      use: |-
          arktest.assertEQ(await foo("Generic!"), "Generic!")
          arktest.assertEQ(await foo(27), 27)
          arktest.assertEQ(await foo(undefined), undefined)
          arktest.assertEQ(await foo("undefined"), undefined)
          arktest.assertEQ(await foo(null), null)

    - decl: |-
          async function foo(p?: string): Promise<string|int|undefined|null> {
              switch (p) {
                  case 'string': return 'hello';
                  case 'int': return 42;
                  case 'undefined': return undefined;
                  case 'void': return;
                  case 'null': return null;
              }
          }
      use: |-
          let result = await foo('undefined')
          arktest.assertEQ(result, undefined)

          result = await foo('string')
          arktest.assertEQ(result, 'hello')

          result = await foo('int');
          arktest.assertEQ(result, 42)

          result = await foo('void');
          arktest.assertEQ(result, undefined)

          result = await foo('null');
          arktest.assertEQ(result, null)

          result = await foo();
          arktest.assertEQ(result, undefined)

    - decl: |-
          async function foo(p?: string): Promise<string|int|undefined|null> {
              switch (p) {
                  case 'string': return Promise.resolve('hello');
                  case 'int': return Promise.resolve(42);
                  case 'undefined': return Promise.resolve(undefined);
                  case 'void': return Promise.resolve();
                  case 'null': return Promise.resolve(null);
              }
          }
      use: |-
          let result = await foo('undefined')
          arktest.assertEQ(result, undefined)

          result = await foo('string')
          arktest.assertEQ(result, 'hello')

          result = await foo('int');
          arktest.assertEQ(result, 42)

          result = await foo('void');
          arktest.assertEQ(result, undefined)

          result = await foo('null');
          arktest.assertEQ(result, null)

          result = await foo();
          arktest.assertEQ(result, undefined)
