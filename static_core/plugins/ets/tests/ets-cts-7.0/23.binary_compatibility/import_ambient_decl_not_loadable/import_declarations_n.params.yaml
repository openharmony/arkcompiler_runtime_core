cases:
  - decl: |-
      import {bar} from './declarations_n.d'
    use: |-
      bar('3')  // should be verification error
    err: >-
      E/verifier: Cannot link class: Cannot find method
      'bar (Lstd/core/String;)D' in class 'declarations_n.ETSGLOBAL'
  - decl: |-
      import {B} from './declarations_n.d'
    use: |-
      let b: B = new B(4) // should be verification error
    err: |-
      E/verifier: Cannot link class: Cannot find method '<ctor> (D)V' in class 'declarations_n.B'
  - decl: |-
      import {C} from './declarations_n.d'
    use: |-
      let c: C = new C('4')
      c.foo('4') // should be verification error
    err: >-
      E/verifier: Cannot link class: Cannot find method
      'foo (Lstd/core/String;)Lstd/core/String;'
      in class 'declarations_n.C'
