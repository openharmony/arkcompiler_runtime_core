libs:
  - desc: |-
        original namespace exposing m()
    body: |-
        export function m(): string {
            return 'm'
        }
  - desc: |-
        original namespace exposing m() and a
    body: |-
        export function m(): string {
            return 'm'
        }
        export let a: string = 'a'
  - desc: |-
        original namespace with non-exported a and exposed m()
    body: |-
        let a: string = 'a'
        export function m(): string {
            return 'm'
        }
  - desc: |-
        original namespace with non-exported a and exposed m()
    body: |-
        let a: string = 'a'
        export function m(): string {
            return 'm'
        }
  - desc: |-
        original namespace exposing only m()
    body: |-
        export function m(): string {
            return 'm'
        }
