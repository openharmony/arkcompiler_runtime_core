libs:
  - desc: |-
        function added to namespace
    body: |-
        export function f(): string {
            return 'f'
        }
        export function m(): string {
            return 'm'
        }
  - desc: |-
        new members added to namespace
    body: |-
        export namespace NN {
            let a: string = 'a'
        }
        export function m(): string {
            return 'm'
        }
        export let a: string = 'a'
        export let b: string = 'b'
  - desc: |-
        non-exported member removed from namespace
    body: |-
        export function m(): string {
            return 'm'
        }
  - desc: |-
        non-exported member renamed in namespace
    body: |-
        let b: string = 'a'
        export function m(): string {
            return 'm'
        }
  - desc: |-
        type definitions added to namespace
    body: |-
        export function m(): string {
            return 'm'
        }
        export class A {}
        export interface I {}
        export enum E { A, B, C }
        export type T = E
