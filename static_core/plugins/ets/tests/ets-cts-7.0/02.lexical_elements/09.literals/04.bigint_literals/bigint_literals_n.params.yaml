--- # List of invalid bigint literals
cases:
    - {lit: '00n',         exp_out: "Syntax error ESY0255: Invalid BigInt number."}
    - {lit: '0000000123n', exp_out: "Syntax error ESY0255: Invalid BigInt number."}
    - {lit: '5.5n',        exp_out: "Syntax error ESY0255: Invalid BigInt number."}
    - {lit: '5.5e5n',      exp_out: "Syntax error ESY0255: Invalid BigInt number."}

    - {lit: '_123n', exp_out: "Semantic error ESE0143: Unresolved reference _123n"}

    - {lit: '123_n', exp_out: "Syntax error ESY0250: Numeric separators are not allowed at the end of numeric literals."}
    
    - {lit: '123n_',         exp_out: "Syntax error ESY0227: Unexpected token '_'."}
    - {lit: '1N',            exp_out: "Syntax error ESY0227: Unexpected token 'N'."}
    - {lit: '123456789abcn', exp_out: "Syntax error ESY0227: Unexpected token 'abcn'."}
