--- # List of invalid bigint functions
cases:
    - {func: 'BigInt()    // missing args',             exp_out: "Semantic error ESE0127: No matching call signature for $_invoke()"}
    - {func: 'BigInt(new Object())  // wrong arg type', exp_out: "Semantic error ESE0127: No matching call signature for $_invoke(Object)"}
    - {func: 'BigInt(null)  // wrong arg type',         exp_out: "Semantic error ESE0127: No matching call signature for $_invoke(null)"}
    - {func: 'BigInt(undefined) // wrong arg type',     exp_out: "Semantic error ESE0127: No matching call signature for $_invoke(undefined)"}

    - {func: 'BigInt.asIntN()  // missing args',                    exp_out: "Semantic error ESE0127: No matching call signature for asIntN()"}
    - {func: 'BigInt.asIntN(1n, 0n)  // wrong 1st arg type',        exp_out: "Semantic error ESE0127: No matching call signature for asIntN(bigint, bigint)"}
    - {func: 'BigInt.asIntN("5", 12345n)   // wrong 1st arg type',  exp_out: 'Semantic error ESE0127: No matching call signature for asIntN(\"5\", bigint)'}
    - {func: 'BigInt.asIntN(32, 0 as byte)  // wrong 2nd arg type', exp_out: "Semantic error ESE0127: No matching call signature for asIntN(Long, Byte)"}
    - {func: 'BigInt.asIntN(32, 12345)  // wrong 2nd arg type',     exp_out: "Semantic error ESE0127: No matching call signature for asIntN(Long, Int)"}

    - {func: 'BigInt.asUintN()  // missing args',                     exp_out: "Semantic error ESE0127: No matching call signature for asUintN()"}
    - {func: 'BigInt.asUintN(1n, 0n)  // wrong 1st arg type',         exp_out: "Semantic error ESE0127: No matching call signature for asUintN(bigint, bigint)"}
    - {func: 'BigInt.asUintN("5", 12345n)  // wrong 1st arg type',    exp_out: 'Semantic error ESE0127: No matching call signature for asUintN(\"5\", bigint)'}
    - {func: 'BigInt.asUintN(32, 0 as short)  // wrong 2nd arg type', exp_out: "Semantic error ESE0127: No matching call signature for asUintN(Long, Short)"}
    - {func: 'BigInt.asUintN(32, 12345)  // wrong 2nd arg type',      exp_out: "Semantic error ESE0127: No matching call signature for asUintN(Long, Int)"}
