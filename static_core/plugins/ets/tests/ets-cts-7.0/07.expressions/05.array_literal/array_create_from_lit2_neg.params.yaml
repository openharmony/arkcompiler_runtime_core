---
cases:
  - desc: |-
      Create 1D Array with wrong type values
    sub_cases_logic:
      - code: |-
            let a: Object[] = [1, 3, undefined]
        expected_out: |-
            Semantic error ESE0227: Array element at index 2 with type 'undefined' is not compatible with the target array element type 'Object'
      - code: |-
            let a: Object[] = [1, null, 3]
        expected_out: |-
            Semantic error ESE0227: Array element at index 1 with type 'null' is not compatible with the target array element type 'Object'
      - code: |-
            let a: int[] = [1, 3, 5.7]
        expected_out: |-
            Semantic error ESE0227: Array element at index 2 with type 'Double' is not compatible with the target array element type 'Int'
      - code: |-
            let a: int[] = [1, "abc", 5]
        expected_out: |-
            Semantic error ESE0227: Array element at index 1 with type '"abc"' is not compatible with the target array element type 'Int'
      - code: |-
            let a: string[] = ["abc", 3, "efg"]
        expected_out: |-
            Semantic error ESE0227: Array element at index 1 with type 'Int' is not compatible with the target array element type 'String'
      - code: |-
            let a: boolean[] = [true, false, "true"]
        expected_out: |-
            Semantic error ESE0227: Array element at index 2 with type '"true"' is not compatible with the target array element type 'Boolean'

  - desc: |-
      Create 1D Array with not covariant subtypes
    decl: |-
      class Animal {}
      class Dog extends Animal {}
      class Cat extends Animal {}
    sub_cases_logic:
      - code: |-
            let dogs: Dog[] = [new Dog, new Animal, new Dog]
        expected_out: |-
            Semantic error ESE0227: Array element at index 1 with type 'Animal' is not compatible with the target array element type 'Dog'
      - code: |-
            let dogs: Dog[] = [new Dog, new Dog, new Cat]
        expected_out: |-
            Semantic error ESE0227: Array element at index 2 with type 'Cat' is not compatible with the target array element type 'Dog'

  - desc: |-
      Create 1D Array with not covariant function subtypes
    decl: |-
      class A {}
      class B extends A {}
      class C extends A {}
      type HandlerReq = (a: B, b: int) => B
      type HandlerCInt = (a: C, b: int) => B
      const handlerCInt: HandlerCInt = (a: C, b: int): B => {
        return new B
      }
      type HandlerBInt = (a: B, b: int) => A
      const handlerBInt: HandlerBInt = (a: B, b: int): A => {
        return new B
      }
      type HandlerB = (a: B) => A
      const handlerB: HandlerB = (a: B): A => {
        return new B
      }
      type HandlerBIntInt = (a: B, b: int, c: int) => B
      const handlerBIntInt: HandlerBIntInt = (a: B, b: int, c: int): B => {
        return new B
      }
      type HandlerNothing = () => C
      const handlerNothing: HandlerNothing = (): C => {
        return new C
      }
    sub_cases_logic:
      - code: |-
            let a: HandlerReq[] = [handlerCInt]
        expected_out: |-
            Semantic error ESE0227: Array element at index 0 with type '((p1: C, p2: Int) => B)' is not compatible with the target array element type '((p1: B, p2: Int) => B)'
      - code: |-
            let a: HandlerReq[] = [handlerBInt]
        expected_out: |-
            Semantic error ESE0227: Array element at index 0 with type '((p1: B, p2: Int) => A)' is not compatible with the target array element type '((p1: B, p2: Int) => B)'
      - code: |-
            let a: HandlerReq[] = [handlerB]
        expected_out: |-
            Semantic error ESE0227: Array element at index 0 with type '((p1: B) => A)' is not compatible with the target array element type '((p1: B, p2: Int) => B)'
      - code: |-
            let a: HandlerReq[] = [handlerBIntInt]
        expected_out: |-
            Semantic error ESE0227: Array element at index 0 with type '((p1: B, p2: Int, p3: Int) => B)' is not compatible with the target array element type '((p1: B, p2: Int) => B)'
      - code: |-
            let a: HandlerReq[] = [handlerNothing]
        expected_out: |-
            Semantic error ESE0227: Array element at index 0 with type '(() => C)' is not compatible with the target array element type '((p1: B, p2: Int) => B)'