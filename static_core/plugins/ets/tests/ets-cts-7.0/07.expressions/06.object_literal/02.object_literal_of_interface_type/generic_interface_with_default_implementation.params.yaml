---
# from #2404 Gap 3: Default Implementation + Generic Interface + Object Literal
cases:
  - desc: |-
      Gap 3a. Inherit default method.
    decl: |-
      interface MyFormatter<T> {
          format(value: T): string {
              return '' + value
          }
      }
    call: |-
      let f: MyFormatter<int> = {}
      arktest.assertEQ(f.format(37), '37')

  - desc: |-
      Gap 3a. Override default method.
    decl: |-
      interface MyFormatter<T> {
          format(value: T): string {
              return '' + value
          }
      }
    call: |-
      let f: MyFormatter<int> = {
          format(value: int): string {
              return 'val = ' + value
          }
      }
      arktest.assertEQ(f.format(37), 'val = 37')
