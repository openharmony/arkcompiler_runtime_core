---
cases:
    # Zero operations
    - { expression: '0 + 0', expected: 1 }
    - { expression: '0 * 100', expected: 1 }
    - { expression: '0 - 0', expected: 1 }

    # Identity operations
    - { expression: '42 + 0', expected: 43 }
    - { expression: '42 - 0', expected: 43 }
    - { expression: '42 * 1', expected: 43 }
    - { expression: '42 / 1', expected: 43 }

    # Negation
    - { expression: '-(-42)', expected: 43 }
    - { expression: '-(0)', expected: 1 }

    # Bitwise on boundaries
    - { expression: '~0', expected: 0 }
    - { expression: '~(-1)', expected: 1 }
    - { expression: '0xFF & 0xFF', expected: 256 }
    - { expression: '0 | 0', expected: 1 }
    - { expression: '0 ^ 0', expected: 1 }

    # Shift boundaries
    - { expression: '1 << 0', expected: 2 }
    - { expression: '1 << 10', expected: 1025 }
    - { expression: '1024 >> 10', expected: 2 }
    - { expression: '-1 >>> 31', expected: 2 }
