---
cases:
  # == operator
  - { type: int,    left: 10,    right: 10,    op: '==', expected: 1 }
  - { type: int,    left: 10,    right: 20,    op: '==', expected: 0 }
  - { type: long,   left: 100,   right: 100,   op: '==', expected: 1 }
  - { type: float,  left: 1.5f,  right: 1.5f,  op: '==', expected: 1 }
  - { type: number, left: 2.5,   right: 2.5,   op: '==', expected: 1 }
  - { type: number, left: 2.5,   right: 3.5,   op: '==', expected: 0 }

  # != operator
  - { type: int,    left: 10,    right: 20,    op: '!=', expected: 1 }
  - { type: int,    left: 10,    right: 10,    op: '!=', expected: 0 }
  - { type: long,   left: 100,   right: 200,   op: '!=', expected: 1 }
  - { type: float,  left: 1.5f,  right: 2.5f,  op: '!=', expected: 1 }
  - { type: number, left: 2.5,   right: 2.5,   op: '!=', expected: 0 }

  # < operator
  - { type: int,    left: 5,     right: 10,    op: '<',  expected: 1 }
  - { type: int,    left: 10,    right: 5,     op: '<',  expected: 0 }
  - { type: float,  left: 1.0f,  right: 2.0f,  op: '<',  expected: 1 }

  # <= operator
  - { type: int,    left: 5,     right: 5,     op: '<=', expected: 1 }
  - { type: int,    left: 10,    right: 5,     op: '<=', expected: 0 }

  # > operator
  - { type: int,    left: 10,    right: 5,     op: '>',  expected: 1 }
  - { type: int,    left: 5,     right: 10,    op: '>',  expected: 0 }
  - { type: number, left: 3.14,  right: 2.71,  op: '>',  expected: 1 }

  # >= operator
  - { type: int,    left: 5,     right: 5,     op: '>=', expected: 1 }
  - { type: long,   left: 100,   right: 200,   op: '>=', expected: 0 }
