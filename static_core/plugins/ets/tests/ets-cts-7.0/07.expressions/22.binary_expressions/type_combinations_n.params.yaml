# List of operations with illegal types per table in chapter 7.22
# Note for &&, || - no illegal types are possible per 15.14.1 Extended Conditional Expressions
operations:
  - op: { sign: "*", name: "mul" }
    pairs:
      - {
        type1: ["byte", "1"], type2: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }
      - {
        type2: ["byte", "1"], type1: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }
      - {
        type1: ["long", "1"], type2: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }
      - {
        type1: ["float", "1"], type2: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }
      - {
        type1: ["double", "1"], type2: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }
      - {
        type1: ["bigint", "1n"], type2: ["boolean", "true"],
        expected_out: "'Semantic error ESE0107: Bad operand type, the types of the operands must be numeric type.'"
      }

  - op: { sign: "/", name: "div" }
