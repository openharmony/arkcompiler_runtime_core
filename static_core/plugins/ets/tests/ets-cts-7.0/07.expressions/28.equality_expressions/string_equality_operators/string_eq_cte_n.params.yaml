---
cases:
    - ltype: 'String'
      lval: '"test0"'
      op: '=='
      rtype: 'Boolean'
      rval: 'true'
      expected_out: |-
        Semantic error ESE0105: Operator '==' cannot be applied to types '\"test0\"' and 'Boolean'.

    - ltype: 'String'
      lval: '"test1"'
      op: '=='
      rtype: 'Byte' 
      rval: '0'
      expected_out: |-
        Semantic error ESE0105: Operator '==' cannot be applied to types '\"test1\"' and 'Byte'.

