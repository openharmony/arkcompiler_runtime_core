# Cross-enum equality tests. Per spec (7_expressions.rst:6739-6740):
#   "Both operands are of enumeration types and have the same numeric value
#    or the same string value."
# The spec does not require same enumeration type.
#
# === and !== compile and work correctly. == and != hit frontend ESE0114 bug.
# Indices 0-7 pass, indices 8-15 fail (listed in ets-cts-ignored.txt).

---
cases:
    # --- strict equality (=== / !==): compile and pass ---

    - desc: "numeric enums, same value 0, Color.Red === Status.OK"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Red === Status.OK)

    - desc: "numeric enums, same value 0, Color.Red === Direction.North"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Direction { North = 0, South = 1 }
      use: |-
          arktest.assertTrue(Color.Red === Direction.North)

    - desc: "numeric enums, different values, Color.Red !== Status.Error"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Red !== Status.Error)
          arktest.assertFalse(Color.Red === Status.Error)

    - desc: "numeric enums, same value 1, Color.Green === Status.Error"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Green === Status.Error)

    - desc: "numeric enums, same value 1, Color.Green === Direction.South"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Direction { North = 0, South = 1 }
      use: |-
          arktest.assertTrue(Color.Green === Direction.South)

    - desc: "string enums, same string A, Letters.Alpha === Tags.X"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Alpha === Tags.X)

    - desc: "string enums, same string B, Letters.Beta === Tags.Y"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Beta === Tags.Y)

    - desc: "string enums, different strings, Letters.Alpha !== Tags.Y"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Alpha !== Tags.Y)
          arktest.assertFalse(Letters.Alpha === Tags.Y)

    # --- loose equality (== / !=): ESE0114 frontend bug, in ignored list ---

    - desc: "numeric enums, same value 0, Color.Red == Status.OK"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Red == Status.OK)

    - desc: "numeric enums, same value 0, Color.Red == Direction.North"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Direction { North = 0, South = 1 }
      use: |-
          arktest.assertTrue(Color.Red == Direction.North)

    - desc: "numeric enums, different values, Color.Red != Status.Error"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Red != Status.Error)
          arktest.assertFalse(Color.Red == Status.Error)

    - desc: "numeric enums, same value 1, Color.Green == Status.Error"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Status { OK = 0, Error = 1 }
      use: |-
          arktest.assertTrue(Color.Green == Status.Error)

    - desc: "numeric enums, same value 1, Color.Green == Direction.South"
      decl: |-
          enum Color { Red, Green, Blue }
          enum Direction { North = 0, South = 1 }
      use: |-
          arktest.assertTrue(Color.Green == Direction.South)

    - desc: "string enums, same string A, Letters.Alpha == Tags.X"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Alpha == Tags.X)

    - desc: "string enums, same string B, Letters.Beta == Tags.Y"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Beta == Tags.Y)

    - desc: "string enums, different strings, Letters.Alpha != Tags.Y"
      decl: |-
          enum Letters { Alpha = "A", Beta = "B" }
          enum Tags { X = "A", Y = "B" }
      use: |-
          arktest.assertTrue(Letters.Alpha != Tags.Y)
          arktest.assertFalse(Letters.Alpha == Tags.Y)
