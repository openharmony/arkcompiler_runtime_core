testData:
  # byte (Byte)
  - {type: "byte", value: "12", format: "-%s", result: "-12", resultType: "int",  desc: "0. Decimal byte value with minus sign."}
  - {type: "Byte", value: "0x1_A", format: "-%s", result: "-0O32", resultType: "int",  desc: "1. Hex Byte (alias) value with minus sign."}
  - {type: "Byte", value: "0o33", format: "-%s", result: "-0B0001_1011", resultType: "int",  desc: "2. Octal Byte (alias) value with minus sign."}
  - {type: "byte", value: "0b11011", format: "-%s", result: "-0X1B", resultType: "int",  desc: "3. Binary byte value with minus sign."}

  - {type: "Byte", value: "0", format: "-%s", result: "0x0", resultType: "int",  desc: "4. Decimal Byte (alias) value (zero) with minus sign."}
  - {type: "byte", value: "0X0", format: "-%s", result: "0", resultType: "int",  desc: "5. Hex byte value (zero) with minus sign."}
  - {type: "byte", value: "0O0", format: "-%s", result: "0b0", resultType: "int",  desc: "6. Octal byte value (zero) with minus sign."}
  - {type: "Byte", value: "0B0", format: "-%s", result: "0o0", resultType: "int",  desc: "7. Binary Byte (alias) value (zero) with minus sign."}

  # short (Short)
  - {type: "Short", value: "1_201", format: "-%s", result: "-1201", resultType: "int",  desc: "8. Decimal Short (alias) value with minus sign."}
  - {type: "short", value: "0X01_Af", format: "-%s", result: "-0o657", resultType: "int",  desc: "9. Hex short value with minus sign."}
  - {type: "short", value: "0O03_37", format: "-%s", result: "-0b11011111", resultType: "int",  desc: "10. Octal short value with minus sign."}
  - {type: "Short", value: "0B0011_0011_0011", format: "-%s", result: "-0x333", resultType: "int",  desc: "11. Binary Short (alias) value with minus sign."}

  - {type: "short", value: "0", format: "-%s", result: "0B0", resultType: "int",  desc: "12. Decimal short value (zero) with minus sign."}
  - {type: "Short", value: "0x000", format: "-%s", result: "0O0", resultType: "int",  desc: "13. Hex Short (alias) value (zero) with minus sign."}
  - {type: "Short", value: "0o0_0", format: "-%s", result: "0X0", resultType: "int",  desc: "14. Octal Short (alias) value (zero) with minus sign."}
  - {type: "short", value: "0b0_0_0_0", format: "-%s", result: "0", resultType: "int",  desc: "15. Binary short value (zero) with minus sign."}

testData2:
  # parentheses
  - {type: "Byte", value: "-120", format: "-(%s)", result: "1_20", resultType: "int",  desc: "0 (16). Negative decimal Byte (alias) value with minus sign and parentheses."}
  - {type: "byte", value: "0x1_B", format: "-(-(-%s))", result: "-0O33", resultType: "int",  desc: "1 (17). Hex byte value with minus sign in parentheses."}
  - {type: "Byte", value: "0o34", format: "-(%s)", result: "-0B0001_1100", resultType: "int",  desc: "2 (18). Octal Byte (alias) value with multi minus sign and parentheses."}
  - {type: "Byte", value: "-0b0_0_0_11", format: "-(+%s)", result: "0B11", resultType: "int",  desc: "3 (19). Negative binary Byte (alias) value with minus sign, parentheses and plus sign"}
  
  - {type: "short", value: "-0o0_1", format: "-(%s)", result: "1", resultType: "int",  desc: "4 (20). Negative octal short value with minus sign and parentheses."}
  - {type: "Short", value: "0b0_0_0_10", format: "-(-(-%s))", result: "-2", resultType: "int",  desc: "5 (21). Binary Short (alias) value with minus sign in parentheses."}
  - {type: "short", value: "0O03_36", format: "-(%s)", result: "-0b11011110", resultType: "int",  desc: "6 (22). Octal short value with multi minus sign and parentheses."}
  - {type: "short", value: "-0X01_Ad", format: "-(+%s)", result: "0o655", resultType: "int",  desc: "7 (23). Negative hex short value with minus sign, parentheses and plus sign"}

  - {type: "byte", value: "7", format: "-(%s + 2)", result: "-0b1001", resultType: "int",  desc: "8 (24). Decimal byte value with minus sign and sum expression."}
  - {type: "short", value: "0X3", format: "-(%s*0x2)", result: "-6", resultType: "int",  desc: "9 (25). Hex short value with minus sign and multiplication expression."}
  - {type: "byte", value: "0o4", format: "-(%s - 0o7)", result: "0x3", resultType: "int",  desc: "10 (26). Octal byte value with minus sign and minus expression."}
  - {type: "short", value: "0B110", format: "-(%s*(0b1-0B11))", result: "0xC", resultType: "int",  desc: "11 (27). Binary short value with minus sign, multiplication and minus expression."}
