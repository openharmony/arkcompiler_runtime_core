    - src_type: float
      src_val: '1.0f'
      supertypes: [Any, Object, Numeric, Float]

    - src_type: double
      src_val: '1.0'
      supertypes: [Any, Object, Numeric, Double]

    - src_type: Enum_int
      src_val: Enum_int.Blue
