---
cases:
    - type: byte
      value: 127 as byte
      union_type_pos: short|int|float|byte
      union_type_neg: Short|Double|long|short

    - type: Byte
      value: new Byte(-127 as byte)
      union_type_pos: short|int|byte|long|Double
      union_type_neg: short|int|Double

    - type: short
      value: 32767 as short
      union_type_pos: short|int|Float
      union_type_neg: byte|long|Double

    - type: Short
      value: new Short(-32767 as short)
      union_type_pos: short|byte|long|Double
      union_type_neg: int|Float|byte|long|Double

    - type: int
      value: '-32769'
      union_type_pos: short|int|double
      union_type_neg: short|Float|byte|long|Double

    - type: Int
      value: new Int(32769)
      union_type_pos: char|int|Float|byte|long|Double
      union_type_neg: long|Double

    - type: long
      value: 2147483648 as long
      union_type_pos: byte|long|Double
      union_type_neg: short|int|Float|byte|Double

    - type: Long
      value: new Long(-2147483648 as long)
      union_type_pos: Short|int|Long
      union_type_neg: Float|Double

    - type: float
      value: 1.1e11f
      union_type_pos: int|Float|byte|long|Double
      union_type_neg: short|int|byte|long|Double

    - type: Float
      value: new Float(-0.1e11f)
      union_type_pos: short|int|Float|byte
      union_type_neg: Short|int|byte|long|Double

    - type: double
      value: '0.0001'
      union_type_pos: short|Double
      union_type_neg: short|int|Float|byte|long

    - type: Double
      value: new Double(-0.0001)
      union_type_pos: short|byte|long|Double
      union_type_neg: short|int|Float|byte|long
