---
cases:
    - type: byte
      value: 127 as byte

    - type: Byte
      value: new Byte(-127 as byte)

    - type: short
      value: 32767 as short

    - type: Short
      value: new Short(-32767 as short)

    - type: int
      value: '-32769'

    - type: Int
      value: new Int(32769)

    - type: long
      value: 2147483648 as long

    - type: Long
      value: new Long(-2147483648 as long)

    - type: float
      value: 1.1e11f

    - type: Float
      value: new Float(-0.1e11f)

    - type: double
      value: '0.0001'

    - type: Double
      value: new Double(-0.0001)

    - type: boolean
      value: 'true'

    - type: Boolean
      value: new Boolean(false)

    - type: char
      value: c'A'

    - type: Char
      value: new Char(c'B')
