---
cases:
    # cast from char to numeric

    - dst_type: int
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Int' can throw 'ClassCastError' exception at runtime

    - dst_type: byte
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Byte' can throw 'ClassCastError' exception at runtime

    - dst_type: short
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Short' can throw 'ClassCastError' exception at runtime

    - dst_type: long
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Long' can throw 'ClassCastError' exception at runtime

    - dst_type: float
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Float' can throw 'ClassCastError' exception at runtime

    - dst_type: double
      src_type: char
      src_val: c'A'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Char' to 'Double' can throw 'ClassCastError' exception at runtime

    # cast from boolean to numeric

    - dst_type: int
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Int' can throw 'ClassCastError' exception at runtime

    - dst_type: byte
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Byte' can throw 'ClassCastError' exception at runtime

    - dst_type: short
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Short' can throw 'ClassCastError' exception at runtime

    - dst_type: long
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Long' can throw 'ClassCastError' exception at runtime

    - dst_type: float
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Float' can throw 'ClassCastError' exception at runtime

    - dst_type: double
      src_type: boolean
      src_val: 'true'
      expected_out: |-
          Warning W0326: Attempting to cast type 'Boolean' to 'Double' can throw 'ClassCastError' exception at runtime

    # cast from string to numeric

    - dst_type: int
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Int' can throw 'ClassCastError' exception at runtime

    - dst_type: byte
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Byte' can throw 'ClassCastError' exception at runtime

    - dst_type: short
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Short' can throw 'ClassCastError' exception at runtime

    - dst_type: long
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Long' can throw 'ClassCastError' exception at runtime

    - dst_type: float
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Float' can throw 'ClassCastError' exception at runtime

    - dst_type: double
      src_type: string
      src_val: "'0'"
      expected_out: |-
          Warning W0326: Attempting to cast type 'String' to 'Double' can throw 'ClassCastError' exception at runtime

    # cast from string enum to numeric

    - dst_type: byte
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Byte' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }

    - dst_type: short
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Short' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }

    - dst_type: int
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Int' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }

    - dst_type: long
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Long' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }

    - dst_type: float
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Float' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }

    - dst_type: double
      src_type: Enum
      src_val: Enum.Red
      expected_out: |-
          Warning W0326: Attempting to cast type 'Enum' to 'Double' can throw 'ClassCastError' exception at runtime
      decl: |-
          enum Enum { Red = 'r', Green = 'g', Blue = 'b' }
