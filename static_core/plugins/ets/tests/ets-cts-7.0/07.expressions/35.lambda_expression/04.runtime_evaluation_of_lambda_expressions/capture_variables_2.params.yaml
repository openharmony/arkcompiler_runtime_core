--- # Cases for variable captures
cases:

  - outer: "c'a'"
    expression: outer = c'b'
    expected: "c'b'"

  - outer: "true"
    expression: outer = !outer
    expected: "false"

  - outer: 1
    expression: outer++
    expected: 2

  - outer: 1.0f
    expression: outer = 3.14f
    expected: 3.14f

  - outer: 1.0
    expression: outer = 3.14
    expected: 3.14

  - outer: "'1'"
    expression: outer = outer + outer
    expected: "'11'"

  - outer: ByteEnum.A
    expression: outer = ByteEnum.B
    expected: ByteEnum.B

  - outer: Color.Red
    expression: outer = Color.Green
    expected: Color.Green

  - outer: 0x8000_0000
    expression: outer = outer + 256
    expected: 0x8000_0100

  - outer: "bv"
    expression: outer++
    expected: 13

  - outer: "sv"
    expression: outer++
    expected: 1235

  - outer: "lv"
    expression: outer = outer + 10
    expected: 12345678910

  - outer: "ln"
    expression: outer = 3.14
    expected: 3.14
