--- # List of operations from table in chapter 7.22, every entry corresponds to line in table
table_lines:
  - operator: [{sign: "+", name: "add"}]
    decl: |-
      class Cls {}
      enum EAB {A, B}
      enum ES {a = "0", b = "1"}
      enum EN {a = 0, b = 1}
      function foo() {}
    type1: [{t: "string", i: "'1'"}]
    type2: [{t: "byte", i: "1"}, {t: "short", i: "1"}, {t: "int", i: "1"}, {t: "long", i: "1"}, {t: "float", i: "1"},
            {t: "double", i: "1"}, {t: "bigint", i: "1n"}, {t: "boolean", i: "true"}, {t: "char", i: "c'0'"},
            {t: "string", i: "'1'"}, {t: "Cls", i: "new Cls"}, {t: "EAB", i: "EAB.A"}, {t: "ES", i: "ES.a"},
            {t: "EN", i: "EN.a"}, {t: "()=>void", i: "foo"}, {t: "null", i: "null"}, {t: "undefined", i: "undefined"}]
    result_type: "string"

  - operator: [ { sign: "<", name: "less" }, { sign: "<=", name: "leq" }, { sign: ">", name: "greater" }, { sign: ">=", name: "geq" } ]
    type1: [{t: "string", i: "'1'"}, {t: "'1'", i: "'1'"}]
    type2: [{t: "string", i: "'1'"}, {t: "'1'", i: "'1'"}]
    result_type: "boolean"

  - operator: [ { sign: "<", name: "less1" }, { sign: "<=", name: "leq1" }, { sign: ">", name: "greater1" }, { sign: ">=", name: "geq1" } ]
    decl: |-
      enum EAB {A, B}
    type1: [{t: "EAB", i: "EAB.A"}]
    type2: [{t: "EAB", i: "EAB.B"}]
    result_type: "boolean"

  - operator: [ { sign: "<", name: "less2" }, { sign: "<=", name: "leq2" }, { sign: ">", name: "greater2" }, { sign: ">=", name: "geq2" } ]
    decl: |-
      enum EN {a = 0, b = 1}
    type1: [{t: "EN", i: "EN.a"}]
    type2: [{t: "EN", i: "EN.b"}]
    result_type: "boolean"

  - operator: [ { sign: "<", name: "less3" }, { sign: "<=", name: "leq3" }, { sign: ">", name: "greater3" }, { sign: ">=", name: "geq3" } ]
    decl: |-
      enum ES {a = "0", b = "1"}
    type1: [{t: "ES", i: "ES.a"}]
    type2: [{t: "ES", i: "ES.b"}]
    result_type: "boolean"

  - operator: [ { sign: "<", name: "less4" }, { sign: "<=", name: "leq4" }, { sign: ">", name: "greater4" }, { sign: ">=", name: "geq4" } ]
    type1: [{t: "boolean", i: "true"}]
    type2: [{t: "boolean", i: "false"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq" }, { sign: "!=", name: "neq" }, { sign: "===", name: "eq_ext" }, { sign: "!==", name: "neq_ext" } ]
    type1: [{t: "string", i: "'1'"}, {t: "'1'", i: "'1'"}]
    type2: [{t: "string", i: "'1'"}, {t: "'1'", i: "'1'"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq1" }, { sign: "!=", name: "neq1" }, { sign: "===", name: "eq_ext1" }, { sign: "!==", name: "neq_ext1" } ]
    type1: [{t: "boolean", i: "true"}]
    type2: [{t: "boolean", i: "false"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq2" }, { sign: "!=", name: "neq2" }, { sign: "===", name: "eq_ext2" }, { sign: "!==", name: "neq_ext2" } ]
    type1: [{t: "char", i: "c'0'"}]
    type2: [{t: "char", i: "c'1'"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq3" }, { sign: "!=", name: "neq3" }, { sign: "===", name: "eq_ext3" }, { sign: "!==", name: "neq_ext3" } ]
    decl: |-
      enum EAB {A, B}
    type1: [{t: "EAB", i: "EAB.A"}]
    type2: [{t: "EAB", i: "EAB.B"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq4" }, { sign: "!=", name: "neq4" }, { sign: "===", name: "eq_ext4" }, { sign: "!==", name: "neq_ext4" } ]
    decl: |-
      enum ES {a = "0", b = "1"}
    type1: [{t: "ES", i: "ES.a"}]
    type2: [{t: "ES", i: "ES.b"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq5" }, { sign: "!=", name: "neq5" }, { sign: "===", name: "eq_ext5" }, { sign: "!==", name: "neq_ext5" } ]
    decl: |-
      enum EN {a = 0, b = 1}
    type1: [{t: "EN", i: "EN.a"}]
    type2: [{t: "EN", i: "EN.b"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq6" }, { sign: "!=", name: "neq6" }, { sign: "===", name: "eq_ext6" }, { sign: "!==", name: "neq_ext6" } ]
    decl: |-
      function foo1() {}
      function foo2() {}
      type foo_type = () => void
    type1: [{t: "foo_type", i: "foo1"}, {t: "foo_type", i: "foo2"}]
    type2: [{t: "foo_type", i: "foo1"}, {t: "foo_type", i: "foo2"}]
    result_type: "boolean"

  - operator: [ { sign: "==", name: "eq7" }, { sign: "!=", name: "neq7" }, { sign: "===", name: "eq_ext7" }, { sign: "!==", name: "neq_ext7" } ]
    decl: |-
      function foo1() {}
      function foo2() {}
      type foo_type = () => void
    type1: [{t: "null", i: "null"}, {t: "undefined", i: "undefined"}]
    type2: [{t: "null", i: "null"}, {t: "undefined", i: "undefined"}]
    result_type: "boolean"

  - operator: [ { sign: "&", name: "and_bit" }, { sign: "^", name: "xor" }, { sign: "|", name: "or_bit" } ]
    type1: [{t: "boolean", i: "true"}]
    type2: [{t: "boolean", i: "false"}]
    result_type: "boolean"

