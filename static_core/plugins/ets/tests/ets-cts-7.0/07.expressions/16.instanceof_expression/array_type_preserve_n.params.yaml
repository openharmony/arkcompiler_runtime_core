---
cases:


    # G6 Fixed Array with nested non-preserved type
    - expr: |-
          let a: FixedArray<Array<Int>> = [[1, 2], [3, 4], [5,6]]
          let t = pass(a) instanceof FixedArray<Array<Int>>
    - expr: |-
          let a: FixedArray<Array<string>> = [["one", "two"]]
          let t = pass(a) instanceof FixedArray<Array<string>>
    - expr: |-
          let a: FixedArray<(p: number) => void> = [(p: number) => {}, (p: number) => {}]
          let t = pass(a) instanceof FixedArray<(p: number) => void>
    - expr: |-
          let a: FixedArray<[int, string, boolean]> = [[0, "0", false], [1, "1", true]]
          let t = pass(a) instanceof FixedArray<[int, string, boolean]>


