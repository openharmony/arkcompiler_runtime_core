---
cases:
  - decl: |-
      class C {}
      class D extends C {}
    check: |-
      let d: D = new D()
      arktest.assertTrue(d instanceof C)
    # TODO: replace WXXXXX with real warning code when defined
    expected: 'Warning WXXXXX: expression is always true'

  - decl: |-
      class C {}
      class D extends C {}
      class E {}
    check: |-
      let d: D = new D()
      arktest.assertFalse(d instanceof E)
    # TODO: replace WXXXXX with real warning code when defined
    expected: 'Warning WXXXXX: expression is always false'

  - decl: |-
      interface I {}
      class D implements I {}
    check: |-
      let d: D = new D()
      arktest.assertTrue(d instanceof I)
    # TODO: replace WXXXXX with real warning code when defined
    expected: 'Warning WXXXXX: expression is always true'

  - decl: |-
      class D {}
    check: |-
      let d: D = new D()
      arktest.assertTrue(d instanceof D)
    # TODO: replace WXXXXX with real warning code when defined
    expected: 'Warning WXXXXX: expression is always true'

  - decl: |-
      class A {}
      class B extends A {}
      class C extends B {}
    check: |-
      let c: C = new C()
      arktest.assertTrue(c instanceof A)
    # TODO: replace WXXXXX with real warning code when defined
    expected: 'Warning WXXXXX: expression is always true'
