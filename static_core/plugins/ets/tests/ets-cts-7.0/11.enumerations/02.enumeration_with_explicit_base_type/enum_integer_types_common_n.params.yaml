cases:
  - desc: |-
      >-
        A compile-time error occurs in the following situations:
        • Type of explicit member initializer is not assignable (see Assignability) to the base type
        params: wrong init type
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first = 1.2 }
      - |-
        enum Enum: [check_type] { first = 1.2f }
      - |-
        enum Enum: [check_type] { first = "abc" }
      - |-
        enum Enum: [check_type] { first = false }
    stdout:
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
    test_suffix: "wit"

  - desc: |-
      >-
        A compile-time error occurs in the following situations:
        • Type of explicit member initializer is not assignable (see Assignability) to the base type
        params: mixing of types
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first = 1, second = "abc" }
      - |-
        enum Enum: [check_type] { first = "abc", second = 1 }
    stdout:
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
    test_suffix: "mot"

  - desc: |-
      >-
        A compile-time error occurs in the following situations:
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type.
        params: out of range
    check_variants:
      - {check_type: "long", c_value: "9223372036854775808"}
      - {check_type: "int", c_value: "2147483648"}
      - {check_type: "short", c_value: "32768"}
      - {check_type: "byte", c_value: "128"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first, second, third = [c_value] }
    stdout:
      - |-
        "Expected CTE output is unknown"
    test_suffix: "oor"

  - desc: |-
      >-
        A compile-time error occurs in the following situations:
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type.
        params: not assignable value type
    check_variants:
      - {check_type: "int", init_value_type: "long", c_value: "1"}
      - {check_type: "short", init_value_type: "int", c_value: "1"}
      - {check_type: "byte", init_value_type: "short", c_value: "1"}
    decl_variants:
      - |-
        const c: [init_value_type] = [c_value]
        enum Enum: [check_type] { first, second, third = c }
      - |-
        let c: [init_value_type] = [c_value]
        enum Enum: [check_type] { first, second, third = c }
      - |-
        enum Enum: [check_type] { first, second, third = [c_value] as [init_value_type] }
    stdout:
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
    test_suffix: "navt"

  - desc: |-
      Same enumeration type name
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Color: [check_type] { Red, Green, Blue }
        enum Color: [check_type] { Red, Green, Blue }
    stdout:
      - |-
        "Semantic error ESE0351: Variable 'Color' has already been declared."
    test_suffix: "setn"

  - desc: |-
      Wrong type
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Enum1: [check_type] { first = 42, second }
        enum Enum2: [check_type] { first = 42, second }
    logic: |-
      let v: Enum2 = Enum1.first
    stdout:
      - |-
        "Semantic error ESE0318: Type 'Enum1' cannot be assigned to type 'Enum2'"
    test_suffix: "wt"

  - desc: |-
      Modifying const variable of enum type
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Enum: [check_type] { first = 1, second = 3, third = 5 }
        const e: Enum = Enum.first
      - |-
        enum Enum: [check_type] { first = 1, second = 3, third = 5 }
        const e = Enum.first
    logic: |-
      e = Enum.second
    stdout:
      - |-
        "Semantic error ESE4001: Cannot assign to a constant variable e"
      - |-
        "Semantic error ESE4001: Cannot assign to a constant variable e"
    test_suffix: "mcvoet"

  - desc: |-
      >-
        If a variable has no default value, then its value must be set
        by the Simple Assignment Operator before any use of the variable.
        params: using variable of enum type before it is initialized
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Color: [check_type] { Red = 1, Green = 3, Blue = 5 }
    logic: |-
      let v: Color
      arktest.assertTrue(v instanceof Color)
    stdout:
      - |-
        "Semantic error ESE0375: Variable 'v' is used before being assigned."
    test_suffix: "uvoet"

  - desc: |-
      >-
        A constant declaration introduces a named variable with a mandatory
        explicit value.
        params: const enum variable without initializer
    check_variants:
      - {check_type: "long"}
      - {check_type: "int"}
      - {check_type: "short"}
      - {check_type: "byte"}
    decl_variants:
      - |-
        enum Color: [check_type] { Red = 1, Green = 3, Blue = 5 }
    logic: |-
      const v: Color
    stdout:
      - |-
        "Semantic error ESE0363: Missing initializer in const declaration"
    test_suffix: "cevwi"
