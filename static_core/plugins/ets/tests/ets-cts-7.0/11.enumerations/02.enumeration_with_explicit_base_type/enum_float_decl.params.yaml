cases:
  - desc: |-
      >-
        Enumeration base type can be set explicitly.
        A compile-time error occurs in the following situations:
        • Explicit type is different from any numeric or string type.
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type;
        • Enumeration member has no explicit initializer and the base type
        is not an integer type (see Initialization of Enumeration Members).
    params: |-
      all float enum members values should be set explicitly
    decl_variants:
      - |-
        enum Color: float { Red = 1.1f, Green = 1.2f, Blue = 1.3f }
        enum Color2: float { Red = 1.1f, Green = 1.2f, Blue = 1.3f }
    sub_cases_logic:
      - |-
        let r: Color = Color.Red
        let g: Color = Color.Green
        let b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r, 1.1f)
        arktest.assertEQ(g, 1.2f)
        arktest.assertEQ(b, 1.3f)
      - |-
        let r = Color.Red
        let g = Color.Green
        let b = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r, 1.1f)
        arktest.assertEQ(g, 1.2f)
        arktest.assertEQ(b, 1.3f)
      - |-
        arktest.assertTrue(Color.Red instanceof Color)
        arktest.assertTrue(Color.Green instanceof Color)
        arktest.assertTrue(Color.Blue instanceof Color)
        arktest.assertFalse(Color.Red instanceof Color2)
        arktest.assertFalse(Color.Green instanceof Color2)
        arktest.assertFalse(Color.Blue instanceof Color2)
        arktest.assertTrue(Color.Red.valueOf() instanceof float)
        arktest.assertTrue(Color.Green.valueOf() instanceof float)
        arktest.assertTrue(Color.Blue.valueOf() instanceof float)
        arktest.assertEQ(Color.Red, 1.1f)
        arktest.assertEQ(Color.Green, 1.2f)
        arktest.assertEQ(Color.Blue, 1.3f)
    test_suffix: "afemvsbse"

  - desc: |-
      >-
        Enumeration base type can be set explicitly.
        A compile-time error occurs in the following situations:
        • Explicit type is different from any numeric or string type.
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type;
        • Enumeration member has no explicit initializer and the base type
        is not an integer type (see Initialization of Enumeration Members).
    params: |-
      >-
        types of all initializer expressions are assignable to enum base type,
        using different integer literals
    decl_variants:
      - |-
        enum Enum: float { first = 0b0011, second = 0o731,
          third = 0xCAFE_BAD3_7FFF, fourth = 9_372_036_854_775_805 }
    sub_cases_logic:
      - |-
        const v1: float = 0b0011
        const v2: float = 0o731
        const v3: float = 0xCAFE_BAD3_7FFF
        const v4: float = 9_372_036_854_775_805
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.fourth instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof float)
        arktest.assertTrue(Enum.second.valueOf() instanceof float)
        arktest.assertTrue(Enum.third.valueOf() instanceof float)
        arktest.assertTrue(Enum.fourth.valueOf() instanceof float)
        arktest.assertEQ(Enum.first.valueOf(), v1)
        arktest.assertEQ(Enum.second.valueOf(), v2)
        arktest.assertEQ(Enum.third.valueOf(), v3)
        arktest.assertEQ(Enum.fourth.valueOf(), v4)
    test_suffix: "udil"

  - desc: |-
