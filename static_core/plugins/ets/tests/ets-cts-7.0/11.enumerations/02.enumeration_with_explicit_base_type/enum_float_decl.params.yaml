  - desc: |-
      Checking in switch statement
    params: ""
    decl_variants:
      - |-
        enum Color: float { Red = 5.7f, Green = 7.8f, Blue = -53.2f }

        function check_switch(v: Color): string {
          let res: string = ""
          switch (v) {
            case Color.Red:
              arktest.assertTrue(v instanceof Color)
              arktest.assertTrue(v.valueOf() instanceof float)
              arktest.assertEQ(v.valueOf(), 5.7f)
              res = "red"
              break
            case Color.Green:
              arktest.assertTrue(v instanceof Color)
              arktest.assertTrue(v.valueOf() instanceof float)
              arktest.assertEQ(v.valueOf(), 7.8f)
              res = "green"
              break
            case Color.Blue:
              arktest.assertTrue(v instanceof Color)
              arktest.assertTrue(v.valueOf() instanceof float)
              arktest.assertEQ(v.valueOf(), -53.2f)
              res = "blue"
              break
            default:
              arktest.assertTrue(false, "shouldn't be execute")
          }
          return res
        }
    sub_cases_logic:
      - |-
        arktest.assertEQ(check_switch(Color.Red), "red")
        arktest.assertEQ(check_switch(Color.Green), "green")
        arktest.assertEQ(check_switch(Color.Blue), "blue")
    test_suffix: "ciss"

  - desc: |-
      Checking const variables of enum type
    params: ""
    decl_variants:
      - |-
        enum Color: float { Red = 5.7f, Green = 7.8f, Blue = -53.2f }
        enum Color2: float { Red = 5.7f, Green = 7.8f, Blue = -53.2f }

        // Checks access to common union member
        function get_value(v: Color | Color2): float {
          return v.valueOf()
        }

        // Checks that equality expression use the actual type of operand
        function get_name(v: Any): string {
          if (v == Color.Red) {
            return "red"
          }
          else if (v == Color.Green) {
            return "green"
          }
          else if (v == Color.Blue) {
            return "blue"
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return ""
          }
        }

        // Used for checking that value is unchanged outside after
        // changing value inside function
        function change_value(v: Color): void {
          if (v == Color.Red) {
            v = Color.Green
          }
          else if (v == Color.Green) {
            v = Color.Blue
          }
          else if (v == Color.Blue) {
            v = Color.Red
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
          }
        }

        // Used for checking enum member in runtime
        function get_enum_member(v: string): Color {
          if (v == "red") {
            return Color.Red
          }
          else if (v == "green") {
            return Color.Green
          }
          else if (v == "blue") {
            return Color.Blue
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return Color.Red
          }
        }
    sub_cases_logic:
      - |-
        const r: Color = Color.Red
        const g: Color = Color.Green
        const b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
        arktest.assertEQ(get_value(r), 5.7f)
        arktest.assertEQ(get_value(g), 7.8f)
        arktest.assertEQ(get_value(b), -53.2f)
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
      - |-
        const r = Color.Red
        const g = Color.Green
        const b = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
        arktest.assertEQ(get_value(r), 5.7f)
        arktest.assertEQ(get_value(g), 7.8f)
        arktest.assertEQ(get_value(b), -53.2f)
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
      - |-
        const r = get_enum_member("red")
        const g = get_enum_member("green")
        const b = get_enum_member("blue")
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
        arktest.assertEQ(get_value(r), 5.7f)
        arktest.assertEQ(get_value(g), 7.8f)
        arktest.assertEQ(get_value(b), -53.2f)
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
        arktest.assertEQ(b.valueOf(), -53.2f)
    test_suffix: "ccvoet"

  - desc: |-
      >-
        Checking variables of enum type.
        If a variable has no default value, then its value must be set
        by the Simple Assignment Operator before any use of the variable.
    params: ""
    decl_variants:
      - |-
        enum Color: float { Red = 5.7f, Green = 7.8f, Blue = -53.2f }
        enum Color2: float { Red = 5.7f, Green = 7.8f, Blue = -53.2f }

        // Checks access to common union member
        function get_value(v: Color | Color2): float {
          return v.valueOf()
        }

        // Checks that equality expression use the actual type of operand
        function get_name(v: Any): string {
          if (v == Color.Red) {
            return "red"
          }
          else if (v == Color.Green) {
            return "green"
          }
          else if (v == Color.Blue) {
            return "blue"
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return ""
          }
        }

        // Used for checking that value is unchanged outside after
        // changing value inside function
        function change_value(v: Color): void {
          if (v == Color.Red) {
            v = Color.Green
          }
          else if (v == Color.Green) {
            v = Color.Blue
          }
          else if (v == Color.Blue) {
            v = Color.Red
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
          }
        }

        // Used for checking enum member in runtime
        function get_enum_member(v: string): Color {
          if (v == "red") {
            return Color.Red
          }
          else if (v == "green") {
            return Color.Green
          }
          else if (v == "blue") {
            return Color.Blue
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return Color.Red
          }
        }
    sub_cases_logic:
      - |-
        let r: Color = Color.Red
        let g: Color = Color.Green
        let b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof float)
        arktest.assertTrue(g.valueOf() instanceof float)
        arktest.assertTrue(b.valueOf() instanceof float)
        arktest.assertEQ(r.valueOf(), 5.7f)
        arktest.assertEQ(g.valueOf(), 7.8f)
