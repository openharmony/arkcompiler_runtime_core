        arktest.assertTrue(Enum.E.valueOf() instanceof float)
        arktest.assertEQ(Enum.A.valueOf(), v1)
        arktest.assertEQ(Enum.B.valueOf(), v2)
        arktest.assertEQ(Enum.C.valueOf(), v3)
        arktest.assertEQ(Enum.D.valueOf(), v4)
        arktest.assertEQ(Enum.E.valueOf(), v5)
    test_suffix: "udfpl"

