  - desc: |-
      Using in string operator contexts
    params: ""
    decl_variants:
      - |-
        enum Color: string { Red = "red", Green = "green", Blue = "blue" }
        function foo(p: string): boolean {
          return p == "blue"
        }
    sub_cases_logic:
      - |-
        arktest.assertEQ(foo(Color.Red), false)
        arktest.assertEQ(foo(Color.Blue), true)
    test_suffix: "uisoc3"

  - desc: |-
      Checking multiline enum member values support
    params: ""
    decl_variants:
      - |-
        enum Template: string {
          t1 = "Line 1\nLine 2",
          t2 = "Line 3\nLine 4"
        }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Template.t1 instanceof Template)
        arktest.assertTrue(Template.t2 instanceof Template)
        arktest.assertTrue(Template.t1.valueOf() instanceof string)
        arktest.assertTrue(Template.t2.valueOf() instanceof string)
        arktest.assertEQ(Template.t1.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Template.t2.valueOf(), "Line 3\nLine 4")
        arktest.assertEQ(Template.t1.toString(), "Line 1\nLine 2")
        arktest.assertEQ(Template.t2.toString(), "Line 3\nLine 4")
        let v1: string = Template.t1
        let v2: string = Template.t2
        arktest.assertEQ(v1, "Line 1\nLine 2")
        arktest.assertEQ(v2, "Line 3\nLine 4")
    test_suffix: "cmemvs"

  - desc: |-
      Checking in switch statement
    params: ""
    decl_variants:
      - |-
        enum Enum: string { e1 = "A", e2 = "B", e3 = "C" }

        function check_switch(v: Enum): string {
          let res: string = ""
          switch (v) {
            case Enum.e1:
              arktest.assertTrue(v instanceof Enum)
              arktest.assertTrue(v.valueOf() instanceof string)
              arktest.assertEQ(v.valueOf(), "A")
              res = "A"
              break
            case Enum.e2:
              arktest.assertTrue(v instanceof Enum)
              arktest.assertTrue(v.valueOf() instanceof string)
              arktest.assertEQ(v.valueOf(), "B")
              res = "B"
              break
            case Enum.e3:
              arktest.assertTrue(v instanceof Enum)
              arktest.assertTrue(v.valueOf() instanceof string)
              arktest.assertEQ(v.valueOf(), "C")
              res = "C"
              break
            default:
              arktest.assertTrue(false, "shouldn't be execute")
          }
          return res
        }
    sub_cases_logic:
      - |-
        arktest.assertEQ(check_switch(Enum.e1), "A")
        arktest.assertEQ(check_switch(Enum.e2), "B")
        arktest.assertEQ(check_switch(Enum.e3), "C")
    test_suffix: "ciss"

  - desc: |-
      Checking const variable of enum type
    params: ""
    decl_variants:
      - |-
        enum Color: string { Red = "700", Green = "500", Blue = "400" }
        enum Color2: string { Red = "700", Green = "500", Blue = "400" }

        // Checks access to common union member
        function get_value(v: Color | Color2): string {
          return v.valueOf()
        }

        // Checks that equality expression use the actual type of operand
        function get_name(v: Any): string {
          if (v == Color.Red) {
            return "red"
          }
          else if (v == Color.Green) {
            return "green"
          }
          else if (v == Color.Blue) {
            return "blue"
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return ""
          }
        }

        // Used for checking that value is unchanged outside after
        // changing value inside function
        function change_value(v: Color): void {
          if (v == Color.Red) {
            v = Color.Green
          }
          else if (v == Color.Green) {
            v = Color.Blue
          }
          else if (v == Color.Blue) {
            v = Color.Red
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
          }
        }

        // Used for checking enum member in runtime
        function get_enum_member(v: string): Color {
          if (v == "red") {
            return Color.Red
          }
          else if (v == "green") {
            return Color.Green
          }
          else if (v == "blue") {
            return Color.Blue
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return Color.Red
          }
        }
    sub_cases_logic:
      - |-
        const r: Color = Color.Red
        const g: Color = Color.Green
        const b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
        arktest.assertEQ(get_value(r), "700")
        arktest.assertEQ(get_value(g), "500")
        arktest.assertEQ(get_value(b), "400")
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
      - |-
        const r = Color.Red
        const g = Color.Green
        const b = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
        arktest.assertEQ(get_value(r), "700")
        arktest.assertEQ(get_value(g), "500")
        arktest.assertEQ(get_value(b), "400")
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
      - |-
        const r = get_enum_member("red")
        const g = get_enum_member("green")
        const b = get_enum_member("blue")
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
        arktest.assertEQ(get_value(r), "700")
        arktest.assertEQ(get_value(g), "500")
        arktest.assertEQ(get_value(b), "400")
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
    test_suffix: "ccvoet"

  - desc: |-
      >-
        Checking variables of enum type.
        If a variable has no default value, then its value must be set
        by the Simple Assignment Operator before any use of the variable.
    params: ""
    decl_variants:
      - |-
        enum Color: string { Red = "700", Green = "500", Blue = "400" }
        enum Color2: string { Red = "700", Green = "500", Blue = "400" }

        // Checks access to common union member
        function get_value(v: Color | Color2): string {
          return v.valueOf()
        }

        // Checks that equality expression use the actual type of operand
        function get_name(v: Any): string {
          if (v == Color.Red) {
            return "red"
          }
          else if (v == Color.Green) {
            return "green"
          }
          else if (v == Color.Blue) {
            return "blue"
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return ""
          }
        }

        // Used for checking that value is unchanged outside after
        // changing value inside function
        function change_value(v: Color): void {
          if (v == Color.Red) {
            v = Color.Green
          }
          else if (v == Color.Green) {
            v = Color.Blue
          }
          else if (v == Color.Blue) {
            v = Color.Red
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
          }
        }

        // Used for checking enum member in runtime
        function get_enum_member(v: string): Color {
          if (v == "red") {
            return Color.Red
          }
          else if (v == "green") {
            return Color.Green
          }
          else if (v == "blue") {
            return Color.Blue
          }
          else {
            arktest.assertTrue(false, "shouldn't be execute")
            return Color.Red
          }
        }
    sub_cases_logic:
      - |-
        let r: Color = Color.Red
        let g: Color = Color.Green
        let b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
        arktest.assertEQ(get_value(r), "700")
        arktest.assertEQ(get_value(g), "500")
        arktest.assertEQ(get_value(b), "400")
        arktest.assertEQ(get_name(r), "red")
        arktest.assertEQ(get_name(g), "green")
        arktest.assertEQ(get_name(b), "blue")
        change_value(r)
        change_value(g)
        change_value(b)
        arktest.assertEQ(r.valueOf(), "700")
        arktest.assertEQ(g.valueOf(), "500")
        arktest.assertEQ(b.valueOf(), "400")
        r = Color.Blue
        g = Color.Red
        b = Color.Green
        arktest.assertEQ(r.valueOf(), "400")
        arktest.assertEQ(g.valueOf(), "700")
        arktest.assertEQ(b.valueOf(), "500")
        arktest.assertEQ(get_value(r), "400")
        arktest.assertEQ(get_value(g), "700")
        arktest.assertEQ(get_value(b), "500")
        arktest.assertEQ(get_name(r), "blue")
