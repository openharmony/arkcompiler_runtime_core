        let e3 = Enum.third
        arktest.assertTrue(e1 instanceof Enum)
        arktest.assertTrue(e2 instanceof Enum)
        arktest.assertTrue(e3 instanceof Enum)
        arktest.assertTrue(e1.valueOf() instanceof string)
        arktest.assertTrue(e2.valueOf() instanceof string)
        arktest.assertTrue(e3.valueOf() instanceof string)
