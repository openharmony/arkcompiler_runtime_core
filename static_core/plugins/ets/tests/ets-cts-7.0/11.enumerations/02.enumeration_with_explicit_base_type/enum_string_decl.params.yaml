cases:
  - desc: |-
      >-
        Enumeration base type can be set explicitly.
        A compile-time error occurs in the following situations:
        • Explicit type is different from any numeric or string type.
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type;
        • Enumeration member has no explicit initializer and the base type
        is not an integer type (see Initialization of Enumeration Members).
    params: |-
      all string enum members values should be set explicitly
    decl_variants:
      - |-
        enum Color: string { Red = "Value 1", Green = "Value 2", Blue = "Value 3" }
        enum Color2: string { Red = "Value 1", Green = "Value 2", Blue = "Value 3" }
    sub_cases_logic:
      - |-
        let r: Color = Color.Red
        let g: Color = Color.Green
        let b: Color = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r, "Value 1")
        arktest.assertEQ(g, "Value 2")
        arktest.assertEQ(b, "Value 3")
      - |-
        let r = Color.Red
        let g = Color.Green
        let b = Color.Blue
        arktest.assertTrue(r instanceof Color)
        arktest.assertTrue(g instanceof Color)
        arktest.assertTrue(b instanceof Color)
        arktest.assertFalse(r instanceof Color2)
        arktest.assertFalse(g instanceof Color2)
        arktest.assertFalse(b instanceof Color2)
        arktest.assertTrue(r.valueOf() instanceof string)
        arktest.assertTrue(g.valueOf() instanceof string)
        arktest.assertTrue(b.valueOf() instanceof string)
        arktest.assertEQ(r, "Value 1")
        arktest.assertEQ(g, "Value 2")
        arktest.assertEQ(b, "Value 3")
      - |-
        arktest.assertTrue(Color.Red instanceof Color)
        arktest.assertTrue(Color.Green instanceof Color)
        arktest.assertTrue(Color.Blue instanceof Color)
        arktest.assertFalse(Color.Red instanceof Color2)
        arktest.assertFalse(Color.Green instanceof Color2)
        arktest.assertFalse(Color.Blue instanceof Color2)
        arktest.assertTrue(Color.Red.valueOf() instanceof string)
        arktest.assertTrue(Color.Green.valueOf() instanceof string)
        arktest.assertTrue(Color.Blue.valueOf() instanceof string)
        arktest.assertEQ(Color.Red, "Value 1")
        arktest.assertEQ(Color.Green, "Value 2")
        arktest.assertEQ(Color.Blue, "Value 3")
    test_suffix: "asemvsbse"

  - desc: |-
      >-
        Enumeration base type can be set explicitly.
        A compile-time error occurs in the following situations:
        • Explicit type is different from any numeric or string type.
        • Type of explicit member initializer is not assignable
        (see Assignability) to the base type;
        • Enumeration member has no explicit initializer and the base type
        is not an integer type (see Initialization of Enumeration Members).
    params: |-
      >-
        types of all initializer expressions are assignable to type string,
        using different values types
    decl_variants:
      - |-
        const v1: string = "11"
        const v2: "12" = "12"
        const v3: "13" = "13"
        enum Enum: string { first = v1, second = v2, third = v3 }
      - |-
        let v1: "11" = "11"
        let v2: string = "12"
        let v3: "13" = "13"
        enum Enum: string { first = v1, second = v2, third = v3 }
      - |-
        enum Enum: string { first = "11", second = "12", third = "13" as string }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "11")
        arktest.assertEQ(Enum.second.valueOf(), "12")
        arktest.assertEQ(Enum.third.valueOf(), "13")
    test_suffix: "udvt"

  - desc: |-
