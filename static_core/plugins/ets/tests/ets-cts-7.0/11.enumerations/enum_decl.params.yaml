      arktest.assertFalse(E.A >= E.D)
      arktest.assertFalse(E.A > E.D)
      arktest.assertFalse(E.B < E.A)
      arktest.assertFalse(E.B <= E.A)
      arktest.assertTrue(E.B >= E.A)
      arktest.assertTrue(E.B > E.A)
      arktest.assertTrue(E.B < E.C)
      arktest.assertTrue(E.B <= E.C)
      arktest.assertFalse(E.B >= E.C)
      arktest.assertFalse(E.B > E.C)
      arktest.assertFalse(E.B < E.D)
      arktest.assertTrue(E.B <= E.D)
      arktest.assertTrue(E.B >= E.D)
      arktest.assertFalse(E.B > E.D)
      arktest.assertFalse(E.C < E.D)
      arktest.assertFalse(E.C <= E.D)
      arktest.assertTrue(E.C >= E.D)
      arktest.assertTrue(E.C > E.D)
