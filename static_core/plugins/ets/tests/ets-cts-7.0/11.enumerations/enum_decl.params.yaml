      arktest.assertTrue(E1.A != E1.C)
      arktest.assertFalse(E1.A === E1.C)
      arktest.assertTrue(E1.A !== E1.C)
      arktest.assertFalse(E1.A == E1.D)
      arktest.assertTrue(E1.A != E1.D)
      arktest.assertFalse(E1.A === E1.D)
      arktest.assertTrue(E1.A !== E1.D)
      arktest.assertFalse(E1.B == E1.A)
      arktest.assertTrue(E1.B != E1.A)
      arktest.assertFalse(E1.B === E1.A)
      arktest.assertTrue(E1.B !== E1.A)
      arktest.assertFalse(E1.B == E1.C)
      arktest.assertTrue(E1.B != E1.C)
      arktest.assertFalse(E1.B === E1.C)
      arktest.assertTrue(E1.B !== E1.C)
      arktest.assertTrue(E1.B == E1.D)
      arktest.assertFalse(E1.B != E1.D)
      arktest.assertTrue(E1.B === E1.D)
      arktest.assertFalse(E1.B !== E1.D)
      arktest.assertFalse(E1.C == E1.D)
      arktest.assertTrue(E1.C != E1.D)
      arktest.assertFalse(E1.C === E1.D)
      arktest.assertTrue(E1.C !== E1.D)
      arktest.assertFalse(eq(E1.A, E1.B))
      arktest.assertTrue(ne(E1.A, E1.B))
      arktest.assertFalse(strict_eq(E1.A, E1.B))
      arktest.assertTrue(strict_ne(E1.A, E1.B))
      arktest.assertFalse(eq(E1.A, E1.C))
      arktest.assertTrue(ne(E1.A, E1.C))
      arktest.assertFalse(strict_eq(E1.A, E1.C))
      arktest.assertTrue(strict_ne(E1.A, E1.C))
      arktest.assertFalse(eq(E1.A, E1.D))
      arktest.assertTrue(ne(E1.A, E1.D))
      arktest.assertFalse(strict_eq(E1.A, E1.D))
      arktest.assertTrue(strict_ne(E1.A, E1.D))
      arktest.assertFalse(eq(E1.B, E1.A))
      arktest.assertTrue(ne(E1.B, E1.A))
      arktest.assertFalse(strict_eq(E1.B, E1.A))
      arktest.assertTrue(strict_ne(E1.B, E1.A))
      arktest.assertFalse(eq(E1.B, E1.C))
      arktest.assertTrue(ne(E1.B, E1.C))
