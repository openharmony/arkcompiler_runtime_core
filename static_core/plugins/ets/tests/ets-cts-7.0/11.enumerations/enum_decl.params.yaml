          enum E2: float { A = 0.0f, B = 1.5f }
    decl: |-
      [decl_data]
      function eq(a: Object, b: Object): boolean {
        return a == b
      }
      function ne(a: Object, b: Object): boolean {
        return a != b
      }
      function strict_eq(a: Object, b: Object): boolean {
        return a === b
      }
      function strict_ne(a: Object, b: Object): boolean {
        return a !== b
