      arktest.assertFalse(strict_ne(E1.A, E2.A))
      arktest.assertFalse(eq(E1.A, E2.B))
      arktest.assertTrue(ne(E1.A, E2.B))
      arktest.assertFalse(strict_eq(E1.A, E2.B))
      arktest.assertTrue(strict_ne(E1.A, E2.B))
    test_suffix: "eonebt"
