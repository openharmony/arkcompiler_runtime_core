  - desc: |-
      >-
        Values can be the same.
        If some but not all members have their values set explicitly,
        then the values of the members are set by the following rules:
        • If an initializer is not a constant expression,
        all subsequent members must be explicitly initialized.
        Otherwise, a compile-time error occurs.
        • The member which is the first and has no explicit initializer
        gets zero value.
        • Member with an explicit initializer has that explicit value.
        • Member that is not the first and has no explicit initializer
        takes the value of the immediately preceding constant plus one.
        params: same values using expressions
    decl: |-
      enum E { A, B, C, D, BC = B | C }
    logic: |-
      arktest.assertTrue(E.A instanceof E)
      arktest.assertTrue(E.B instanceof E)
      arktest.assertTrue(E.C instanceof E)
      arktest.assertTrue(E.D instanceof E)
      arktest.assertTrue(E.A.valueOf() instanceof int)
      arktest.assertTrue(E.B.valueOf() instanceof int)
      arktest.assertTrue(E.C.valueOf() instanceof int)
      arktest.assertTrue(E.D.valueOf() instanceof int)
      arktest.assertEQ(E.A, 0)
      arktest.assertEQ(E.B, 1)
      arktest.assertEQ(E.C, 2)
      arktest.assertEQ(E.D, 3)
      arktest.assertEQ(E.BC, 3)
    test_suffix: "svue"
    ids: "41"

  - desc: |-
      >-
        Empty enum is supported as a corner case for compatibility
        with TypeScript.
        params: empty enum
    decl: |-
      enum Empty {}
      function foo1(v: Empty | int) {
        arktest.assertTrue(v instanceof int)
        arktest.assertFalse(v instanceof Empty)
      }
      function foo2(v: Object) {
        arktest.assertTrue(v instanceof int)
        arktest.assertFalse(v instanceof Empty)
      }
      function foo3(v: Any) {
        arktest.assertTrue(v instanceof int)
        arktest.assertFalse(v instanceof Empty)
      }
    logic: |-
      let v: Empty | int = 5
      arktest.assertTrue(v instanceof int)
      arktest.assertFalse(v instanceof Empty)
      foo1(v)
      foo2(v)
      foo3(v)
    test_suffix: "ee"
    ids: "42"

  - desc: |-
      >-
        The following operators can be applied to operands of enumeration
        types:
        • Relational operators, see Enumeration Relational Operators;
        • Equality operators, see Equality Expressions.
        If both operands are of the same enumeration type (see Enumerations),
        then Numeric Relational Operators or String Relational Operators
        are used depending on the type of enumeration base type.
        Otherwise, a compile-time error occurs
        params: relational operators, numeric enum base type
    check_variants:
      - decl_data: |-
          enum E { A, B, C, D = B }
      - decl_data: |-
          enum E: long { A, B, C, D = B }
      - decl_data: |-
