  - desc: |-
      >-
        The following operators can be applied to operands of enumeration
        types:
        • Relational operators, see Enumeration Relational Operators;
        • Equality operators, see Equality Expressions.
        A comparison that uses the operators '==' and '===' is evaluated
        to true if: both operands are of the same enumeration type and have
        the same numeric value or the same string contents, depending
        on the enumeration base type.
        params: equality operators, numeric enum base type
    check_variants:
      - decl_data: |-
          enum E1 { A, B, C, D = B }
          enum E2 { A, B }
      - decl_data: |-
          enum E1: long { A, B, C, D = B }
