      - decl_data: |-
          enum E: float { A = 0.0f, B = 1.5f, C = 2.3f, D = B }
    decl: |-
      [decl_data]
    logic: |-
      arktest.assertTrue(E.A < E.B)
      arktest.assertTrue(E.A <= E.B)
