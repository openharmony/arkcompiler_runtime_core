  - desc: |-
      >-
        An enumeration member has a value that can be set explicitly
        by an initializer expression or implicitly.
        Each enumeration has a enumeration base type.
        A base type can be set explicitly (see Enumeration with Explicit Base
        Type) or inferred from initializers as follows:
        • If at least one member does not have an initializer,
        the inferred type is int. Types of all initializers must be are
        assignable to type int (see Assignability). Otherwise, a compile-time
        error occurs.
        • If types of all initializer expressions are assignable to type int
        then the inferred type is int;
        • If types of all initializer expressions are assignable to type string
        then the inferred type is string;
        • Otherwise, a compile-time error occurs.
        params: string enum base type
    check_variants:
      - decl_data: |-
          enum Commands { Open = "fopen", Close = "fclose" }
      - decl_data: |-
          enum Commands { Open = "f" + "open",
            Close = "f" + "clo" + "se" }
    decl: |-
      [decl_data]
    logic: |-
      arktest.assertTrue(Commands.Open instanceof Commands)
      arktest.assertTrue(Commands.Close instanceof Commands)
      arktest.assertTrue(Commands.Open.valueOf() instanceof string)
      arktest.assertTrue(Commands.Close.valueOf() instanceof string)
      arktest.assertEQ(Commands.Open, "fopen")
      arktest.assertEQ(Commands.Close, "fclose")
    test_suffix: "sebt"
    ids: "30-31"

  - desc: |-
      >-
        Values can be the same.
        A comparison that uses the operators '==' and '===' is evaluated
        to true if: both operands are of the same enumeration type and have
        the same numeric value or the same string contents, depending
        on the enumeration base type.
        params: same values, int enum base type
    check_variants:
      - decl_data: |-
          enum E1 { A = 5, B = 5, C }
          enum E2 { A = 5, B = 5, C }
        check_val1: "5"
        check_val2: "6"
        check_type: "int"
      - decl_data: |-
          enum E1: long { A = 5, B = 5, C }
          enum E2: long { A = 5, B = 5, C }
        check_val1: "5"
        check_val2: "6"
        check_type: "long"
      - decl_data: |-
          enum E1: int { A = 5, B = 5, C }
          enum E2: int { A = 5, B = 5, C }
        check_val1: "5"
        check_val2: "6"
        check_type: "int"
      - decl_data: |-
          enum E1: short { A = 5, B = 5, C }
          enum E2: short { A = 5, B = 5, C }
        check_val1: "5"
        check_val2: "6"
        check_type: "short"
      - decl_data: |-
          enum E1: byte { A = 5, B = 5, C }
          enum E2: byte { A = 5, B = 5, C }
        check_val1: "5"
        check_val2: "6"
        check_type: "byte"
      - decl_data: |-
          enum E1: double { A = 5.5, B = 5.5, C = 6.7 }
          enum E2: double { A = 5.5, B = 5.5, C = 6.7 }
        check_val1: "5.5"
        check_val2: "6.7"
        check_type: "double"
      - decl_data: |-
          enum E1: float { A = 5.5f, B = 5.5f, C = 6.7f }
          enum E2: float { A = 5.5f, B = 5.5f, C = 6.7f }
        check_val1: "5.5f"
        check_val2: "6.7f"
        check_type: "float"
    decl: |-
      [decl_data]
    logic: |-
      arktest.assertTrue(E1.A instanceof E1)
      arktest.assertTrue(E1.B instanceof E1)
      arktest.assertTrue(E1.C instanceof E1)
      arktest.assertFalse(E1.A instanceof E2)
      arktest.assertFalse(E1.B instanceof E2)
      arktest.assertFalse(E1.C instanceof E2)
      arktest.assertTrue(E1.A.valueOf() instanceof [check_type])
      arktest.assertTrue(E1.B.valueOf() instanceof [check_type])
      arktest.assertTrue(E1.C.valueOf() instanceof [check_type])
      arktest.assertEQ(E1.A, [check_val1])
      arktest.assertEQ(E1.B, [check_val1])
      arktest.assertEQ(E1.C, [check_val2])
      arktest.assertEQ(E1.A, E1.B)
      arktest.assertNE(E1.A, E1.C)
      arktest.assertTrue(E2.A instanceof E2)
      arktest.assertTrue(E2.B instanceof E2)
      arktest.assertTrue(E2.C instanceof E2)
      arktest.assertFalse(E2.A instanceof E1)
      arktest.assertFalse(E2.B instanceof E1)
      arktest.assertFalse(E2.C instanceof E1)
      arktest.assertTrue(E2.A.valueOf() instanceof [check_type])
      arktest.assertTrue(E2.B.valueOf() instanceof [check_type])
      arktest.assertTrue(E2.C.valueOf() instanceof [check_type])
      arktest.assertEQ(E2.A, [check_val1])
      arktest.assertEQ(E2.B, [check_val1])
      arktest.assertEQ(E2.C, [check_val2])
      arktest.assertEQ(E2.A, E2.B)
      arktest.assertNE(E2.A, E2.C)
      arktest.assertEQ(E1.A, E2.A)
      arktest.assertEQ(E1.A, E2.B)
      arktest.assertNE(E1.A, E2.C)
      arktest.assertEQ(E1.B, E2.A)
      arktest.assertEQ(E1.B, E2.B)
      arktest.assertNE(E1.B, E2.C)
    test_suffix: "sviebt"
    ids: "32-38"

  - desc: |-
      >-
