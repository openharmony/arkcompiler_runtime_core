        enum Color { Red = "red", Green = "green", Blue = "blue" }
    sub_cases_logic:
      - |-
        let r: string = Color.Red
        let g: string = Color.Green
        let b: string = Color.Blue
        arktest.assertEQ(r, "red")
        arktest.assertEQ(g, "green")
