cases:
  - desc: |-
      >-
        Each enumeration has a enumeration base type.
        A base type can be set explicitly (see Enumeration with Explicit Base
        Type) or inferred from initializers as follows:
        • If at least one member does not have an initializer,
        the inferred type is int. Types of all initializers must be are
        assignable to type int (see Assignability). Otherwise, a compile-time
        error occurs.
        • If types of all initializer expressions are assignable to type int
        then the inferred type is int;
        • If types of all initializer expressions are assignable to type string
        then the inferred type is string;
        • Otherwise, a compile-time error occurs.
        Values can be the same.
    params: |-
      >-
        all initializer expressions are assignable to type string,
        same values
    decl_variants:
      - |-
        enum Enum { first = "A", _second = "B", third = "B" }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum._second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum._second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "A")
        arktest.assertEQ(Enum._second.valueOf(), "B")
        arktest.assertEQ(Enum.third.valueOf(), "B")
        arktest.assertEQ(Enum.first.toString(), "A")
        arktest.assertEQ(Enum._second.toString(), "B")
        arktest.assertEQ(Enum.third.toString(), "B")
    test_suffix: "aieaatts"
    ids: "0"

  - desc: |-
      >-
        Each enumeration has a enumeration base type.
        A base type can be set explicitly (see Enumeration with Explicit Base
        Type) or inferred from initializers as follows:
        • If at least one member does not have an initializer,
        the inferred type is int. Types of all initializers must be are
        assignable to type int (see Assignability). Otherwise, a compile-time
        error occurs.
        • If types of all initializer expressions are assignable to type int
        then the inferred type is int;
        • If types of all initializer expressions are assignable to type string
        then the inferred type is string;
        • Otherwise, a compile-time error occurs.
    params: |-
      >-
        types of all initializer expressions are assignable to type string,
        using different values types assignable to type string
    decl_variants:
      - |-
        const v1: string = "11"
        const v2: "12" = "12"
        const v3: "13" = "13"
        enum Enum { first = v1, second = v2, third = v3 }
      - |-
        let v1: "11" = "11"
        let v2: string = "12"
        let v3: "13" = "13"
        enum Enum { first = v1, second = v2, third = v3 }
      - |-
        enum Enum { first = "11", second = "12", third = "13" as string }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "11")
        arktest.assertEQ(Enum.second.valueOf(), "12")
        arktest.assertEQ(Enum.third.valueOf(), "13")
    test_suffix: "udvtatts"
    ids: "1-3"

  - desc: |-
