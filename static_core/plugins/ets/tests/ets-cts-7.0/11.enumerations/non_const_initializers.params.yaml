---
cases:
    - decl: |-
          function f(): int {
              return 1
          }

          enum E { A = f(), B = f() + 1 }
      expected_out: |-
          Semantic error ESE0342: Type of enumeration constants must be any integer or string type or explicitly defined and they must be of the same type.

    - decl: |-
          let x = 5
          enum E { A = x, B = x + 1 }
      expected_out: |-
          Semantic error ESE0342: Type of enumeration constants must be any integer or string type or explicitly defined and they must be of the same type.

    - decl: |-
          enum E { A = (5).toInt() }
      expected_out: |-
          Semantic error ESE0342: Type of enumeration constants must be any integer or string type or explicitly defined and they must be of the same type.

    - decl: |-
          enum E: long { A = (5).toLong(), B = (10).toLong() }
      expected_out: |-
          Semantic error ESE0342: Type of enumeration constants must be any integer or string type or explicitly defined and they must be of the same type.

    - decl: |-
          function foo(): short {
              return 42
          }

          enum E: short { A = foo(), B = foo() + 1 }
      expected_out: |-
          Semantic error ESE0342: Type of enumeration constants must be any integer or string type or explicitly defined and they must be of the same type.
