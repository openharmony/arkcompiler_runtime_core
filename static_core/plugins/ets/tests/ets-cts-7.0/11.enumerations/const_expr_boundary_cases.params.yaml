---
cases:
    - decl: |-
          enum E { A = 0x5A & 0xA5 ? 42 * 2: 42 / 2, B = 42 << 1 }
      main: |-
          arktest.assertEQ(E.A.valueOf(), 21)
          arktest.assertEQ(E.B.valueOf(), 84)

    - decl: |-
          enum E { A = 0x5A > 0xA5 ? "ab" + "\x06\x07": "cd" + "\x32\x33", B = "\u3254" }
      main: |-
          arktest.assertEQ(E.A.valueOf(), "cd23")
          arktest.assertEQ(E.B.valueOf(), "\u3254")

    - decl: |-
          enum E { A = 5 as byte, B, C }
      main: |-
          arktest.assertEQ(E.A.valueOf(), 5)
          arktest.assertEQ(E.B.valueOf(), 6)
          arktest.assertEQ(E.C.valueOf(), 7)

    - decl: |-
          enum E { A = (1 << 3) + 5, B }
      main: |-
          arktest.assertEQ(E.A.valueOf(), 13)
          arktest.assertEQ(E.B.valueOf(), 14)
