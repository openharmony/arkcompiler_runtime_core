cases:
  - desc: |-
      >-
        If an initializer is not a constant expression (see Constant
        Expressions), all subsequent members must be explicitly initialized
        params: all subsequent members must be explicitly initialized
    decl_variants:
      - |-
          enum Enum { A = 5, B, C = A, D }
      - |-
          enum Enum1 { A = 5, B }
          enum Enum2 { A = Enum1.A, B }
      - |-
          const a: int = 5
          enum Enum { A = a, B }
      - |-
          let a: int = 5
          enum Enum { A = a, B }
      - |-
          enum Enum { A = (5).toInt(), B }
      - |-
          function foo(): int {
            return 9
          }
          enum Enum { A = foo(), B }
      - |-
        function foo(): int {
            return 9
        }
        enum Enum { A = 5, B, C, D = foo(), E = 11, F, G }
    stdout:
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
      - |-
        "Expected CTE output is unknown"
    test_suffix: "asmmbei"
    ids: "0-6"
