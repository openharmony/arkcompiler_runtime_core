cases:
  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using string literals in initializer expressions
    decl_variants:
      - |-
        enum Enum: string { first = "Line 1", second = "Line 2", third = "Line 1" + "\nLine 2" }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "Line 1")
        arktest.assertEQ(Enum.second.valueOf(), "Line 2")
        arktest.assertEQ(Enum.third.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Enum.first.toString(), "Line 1")
        arktest.assertEQ(Enum.second.toString(), "Line 2")
        arktest.assertEQ(Enum.third.toString(), "Line 1\nLine 2")
    test_suffix: "usliie"

  - desc: |-
      >-
        An enumeration member value can be set explicitly by initializer
        expression. An initializer can be omitted if an enumeration base type
        is an integer type. Otherwise, a compile-time error occurs.
    params: |-
      using enum members values in initializers expressions
    decl_variants:
      - |-
        enum Enum: string { first = "Line 1", second = "Line 2", third = first + "\n" + second }
    sub_cases_logic:
      - |-
        arktest.assertTrue(Enum.first instanceof Enum)
        arktest.assertTrue(Enum.second instanceof Enum)
        arktest.assertTrue(Enum.third instanceof Enum)
        arktest.assertTrue(Enum.first.valueOf() instanceof string)
        arktest.assertTrue(Enum.second.valueOf() instanceof string)
        arktest.assertTrue(Enum.third.valueOf() instanceof string)
        arktest.assertEQ(Enum.first.valueOf(), "Line 1")
        arktest.assertEQ(Enum.second.valueOf(), "Line 2")
        arktest.assertEQ(Enum.third.valueOf(), "Line 1\nLine 2")
        arktest.assertEQ(Enum.first.toString(), "Line 1")
        arktest.assertEQ(Enum.second.toString(), "Line 2")
        arktest.assertEQ(Enum.third.toString(), "Line 1\nLine 2")
    test_suffix: "uemviie"
