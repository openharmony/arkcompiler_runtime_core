---
cases:
  - { modifier: public,    constructor: '',                          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: public,    constructor: 'constructor() {}',          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: public,    constructor: 'constructor() { super() }', exp_out: "Semantic error ESE0128: No matching call signature" }
  - { modifier: protected, constructor: '',                          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: protected, constructor: 'constructor() {}',          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: protected, constructor: 'constructor() { super() }', exp_out: "Semantic error ESE0128: No matching call signature" }
  - { modifier: private,   constructor: '',                          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: private,   constructor: 'constructor() {}',          exp_out: "Semantic error ESE0192: Must call super constructor"}
  - { modifier: private,   constructor: 'constructor() { super() }', exp_out: "Semantic error ESE0128: No matching call signature" }
