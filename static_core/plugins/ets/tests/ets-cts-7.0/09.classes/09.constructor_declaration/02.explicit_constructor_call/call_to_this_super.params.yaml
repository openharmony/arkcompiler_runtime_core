---
cases:
    - stmt: |-
        this.childField1 = 1
        super()
      expected_out: |-
        Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.

    - stmt: |-
        let v = this.childMethod1()
        super()
      expected_out: |-
        Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.

    - stmt: |-
        super.parentField = 1
        super()
      expected_out: |-
        Semantic error ESE0377: Class field 'parentField' defined by the parent class is not accessible in the child class via super.

    - stmt: |-
        let v = super.parentMethod()
        super()
      expected_out: |-
        Semantic error ESE0679: 'super' cannot be referenced before super() call or this() call.

    - stmt: |-
        if (new B() instanceof A)
            super()
        else
            throw new Error()
      expected_out: |-
        Semantic error ESE2077: 'super' call must be a root-level statement in constructor

    - stmt: |-
        super(this.childField2)
      expected_out: |-
        Semantic error ESE0235: Using this is not allowed in constructor

    - stmt: |-
        super(this.childMethod2())
      expected_out: |-
        Semantic error ESE0235: Using this is not allowed in constructor

    - stmt: |-
        this.childField1 = 1
        this('')
      expected_out: |-
        Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.

    - stmt: |-
        this.childMethod1()
        this('')
      expected_out: |-
        Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.

    - stmt: |-
        let v = super.parentMethod()
        this('')
      expected_out: |-
        Semantic error ESE0679: 'super' cannot be referenced before super() call or this() call.

    - stmt: |-
        if (new B() instanceof A)
            this(1)
        else
            this('')
      expected_out: |-
        Semantic error ESE2077: 'this' call must be a root-level statement in constructor

    - stmt: |-
        this(super.parentField)
      expected_out: |-
        Semantic error ESE0235: Using super is not allowed in constructor

    - stmt: |-
        this(super.parentMethod())
      expected_out: |-
        Semantic error ESE0235: Using super is not allowed in constructor

    - stmt: |-
        this.super(this.childField2)
      expected_out: |-
        Syntax error ESY0224: Identifier expected, got 'super'.

    - stmt: |-
        this.super(this.childMethod2())
      expected_out: |-
        Syntax error ESY0224: Identifier expected, got 'super'.
