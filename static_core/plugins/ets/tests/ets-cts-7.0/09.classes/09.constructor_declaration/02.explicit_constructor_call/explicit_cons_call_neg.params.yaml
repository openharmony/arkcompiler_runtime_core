---
cases:
    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a field
          class A {
              s: string
              fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
              constructor() {
                  this(this.fld)  // CTE, cannot use this.fld
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a field
          class A {
              s: string
              readonly fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
              constructor() {
                  this(this.fld)  // CTE, cannot use this.fld
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to an instance method
          class A {
              s: string
              constructor(p: string) {
                  this.s = p
              }
              constructor() {
                  this(this.meth())  // CTE, cannot use this.meth()
              }
              meth(): string {
                  return 'hello'
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to an instance method
          class A {
              s: string
              constructor(p: () => string) {
                  this.s = p()
              }
              constructor() {
                  this(this.meth)  // CTE, cannot use this.meth
              }
              meth(): string {
                  return 'hello'
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to this
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
              constructor() {
                  this(this)  // CTE, cannot use this in args
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super field
          class A {
              s: string
              readonly fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
          }
          class B extends A {
              constructor(p: string) {
                  super(p)
              }
              constructor() {
                  this(super.fld) // CTE, cannot use super field in args
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super field
          class A {
              s: string
              fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
          }
          class B extends A {
              constructor(p: string) {
                  super(p)
              }
              constructor() {
                  this(super.fld) // CTE, cannot use super field in args
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super method
          class A {
              s: string
              constructor(p: string) {
                  this.s = p
              }
              meth(): string {
                  return 'hello'
              }
          }
          class B extends A {
              constructor(p: string) {
                  super(p)
              }
              constructor() {
                  this(super.meth()) // CTE, cannot use super method in args
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super method
          class A {
              s: string
              constructor(p: () => string) {
                  this.s = p()
              }
              meth(): string {
                  return 'hello'
              }
          }
          class B extends A {
              constructor(p: () => string) {
                  super(p)
              }
              constructor() {
                  this(super.meth) // CTE, cannot use super method in args
              }
          }

    - expected_out: |-
          Syntax error ESY0061: Unexpected super keyword.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to super
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
          }
          class B extends A {
              constructor(p: A) {
                  super(p)
              }
              constructor() {
                  this(super) // CTE, cannot use super in args
              }
          }

    - expected_out: |-
          Syntax error ESY0061: Unexpected super keyword.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to super
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
          }
          class B extends A {
              constructor(p: A) {
                  super(p)
              }
              constructor() {
                  super(super) // CTE, cannot use super in args
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using this is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to this
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
          }
          class B extends A {
              constructor(p: A) {
                  super(p)
              }
              constructor() {
                  super(this) // CTE, cannot use this in args
              }
          }

    - expected_out: |-
          Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a field
          class A {
              s: string
              fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
              constructor() {
                  let v = this.fld  // CTE, cannot use this.fld before this()
                  this(v)
              }
          }

    - expected_out: |-
          Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to an instance method
          class A {
              s: string
              constructor(p: string) {
                  this.s = p
              }
              constructor() {
                  let v = this.meth()  // CTE, cannot use this.meth() before this()
                  this(v)
              }
              meth(): string {
                  return 'hello'
              }
          }

    - expected_out: |-
          Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to an instance method
          class A {
              s: string
              constructor(p: () => string) {
                  this.s = p()
              }
              constructor() {
                  let v = this.meth  // CTE, cannot use this.meth before this()
                  this(v)
              }
              meth(): string {
                  return 'hello'
              }
          }

    - expected_out: |-
          Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to this
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
              constructor() {
                  let v = this  // CTE, cannot use this before this()
                  this(v)
              }
          }

    - expected_out: |-
          Semantic error ESE0377: Class field 'fld' defined by the parent class is not accessible in the child class via super.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super field
          class A {
              s: string
              readonly fld: string = 'hello'
              constructor(p: string) {
                  this.s = p
              }
          }
          class B extends A {
              constructor(p: string) {
                  super(p)
              }
              constructor() {
                  let v = super.fld  // CTE, cannot use super field before this()
                  this(v)
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super method
          class A {
              s: string
              constructor(p: string) {
                  this.s = p
              }
              meth(): string {
                  return 'hello'
              }
          }
          class B extends A {
              constructor(p: string) {
                  super(p)
              }
              constructor() {
                  let v = super.meth()  // CTE, cannot use super method before this()
                  this(v)
              }
          }

    - expected_out: |-
          Semantic error ESE0235: Using super is not allowed in constructor
      decl: |-
          // CTE if arguments of an explicit constructor call refer to a super method
          class A {
              s: string
              constructor(p: () => string) {
                  this.s = p()
              }
              meth(): string {
                  return 'hello'
              }
          }
          class B extends A {
              constructor(p: () => string) {
                  super(p)
              }
              constructor() {
                  let v = super.meth  // CTE, cannot use super method before this()
                  this(v)
              }
          }

    - expected_out: |-
          Semantic error ESE0679: 'this' cannot be referenced before super() call or this() call.
      decl: |-
          // CTE if arguments of an explicit constructor call refer to this
          class A {
              s: string|undefined
              constructor(p: A) {
                  this.s = p.s ?? 'hello'
              }
          }
          class B extends A {
              constructor(p: A) {
                  super(p)
              }
              constructor() {
                  let v = this  // CTE, cannot use this before super()
                  super(v)
              }
          }
