cases:
  - desc: |-
      >-
        Checking for initialization with field initializer
        by assign this directly.
    decl_variants:
      - |-
        class A {
          field = this
        }
    logic_data: |-
      let c: A = new A()
      arktest.assertEQ(c.field, c)

  - desc: |-
      >-
        Checking for initialization with field initializer
        with call methods of this.
    check_variants:
      - {check_type: "int", check_value: "5"}
      - {check_type: "double", check_value: "7.3"}
      - {check_type: "Object", check_value: "5"}
    decl_variants:
      - |-
        class A {
          foo (): [check_type] {
            return [check_value]
          }
          field: [check_type] = this.foo()
        }
    logic_data: |-
      arktest.assertEQ(new A().field, [check_value])

  - desc: |-
      >-
        Initialize field by calling external function, passing 'this' as an argument.
    decl_variants:
      - |-
        class B {}
        function foo (f: () => B) { return f() }
        class A {
          field1 = new B
          field2 = foo(() => this.field1)
        }
      - |-
        class B {}
        function foo (f: () => B) { return f() }
        class A {
          field1 = foo(() => this.field2)
          field2 = new B
        }
    logic_data: |-
      let c: A = new A()
      arktest.assertEQ(c.field1, c.field2)

  - desc: |-
      >-
        Checking for initialization with field initializer
        with usage this.
    check_variants:
      - {check_type: "int", check_value: "5"}
      - {check_type: "double", check_value: "7.3"}
      - {check_type: "Object", check_value: "5"}
    decl_variants:
      - |-
        class A {
          v: [check_type] = [check_value]
          field: [check_type] = this.v
        }
      - |-
        class A {
          private _v: [check_type] = [check_value]
          get v(): [check_type] {
            return this._v
          }
          field: [check_type] = this.v
        }
    logic_data: |-
      arktest.assertEQ(new A().field, [check_value])


  - desc: |-
      >-
        Checking for initialization with field initializer
        with usage this.
    check_variants:
      - {check_type: "int", check_value: "5"}
      - {check_type: "double", check_value: "7.3"}
      - {check_type: "Object", check_value: "5"}
    decl_variants:
      - |-
        class A {
          private v: [check_type] = [check_value]
          private _field: [check_type] = this.v
          foo(): [check_type] {
            return this._field
          }
        }
    logic_data: |-
      arktest.assertEQ(new A().foo(), [check_value])
