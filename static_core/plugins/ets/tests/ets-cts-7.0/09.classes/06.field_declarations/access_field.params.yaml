    params: |-
      two superinterfaces with same property, access within the class in class method
    decl: |-
      interface I1 {
        x: int
      }
      interface I2 {
        x: int
      }
      class A implements I1, I2 {
        x: int = 5
        foo(): void {
          this.x++
        }
      }
    logic: |-
      let a: A = new A()
      let b: I1 = new A()
      let c: I2 = new A()
      arktest.assertTrue(a.x instanceof int)
