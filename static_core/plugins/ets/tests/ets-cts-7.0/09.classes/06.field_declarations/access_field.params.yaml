  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      >-
        two superinterfaces with same property,
        one superclass with same field name,
        access within the class in class method
    decl: |-
      class A {
        x: int = 5
      }
      interface I1 {
        x: int
      }
      interface I2 {
        x: int
      }
      class B extends A implements I1, I2 {
        foo(): void {
          this.x++
        }
      }
    logic: |-
      let a: A = new A()
      let b: B = new B()
      let c: A = new B()
      let d: I1 = new B()
      let e: I2 = new B()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertTrue(b.x instanceof int)
      arktest.assertTrue(c.x instanceof int)
      arktest.assertTrue(d.x instanceof int)
      arktest.assertTrue(e.x instanceof int)
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(b.x, 5)
      arktest.assertEQ(c.x, 5)
      arktest.assertEQ(d.x, 5)
      arktest.assertEQ(e.x, 5)
      b.foo()
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(b.x, 6)
      arktest.assertEQ(c.x, 5)
      arktest.assertEQ(d.x, 5)
      arktest.assertEQ(e.x, 5)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
