        x: int = 5
      }
      interface I1 {
        x: int
      }
      interface I2 {
        x: int
      }
      class B extends A implements I1, I2 {
        constructor() {
          super()
          this.x++
        }
      }
    logic: |-
      let a: A = new A()
      let b: B = new B()
      let c: B = new B()
      let d: A = new B()
      let e: I1 = new B()
      let f: I2 = new B()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertTrue(b.x instanceof int)
      arktest.assertTrue(c.x instanceof int)
      arktest.assertTrue(d.x instanceof int)
      arktest.assertTrue(e.x instanceof int)
      arktest.assertTrue(f.x instanceof int)
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(b.x, 6)
      arktest.assertEQ(c.x, 6)
      arktest.assertEQ(d.x, 6)
      arktest.assertEQ(e.x, 6)
      arktest.assertEQ(f.x, 6)
      b.x = 7
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(b.x, 7)
      arktest.assertEQ(c.x, 6)
      arktest.assertEQ(d.x, 6)
      arktest.assertEQ(e.x, 6)
      arktest.assertEQ(f.x, 6)
