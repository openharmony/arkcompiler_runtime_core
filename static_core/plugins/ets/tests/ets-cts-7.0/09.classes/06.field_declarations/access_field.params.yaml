cases:
  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class
    decl: |-
      class A {
        x: int = 5
      }
    logic: |-
      let a: A = new A()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertEQ(a.x, 5)
      a.x = 6
      arktest.assertEQ(a.x, 6)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      inherit field from superclass, access outside the class
    decl: |-
      class A {
        x: int = 5
      }
      class B extends A {
      }
    logic: |-
      let a: A = new A()
      let b: B = new B()
      let c: A = new B()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertTrue(b.x instanceof int)
      arktest.assertTrue(c.x instanceof int)
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(b.x, 5)
      arktest.assertEQ(c.x, 5)
      a.x = 6
      arktest.assertEQ(a.x, 6)
      arktest.assertEQ(b.x, 5)
      arktest.assertEQ(c.x, 5)
      b.x = 7
      arktest.assertEQ(a.x, 6)
      arktest.assertEQ(b.x, 7)
      arktest.assertEQ(c.x, 5)
      c.x = 4
      arktest.assertEQ(a.x, 6)
      arktest.assertEQ(b.x, 7)
      arktest.assertEQ(c.x, 4)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access within the class in class method
    decl: |-
      class A {
        x: int = 5
        foo(): void {
          this.x++
        }
      }
    logic: |-
      let a: A = new A()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertEQ(a.x, 5)
      a.foo()
      arktest.assertEQ(a.x, 6)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access within the class in getter
    decl: |-
      class A {
        x: int = 5
        get field(): int {
          return this.x + 1
        }
      }
    logic: |-
      let a: A = new A()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertEQ(a.x, 5)
      arktest.assertEQ(a.field, 6)
      arktest.assertEQ(a.x, 5)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access within the class in setter
    decl: |-
      class A {
        x: int = 5
        set field(a: int) {
          this.x = a
        }
      }
    logic: |-
      let a: A = new A()
      arktest.assertTrue(a.x instanceof int)
      arktest.assertEQ(a.x, 5)
      a.field = 6
      arktest.assertEQ(a.x, 6)

  - desc: |-
      >-
