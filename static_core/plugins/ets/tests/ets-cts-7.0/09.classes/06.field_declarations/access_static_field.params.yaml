cases:
  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      simple, single class, access outside the class
    decl: |-
      class A {
        static x: int = 5
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      A.x = 6
      arktest.assertEQ(A.x, 6)
      A.x = 5
      arktest.assertEQ(A.x, 5)

  - desc: |-
      >-
        Any static field can be accessed only with the qualification of a class name.
        Static members of a superclass are not inherited. The subclass which wants
        to use static members of its superclass must use explicit qualification using
        the superclass name.
    params: |-
      >-
        using same name for static field in subclass,
        accessing outside the class
    decl: |-
      class A {
        static x: int = 5
      }
      class B extends A {
        static x: int = A.x + 1
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertTrue(B.x instanceof int)
      arktest.assertEQ(A.x, 5)
      arktest.assertEQ(B.x, 6)
      A.x = 7
      arktest.assertEQ(A.x, 7)
      arktest.assertEQ(B.x, 6)
      B.x = 8
      arktest.assertEQ(A.x, 7)
      arktest.assertEQ(B.x, 8)
      A.x = 5
      B.x = 6
      arktest.assertEQ(A.x, 5)
      arktest.assertEQ(B.x, 6)

  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      simple, single class, access within the class in class method
    decl: |-
      class A {
        static x: int = 5
        foo(): void {
          A.x++
        }
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      let a: A = new A()
      a.foo()
      arktest.assertEQ(A.x, 6)
      A.x = 5
      arktest.assertEQ(A.x, 5)

  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      simple, single class, access within the class in getter
    decl: |-
      class A {
        static x: int = 5
        get field(): int {
          return A.x + 1
        }
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      let a: A = new A()
      arktest.assertEQ(a.field, 6)
      arktest.assertEQ(A.x, 5)

  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      simple, single class, access within the class in setter
    decl: |-
      class A {
        static x: int = 5
        set field(a: int) {
          A.x = a
        }
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      let a: A = new A()
      a.field = 6
      arktest.assertEQ(A.x, 6)
      A.x = 5
      arktest.assertEQ(A.x, 5)

  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      simple, single class, access within the class in constructor
    decl: |-
      class A {
        static x: int = 5
        constructor() {
          A.x++
        }
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      let a: A = new A()
      arktest.assertEQ(A.x, 6)
      A.x = 5
      arktest.assertEQ(A.x, 5)

  - desc: |-
      Any static field can be accessed only with the qualification of a class name.
    params: |-
      >-
        simple, single class,
        access within the class in instance field initializer expression
    decl: |-
      class A {
        static x: int = 5
        y: int = A.x
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertEQ(A.x, 5)
      let a: A = new A()
      arktest.assertEQ(a.y, 5)

  - desc: |-
