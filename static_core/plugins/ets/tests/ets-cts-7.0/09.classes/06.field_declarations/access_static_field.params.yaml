        static y: int = A.x + 1
      }
    logic: |-
      arktest.assertTrue(A.x instanceof int)
      arktest.assertTrue(A.y instanceof int)
      arktest.assertEQ(A.x, 5)
      arktest.assertEQ(A.y, 6)

  - desc: |-
