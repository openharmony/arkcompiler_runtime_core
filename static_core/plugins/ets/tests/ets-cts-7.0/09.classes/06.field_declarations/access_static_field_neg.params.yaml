cases:
  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class by simple name
    decl_variants:
      - |-
        class A {
          static x: int = 5
        }
    logic: |-
      x++
    expected_out:
      - |-
        "Semantic error ESE0143: Unresolved reference x"

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class by class instance usage
    decl_variants:
      - |-
        class A {
          static x: int = 5
        }
    logic: |-
      let a: A = new A()
      let v = a.x
    expected_out:
      - |-
        "Semantic error ESE0207: 'x' is a static property of 'A'"

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class by class instance usage
    decl_variants:
      - |-
        class A {
          static x: int = 5
        }
    logic: |-
      let a: A = new A()
      a.x = 5
    expected_out:
      - |-
        "Semantic error ESE0207: 'x' is a static property of 'A'"

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access within the class by simple name
    decl_variants:
      - |-
        class A {
          static x: int = 5
          foo(): void {
            x++
          }
        }
      - |-
        class A {
          static x: int = 5
          get field(): int {
            return x
          }
        }
      - |-
        class A {
          static x: int = 5
          set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          static x: int = 5
          constructor() {
            x++
          }
        }
      - |-
        class A {
          static x: int = 5
          y: int = x
        }
      - |-
        class A {
          static x: int = 5
          static y: int = x
        }
      - |-
        class A {
          static x: int = 5
          static foo(): void {
            x++
          }
        }
      - |-
        class A {
          static x: int = 5
          static get field(): int {
            return x
          }
        }
      - |-
        class A {
          static x: int = 5
          static set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          static x: int = 5
          static {
            x++
          }
        }
    expected_out:
      - |-
        "Semantic error ESE0173: Static property 'x' must be accessed through it's class 'A'"
      - |-
        "Semantic error ESE0173: Static property 'x' must be accessed through it's class 'A'"
