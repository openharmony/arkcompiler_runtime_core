  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification.
        Static members of a superclass are not inherited. The subclass
        which wants to use static members of its superclass
        must use explicit qualification using the superclass name.
    params: |-
      access outside the class by subclass name
    decl_variants:
      - |-
        class A {
          static x: int = 5
        }
        class B extends A {}
    logic: |-
      B.x++
    expected_out:
      - |-
        "Semantic error ESE0207: 'x' is a static property of 'A'"

