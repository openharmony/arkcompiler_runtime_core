cases:
  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class by simple name
    decl_variants:
      - |-
        class A {
          x: int = 5
        }
    logic: |-
      x++
    expected_out:
      - |-
        "Semantic error ESE0143: Unresolved reference x"

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access outside the class by class name
    decl_variants:
      - |-
        class A {
          x: int = 5
        }
    logic: |-
      A.x++
    expected_out:
      - |-
        "Semantic error ESE0208: 'x' is an instance property of 'A'"

  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      simple, single class, access within the class by simple name
    decl_variants:
      - |-
        class A {
          x: int = 5
          foo(): void {
            x++
          }
        }
      - |-
        class A {
          x: int = 5
          get field(): int {
            return x
          }
        }
      - |-
        class A {
          x: int = 5
          set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          x: int = 5
          constructor() {
            x++
          }
        }
      - |-
        class A {
          x: int = 5
          y: int = x
        }
      - |-
        class A {
          x: int = 5
          static y: int = x
        }
      - |-
        class A {
          x: int = 5
          static foo(): void {
            x++
          }
        }
      - |-
        class A {
          x: int = 5
          static get field(): int {
            return x
          }
        }
      - |-
        class A {
          x: int = 5
          static set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          x: int = 5
          static {
            x++
          }
        }
    expected_out:
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"
      - |-
        "Semantic error ESE0143: Unresolved reference x"
      - |-
        "Semantic error ESE0143: Unresolved reference x"
      - |-
        "Semantic error ESE0143: Unresolved reference x"
      - |-
        "Semantic error ESE0143: Unresolved reference x"
      - |-
        "Semantic error ESE0143: Unresolved reference x"

