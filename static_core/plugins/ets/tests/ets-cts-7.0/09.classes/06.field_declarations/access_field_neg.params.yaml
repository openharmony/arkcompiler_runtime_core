      simple, single interface, access within interface by simple name
    decl_variants:
      - |-
        interface I {
          x: int
          methI(): void {
            x++
          }
        }
    expected_out:
      - |-
        "Semantic error ESE0145: Property 'x' must be accessed through 'this'"

