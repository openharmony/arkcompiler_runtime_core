  - desc: |-
      >-
        Any static field can be accessed only with the qualification
        of a class name, while an instance field can be accessed with
        the object reference qualification
    params: |-
      inherit field from superclass
    decl_variants:
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          foo(): void {
            x++
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          get field(): int {
            return x
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          constructor() {
            super()
            x++
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          y: int = x
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          static y: int = x
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          static foo(): void {
            x++
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          static get field(): int {
            return x
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          static set field(a: int) {
            x = a
          }
        }
      - |-
        class A {
          x: int = 5
        }
        class B extends A {
          static {
            x++
          }
        }
    expected_out:
