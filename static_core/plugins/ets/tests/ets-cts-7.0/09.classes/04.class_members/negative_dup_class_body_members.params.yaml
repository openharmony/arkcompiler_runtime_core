--- # List of valid class members
class_members:
  - m: "f: int;"
    exp_out: |-
      "Semantic error ESE0351: Variable 'f' has already been declared."
  - m: "m(): void {}"
    exp_out: |-
      "Semantic error ESE0130: Function m is already declared."
  - m: "class B{}"
    exp_out: |-
      "Semantic error ESE0351: Variable 'B' has already been declared."
  - m: "interface I{}"
    exp_out: |-
      "Semantic error ESE0351: Variable 'I' has already been declared."
  - m: "enum E{V1, V2}"
    exp_out: |-
      "Semantic error ESE0351: Variable 'E' has already been declared."
  - m: "constructor() {}"
    exp_out: |-
      "Semantic error ESE0130: Function constructor is already declared."
  - m: "final get age(): int {return 2}; set age(i: int) {}"
    exp_out: |-
      "Semantic error ESE0130: Function age is already declared."
