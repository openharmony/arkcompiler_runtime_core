---
cases:
  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        readonly f: int = 1
      }
    expected_out: "Semantic error ESE0337: Cannot implement interface I: property 'f' must have a setter, but the implementation is readonly"
    doc: cannot narrow down the parameter from writable to readonly form

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        get f(): int { return 1 }
      }
    expected_out: "Semantic error ESE0189: C is not abstract and does not implement setter for f property in I"
    doc: writable parameter requires both getter and setter

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        set f(i: int) {}
      }
    expected_out: "Semantic error ESE0188: C is not abstract and does not implement getter for f property in I"
    doc: writable parameter requires both getter and setter

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {
        f: boolean = false
      }
    expected_out: "Semantic error ESE0141: f(): Boolean in C cannot override f(): Int in I because overriding return type is not compatible with the other return type."
    doc: incorrect field type

  - decl: |-
      interface I {
        get f(): int
        set f(i: int)
      }
      class C implements I {}
    expected_out: "Semantic error ESE0188: C is not abstract and does not implement getter for f property in I"
    doc: required property is not initialized

  - decl: |-
      interface J {
        get n(): number
        set n(x: string)
      }
      class D implements J {
        n: number = 1
      }
    expected_out: "Semantic error ESE0136: Method n(%%property-n: Double): void in D not overriding any method"
    doc: different getter and setter types

  - decl: |-
      interface J {
        get n(): number
        set n(x: string)
      }
      class D implements J {
        n: string = "1"
      }
    expected_out: "Semantic error ESE0141: n(): String in D cannot override n(): Double in J because overriding return type is not compatible with the other return type."
    doc: different getter and setter types
