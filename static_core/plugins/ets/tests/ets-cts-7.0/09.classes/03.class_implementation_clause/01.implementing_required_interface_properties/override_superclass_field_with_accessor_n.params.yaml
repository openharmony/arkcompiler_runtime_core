---
cases:
  - decl: |-
      interface I {
        n: number
      }
      class C implements I {
        n: number = 1
      }
      class C1 extends C {
        get n(): number { return 2 }
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'C', but is overridden here in 'C1' as an instance property."
    doc: getter overrides superclass field that implements interface property

  - decl: |-
      interface I {
        n: int
      }
      class C implements I {
        n: int = 1
      }
      class C1 extends C {
        get n(): int { return 2 }
        set n(x: int) {}
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'C', but is overridden here in 'C1' as an instance property."
    doc: getter and setter override superclass field that implements interface property

  - decl: |-
      interface I {
        s: string
      }
      abstract class A implements I {
        s: string = 's'
      }
      class C1 extends A {
        get s(): string { return "str" }
      }
    expected_out: "Semantic error ESE129829: 'n' is defined as an accessor in class 'C', but is overridden here in 'C1' as an instance property."
    doc: getter overrides field from abstract superclass that implements interface property
