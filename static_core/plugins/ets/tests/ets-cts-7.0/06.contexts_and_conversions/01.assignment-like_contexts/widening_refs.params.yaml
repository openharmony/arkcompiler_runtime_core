---
cases:

  # non-generic types:
#0
  - defs: ''
    src_type: C
    src_class: C
    dst_type: B
#1
  - defs: ''
    src_type: B
    src_class: B
    dst_type: I
#2
  - defs: ''
    src_type: C
    src_class: C
    dst_type: Object


  # parameterized types
#3
  - defs: |
      interface J<T> {}
      class R<T> implements J<T> {}
      class Q<T> extends R<T> {}
    src_type: Q<C>
    src_class: Q<C>
    dst_type: R<C>
#4
  - defs: |
      interface K<T> {}
      class L<T> implements K<T> {}
      class H<T> extends L<T> {}
    src_type: H<B>
    src_class: H<B>
    dst_type: K<B>
