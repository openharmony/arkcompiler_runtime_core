#25
  - defs: |-
      class A {}
    stype: Object
    sval: new A()
    dtype2: .toDouble()
    expected: "Semantic error ESE0087: Property 'toDouble' does not exist on type 'A'"
#26
  - defs: |-
      interface I {}
      class A implements I {}
      class B implements I {}
    stype: I
    sval: new A()
    dtype: as B
    expected: "Semantic error ESE0326: Cannot cast type 'A' to 'B'"
#27
  - defs: |-
      class A {}
    stype: Object
    sval: new A[1](new A())
    dtype: as A[][]
    expected: "Semantic error ESE0326: Cannot cast type 'Array<A>' to 'Array<Array<A>>'"
#28
  - defs: |-
      type func = (a: int, b: int) => Int;
      function foo(a: int, b: int): Int {
        return new Int(a + b);
      }
    stype: func
    sval: foo
    dtype: as Object[]
    expected: "Semantic error ESE0326: Cannot cast type '((p1: Int, p2: Int) => Int)' to 'Array<Object>'"
