---
cases:
#0
  - { stype: boolean, sval: 'true', dtype: as byte, expected: "Semantic error ESE0326: Cannot cast type 'Boolean' to 'Byte'" } 
#1
  - { stype: boolean, sval: 'false', dtype2: .toInt(), expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'Boolean'"}
#2
  - { stype: boolean, sval: 'true', dtype2: .toDouble(), expected: "Semantic error ESE0087: Property 'toDouble' does not exist on type 'Boolean'"}
#3
  - { stype: short, sval: (1).toShort(), dtype: as boolean, expected: "Semantic error ESE0326: Cannot cast type 'Short' to 'Boolean'" }
#4
  - { stype: long, sval: (1).toLong(), dtype: as boolean, expected: " Semantic error ESE0326: Cannot cast type 'Long' to 'Boolean'" }
#5
  - { stype: float, sval: 1.0f, dtype: as boolean, expected: "Semantic error ESE0326: Cannot cast type 'Float' to 'Boolean'" }

#6
  - { stype: Boolean, sval: new Boolean(), dtype2: .toShort(), expected: "Semantic error ESE0087: Property 'toShort' does not exist on type 'Boolean'" }
#7
  - { stype: Boolean, sval: new Boolean(), dtype2: .toLong(), expected: "Semantic error ESE0087: Property 'toLong' does not exist on type 'Boolean'" }
#8
  - { stype: Boolean, sval: new Boolean(), dtype2: f, expected: "Syntax error ESY0227: Unexpected token 'f'." }
#9
  - { stype: byte, sval: 1 as byte, dtype: as Boolean, expected: "Semantic error ESE0326: Cannot cast type 'Byte' to 'Boolean'" }
#10
  - { stype: int, sval: (1).toInt(), dtype: as Boolean, expected: "Semantic error ESE0326: Cannot cast type 'Int' to 'Boolean'" }
#11
  - { stype: double, sval: 1.0, dtype: as Boolean, expected: "Semantic error ESE0326: Cannot cast type 'Double' to 'Boolean'" }

#12
  - { stype: int, sval: 1, dtype: as string, expected: "Semantic error ESE0326: Cannot cast type 'Int' to 'String'" }
#13
  - { stype: string, sval: '"1"', dtype2: .toInt(), expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'String'" }
#14
  - { stype: Boolean, sval: new Boolean(), dtype: as string, expected: "Semantic error ESE0326: Cannot cast type 'Boolean' to 'String'" }
#15
  - { stype: string, sval: '"true"', dtype: as Boolean, expected: "Semantic error ESE0326: Cannot cast type '\\\"true\\\"' to 'Boolean'" }
#16
  - { stype: Object, sval: new Int(), dtype: as Boolean, expected: "Semantic error ESE0326: Cannot cast type 'Int' to 'Boolean'" }

#17
  - defs: |-
      class A {}
      class B extends A {}
      class C extends A {}
    stype: B
    sval: new B()
    dtype: as C
    expected: "Semantic error ESE0326: Cannot cast type 'B' to 'C'"
#18
  - defs: |-
      interface I {}
      interface J extends I {}
      interface K extends I {}
      class B implements J {}
      class C implements K {}
    stype: B
    sval: new B()
    dtype: as C
    expected: "Semantic error ESE0326: Cannot cast type 'B' to 'C'"
#19
  - defs: |-
      class A {}
      class B {}
    stype: B[]
    sval: new B[1](new B())
    dtype: as A[]
    expected: "Semantic error ESE0326: Cannot cast type 'Array<B>' to 'Array<A>'"
#20
  - defs: |-
      type func = (a: int, b: int) => int;
    stype: func
    sval: '(a: int, b: int): int => { return a + b; }'
    dtype2: .toInt()
    expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'Function'"
#21
  - defs: |-
      type func = (a: int, b: int) => Int;
      function foo(a: int, b: int): Int {
        return new Int(a + b);
      }
    stype: Int
    sval: foo(1, 2)
    dtype: as func
    expected: "Semantic error ESE0326: Cannot cast type 'Int' to '((p1: Int, p2: Int) => Int)'"
#22
  - defs: |-
      class A<T> {}
    stype: A<Int>
    sval: new A<Int>()
    dtype: as A<Long>
    expected: "Semantic error ESE0326: Cannot cast type 'A<Int>' to 'A<Long>'"
#23
  - defs: |-
      class X {}
      class Y extends X {}
      class BB<T> {}
    stype: BB<Y>
    sval: new BB<Y>()
    dtype: as BB<X>
    expected: "Semantic error ESE0326: Cannot cast type 'BB<Y>' to 'BB<X>'"
#24
  - defs: |-
      class X {}
      class Y extends X {}
      class BB<T> {}
    stype: BB<X>
    sval: new BB<X>()
    dtype: as BB<Y>
    expected: "Semantic error ESE0326: Cannot cast type 'BB<X>' to 'BB<Y>'"

