---
cases:
#0
  - stype: boolean
    sval: 'true'
    dtype: 'as byte'
    error: {runtime: "ClassCastError: std.core.Boolean cannot be cast to std.core.Byte"}
    asserts: |
      arktest.assertTrue(dst instanceof byte)
      arktest.assertEQ(dst, 1)
#1
  - { tags: compile-only, stype: boolean, sval: 'false', dtype2: .toInt(), expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'Boolean'"}
#2
  - { tags: compile-only, stype: boolean, sval: 'true', dtype2: .toDouble(), expected: "Semantic error ESE0087: Property 'toDouble' does not exist on type 'Boolean'"}
#3
  - stype: short
    sval: (1).toShort()
    dtype: as boolean
    error: {runtime: "ClassCastError: std.core.Short cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, true)
#4
  - stype: long
    sval: (11).toLong()
    dtype: as boolean
    error: {runtime: "ClassCastError: std.core.Long cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, true)
#5
  - stype: float
    sval: 1.0f
    dtype: as boolean
    error: {runtime: "ClassCastError: std.core.Float cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean);
      arktest.assertEQ(dst, true)
#6
  - { tags: compile-only, stype: Boolean, sval: new Boolean(), dtype2: .toShort(), expected: "Semantic error ESE0087: Property 'toShort' does not exist on type 'Boolean'" }
#7
  - { tags: compile-only, stype: Boolean, sval: new Boolean(), dtype2: .toLong(), expected: "Semantic error ESE0087: Property 'toLong' does not exist on type 'Boolean'" }
#8
  - { tags: compile-only, stype: Boolean, sval: new Boolean(), dtype2: f, expected: "Syntax error ESY0227: Unexpected token 'f'." }
#9
  - stype: byte
    sval: 1 as byte
    dtype: as Boolean
    error: {runtime: "ClassCastError: std.core.Byte cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, true)
#10
  - stype: int
    sval: (1).toInt()
    dtype: as Boolean
    error: {runtime: "ClassCastError: std.core.Int cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, true)
#11
  - stype: double
    sval: 1.0
    dtype: as Boolean
    error: {runtime: "ClassCastError: std.core.Double cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, true)
#12
  - stype: int
    sval: 1
    dtype: as string
    error: {runtime: "ClassCastError: std.core.Int cannot be cast to std.core.String"}
    asserts: |
      arktest.assertTrue(dst instanceof string);
#13
  - { tags: compile-only, stype: string, sval: '"1"', dtype2: .toInt(), expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'String'" }
#14
  - stype: Boolean
    sval: new Boolean()
    dtype: as string
    error: {runtime: "ClassCastError: std.core.Boolean cannot be cast to std.core.String"}
    asserts: |
      arktest.assertTrue(dst instanceof string)
#15
  - stype: string
    sval: '"true"'
    dtype: as Boolean
    error: {runtime: "ClassCastError: std.core.String cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
#16
  - stype: Object
    sval: new Int()
    dtype: as Boolean
    error: {runtime: "ClassCastError: std.core.Int cannot be cast to std.core.Boolean"}
    asserts: |
      arktest.assertTrue(dst instanceof boolean)
      arktest.assertEQ(dst, false)
#9
  - defs: |-
      class A {}
      class B extends A {}
      class C extends A {}
    stype: B
    sval: new B()
    dtype: as C
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst instanceof C)
#10
  - defs: |-
      interface I {}
      interface J extends I {}
      interface K extends I {}
      class B implements J {}
      class C implements K {}
    stype: B
    sval: new B()
    dtype: as C
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst instanceof C)
#11
  - defs: |-
      class A {}
      class B {}
    stype: B[]
    sval: new B[1](new B())
    dtype: as A[]
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst[0] instanceof A)
#12
  - defs: |-
      type func = (a: int, b: int) => Int;
      function foo(a: int, b: int): Int {
        return new Int(a + b);
      }
    stype: Int
    sval: foo(1, 2)
    dtype: as func
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst instanceof func)
#13
  - defs: |-
      type func = (a: int, b: int) => int;
    tags: compile-only
    stype: func
    sval: '(a: int, b: int): int => { return a + b; }'
    dtype2: .toInt()
    expected: "Semantic error ESE0087: Property 'toInt' does not exist on type 'Function'"
#14
  - defs: |-
      class A {}
    tags: compile-only
    stype: Object
    sval: new A()
    dtype2: .toDouble()
    expected: "Semantic error ESE0087: Property 'toDouble' does not exist on type 'A'"
#15
  - defs: |-
      interface I {}
      class A implements I {}
      class B implements I {}
    stype: I
    sval: new A()
    dtype: as B
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst instanceof B)
#16
  - defs: |-
      class A {}
    stype: Object
    sval: new A[1](new A())
    dtype: as A[][]
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst[0] instanceof A)
#17
  - defs: |-
      type func = (a: int, b: int) => Int;
      function foo(a: int, b: int): Int {
        return new Int(a + b);
      }
    stype: func
    sval: foo
    dtype: as Object[]
    error: {runtime: "Unhandled exception: std.core.ClassCastError"}
    asserts: |
      arktest.assertTrue(dst instanceof object)
