---
cases:
    - decl: |-
          function foo(p: int) { return 1 }
          function bar(p: string) { return 2 }

          overload fb { foo, bar }
          overload fb { bar, foo }

    - decl: |-
          function foo(p: int) { return 1 }
          function bar(p: string) { return 2 }

          overload fb { bow }

          function bow() { return 3 }

          overload fb { foo, bar }

    - decl: |-
          class A {
              meth1(p: int) { return 1 }
              meth2(p: string) { return 2 }

              overload fb { meth1, meth2 }

              meth3(p: int) { return 3 }
              meth4(p: string) { return 4 }

              overload fb { meth3, meth4 }
          }

    - decl: |-
          interface I {
              meth1(p: int) { return 1 }
              meth2(p: string) { return 2 }

              overload fb { meth1, meth2 }

              meth3(p: int) { return 3 }
              meth4(p: string) { return 4 }

              overload fb { meth3, meth4 }
          }

    - decl: |-
          interface I {
              meth1()
              meth2()

              overload fb { meth1, meth2 }

              meth3()
              meth4()

              overload fb { meth3, meth4 }
          }

    - decl: |-
          interface I {
              meth1(p: int)
              meth2(p: string) {}

              overload fb { meth1, meth2 }

              meth3(p: int) {}
              meth4(p: string)

              overload fb { meth3, meth4 }
          }
