cases:
  # Fixed Array Subtyping
  - type1: 'FixedArray<"a"|"b"|"c">'
    value: '["a", "b", "c"]'
    type2: 'FixedArray<string>'
  
  - type1: 'FixedArray<B>'
    value: '[new B(), new B("John")]'
    type2: 'FixedArray<A>'
  
  - decl:  'class E<in T> {}'
    type1: 'FixedArray<E<A>>'
    value: '[new E<A>(), new E<A>()]'
    type2: 'FixedArray<E<B>>'
  
  - decl:  'class E2<out T> {}'
    type1: 'FixedArray<E2<B>>'
    value: '[new E2<B>(), new E2<B>()]'
    type2: 'FixedArray<E2<A>>'

  # Union Type Subtyping
  - type1: 'string'
    value: '"hello"'
    type2: 'number | string'
  
  - type1: '"success" | "loading"'
    value: '"success"'
    type2: '"error" | "loading" | "success"'
  
  - type1: 'B'
    value: 'new B()'
    type2: 'A | B'
  
  - decl:  'class E3<out T> {}'
    type1: 'E3<B>'
    value: 'new E3<B>()'
    type2: 'E3<A>'

  - decl:  'class E4<in T> {}'
    type1: 'E4<A>'
    value: 'new E4<A>()'
    type2: 'E4<B>'

  # Literal Type subtyping
  - type1: '"hello"'
    value: '"hello"'
    type2: 'string'

  - decl:  'class E5<out T> {}'
    type1: 'E5<"hello">'
    value: 'new E5<"hello">()'
    type2: 'E5<string>'

  - decl:  'class E6<in T> {}'
    type1: 'E6<string>'
    value: 'new E6<string>()'
    type2: 'E6<"hello">'

  # Function Types
  - type1: '(p: A) => B'
    value: '(p: A): B => { return new B()}'
    type2: '(p: B) => A'

  - type1: '(p?: A) => B'
    value: '(p?: A): B => { return new B()}'
    type2: '(p?: B) => A'

  - type1: '(q: A) => B'
    value: '(q: A): B => { return new B()}'
    type2: '(q: B, p?: A) => A'
  
  - decl:  'class E7<in T> {}'
    type1: '(p: E7<B>) => E7<A>'
    value: '(p: E7<B>): E7<A> => { return new E7<A>()}'
    type2: '(p: E7<A>) => E7<B>'

  - decl:  'class E8<out T> {}'
    type1: '(p: E8<A>) => E8<B>'
    value: '(p: E8<A>): E8<B> => { return new E8<B>()}'
    type2: '(p: E8<B>) => E8<A>'

  # Object Type subtyping
  - type1: 'A'
    value: '{name: "Alice"}'
    type2: 'Object'

  - decl:  'class E9<out T> {}'
    type1: 'E9<B>'
    value: 'new E9<B>()'
    type2: 'Object'

  - decl:  'class E10<in T> {}'
    type1: 'E10<A>'
    value: 'new E10<A>()'
    type2: 'Object'
