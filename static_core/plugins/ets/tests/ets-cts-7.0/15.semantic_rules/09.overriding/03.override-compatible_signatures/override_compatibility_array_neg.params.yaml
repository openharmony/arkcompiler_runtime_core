---
cases:
  # RESIZABLE ARRAY, PARAMETER
#0
  - base: |-
      foo(i: Array<Derived>) {
          res = 1
      }
    derived: |-
      override foo(i: Array<Base>) {
          res = 2
      }
    params: override-incompatible parameter
#1
  - base: |-
      foo(i: Array<Base>) {
          res = 1
      }
    derived: |-
      override foo(i: Array<Derived>) {
          res = 2
      }
    params: override-incompatible parameter

  # RESIZABLE ARRAY, RETURN TYPE
#2
  - base: |-
      foo(): Array<Base> {
          res = 1
          return [new Base()]
      }
    derived: |-
      override foo(): Array<Derived> {
          res = 2
          return [new Derived()]
      }
    params: override-incompatible return type
#3
  - base: |-
      foo(): Array<Derived> {
          res = 1
          return [new Derived()]
      }
    derived: |-
      override foo(): Array<Base> {
          res = 2
          return [new Base()]
      }
    params: override-incompatible return type
