---
cases:
    - decl: |-
          function test<T>(p: Object) {
              return p instanceof Array
          }

    - decl: |-
          function test<T extends Error>(p: Object) {
              return p instanceof Array
          }

    - decl: |-
          function test<T extends string>(p: Object) {
              return p instanceof Array
          }

    - decl: |-
          class A<T> {
              test(p: Object) {
                  return p instanceof A
              }
          }

    - decl: |-
          class A<T> {
              test(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          class A<T extends Error> {
              test(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          class A<T extends number> {
              test(p: Object) {
                  return p instanceof A
              }
          }

    - decl: |-
          class A {
              test<T>(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          class A {
              test<T extends Error>(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          interface I<T> {
              test(p: Object) {
                  return p instanceof I
              }
          }

    - decl: |-
          interface I<T> {
              test(p: Object) {
                  return p instanceof I
              }
          }

    - decl: |-
          interface I<T extends Error> {
              test(p: Object) {
                  return p instanceof I
              }
          }

    - decl: |-
          interface I<T extends string> {
              test(p: Object) {
                  return p instanceof I
              }
          }

    # generic tuple
    - decl: |-
          class A<T, U> {
              test(p: Object) {
                  p instanceof [T, U]
              }
          }

    - decl: |-
          class A<T> {
              test(p: Object) {
                  p instanceof [T, string]
              }
          }

    - decl: |-
          class A<out T> {
              test(p: Object) {
                  return p instanceof A
              }
          }

    - decl: |-
          class A<out T> {
              test(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          class A<out T extends Error> {
              test(p: Object) {
                  return p instanceof Array
              }
          }

    - decl: |-
          class A<out T extends number> {
              test(p: Object) {
                  return p instanceof A
