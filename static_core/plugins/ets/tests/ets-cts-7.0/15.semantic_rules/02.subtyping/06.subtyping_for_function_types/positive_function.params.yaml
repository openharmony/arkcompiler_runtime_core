  - decl: |-
      //function with extra rest param
      function fooBBR(p: Base, ...n: number[]): Base {return p};
      function fooDBR(p: Derived, ...n: number[]): Base { return new Base()};

      let foobbr = fooBBR
      let foodbr = fooDBR

      foodbr = foobbr
    check: |-
      let r = foodbr.unsafeCall(new Base, 1.0, 2.0, 3.0)
      arktest.assertTrue(r instanceof Base)
      arktest.assertEQ((r as Base).b, 'b')
