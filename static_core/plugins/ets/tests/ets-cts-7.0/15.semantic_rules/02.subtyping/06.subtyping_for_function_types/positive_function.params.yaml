  # rest or optional in param, another param contravariant and return type identical
  - decl: |-
      function fooBBN(p: Base, n: number): Base {return p};
      function fooDBN(p: Derived, n: number): Base { return new Base()};

      let foobbn = fooBBN
      let foodbn = fooDBN

      foodbn = foobbn
    check: |-
      let r = foodbn.unsafeCall(new Base, 1.0)
      arktest.assertTrue(r instanceof Base)
      arktest.assertEQ((r as Base).b, 'b')

  - decl: |-
      function fooBBO(p: Base, n?: number): Base {return p};
      function fooDBO(p: Derived, n?: number): Base { return new Base()};

