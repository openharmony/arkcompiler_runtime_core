---
cases:
    - decl: |-
        class C {
          fooN(n: number) {}
          foo() {}
          fooX(x?: number) {}

          overload foo { fooN, fooX }
        }
      expected_out: "Semantic error ESE0397: Method with the same name as overload declaration 'foo', overloadlist must list this medhod."

    - decl: |-
        class C {
          fooN(n: number) {}
          foo() {}
          fooX(x?: number) {}

          overload foo { foo, fooX, fooZ }
        }
      expected_out: "Semantic error ESE0384: overloaded name must refer to an accessible method."

    - decl: |-
        class B {
          foo() {}
        }
       
        class C extends B {
          fooN(n: number) {}
          fooX(x?: number) {}

          overload foo { fooN, fooX }
        }
      expected_out: "Semantic error ESE0397: Method with the same name as overload declaration 'foo', overloadlist must list this medhod."

    - decl: |-
        interface I {
          foo() {}
        }
       
        class C implements I {
          fooN(n: number) {}
          fooX(x?: number) {}

          overload foo { fooN, fooX }
        }
      expected_out: "Semantic error ESE0397: Method with the same name as overload declaration 'foo', overloadlist must list this medhod."

    - decl: |-
        interface I {
          foo()
        }
       
        class B implements I {
          foo() {}
        }
       
        class C extends B {
          fooN(n: number) {}
          fooX(x?: number) {}

          overload foo { fooN, fooX }
        }
      expected_out: "Semantic error ESE0397: Method with the same name as overload declaration 'foo', overloadlist must list this medhod."
