---
cases:
    # override-incompatible argument type
#0
    - base: |-
          foo(i: [Object, Object]): void {}
      derived: |-
        override foo(i: [Object, Base]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: [Object, Base]): undefined in Derived not overriding any method"
    # override-incompatible argument type
#1
    - base: |-
          foo(i: [Base, Base]): void {}
      derived: |-
          override foo(i: [Object, Base]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: [Object, Base]): undefined in Derived not overriding any method"

    # override-incompatible argument type
#2
    - base: |-
          foo(i: [Base, Base]): void {}
      derived: |-
          override foo(i: [Object, Object]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: [Object, Object]): undefined in Derived not overriding any method"

    # override-incompatible return type
#3
    - base: |-
          foo(): [Object, Object] {
              return [new Object(), new Object()];
          }
      derived: |-
          override foo(): [Object, Base] {
              return [new Object(), new Base()];
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type [Object, Base] in Derived cannot override foo with type [Object, Object] field from class Base because the overriding return type is not compatible with the other return type."

    # override-incompatible return type
#4
    - base: |-
          foo(): [Object, Base] {
              return [new Object(), new Base()];
          }
      derived: |-
          override foo(): [Object, Object] {
              return [new Object(), new Object()];
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type [Object, Object] in Derived cannot override foo with type [Object, Base] field from class Base because the overriding return type is not compatible with the other return type."

    # override-incompatible return type
#5
    - base: |-
          foo(): [Object, Object] {
              return [new Object(), new Object()];
          }
      derived: |-
          override foo(): [Base, Base] {
              return [new Base(), new Base()];
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type [Base, Base] in Derived cannot override foo with type [Object, Object] field from class Base because the overriding return type is not compatible with the other return type."

    # override-incompatible argument (covariance)
#6
    - base: |-
          foo(i: Object): void {}
      derived: |-
          override foo(i: Base): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Base): undefined in Derived not overriding any method"

    # override-incompatible return value (contravariance)
#7
    - base: |-
          foo(): Base {
              return new Base();
          }
      derived: |-
          override foo(): Object {
              return new Object();
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type Object in Derived cannot override foo with type Base field from class Base because the overriding return type is not compatible with the other return type."

    # override-incompatible argument (contravariance)
#8
    - base: |-
          foo(i: (j: Base) => Base): void {
              i(new Base());
          }
      derived: |-
          override foo(i: (j: Object) => Base): void {
              i(new Object());
          }
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: ((p1: Object) => Base)): undefined in Derived not overriding any method"

    # override-incompatible return type (covariance)
#9
    - base: |-
          foo(i: (j: Object) => Object): void {
              i(new Object());
          }
      derived: |-
          override foo(i: (j: Object) => Base): void {
              i(new Object());
          }
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: ((p1: Object) => Base)): undefined in Derived not overriding any method"

    # override-incompatible argument (contravariance)
#10
    - base: |-
          foo(i: Object[]): void {}
      derived: |-
          override foo(i: Base[]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Array<Base>): undefined in Derived not overriding any method"

    # override-incompatible argument (contravariance)
#11
    - base: |-
          foo(i: Object[]): void {}
      derived: |-
          override foo(i: Base[]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Array<Base>): undefined in Derived not overriding any method"

    # override-incompatible argument (covariance)
#12
    - base: |-
          foo(i: Base[]): void {}
      derived: |-
          override foo(i: Object[]): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Array<Object>): undefined in Derived not overriding any method"

    # override-incompatible return type (contravariance)
#13
    - base: |-
          foo(): Base[] {
              return new Base[2];
          }
      derived: |-
          override foo(): Object[] {
              return new Object[2];
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type Array<Object> in Derived cannot override foo with type Array<Base> field from class Base because the overriding return type is not compatible with the other return type."

    # Any vs Object: override-incompatible argument (Object not contravariant to Any)
#14
    - base: |-
          foo(i: Any): void {}
      derived: |-
          override foo(i: Object): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: Object): undefined in Derived not overriding any method"

    # Any vs Object: override-incompatible return type (Any not covariant to Object)
#15
    - base: |-
          foo(): Object {
              return new Object();
          }
      derived: |-
          override foo(): Any {
              return 1;
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type Any in Derived cannot override foo with type Object field from class Base because the overriding return type is not compatible with the other return type."

    # FixedArray<Any/Object>: override-incompatible argument (FixedArray<Object> not contravariant to FixedArray<Any>)
#16
    - base: |-
          foo(i: FixedArray<Any>): void {}
      derived: |-
          override foo(i: FixedArray<Object>): void {}
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: FixedArray<Object>): undefined in Derived not overriding any method"

    # FixedArray<Any/Object>: override-incompatible return type (FixedArray<Any> not covariant to FixedArray<Object>)
#17
    - base: |-
          foo(): FixedArray<Object> {
              return [new Object()];
          }
      derived: |-
          override foo(): FixedArray<Any> {
              return [1, null];
          }
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type FixedArray<Any> in Derived cannot override foo with type FixedArray<Object> field from class Base because the overriding return type is not compatible with the other return type."
