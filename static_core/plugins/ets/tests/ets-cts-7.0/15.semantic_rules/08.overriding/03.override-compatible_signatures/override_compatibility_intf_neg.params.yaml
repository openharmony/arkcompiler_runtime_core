---
cases:
    # INTERFACE, METHOD PARAMETER
    - base: |-
          foo(i: IBase): void {
              res = 1;
          }
      derived: |-
          override foo(i: IDerived): void {
              res = 2;
          }
      doc: Class/Interface type
      params: override-incompatible parameter
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: IDerived): void in Derived not overriding any method"

    # INTERFACE, METHOD RETURN TYPE
    - base: |-
          foo(): IDerived {
              res = 1;
              return new B();
          }
      derived: |-
          override foo(): IBase {
              res = 2;
              return new A();
          }
      doc: Class/Interface type
      params: override-incompatible return type
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type IBase in Derived cannot override foo with type IDerived field from class Base because the overriding return type is not compatible with the other return type."
