---
cases:
    # TUPLE, PARAMETER

    - base: |-
          foo(i: TPL_OB) {
              res = 1
          }
      derived: |-
          override foo(i: TPL_BD) {
              res = 2
          }
      params: overload-incompatible parameter
      exp_out: |-
        Semantic error ESE0136: Method foo(i: [Base, Derived]): undefined in Derived not overriding any method

    - base: |-
          foo(i: TPL_DO) {
              res = 1
          }
      derived: |-
          override foo(i: TPL_DD) {
              res = 2
          }
      params: overload-incompatible parameter
      exp_out: |-
        Semantic error ESE0136: Method foo(i: [Derived, Derived]): undefined in Derived not overriding any method

    - base: |-
          foo(i: TPL_OOO) {
              res = 1
          }
      derived: |-
          override foo(i: TPL_BBB) {
              res = 2
          }
      params: overload-incompatible parameter
      exp_out: |-
        Semantic error ESE0136: Method foo(i: [Base, [Base, Base]]): undefined in Derived not overriding any method

    - base: |-
          foo(i: TPL_OO) {
              res = 1
          }
      derived: |-
        override foo(i: TPL_DD) {
              res = 2
          }
      params: overload-incompatible parameter
