              res = 2
          }
      params: override-incompatible parameter
      exp_out: |-
        Semantic error ESE0136: Method foo(i: [Base, Base]): undefined in Derived not overriding any method

    # TUPLE, RETURN TYPE

    - base: |-
          foo(): TPL_BD {
              res = 1
              return bd
          }
      derived: |-
          override foo(): TPL_BB {
              res = 2
              return bb
          }
      params: override-incompatible return type
      exp_out: |-
        Semantic error ESE0141: Class member foo with type [Base, Base] in Derived cannot override foo with type [Base, Derived] field from class Base because the overriding return type is not compatible with the other return type.

    - base: |-
          foo(): TPL_BD {
              res = 1
              return bd
          }
      derived: |-
          foo(): TPL_BB {
              res = 2
              return bb
          }
