---
cases:
  # RESIZABLE ARRAY, PARAMETER
#0
  - base: |-
      foo(i: Array<Derived>) {
          res = 1
      }
    derived: |-
      override foo(i: Array<Base>) {
          res = 2
      }
    params: override-incompatible parameter
    expected_out: |-
      "Semantic error ESE0136: Method foo(i: Array<Base>): void in Derived not overriding any method"
#1
  - base: |-
      foo(i: Array<Base>) {
          res = 1
      }
    derived: |-
      override foo(i: Array<Derived>) {
          res = 2
      }
    params: override-incompatible parameter
    expected_out: |-
      "Semantic error ESE0136: Method foo(i: Array<Derived>): void in Derived not overriding any method"

  # RESIZABLE ARRAY, RETURN TYPE
#2
  - base: |-
      foo(): Array<Base> {
          res = 1
          return [new Base()]
      }
    derived: |-
      override foo(): Array<Derived> {
          res = 2
          return [new Derived()]
      }
    params: override-incompatible return type
    expected_out: |-
      "Semantic error ESE0141: Class member foo with type Array<Derived> in Derived cannot override foo with type Array<Base> field from class Base because the overriding return type is not compatible with the other return type."
#3
  - base: |-
      foo(): Array<Derived> {
          res = 1
          return [new Derived()]
      }
    derived: |-
      override foo(): Array<Base> {
          res = 2
          return [new Base()]
      }
    params: override-incompatible return type
    expected_out: |-
      "Semantic error ESE0141: Class member foo with type Array<Base> in Derived cannot override foo with type Array<Derived> field from class Base because the overriding return type is not compatible with the other return type."
