---
cases:
    # FUNCTION, PARAMETER
#0
    - base: |-
          foo(i: (j: Base) => Base): void {
              res = 1
          }
      derived: |-
          override foo(i: (j: Base) => Derived): void {
              res = 2
          }
      params: override-incompatible parameter
      expected_out: |-
        "Semantic error ESE0136: Method foo(i: ((p1: Base) => Derived)): undefined in Derived not overriding any method"
#1
