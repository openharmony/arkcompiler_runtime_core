    # FUNCTION, RETURN TYPE
#7
    - base: |-
          foo(): (i: Base) => Base {
              res = 1
              return (i: Base): Base => new Base
          }
      derived: |-
          override foo(): (i: Derived) => Base {
              res = 2
              return (i: Derived): Base => new Base
          }
      params: override-incompatible return type
      expected_out: |-
        "Semantic error ESE0141: Class member foo with type ((p1: Derived) => Base) in Derived cannot override foo with type ((p1: Base) => Base) field from class Base because the overriding return type is not compatible with the other return type."
