---
cases:
    # TYPE PARAMETER, PARAMETER
    - base: |-
          class Base<T> {
              foo(i: T) {
                  res = 1
              }
          }
      derived: |-
          class Derived<T> extends Base<T> {
              override foo<J extends T>(i: J) {
                  res = 2
              }
          }
      params: different number of type parameters
      expected_out: |-
        "Semantic error ESE0136: Method foo<J>(i: J): undefined in Derived<T> not overriding any method"

    - base: |-
          class Base {
              foo<T extends Object>(i: T) {
                  res = 1
              }
          }
      derived: |-
          class Derived extends Base {
              override foo<J extends Base>(i: J) {
                  res = 2
              }
          }
      params: override-incompatible type parameter (covariant)
      expected_out: |-
        "Semantic error ESE150729: Class member foo with type undefined in Derived cannot override foo with type undefined field from class Base because the overriding type parameter's constraints are not compatible with type parameter constraints of the overridden method."

    - decl: |-
          interface I {}
          interface II extends I {}
      base: |-
          class Base {
              foo<T extends I>(i: T) {
                  res = 1
              }
          }
      derived: |-
          class Derived extends Base {
              override foo<J extends II>(i: J) {
                  res = 2
              }
          }
      params: override-incompatible type parameter (covariance)
      expected_out: |-
        "Semantic error ESE150729: Class member foo with type undefined in Derived cannot override foo with type undefined field from class Base because the overriding type parameter's constraints are not compatible with type parameter constraints of the overridden method."

    - decl: |-
          interface I {}
      base: |-
          class Base {
              foo<T extends I, U extends I>(i: T, j: U) {
                  res = 1
              }
          }
      derived: |-
          class Derived extends Base {
              override foo<J extends I>(i: J, j: J) {
                  res = 2
              }
          }
      params: different number of type parameters
      expected_out: |-
        "Semantic error ESE0136: Method foo<J>(i: J, j: J): undefined in Derived not overriding any method"

    # TYPE PARAMETER, RETURN TYPE
    - base: |-
          class Base {
              foo<T extends Object>(i: T): T {
                  res = 1
                  return i
              }
          }
      derived: |-
          class Derived extends Base {
              override foo<J extends Base>(i: J): J {
                  res = 2
                  return i
              }
          }
      params: override-incompatible constraints (covariance)
      expected_out: |-
        "Semantic error ESE150729: Class member foo with type J in Derived cannot override foo with type T field from class Base because the overriding type parameter's constraints are not compatible with type parameter constraints of the overridden method."
