---
cases:
  # 0-1 override base method as arguments are the same
  - { base: "i: Number|undefined|null", derived: "i: undefined|Number|null", call: "undefined", res: 2 }
  - { base: "i: Number|undefined|null", derived: "i: undefined|null|Number", call: "null", res: 2 }
  # 2-3 override base method with different usage primary and alias types
  - { base: "i: Number, j: number", derived: "i: number, k: Number", call: "new Number(), 1", res: 2 }
  - { base: "i: Number, j: number", derived: "i: number, k: Number", call: "1, new Number()", res: 2 }

# Class
  # 4-7 override using different aliases to the same type
  - { base: "i: Number", derived: "i: Double", call: "new Number()", res: 2 }
  - { base: "i: Number", derived: "i: Double", call: "new Double()", res: 2 }
  - { base: "i: Double", derived: "i: Number", call: "new Number()", res: 2 }
  - { base: "i: Double", derived: "i: Number", call: "new Double()", res: 2 }

  # 8-9 correct override due to args contravariance
  - { base: "i: B", derived: "i: A", call: "new A()", res: 2 }
  - { base: "i: B", derived: "i: A", call: "new B()", res: 2 }

# Function

  # 10 FUN_AA is a supertype for FUN_AB (param contravariance) -> OK
  - { base: "i: FUN_AB", derived: "i: FUN_AA", call: "faa", res: 2 }
  # 11 paramval is the same, retval is the same - same func type param (invariance) -> OK
  - { base: "i: FUN_AB", derived: "i: FUN_AB", call: "fab", res: 2 }

  # 12 FUN_BA is a supertype for FUN_AB (param contravariance) -> OK
  - base: "i: FUN_AB"
    derived: "i: FUN_BA"
    call: "fab"
    res: 2
  # 13 FUN_CB is a supertype for FUN_BB (param contravariance) -> OK
  - base: "i: FUN_BB"
    derived: "i: FUN_CB"
    call: "fbb"
    res: 2
  # 14 FUN_AB is a supertype for FUN_BB (param contravariance) -> OK
  - base: "i: FUN_AB"
    derived: "i: FUN_BB"
    call: "fbb"
    res: 2

# Array
  # 15-18 override (alias)
  - { base: "i: number[]", derived: "i: double[]", call: "new number[1](0)", res: 2 }
  - { base: "i: number[]", derived: "i: double[]", call: "new double[2](0)", res: 2 }
  - { base: "i: string[]", derived: "i: String[]", call: "new string[2](\"\")", res: 2 }
  - { base: "i: string[]", derived: "i: String[]", call: "new String[1](\"\")", res: 2 }

  #19
  - base: "i: A[]"
    derived: "i: A[]"
    call: "[new B()]"
    res: 2

  # 20 using of contravariant relationship -> OK
  - base: "i: FixedArray<B>"
    derived: "i: FixedArray<A>"
    call: "[new B()]"
    res: 2
