---
cases:
  #0 covariant paramval (subclass hides but call resolves to Base) -> access via Derived fails
  - base: "i: A"
    derived: "i: B"
    call: "new A()"
    res: 1
    expected_error: 'Semantic error ESE854298: Class static member foo must be accessed
      with the class name Base qualification only.'

  #1 paramval contravariant + retval covariant (incompatible signatures, call resolves to Base)
  - base: "i: FUN_BB"
    derived: "i: FUN_AC"
    call: "fbc"
    res: 1
    expected_error: 'Semantic error ESE854298: Class static member foo must be accessed
      with the class name Base qualification only.'

  #2 covariant FixedArray (call resolves to Base)
  - base: "i: FixedArray<A>"
    derived: "i: FixedArray<B>"
    call: "[new A()]"
    res: 1
    expected_error: 'Semantic error ESE854298: Class static member foo must be accessed
      with the class name Base qualification only.'
