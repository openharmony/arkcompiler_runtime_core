---
cases:
  - decl: |-
      class Base {
        f(): Object { return new Object; }
      }

      class Derived extends Base {
        override f(): number { return 5; }
      }

    use: |-
      let res = new Derived().f();
      arktest.assertEQ(res, 5, 'overridden method call expected');

  - decl: |-
      class Base {
        g(n: number): string { return '1'; }
      }

      class Derived extends Base {
        override g(n: Object): string { return '2'; }
      }

    use: |-
      let res = new Derived().g(1);
      arktest.assertEQ(res, '2', 'overridden method call expected');

  - decl: |-
      class Base {
        f(): Object { return new Object; }
      }

      class Derived extends Base {
        f(): number { return 5; }
      }

    use: |-
      let res = new Derived().f();
      arktest.assertEQ(res, 5, 'overridden method call expected');

  - decl: |-
      class Base {
        g(n: number): string { return '1'; }
      }

      class Derived extends Base {
        g(n: Object): string { return '2'; }
      }

    use: |-
      let res = new Derived().g(1);
      arktest.assertEQ(res, '2', 'overridden method call expected');

  - decl: |-
      class Base {
        f(): Object { return new Object; }
      }

      class Derived extends Base {
        override f(): number { return 5; }
      }

    use: |-
      let res = (new Derived() as Base).f();
      arktest.assertEQ(res, 5, 'overridden method call expected');

  - decl: |-
      class Base {
        g(n: number): string { return '1'; }
      }

      class Derived extends Base {
        override g(n: Object): string { return '2'; }
      }

    use: |-
      let res = (new Derived() as Base).g(1);
      arktest.assertEQ(res, '2', 'overridden method call expected');
