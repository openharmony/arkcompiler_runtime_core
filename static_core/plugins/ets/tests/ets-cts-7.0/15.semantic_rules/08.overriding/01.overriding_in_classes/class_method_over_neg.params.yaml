---
cases:
  - doc: |-
      CTE due to different return types.
    decl: |-
      class A {}
      class B extends A {}
      class Base<T,S> {
          foo(i: T, j: S) {
            res = 11;
          }
      }
      class Derived<T,S> extends Base<T,S> {
          /* @@ label */foo(i: T, j: S): int {
            res = 21;
            return 1;
          }
      }
    use: |-
      new Derived<A, B>();
    expected_out: "Semantic error ESE0141: Class member foo with type Int in Derived<T,S> cannot override foo with type void field from class Base<T,S> because the overriding return type is not compatible with the other return type."

  - doc: |-
      CTE as return type A contravariant to B.
    decl: |-
      class A {}
      class B extends A {}
      class Base<T, S> {
          foo(i: T, j: S): B {
            res = 11;
            return new B();
          }
          static foo(i: T, j: S): B {
            res = 12;
            return new B();
          }
      }
      class Derived<T, S> extends Base<T, S> {
          /* @@ label1 */foo(i: T, j: S): A {
            res = 21;
            return new A();
          }
          static /* @@ label2 */foo(i: T, j: S): A {
            res = 22;
            return new A();
          }
      }
    use: |-
      new Derived<Number, String>();
    expected_out: "Semantic error ESE0141: Class member foo with type A in Derived<T,S> cannot override foo with type B field from class Base<T,S> because the overriding return type is not compatible with the other return type."