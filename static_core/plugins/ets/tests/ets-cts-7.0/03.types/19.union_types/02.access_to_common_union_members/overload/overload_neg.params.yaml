---
cases:
    - decl: |-
          // overload alias in one
          class A {
              overload meth { meth1, meth2 }
              meth1(p: Object): number {
                  return 1 // intentionally same return value everywhere
              }
              meth2(p: number): number {
                  return 1
              }
          }
          class B {
              meth(p: Object): number {
                  return 1
              }
              meth1(p: number): number {
                  return 1
              }
          }
          let u1: A|B = new A
      use: |-
          arktest.assertEQ(u1.meth(), 1)  // CTE: method with overload signature
      tags: compile-only, negative
      stdout: |-
          "Semantic error ESE0124: Expected 1 arguments, got 0."

    - decl: |-
          // overload alias in both
          class A {
              overload meth { meth1, meth2 }
              meth1(p: Object): number {
                  return 1 // intentionally same return value everywhere
              }
              meth2(p: number): number {
                  return 1
              }
          }
          class B {
              overload meth { meth1, meth2 }
              meth1(p: Object): number {
                  return 1
              }
              meth2(p: number): number {
                  return 1
              }
          }
          let u1: A|B = new A
      use: |-
          arktest.assertEQ(u1.meth(), 1)  // CTE: method with overload signature
      tags: compile-only, negative
      stdout: |-
          "Semantic error ESE0391: Overload declaration cannot be called by union."

    - decl: |-
          class A {
              meth(p: int): number {
                  return 1
              }
              meth(p: Object): number {
                  return 2
              }
          }
          class B {
              meth(p: Object): number {
                  return 3
              }
          }
          let u1: A|B = new A
          let u2: A|B = new B
      use: |-
          arktest.assertEQ(u1.meth(1), 2, "u1.meth(1)")
          arktest.assertEQ(u1.meth(new Object()), 2, "u1.meth(new Object())")
          arktest.assertEQ(u2.meth(new Object()), 3, "u2.meth(new Object())")
      tags: compile-only, negative
      stdout: |-
          "Semantic error ESE0244: Member type must be the same for all union objects."
