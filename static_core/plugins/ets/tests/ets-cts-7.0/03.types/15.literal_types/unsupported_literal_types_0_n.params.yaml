--- # list of values
values:
### unsupported types
- { type: 0, value: 0}
- { type: 0.0f, value: 0 }
- { type: "12345678901234567890n", value: "12345678901234567890n" }
- { type: "true", value: "true" }
- { type: "c'A'", value: "c'A'" }
- { type: "2 as byte", value: "2 as byte" }
- { type: "3 as short", value: "3 as short" }
- { type: "4 as int", value: "4 as int" }
- { type: "5 as long", value: "5 as long" }
- { type: "6 as float", value: "6 as float" }
- { type: "7 as double", value: "7 as double" }
- { type: "8 as number", value: "8 as number" }
- { type: "[ 1, 2 ]", value: "[ 1, 2 ]"}

- type: "{ }"
  value: "{ }"
  response: "Syntax error ESY177354: Using object literals to declare types in place is not supported. Please declare types and interfaces explicitly!"

- type: "{ i: \"1\"}"
  value: "{ i: \"1\"}"
  response: "Syntax error ESY177354: Using object literals to declare types in place is not supported. Please declare types and interfaces explicitly!"

- type: "Types.Str"
  value: "Types.Str"
  response: "Semantic error ESE0070: ''Str'' type does not exist."

  ## supported but invalid initialization
- type: "undefined"
  value: "null"
  response: "Semantic error ESE0318: Type ''null'' cannot be assigned to type ''undefined''"

- type: "null"
  value: "undefined"
  response: "Semantic error ESE0318: Type ''undefined'' cannot be assigned to type ''null''"

- type: '"what are you"'
  value: '"i am venom"'
  response: "Semantic error ESE0318: Type ''\"i am venom\"'' cannot be assigned to type ''\"what are you\"''"

- type: '"what are you" | "who are you"'
  value: '"i am groot"'
  response: "Semantic error ESE0318: Type ''\"i am groot\"'' cannot be assigned to type ''\"what are you\"|\"who are you\"''"

- type: 'ULT'
  value: '"i am groot"'
  response: "Semantic error ESE0318: Type ''\"i am groot\"'' cannot be assigned to type ''\"what are you\"|\"who are you\"''"

- type: '"some type"'
  value: 'new String("some type")'
  response: "Semantic error ESE0318: Type ''String'' cannot be assigned to type ''\"some type\"''"

- type: '"some type"'
  value: '""'
  response: "Semantic error ESE0318: Type ''\"\"'' cannot be assigned to type ''\"some type\"''"

  # literal types are case-sensitive
- type: '"str"'
  value: '"Str"'
  response: "Semantic error ESE0318: Type ''\"Str\"'' cannot be assigned to type ''\"str\"''"
