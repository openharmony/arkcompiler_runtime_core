---
types:
  - abstract class
  - class
  - interface

cases:
  - argument: "{i: 1.9, j: 42}"
    doc: "extra parameter"
    out: "Semantic error ESE0065: type C has no property named i"

  - argument: "{j: false}"
    doc: "invalid parameter type"
    out: "Semantic error ESE0319: Type ''Boolean'' is not compatible with type ''Int|undefined'' at property ''j''"

  - argument: "{j: \"some str\"}"
    doc: "invalid parameter type"
    out: "Semantic error ESE0319: Type ''\"some str\"'' is not compatible with type ''Int|undefined'' at property ''j''"

  - argument: "{i: 1.9}"
    doc: "invalid variable name"
    out: "Semantic error ESE0226: Class property ''j'' needs to be initialized for Required<C>."
