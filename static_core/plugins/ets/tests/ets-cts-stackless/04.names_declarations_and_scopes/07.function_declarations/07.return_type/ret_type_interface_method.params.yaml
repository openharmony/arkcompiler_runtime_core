    - decl: |-
          interface I {
            i: int
            foo(): void
          }
          class A implements I {
            i = 0
            foo(): void {  
                this.i += 1
            }
          }
      call: |-
          let a = new A()
          a.foo()
          arktest.assertEQ(a.i, 1)
