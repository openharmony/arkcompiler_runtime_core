---
function_decls:
    # function: undefined | number, empty body — OK (union contains undefined)
    - decl: |-
          function foo(): undefined | number {}
      call: |-
          let v = foo()
          arktest.assertTrue(v == undefined)

    # function: undefined | number, returns a value on one path — OK
    - decl: |-
          let flag = false
          function foo(): undefined | number {
              if (flag) return 1
          }
      call: |-
          let v = foo()
          arktest.assertTrue(v == undefined)

    # function: undefined | number, returns value on one path — OK
    - decl: |-
          let flag = true
          function foo(): undefined | number {
              if (flag) return 1.0
          }
      call: |-
          let v = foo()
          arktest.assertTrue(v == 1.0)

    # function: undefined | string, returns string — OK
    - decl: |-
          function foo(): undefined | string {
              return "hello"
          }
      call: |-
          let v = foo()
          arktest.assertTrue(v == "hello")

    # lambda: undefined | int, empty body — OK
    - decl: |-
          let foo = (): undefined | int => {}
      call: |-
          let v = foo()
          arktest.assertTrue(v == undefined)

    # lambda: undefined | boolean, returns value — OK
    - decl: |-
          let foo = (): undefined | boolean => {
              return true
          }
      call: |-
          let v = foo()
          arktest.assertTrue(v == true)

    # class instance method: undefined | int, empty body — OK
    - decl: |-
          class A {
              foo(): undefined | int {}
          }
      call: |-
          new A().foo()

    # class instance method: undefined | string, empty body — OK
    - decl: |-
          class A {
              foo(): undefined | string {}
          }
      call: |-
          let a = (new A).foo()
          arktest.assertTrue(a == undefined)

    # class instance method: undefined | number, returns value on one path — OK
    - decl: |-
          class A {
              flag: boolean = true
              foo(): undefined | number {
                  if (this.flag) return 42
              }
          }
      call: |-
          let a = (new A).foo()
          arktest.assertTrue(a == 42)

    # static class method: undefined | string, returns value — OK
    - decl: |-
          class A {
              static foo(): undefined | string {
                  return "ok"
              }
          }
      call: |-
          let a = A.foo()
          arktest.assertTrue(a == "ok")

    # interface default method: undefined | int, empty body — OK
    - decl: |-
          interface I {
              foo(): undefined | int {}
          }
          class A implements I {}
      call: |-
          let a = (new A).foo()
          arktest.assertTrue(a == undefined)

    # three-way union with undefined: undefined | int | string, empty body — OK
    - decl: |-
          function foo(): undefined | int | string {}
      call: |-
          foo()

    # three-way union with undefined: undefined | int | boolean, empty body — OK
    - decl: |-
          function foo(): undefined | int | boolean {}
      call: |-
          let v = foo()
          arktest.assertTrue(v == undefined)
