---
function_decls:
    # function: undefined | number, returns a value on one path
    - decl: |-
          let flag = false
          function foo(): undefined | number {
              if (flag) return true
          }
      expected_out: |-
          Semantic error ESE0091: Type 'Boolean' is not compatible
          with the enclosing method's return type 'undefined|Double'

    # function: number | undefined, returns value
    - decl: |-
          function foo(): number | undefined {
              return false
          }
      expected_out: |-
          Semantic error ESE0091: Type 'Boolean' is not compatible
          with the enclosing method's return type 'Double|undefined'

    # lambda: undefined | int, returns value
    - decl: |-
          let foo = (): undefined | int => {
              return "abc"
          }
      expected_out: |-
          Semantic error ESE0091: Type '\"abc\"' is not compatible with
          the enclosing method's return type 'undefined|Int'

    # lambda: undefined | boolean, returns value on one path
    - decl: |-
          let flag = false
          let foo = (): undefined | boolean => {
              if (flag) {
                  return 1
              }
          }
      expected_out: |-
          Semantic error ESE0091: Type 'Int' is not compatible
          with the enclosing method's return type 'undefined|Boolean'

    # class instance method: int | undefined, returns value on one path
    - decl: |-
          class A {
              foo(b: boolean): int | undefined {
                  if (b) {
                      return 7f
                  }
              }
          }
      expected_out: |-
          Semantic error ESE0091: Type 'Float' is not compatible
          with the enclosing method's return type 'Int|undefined'
