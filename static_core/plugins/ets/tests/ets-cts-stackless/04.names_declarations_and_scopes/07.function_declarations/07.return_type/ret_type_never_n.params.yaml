---
cases:
    # function: empty body — CTE per spec foo5
    - decl: |-
        function foo(): never {}
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # function: body with normal statements, no throw — CTE
    - decl: |-
        function foo(): never {
            let x = 1
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # function: return value — CTE
    - decl: |-
        function foo(): never {
            return 1.0
        }
      expected_out: "Semantic error ESE0091: Type 'Double' is not compatible with the enclosing method's return type 'never'"

    # function: plain return — CTE
    - decl: |-
        function foo(): never {
            return
        }
      expected_out: "Semantic error ESE0091: Type 'undefined' is not compatible with the enclosing method's return type 'never'"

    # function: conditional where one branch does not throw — CTE
    - decl: |-
        function foo(x: int): never {
            if (x > 0) {
                throw new Error()
            }
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # lambda: empty body — CTE per spec foo6
    - decl: |-
        let foo = (): never => {}
      expected_out: "Semantic error ESE57199: Lambda with a non-void return type must return a value."

    # lambda: body with normal statements, no throw — CTE
    - decl: |-
        let foo = (): never => {
            let x = 1
        }
      expected_out: "Semantic error ESE57199: Lambda with a non-void return type must return a value."

    # lambda: return value — CTE
    - decl: |-
        let foo = (): never => {
            return 1
        }
      expected_out: "Semantic error ESE0091: Type 'Int' is not compatible with the enclosing method's return type 'never'"

    # lambda: plain return — CTE
    - decl: |-
        let foo = (): never => {
            return
        }
      expected_out: "Semantic error ESE0091: Type 'undefined' is not compatible with the enclosing method's return type 'never'"

    # class instance method: empty body — CTE
    - decl: |-
        class C {
            foo(): never {}
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # class instance method: body with normal statements, no throw — CTE
    - decl: |-
        class C {
            foo(): never {
                let x = 1
            }
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # class instance method: return value — CTE
    - decl: |-
        class C {
            foo(): never {
                return 'abc'
            }
        }
      expected_out: "Semantic error ESE0091: Type '\\\"abc\\\"' is not compatible with the enclosing method's return type 'never'"

    # class instance method: plain return — CTE
    - decl: |-
        class C {
            foo(): never {
                return 
            }
        }
      expected_out: "Semantic error ESE0091: Type 'undefined' is not compatible with the enclosing method's return type 'never'"

    # static class method: empty body — CTE
    - decl: |-
        class C {
            static foo(): never {}
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # static class method: body with normal statements — CTE
    - decl: |-
        class C {
            static foo(): never {
                let x = 1
            }
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # abstract class method: empty body — CTE
    - decl: |-
        abstract class C {
            foo(): never {}
        }
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."

    # interface default method: body with normal statements — CTE
    - decl: |-
        interface I {
            foo(): never {
                let x = 1
            }
        }
        class C implements I {}
      expected_out: "Semantic error ESE0103: Function with non-void/undefined return type must return a value."
