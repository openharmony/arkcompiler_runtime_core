---
cases:
  - desc: Deadlock itself.
    decl: |-
      async function startTest() {
        let options = new AsyncLockOptions<void>();
        options.timeout = 100;
        let lock = new AsyncLock();

        await lock.lockAsync<void, void>(async () => {
          await lock.lockAsync<void, void>(async () => {
          }, AsyncLockMode.EXCLUSIVE, options);
        }, AsyncLockMode.EXCLUSIVE, options);
      }
    logic: |-
      waitForCompletion(startTest);
    expected_error: |-
      "Error: AsyncLock:: Operation timed out"

  - desc: AsyncLock Timeout Prevents Deadlock.
    decl: |-
      async function startTest() {
        let lock1 = new AsyncLock();
        let lock2 = new AsyncLock();

        const task1 = async () => {
          const p1 = lock1.lockAsync(async () => {
            await lock2.lockAsync(async () => {
            }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(false, null, 50));
          }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(true, null, 100));
          await p1;
        };

        const task2 = async () => {
          const p2 = lock2.lockAsync(async () => {
            await lock1.lockAsync(async () => {
            }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(false, null, 50));
          }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(true, null, 100));
          await p2;
        };
        await Promise.all([task1(), task2()]);
      }
    logic: |-
      waitForCompletion(startTest);
    expected_error: |-
      "Error: AsyncLock:: Operation timed out"

  - desc: Circular Dependency Timeout.
    decl: |-
      async function startTest() {
        const locks = [
          new AsyncLock(),
          new AsyncLock(),
          new AsyncLock()
        ];
          
        const task = async (lockOrder: int[]) => {
          let firstLock = locks[lockOrder[0]];
          let secondLock = locks[lockOrder[1]];
          
          const p1 = firstLock.lockAsync(async () => {
            await secondLock.lockAsync(async () => {
            }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(false, null, 100));
          }, AsyncLockMode.EXCLUSIVE, new AsyncLockOptions(true, null, 50));
          await p1;
        };
          
        // Circular Dependency
        await Promise.all([
          task([0, 1]), // A -> B
          task([1, 2]), // B -> C  
          task([2, 0])  // C -> A
        ]);
      }
    logic: |-
      waitForCompletion(startTest);
    expected_error: |-
      "Error: AsyncLock:: Operation timed out"