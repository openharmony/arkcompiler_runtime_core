---
cases:
  - desc: Asynchronous condition variable basic functionality.
    logic: |-
      async function startTest() {
        let m = new concurrency.stackless.AsyncMutex();
        let cv = new concurrency.stackless.AsyncCondVar();
        let flag = false;

        const ea1 = new EAWorker();
        ea1.start();
        ea1.run<undefined>(() => {
          waitForCompletion(async () => {
            await m.lock()
            flag = true
            cv.notifyOne(m)
            m.unlock()
          })
        }).Await();

        const ea2 = new EAWorker();
        ea2.start();
        ea2.run<undefined>(() => {
          waitForCompletion(async () => {
            await m.lock()
            while (flag == false) {
              await cv.wait(m)
            }
            arktest.assertTrue(flag);
            m.unlock()
          })
        }).Await();
        
        ea1.quit();
        ea2.quit();
      }