---
cases:
  - desc: Asynchronous read/write lock basic functionality.
    logic: |-
      async function startTest() {
        let rwLock = new concurrency.stackless.AsyncReadWriteLock();
        let readLock = rwLock.readLock();
        let writeLock = rwLock.writeLock();
        let writeAcquired = false;
        let i = 0;

        const ea1 = new EAWorker();
        ea1.start();
        ea1.run<undefined>(() => {
          waitForCompletion(async () => {
            await readLock.lock();
            arktest.assertFalse(writeAcquired);
            i++;
            arktest.assertEQ(i, 1);
            i--;
            readLock.unlock();
          })
        }).Await();
      
        const ea2 = new EAWorker();
        ea2.start();
        ea2.run<undefined>(() => {
          waitForCompletion(async () => {
            await writeLock.lock();
            writeAcquired = true;
            i++;
            arktest.assertEQ(i, 1);
            i--;
            Coroutine.Schedule();
            writeLock.unlock();
          })
        }).Await();

        arktest.assertTrue(writeAcquired);
        ea1.quit();
        ea2.quit();
      }