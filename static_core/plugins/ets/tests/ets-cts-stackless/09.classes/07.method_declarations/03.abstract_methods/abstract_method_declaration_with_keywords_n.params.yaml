--- # List of valid method modifiers
modifiers:
#0
  - mod: "static"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#1
  - mod: "override"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#2
  - mod: "final"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#3
  - mod: "native"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#4
  - mod: "async"
    expected: "Syntax error ESY0118: Abstract method cannot be async."
#5
  - mod: "private"
    expected: "Semantic error ESE0047: Invalid method modifier(s): an abstract method can't have private, override, static, final or native modifier."
#6
  - mod: "abstract"
    expected: "Syntax error ESY0115: Duplicated modifier is not allowed."
