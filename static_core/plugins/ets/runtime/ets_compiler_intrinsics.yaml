coretypes:
- managed_class: std.core.Object
  mirror_class: ark::ets::EtsObject

- managed_class: std.core.String
  mirror_class: ark::ets::EtsString

intrinsics_namespace: ark::ets::intrinsics

intrinsics:

  - name: CompilerEtsEquals
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: u1
      args: [ ref, ref ]
    impl: ark::ets::intrinsics::CompilerEtsEquals
    set_flags: [ commutative ]
    clear_flags: [ acc_read, heap_inv, no_dce, no_cse, no_hoist ]
    peephole_func: PeepholeEquals

  - name: CompilerEtsStrictEquals
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: u1
      args: [ ref, ref ]
    impl: ark::ets::intrinsics::CompilerEtsStrictEquals
    set_flags: [ commutative ]
    clear_flags: [ acc_read, heap_inv, no_dce, no_cse, no_hoist ]
    peephole_func: PeepholeStrictEquals

  - name: CompilerEtsTypeof
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: std.core.String
      args: [ ref ]
    impl: ark::ets::intrinsics::CompilerEtsTypeof
    set_flags: [ no_nullptr ]
    clear_flags: [ acc_read, no_dce ]
    peephole_func: PeepholeTypeof

  - name: CompilerEtsIstrue
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: u1
      args: [ ref ]
    impl: ark::ets::intrinsics::CompilerEtsIstrue
    clear_flags: [ acc_read, require_state, can_throw, heap_inv, no_dce, no_cse, no_hoist  ]
    need_param_locations: true
    peephole_func: PeepholeIstrue

  - name: CompilerEtsLongToStringDecimal
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: std.core.String
      args: [ i64, u64 ]
    impl: ark::ets::intrinsics::CompilerLongToStringDecimal
    codegen_arch: [arm64, amd64]
    codegen_func: CreateLongToStringDecimal
    llvm_codegen_func: EmitLongToStringDecimal
    need_param_locations: true

  - name: CompilerEtsFloatToStringDecimal
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: std.core.String
      args: [ u32, u64 ]
    impl: ark::ets::intrinsics::CompilerFloatToStringDecimal
    codegen_arch: [arm64, amd64]
    codegen_func: CreateFloatToStringDecimal
    llvm_codegen_func: EmitFloatToStringDecimal
    need_param_locations: true

  - name: CompilerEtsDoubleToStringDecimal
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: std.core.String
      args: [ u64, u64 ]
    impl: ark::ets::intrinsics::CompilerDoubleToStringDecimal
    codegen_arch: [arm64, amd64]
    codegen_func: CreateDoubleToStringDecimal
    llvm_codegen_func: EmitDoubleToStringDecimal
    need_param_locations: true

  - name: CompilerEtsNullcheck
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: void
      args: [ ref ]
    impl: ark::ets::intrinsics::CompilerEtsNullcheck
    set_flags: [ no_nullptr ]
    clear_flags: [ heap_inv, acc_write ]
    peephole_func: PeepholeNullcheck

  - name: CompilerEtsStringFromCharCodeSingleNoCache
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: std.core.String
      args: [ u64 ]
    codegen_arch: [ arm64, amd64 ]
    codegen_func: CreateStringFromCharCode
    llvm_codegen_func: EmitStringFromCharCode

  - name: CompilerEtsMemmoveUnchecked_Ref
    space: ets
    compiler_only: true
    static: true
    signature:
      ret: void
      args:
        - std.core.Object\[
        - std.core.Object\[
        - i32
        - i32
        - i32
    impl: ark::ets::intrinsics::CompilerMemmoveUnchecked
