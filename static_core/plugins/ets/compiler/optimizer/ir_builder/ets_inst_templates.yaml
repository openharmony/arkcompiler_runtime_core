  ets: |-
    % name = inst.opcode.upcase.split('_')[1]
    % case name
    % when "LDNULLVALUE"
    UpdateDefinitionAcc(graph_->GetOrCreateUniqueObjectInst());
    % when "MOVNULLVALUE"
    UpdateDefinition(instruction->GetVReg<<%=inst.get_format%>, 0>(), graph_->GetOrCreateUniqueObjectInst());
    % when "ISNULLVALUE"
    BuildIsNullValue(instruction);
    % when "STRICTEQUALS"
    BuildEquals<true>(instruction);
    % when "EQUALS"
    BuildEquals(instruction);
    % when "TYPEOF"
    BuildTypeof(instruction);
    % when "ISTRUE"
    BuildIstrue(instruction);
    % when "NULLCHECK"
    BuildNullcheck(instruction);
    % when "ASYNC"
    %   opcode = inst.opcode.upcase.split('_')[2]
    %   case opcode
    %   when "DISPATCH"
    BuildDispatch(instruction);
    %   when "SUSPEND"
    BuildSuspend(instruction);
    %   else
    UNREACHABLE();
    %   end
    % else
    UNREACHABLE();
    % end
