prefixes:
  - name: ets
    description: Extension for ETS support.

namespaces:
  - namespace: ets
    quickening: false

verification:
  - tag: v2_obj_or_null
    description: Second operand contains a reference to an object or null.

groups:

  - title: Load 'nullvalue' reference into accumulator
    description: >
      Load 'nullvalue' reference into accumulator.
    verification:
      - acc_type
    exceptions:
      - x_none
    pseudo: |
      acc = nullvalue
    namespace: ets
    instructions:
      - sig: ets.ldnullvalue
        prefix: ets
        acc: out:ref
        format: [pref_op_none]

  - title: Move 'nullvalue' reference into a register
    description: >
      Move 'nullvalue' reference into a register.
    verification:
      - none
    exceptions:
      - x_none
    pseudo: |
      vd = nullvalue_object
    namespace: ets
    instructions:
      - sig: ets.movnullvalue v:out:ref
        prefix: ets
        acc: none
        format: [pref_op_v_8]

  - title: Check if accumulator value is 'nullvalue'
    description: >
      Check if accumulator value is 'nullvalue'.
    verification:
      - v1_object
      - acc_type
    exceptions:
      - x_none
    pseudo: |
      if acc == nullvalue_object then
        acc = 1
      else
        acc = 0
      end
    namespace: ets
    instructions:
      - sig: ets.isnullvalue
        prefix: ets
        acc: inout:ref->i32
        format: [pref_op_none]

  - title: Check if two references are loosely equal
    description: >
      Check if two references are loosely equal.
    verification:
      - v1_obj_or_null
      - v2_obj_or_null
      - acc_type
    exceptions:
      - x_none
    pseudo:
      if v1 == v2 then
        acc = 1
      else if is_nullish(v1) or is_nullish(v2) then
        acc = is_nullish(v1) and is_nullish(v2)
      else
        if is_value_typed(v1) and is_value_typed(v2) then
          acc = value_equals(v1, v2) then
        else
          acc = 0
        end
      end
    namespace: ets
    instructions:
      - sig: ets.equals v1:in:ref, v2:in:ref
        prefix: ets
        acc: out:i32
        format: [pref_op_v1_4_v2_4]
        intrinsic_name: INTRINSIC_COMPILER_ETS_EQUALS

  - title: Strict check if two references are strictly equal
    description: >
      Check if two references are strictly equal.
    verification:
      - v1_obj_or_null
      - v2_obj_or_null
      - acc_type
    exceptions:
      - x_none
    pseudo:
      if v1 == v2 then
        acc = 1
      else if is_nullish(v1) or is_nullish(v2) then
        acc = 0
      else
        if is_value_typed(v1) and is_value_typed(v2) then
          acc = value_equals(v1, v2) then
        else
          acc = 0
        end
      end
    namespace: ets
    instructions:
      - sig: ets.strictequals v1:in:ref, v2:in:ref
        prefix: ets
        acc: out:i32
        format: [pref_op_v1_4_v2_4]
        intrinsic_name: INTRINSIC_COMPILER_ETS_STRICT_EQUALS

  - title: Evaluate typeof string
    description: >
      Evaluate typeof string
    verification:
      - v1_obj_or_null
      - acc_type
    exceptions:
      - x_oom
    namespace: ets
    instructions:
      - sig: ets.typeof v1:in:ref
        prefix: ets
        acc: out:ref
        format: [pref_op_v1_8]
        intrinsic_name: INTRINSIC_COMPILER_ETS_TYPEOF

  - title: Check if value is 'true' in extended conditional semantics
    description: >
      Check if the value in the accumulator is considered true in ETS semantics.
    verification:
      - v1_obj_or_null
      - acc_type
    exceptions:
      - x_none
    namespace: ets
    instructions:
      - sig: ets.istrue v:in:ref
        prefix: ets
        acc: out:i32
        format: [pref_op_v_8]
        intrinsic_name: INTRINSIC_COMPILER_ETS_ISTRUE

  - title: Check if the value of reference is null (ets undefined)
    description: >
     Throw a NullPointerError if the value in the accumulator is null
    verification:
      - v1_obj_or_null
      - acc_type
    exceptions:
      - x_null
    namespace: ets
    instructions:
      - sig: ets.nullcheck
        prefix: ets
        acc: in:ref
        format: [pref_op_none]
        intrinsic_name: INTRINSIC_COMPILER_ETS_NULLCHECK

  - title: Suspend coroutine and return to the caller
    description: >
      Suspend coroutine and return to the caller
    verification:
      - none
    exceptions:
      - x_null
    properties:
      - suspend
    pseudo: |
      context = vs
      if context == null then
       throw NullPointerException
      end
      resume_point_id = convert_resume_point_pc_to_id(next_pc)
      if resume_point_id == INVALID_RESUME_POINT_ID then
        throw_ets_exception(...)
      end
      store_resume_point_id(context, resume_point_id)
      save_vregs_to(context)
      acc = load_return_value(context)
      return acc
    namespace: ets
    instructions:
      - sig: ets.async.suspend v:in:ref
        prefix: ets
        acc: out:ref
        format: [pref_op_v_8]

  - title: Select a resume point and move to it
    description: >
      Select a resume point and move to it
    verification:
      - none
    exceptions:
      - x_none
    properties:
      - dispatch
    pseudo: |
      context = vs
      if context != null then
        restore_vregs_from(context)
        resume_point_id = load_resume_point_id(context)
        new_pc = convert_resume_point_id_to_pc(resume_point_id)
        pc = new_pc
      end
    namespace: ets
    instructions:
      - sig: ets.async.dispatch v:in:ref
        prefix: ets
        acc: out:ref
        format: [pref_op_v_8]
